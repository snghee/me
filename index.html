/* gapi는 나중에 비동기 로드 - 없어도 메뉴는 동작 */
function loadGapi() {
  return new Promise((res) => {
    if (window.gapi) { res(); return; }
    const s = document.createElement('script');
    s.src = 'https://apis.google.com/js/api.js';
    s.onload = res; s.onerror = res;
    document.head.appendChild(s);
  });
}

/* Google Identity Services (GIS) 로드 */
function loadGIS() {
  return new Promise((res) => {
    if (window.google?.accounts?.oauth2) { res(); return; }
    const s = document.createElement('script');
    s.src = 'https://accounts.google.com/gsi/client';
    s.onload = res; s.onerror = res;
    document.head.appendChild(s);
  });
}

/* Drive access_token 확보 (GIS tokenClient 방식) */
let _driveToken = null;
let _driveTokenExp = 0;
function getDriveToken() {
  return new Promise(async (res, rej) => {
    if (_driveToken && Date.now() < _driveTokenExp) { res(_driveToken); return; }
    await loadGIS();
    if (!window.google?.accounts?.oauth2) { rej(new Error('Google GIS 로드 실패')); return; }
    const client = google.accounts.oauth2.initTokenClient({
      client_id: CLIENT_ID,
      scope: 'https://www.googleapis.com/auth/drive',
      callback: (resp) => {
        if (resp.error) { rej(new Error('Google 인증 실패: ' + resp.error)); return; }
        _driveToken    = resp.access_token;
        _driveTokenExp = Date.now() + (resp.expires_in - 60) * 1000;
        res(_driveToken);
      },
    });
    client.requestAccessToken({ prompt: _driveToken ? '' : 'consent' });
  });
}

const GITHUB_API    = 'https://api.github.com';

// GitHub API 헬퍼
async function ghGetTree() {
  const r = await fetch(
    `${GITHUB_API}/repos/${GITHUB_OWNER}/${GITHUB_REPO}/git/trees/${GITHUB_BRANCH}?recursive=1`
  );
  if (!r.ok) throw new Error('GitHub 트리 로드 실패');
  const data = await r.json();
  return data.tree.filter(f => f.type === 'blob' && f.path.endsWith('.md'));
}

async function ghGetRawFile(path, bustCache=false) {
  const url = `https://raw.githubusercontent.com/${GITHUB_OWNER}/${GITHUB_REPO}/${GITHUB_BRANCH}/${path}`
    + (bustCache ? `?t=${Date.now()}` : '');
  const r = await fetch(url, bustCache ? {cache:'no-store'} : {});
  if (!r.ok) throw new Error(`파일 로드 실패: ${path}`);
  return await r.text();
}

/* ── Google Drive ── */
function initGapi() {
  return new Promise(async (res,rej) => {
    if (driveInit) { res(); return; }
    await loadGapi();
    if (!window.gapi) { rej(new Error('gapi 로드 실패')); return; }
    gapi.load('client', async () => {
      try { await gapi.client.init({ apiKey:GOOGLE_API_KEY, discoveryDocs:['https://www.googleapis.com/discovery/v1/apis/drive/v3/rest'] }); driveInit=true; res(); }
      catch(e) { rej(e); }
    });
  });
}
async function fetchDriveFiles(id) {
  await initGapi();
  const r = await gapi.client.drive.files.list({ q:`'${id}' in parents and trashed=false`, pageSize:100, fields:'files(id,name,mimeType)' });
  return r.result.files||[];
}

    }

  }

async function populateExecMenu(dd) {
  dd.innerHTML = '<div class="dd-item">⏳ JS 파일 불러오는 중...</div>';
  try {
    const r = await fetch(`${GITHUB_API}/repos/${GITHUB_OWNER}/${GITHUB_REPO}/git/trees/${GITHUB_BRANCH}?recursive=1`);
    if (!r.ok) throw new Error('GitHub 로드 실패');
    const data = await r.json();
    const jsFiles = data.tree.filter(f => f.type === 'blob' && f.path.endsWith('.js') && !f.path.startsWith('.'));

    dd.innerHTML = '';
    if (!jsFiles.length) {
      dd.innerHTML = '<div class="dd-item" style="color:#94a3b8">(JS 파일 없음)</div>';
      return;
    }

    /* 설명 헤더 */
    const hdr = document.createElement('div');
    hdr.style.cssText = 'padding:6px 14px 4px;font-size:10px;color:rgba(255,255,255,0.35);letter-spacing:1px;text-transform:uppercase;border-bottom:1px solid rgba(255,255,255,0.08);';
    hdr.textContent = '⚡ JS 스크립트 실행';
    dd.appendChild(hdr);

    /* 폴더별 그룹 */
    const grouped = {};
    jsFiles.forEach(f => {
      const parts = f.path.split('/');
      const name = parts[parts.length-1];
      const folder = parts.length > 1 ? parts.slice(0,-1).join('/') : '루트';
      (grouped[folder] = grouped[folder]||[]).push({ name, path: f.path });
    });

    const runJs = async (filePath, fileName) => {
      closeAll();
      try {
        showToast(`⚡ ${fileName} 실행 중...`);
        const raw = await ghGetRawFile(filePath, true);
        /* console 출력 캡처 */
        const logs = [];
        const origLog = console.log, origWarn = console.warn, origErr = console.error;
        console.log  = (...a) => { logs.push('📋 '+a.join(' ')); origLog(...a); };
        console.warn = (...a) => { logs.push('⚠️ '+a.join(' ')); origWarn(...a); };
        console.error= (...a) => { logs.push('❌ '+a.join(' ')); origErr(...a); };
        let result;
        try {
          // eslint-disable-next-line no-new-func
          result = await (new Function('fetch','showToast','loadObsidianFileByPath',
            '"use strict";\n'+raw))(fetch, showToast, loadObsidianFileByPath);
        } finally {
          console.log = origLog; console.warn = origWarn; console.error = origErr;
        }
        /* 결과 팝업 */
        showExecResult(fileName, logs, result);
      } catch(e) {
        showToast('❌ 실행 오류: ' + e.message, true);
      }
    };

    /* 루트 파일 */
    if (grouped['루트']) {
      grouped['루트'].forEach(f => {

async function downloadObsidianFile(filePath, name) {
  try {
    const r = await fetch(
      `https://raw.githubusercontent.com/${GITHUB_OWNER}/${GITHUB_REPO}/${GITHUB_BRANCH}/${filePath}`
    );
    if (!r.ok) throw new Error('다운로드 실패');
    const blob = await r.blob();
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href=url; a.download=name+'.md';
    document.body.appendChild(a); a.click(); URL.revokeObjectURL(url); a.remove();
    recordDownload(name, filePath);
  } catch(e) { alert(e.message); }
}

let _ndMode = 'edit';

function ndSetMode(mode) {
  _ndMode = mode;
  // 버튼 active
  ['edit','split','preview'].forEach(m => {
    const b = document.getElementById('nd-btn-'+m);
    if (b) b.classList.toggle('active', m === mode);
  });
  const single   = document.getElementById('nd-textarea-single');
  const splitW   = document.getElementById('nd-split-wrap');
  const taSplit  = document.getElementById('nd-textarea');
  const prevS    = document.getElementById('nd-preview-single');

  // 현재 내용 동기화
  const curVal = (single && single.style.display !== 'none') ? single.value
               : (taSplit ? taSplit.value : '');

  if (mode === 'edit') {
    if (single)  { single.style.display='block'; single.value=curVal; }
    if (splitW)  splitW.style.display='none';
    if (prevS)   prevS.style.display='none';
  } else if (mode === 'split') {
    if (single)  single.style.display='none';
    if (splitW)  { splitW.style.display='grid'; if(taSplit) taSplit.value=curVal; }
    if (prevS)   prevS.style.display='none';
    ndSyncPreview();
  } else { // preview
    if (single)  single.style.display='none';
    if (splitW)  splitW.style.display='none';
    if (prevS)   { prevS.style.display='block'; prevS.innerHTML=mdToHtml(curVal); }
  }
}

function ndSyncPreview() {
  const taSplit  = document.getElementById('nd-textarea');
  const taSingle = document.getElementById('nd-textarea-single');
  const val = (taSplit && taSplit.style.display !== 'none') ? taSplit.value : (taSingle ? taSingle.value : '');
  const p1 = document.getElementById('nd-preview');
  const p2 = document.getElementById('nd-preview-single');
  if (p1) p1.innerHTML = mdToHtml(val);
  if (p2) p2.innerHTML = mdToHtml(val);
}

async function saveNewDoc() {
  // _ndMode 기준으로 textarea 선택
  let body = '';
  if (_ndMode === 'split') {
    body = document.getElementById('nd-textarea')?.value || '';
  } else {
    body = document.getElementById('nd-textarea-single')?.value || '';
  }

  // 둘 다 비어있으면 fallback
  if (!body.trim()) {
    body = document.getElementById('nd-textarea-single')?.value
        || document.getElementById('nd-textarea')?.value
        || '';
  }

  if (!body.trim()) { showToast('❌ 내용을 입력하세요', true); return; }

  _currentRawContent = body;
  _currentFilePath = null;
  _currentFileSha  = null;
  showSaveDialog('새문서.md', '루트');
}

async function _saveNewDoc_unused() {
  const folder = '';
  const title  = '';
  const taSplit  = document.getElementById('nd-textarea');
  const taSingle = document.getElementById('nd-textarea-single');
  const body = (taSplit && taSplit.style.display !== 'none') ? taSplit.value : (taSingle ? taSingle.value : '');

  if (!title) { showToast('❌ 파일명을 입력하세요', true); return; }

  const fileName   = title.endsWith('.md') ? title : title + '.md';
  const filePath   = folder ? `${folder}/${fileName}` : fileName;
  // 경로 세그먼트별 인코딩 (슬래시 보존)
  const encodedPath = folder
    ? `${encodeURIComponent(folder)}/${encodeURIComponent(fileName)}`
    : encodeURIComponent(fileName);

  let token = localStorage.getItem('gh_write_token');
  if (!token) {
    token = prompt('GitHub Token 입력 (최초 1회):');
    if (!token) return;
    localStorage.setItem('gh_write_token', token);
  }

  const encoded = btoa(unescape(encodeURIComponent(body)));

  // 파일 존재 여부 확인 (SHA 필요)
  let sha = undefined;
  try {
    const check = await fetch(
      `${GITHUB_API}/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${encodedPath}?ref=${GITHUB_BRANCH}&t=${Date.now()}`,
      { headers: { 'Authorization': `token ${token}` } }
    );
    if (check.ok) { const j = await check.json(); sha = j.sha; }
  } catch(e) {}

  const payload = { message: sha ? `Update ${fileName}` : `Create ${fileName}`, content: encoded, branch: GITHUB_BRANCH };
  if (sha) payload.sha = sha;

  const btn = document.querySelector('#new-doc-wrap .editor-save-btn, .editor-save-btn');
  if (btn) { btn.disabled = true; btn.textContent = '⏳ 저장 중...'; }

  const r = await fetch(
    `${GITHUB_API}/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${encodedPath}`,
    { method:'PUT', headers:{'Authorization':`token ${token}`,'Content-Type':'application/json'}, body:JSON.stringify(payload) }
  );

  if (btn) { btn.disabled = false; btn.innerHTML = '저장'; }

  if (r.ok) {
    const result = await r.json();
    showToast(`✅ 저장 완료: ${filePath}`);
    // 저장 후 에디터로 전환
    _currentFilePath   = filePath;
    _currentFileSha    = result.content.sha;
    _currentFileName   = fileName;
    _currentFileFolder = folder || '루트';
    _currentRawContent = body;
    _editorMode = 'preview';
    renderEditor(_currentFileName, _currentFileFolder);
  } else {
    const err = await r.json();
    showToast('❌ ' + (err.message || '저장 실패'), true);
  }
}

/* ── 마크다운 → HTML ── */
function mdToHtml(md) {
  if (!md) return '';
  if (typeof marked !== 'undefined') {
    // marked.js 설정
    marked.setOptions({
      breaks: true,       // 단일 줄바꿈 → <br>
      gfm: true,          // GitHub Flavored Markdown (표, 체크박스 등)
      highlight: function(code, lang) {
        if (typeof hljs !== 'undefined' && lang && hljs.getLanguage(lang)) {
          return hljs.highlight(code, { language: lang }).value;
        }
        return typeof hljs !== 'undefined' ? hljs.highlightAuto(code).value : code;
      }
    });
    return marked.parse(md);
  }
  // fallback: marked 로드 전
  if (!md) return '';
  return '<p>' + md
    .replace(/^### (.+)$/gm,'<h3>$1</h3>')
    .replace(/^## (.+)$/gm,'<h2>$1</h2>')
    .replace(/^# (.+)$/gm,'<h1>$1</h1>')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/\*(.+?)\*/g,'<em>$1</em>')
    .replace(/\[(.+?)\]\((.+?)\)/g,'<a href="$2" target="_blank">$1</a>')
    .replace(/`(.+?)`/g,'<code>$1</code>')
    .replace(/^- (.+)$/gm,'<li>$1</li>')
    .replace(/\n\n/g,'</p><p>')
    .replace(/\n/g,'<br>') + '</p>';
}

/* ── 통계 ── */
function recordDownload(name, id) {
  let s = JSON.parse(localStorage.getItem('downloadStats')||'[]');
  const now = new Date().toLocaleString('ko-KR');
  const ex = s.find(x=>x.fileId===id);
  if (ex) { ex.count++; ex.lastDownload=now; }
  else s.push({ fileId:id, fileName:name, count:1, firstDownload:now, lastDownload:now });
  localStorage.setItem('downloadStats', JSON.stringify(s));
  renderDashboard();
}

async function recordVisit() {
  let ip='알 수 없음';
  try { const r=await fetch('https://api.ipify.org?format=json'); ip=(await r.json()).ip; } catch(e){}
  let v = JSON.parse(localStorage.getItem('visitLog')||'[]');
  v.unshift({ time:new Date().toLocaleString('ko-KR'), ip });
  if (v.length>50) v=v.slice(0,50);
  localStorage.setItem('visitLog', JSON.stringify(v));
  renderDashboard();
}

              + '<thead><tr style="background:#f8fafc"><th style="padding:8px 12px;text-align:left;font-size:11px;color:#94a3b8">파일명</th><th style="padding:8px 12px;text-align:center;font-size:11px;color:#94a3b8">횟수</th><th style="padding:8px 12px;text-align:right;font-size:11px;color:#94a3b8">마지막</th></tr></thead>'
              + '<tbody>' + dlRows + '</tbody></table>'
            : '<div style="padding:20px;text-align:center;color:#94a3b8;font-size:13px">기록 없음</div>'}
        </div>
      </div>
    </div>
  </div>`;
}

/* ── 옵시디안 그래프 ── */
let graphZoom = null, graphSvg = null, graphSim = null, graphPaused = false;

async function initObsidianGraph() {
  // DOM 렌더링 완료 후 실행 (offsetWidth 보장)
  await new Promise(r => requestAnimationFrame(() => requestAnimationFrame(r)));

  const wrap = document.getElementById('graph-wrap');
  const svg  = document.getElementById('obs-graph');
  if (!svg || !wrap) return;

  // wrap 크기가 0이면 잠깐 기다리기
  if (wrap.offsetWidth === 0) {
    await new Promise(r => setTimeout(r, 100));
  }

  // 로딩 표시
  svg.innerHTML = '<text x="50%" y="50%" text-anchor="middle" fill="#666" font-size="13" dy=".3em">⏳ 그래프 로딩 중...</text>';

  try {
    // GitHub 트리에서 노드 생성
    const tree = await ghGetTree();
    // 파일 목록 + frontmatter tags 추출 (병렬 로드, 최대 20개)
    const rawNodes = tree
      .filter(f => !f.path.startsWith('.'))
      .map(f => {
        const parts = f.path.split('/');
        const name   = parts[parts.length-1].replace(/\.md$/, '');
        const folder = parts.length > 1 ? parts.slice(0,-1).join('/') : '루트';
        return { id: f.path.replace(/\.md$/, ''), name, path: f.path, folder, tags: [] };
      });

    // 최대 30개 파일에서 frontmatter tags 병렬 로드
    const loadLimit = Math.min(rawNodes.length, 30);
    await Promise.allSettled(rawNodes.slice(0, loadLimit).map(async n => {
      try {
        const raw = await ghGetRawFile(n.path);
        const fm = raw.match(/^---[\s\S]*?---/);
        if (fm) {
          const fmText = fm[0];
          // [tag1, tag2] 인라인 배열 형식
          const inlineArr = fmText.match(/^tags:\s*\[([^\]]+)\]/im);
          if (inlineArr) {
            n.tags = inlineArr[1].split(',').map(t=>t.trim().replace(/^['"]|['"]$/g,'')).filter(Boolean);
          } else {
            // block 리스트 형식 (- tag)
            const blockM = fmText.match(/^tags:\s*\n((?:[ \t]*-[ \t]*[^\n]+\n?)+)/im);
            if (blockM) {
              n.tags = [...blockM[1].matchAll(/^[ \t]*-[ \t]*(.+)/gm)].map(m=>m[1].trim());
            } else {
              // 공백/쉼표 구분 인라인
              const plainM = fmText.match(/^tags:\s*([^\n\[{]+)/im);
              if (plainM) n.tags = plainM[1].split(/[,\s]+/).map(t=>t.trim()).filter(Boolean);
            }
          }
        }
      } catch(e) {}
    }));

    const nodes = rawNodes.map(n => ({ ...n, isTag: false }));

    if (!nodes.length) {
      svg.innerHTML = '<text x="50%" y="50%" text-anchor="middle" fill="#aaa" font-size="13" dy=".3em">노트가 없습니다</text>';
      return;
    }

    // ── 태그 독립 노드 생성 ──
    const allTags = new Set();
    nodes.forEach(n => (n.tags||[]).forEach(t => allTags.add(t)));
    const tagNodes = [...allTags].map(t => ({
      id: '__tag__' + t, name: t, path: null, folder: '__tag__', tags: [], isTag: true
    }));
    const allNodes = [...nodes, ...tagNodes];

    // ── 링크: 폴더 기반(folder) + 태그 기반(tag) ──
    const links = [];
    const linkSet = new Set();
    const addLink = (a, b, type) => {
      const key = [a,b].sort().join('||') + '|' + type;
      if (!linkSet.has(key)) { linkSet.add(key); links.push({ source: a, target: b, type }); }
    };
    // 같은 폴더끼리 연결
    const folderMap = {};
    nodes.forEach(n => { if(!folderMap[n.folder]) folderMap[n.folder]=[]; folderMap[n.folder].push(n.id); });
    Object.values(folderMap).forEach(ids => {
      for (let i = 0; i < ids.length-1; i++) addLink(ids[i], ids[i+1], 'folder');
    });
    // 파일 → 태그 노드 연결
    nodes.forEach(n => {
      (n.tags||[]).forEach(t => {
        addLink(n.id, '__tag__' + t, 'tag');
      });
    });

    drawGraph(svg, allNodes, links);
    document.getElementById('graph-wrap').classList.add('loaded');
    // 버튼 아이콘 현재 스타일로 동기화
    const sb = document.getElementById('graph-style-btn');
    if (sb) { sb.textContent = _graphStyles[_graphStyle]; sb.title = _graphLabels[_graphStyle]; }
  } catch(e) {
    svg.innerHTML = `<text x="50%" y="50%" text-anchor="middle" fill="#e74c3c" font-size="12" dy=".3em">⚠️ GitHub 연결 실패: ${e.message}</text>`;
  }
}

/* ── 그래프 스타일 관리 ── */
let _graphStyle = 3; // 0=은하수 1=포스 2=버블 3=지구본
const _graphStyles = ['🌌','🕸','🔵','🌍'];
const _graphLabels = ['은하수','포스그래프','버블차트','3D지구본'];
let _graphNodes = null, _graphLinks = null;

function cycleGraphStyle() {
  _graphStyle = (_graphStyle + 1) % 4;
  const btn = document.getElementById('graph-style-btn');
  if (btn) {
    btn.textContent = _graphStyles[_graphStyle];
    btn.title = _graphLabels[_graphStyle];
  }
  const svgEl = document.getElementById('obs-graph');
  if (svgEl && _graphNodes) drawGraph(svgEl, _graphNodes, _graphLinks);
}

function drawGraph(svgEl, nodes, links) {
  // 노드/링크 저장 (스타일 전환용)
  _graphNodes = nodes; _graphLinks = links;

  if (_graphStyle === 0) drawGalaxy(svgEl, nodes, links);
  else if (_graphStyle === 1) drawForce(svgEl, nodes, links);
  else if (_graphStyle === 2) drawBubble(svgEl, nodes, links);
  else drawGlobe(svgEl, nodes, links);
}

/* ════════════════════════════════
   🌌 은하수 스타일
════════════════════════════════ */
function drawGalaxy(svgEl, nodes, links) {
  if(window._globeRAF){cancelAnimationFrame(window._globeRAF);window._globeRAF=null;}
  if(window._kaTimer){clearTimeout(window._kaTimer);window._kaTimer=null;}
  graphPaused=false; graphSim=null;

  const wrap=svgEl.parentElement;
  const W=wrap.offsetWidth||900, H=wrap.offsetHeight||600;
  const tooltip=document.getElementById('graph-tooltip');

  const PALETTE=['#7eb8f7','#fbbf67','#f9a8d4','#a78bfa','#67e8f9','#86efac','#fca5a5','#6ee7b7','#fdba74','#c4b5fd'];
  const TAG_CLR='#4ade80';
  const fileFolders=[...new Set(nodes.filter(n=>!n.isTag).map(n=>n.folder))];
  const folderColor=d3.scaleOrdinal(PALETTE).domain(fileFolders);
  const nodeColor=d=>d.isTag?TAG_CLR:folderColor(d.folder);

  const svg=d3.select(svgEl).attr('width',W).attr('height',H);
  svg.selectAll('*').remove();
  const defs=svg.append('defs');

  // 고정 배경색
  const bgGr=defs.append('radialGradient').attr('id','gx-bg').attr('cx','50%').attr('cy','50%');
  bgGr.append('stop').attr('offset','0%').attr('stop-color','#0a0f2e');
  bgGr.append('stop').attr('offset','100%').attr('stop-color','#020408');
  svg.append('rect').attr('width',W).attr('height',H).attr('fill','url(#gx-bg)');

  // 은하 중심 글로우 그라디언트
  const cGr=defs.append('radialGradient').attr('id','gx-core').attr('cx','50%').attr('cy','50%');
  cGr.append('stop').attr('offset','0%').attr('stop-color','rgba(160,120,255,0.3)');
  cGr.append('stop').attr('offset','100%').attr('stop-color','rgba(0,0,0,0)');

  const mkGlow=(id,blur)=>{
    const f=defs.append('filter').attr('id',id).attr('x','-80%').attr('y','-80%').attr('width','260%').attr('height','260%');
    f.append('feGaussianBlur').attr('in','SourceGraphic').attr('stdDeviation',blur).attr('result','blur');
    const m=f.append('feMerge');m.append('feMergeNode').attr('in','blur');m.append('feMergeNode').attr('in','SourceGraphic');
  };
  mkGlow('gx-nf',2.5);mkGlow('gx-nt',4.5);mkGlow('gx-arm',8);

  // 줌 레이어 (배경+별+콘텐츠 전부 여기 안에)
  const g=svg.append('g');
  const zoom=d3.zoom().scaleExtent([0.2,8]).on('zoom',e=>g.attr('transform',e.transform));
  svg.call(zoom); graphZoom=zoom; graphSvg=svg;

  // 배경 별 (줌과 함께 움직임)
  g.append('rect').attr('x',-W).attr('y',-H).attr('width',W*3).attr('height',H*3).attr('fill','url(#gx-bg)').attr('pointer-events','none');
  for(let i=0;i<280;i++){
    g.append('circle')
      .attr('cx',(Math.sin(i*127.1)*0.5+0.5)*W*1.5-W*0.25)
      .attr('cy',(Math.sin(i*311.7)*0.5+0.5)*H*1.5-H*0.25)
      .attr('r',(Math.sin(i*57.3)*0.5+0.5)*1.3+0.15)
      .attr('fill','white').attr('opacity',(Math.sin(i*93.1)*0.5+0.5)*0.55+0.06)
      .attr('pointer-events','none');
  }
  // 은하 중심 글로우
  g.append('ellipse').attr('cx',W/2).attr('cy',H/2).attr('rx',W*0.35).attr('ry',H*0.22).attr('fill','url(#gx-core)').attr('pointer-events','none');

  const CX=W/2, CY=H/2, MAX_R=Math.min(W,H)*0.44;
  const numArms=Math.max(fileFolders.length,1);

  // 나선팔 노드 배치
  const folderCnt={},folderIdx2={};
  nodes.filter(n=>!n.isTag).forEach(n=>{folderCnt[n.folder]=(folderCnt[n.folder]||0)+1;});
  nodes.forEach(n=>{
    if(n.isTag)return;
    const ai=fileFolders.indexOf(n.folder);
    folderIdx2[n.folder]=folderIdx2[n.folder]||0;
    const idx=folderIdx2[n.folder]++,total=folderCnt[n.folder];
    const armOffset=(2*Math.PI*ai)/numArms;
    const t=0.35+(idx/Math.max(total-1,1))*0.6;
    const r=MAX_R*t,theta=armOffset+t*2.8+(idx%3-1)*0.18;
    const spread=MAX_R*0.045*(1+t),perpAngle=theta+Math.PI/2;
    const scatter=(((idx*7+ai*13)%17)/17-0.5)*spread;
    n._px=CX+r*Math.cos(theta)+scatter*Math.cos(perpAngle);
    n._py=CY+r*Math.sin(theta)*0.55+scatter*Math.sin(perpAngle)*0.55;
  });
  const tagNodes=nodes.filter(n=>n.isTag);
  tagNodes.forEach((n,i)=>{
    const angle=(2*Math.PI*i)/Math.max(tagNodes.length,1)-Math.PI/2;
    n._px=CX+MAX_R*0.18*Math.cos(angle);n._py=CY+MAX_R*0.18*Math.sin(angle)*0.55;
  });

  // 나선팔 배경선 (줌 레이어 안)
  fileFolders.forEach((fol,ai)=>{
    const pts=[];
    for(let t=0;t<=1;t+=0.02){
      const ao=(2*Math.PI*ai)/numArms,th=ao+(0.3+t*0.65)*2.8,r=MAX_R*(0.3+t*0.65);
      pts.push([CX+r*Math.cos(th),CY+r*Math.sin(th)*0.55]);
    }
    const lg=d3.line().x(d=>d[0]).y(d=>d[1]).curve(d3.curveCatmullRom);
    g.append('path').attr('d',lg(pts)).attr('fill','none').attr('stroke',folderColor(fol)).attr('stroke-width',18).attr('stroke-opacity',0.12).attr('filter','url(#gx-arm)').attr('pointer-events','none');
    g.append('path').attr('d',lg(pts)).attr('fill','none').attr('stroke',folderColor(fol)).attr('stroke-width',1.5).attr('stroke-opacity',0.35).attr('pointer-events','none');
  });

  const lc={}; nodes.forEach(n=>{lc[n.id]=0;});
  links.forEach(l=>{const s=typeof l.source==='object'?l.source.id:l.source,t=typeof l.target==='object'?l.target.id:l.target;if(lc[s]!=null)lc[s]++;if(lc[t]!=null)lc[t]++;});
  const nodeR=d=>d.isTag?Math.max(5,Math.min(5+(lc[d.id]||0)*2.5,20)):Math.max(4,Math.min(4+(lc[d.id]||0)*1.2,15));

  const nodeById={}; nodes.forEach(n=>{nodeById[n.id]=n;});
  const linkData=links.map(l=>({src:nodeById[typeof l.source==='object'?l.source.id:l.source],tgt:nodeById[typeof l.target==='object'?l.target.id:l.target],type:l.type})).filter(l=>l.src&&l.tgt);

  const linkLayer=g.append('g');
  const linkEls=linkData.map(l=>linkLayer.append('line').attr('stroke',l.type==='tag'?'rgba(74,222,128,0.4)':'rgba(160,190,255,0.12)').attr('stroke-width',l.type==='tag'?1:0.6).attr('stroke-dasharray',l.type==='tag'?'4,3':'none').attr('x1',l.src._px).attr('y1',l.src._py).attr('x2',l.tgt._px).attr('y2',l.tgt._py));

  const nodeLayer=g.append('g');
  nodes.forEach(n=>{
    const ng=nodeLayer.append('g').attr('transform',`translate(${n._px},${n._py})`).style('cursor',n.isTag?'default':'pointer');
    ng.append('circle').attr('class','nhalo').attr('r',nodeR(n)+(n.isTag?7:4)).attr('fill','none').attr('stroke',nodeColor(n)).attr('stroke-width',n.isTag?1.5:0.8).attr('stroke-opacity',n.isTag?0.45:0.2);
    ng.append('circle').attr('class','nbody').datum(n).attr('r',nodeR(n)).attr('fill',nodeColor(n)).attr('fill-opacity',n.isTag?0.95:0.88).attr('filter',`url(#${n.isTag?'gx-nt':'gx-nf'})`);
    if(n.isTag){const r2=nodeR(n)*0.5;ng.append('polygon').attr('points',`0,${-r2} ${r2},0 0,${r2} ${-r2},0`).attr('fill','#56d364').attr('fill-opacity',0.65).attr('pointer-events','none');}
    ng.append('text').attr('x',nodeR(n)+5).attr('dy','0.35em').attr('font-size',n.isTag?'9.5px':'10px').attr('fill',n.isTag?'rgba(74,222,128,0.92)':'rgba(210,225,255,0.85)').attr('pointer-events','none').text(n.name.length>16?n.name.slice(0,16)+'…':n.name);
    _attachNodeEvents(ng,n,nodeR,nodeColor,lc,links,linkData,linkEls,nodeLayer,tooltip,nodeById);
  });
  svg.on('click',()=>{tooltip.style.display='none';});
}

/* ════════════════════════════════
   🕸 포스 그래프
════════════════════════════════ */
function drawForce(svgEl, nodes, links) {
  if(window._globeRAF){cancelAnimationFrame(window._globeRAF);window._globeRAF=null;}
  if(window._kaTimer){clearTimeout(window._kaTimer);window._kaTimer=null;}
  graphPaused=false;

  const wrap=svgEl.parentElement;
  const W=wrap.offsetWidth||900, H=wrap.offsetHeight||600;
  const tooltip=document.getElementById('graph-tooltip');

  const PALETTE=['#7eb8f7','#fbbf67','#f9a8d4','#a78bfa','#67e8f9','#86efac','#fca5a5','#6ee7b7','#fdba74','#c4b5fd'];
  const TAG_CLR='#4ade80';
  const fileFolders=[...new Set(nodes.filter(n=>!n.isTag).map(n=>n.folder))];
  const folderColor=d3.scaleOrdinal(PALETTE).domain(fileFolders);
  const nodeColor=d=>d.isTag?TAG_CLR:folderColor(d.folder);

  const svg=d3.select(svgEl).attr('width',W).attr('height',H);
  svg.selectAll('*').remove();
  const defs=svg.append('defs');
  svg.append('rect').attr('width',W).attr('height',H).attr('fill','#07111f');
  const mkGlow=(id,blur)=>{const f=defs.append('filter').attr('id',id).attr('x','-80%').attr('y','-80%').attr('width','260%').attr('height','260%');f.append('feGaussianBlur').attr('in','SourceGraphic').attr('stdDeviation',blur).attr('result','blur');const m=f.append('feMerge');m.append('feMergeNode').attr('in','blur');m.append('feMergeNode').attr('in','SourceGraphic');};
  mkGlow('ff-nf',2.5);mkGlow('ff-nt',4.5);mkGlow('ff-af',18);

  const lc={}; nodes.forEach(n=>{lc[n.id]=0;});
  links.forEach(l=>{const s=typeof l.source==='object'?l.source.id:l.source,t=typeof l.target==='object'?l.target.id:l.target;if(lc[s]!=null)lc[s]++;if(lc[t]!=null)lc[t]++;});
  const nodeR=d=>d.isTag?Math.max(5,Math.min(5+(lc[d.id]||0)*2.5,20)):Math.max(5,Math.min(5+(lc[d.id]||0)*1.3,18));

  const clusterR=Math.min(W,H)*0.30;
  const clusterCenter={};
  fileFolders.forEach((fol,i)=>{
    const angle=(2*Math.PI*i)/fileFolders.length-Math.PI/2;
    clusterCenter[fol]={x:W/2+clusterR*Math.cos(angle),y:H/2+clusterR*Math.sin(angle)};
  });

  const sim=d3.forceSimulation(nodes)
    .force('link',d3.forceLink(links).id(d=>d.id).distance(l=>l.type==='tag'?55:45).strength(l=>l.type==='tag'?0.3:0.7))
    .force('charge',d3.forceManyBody().strength(d=>d.isTag?-80:-160).distanceMax(300))
    .force('center',d3.forceCenter(W/2,H/2).strength(0.015))
    .force('collision',d3.forceCollide(d=>nodeR(d)+12).strength(0.85))
    .force('cluster-x',d3.forceX(d=>d.isTag?W/2:(clusterCenter[d.folder]?.x??W/2)).strength(d=>d.isTag?0.03:0.22))
    .force('cluster-y',d3.forceY(d=>d.isTag?H/2:(clusterCenter[d.folder]?.y??H/2)).strength(d=>d.isTag?0.03:0.22))
    .alphaMin(0.002).alphaDecay(0.008).velocityDecay(0.38);
  graphSim=sim;

  function keepAlive(){if(graphPaused)return;if(sim.alpha()<0.012)sim.alpha(0.05).restart();window._kaTimer=setTimeout(keepAlive,2500);}
  keepAlive();

  const g=svg.append('g');
  const zoom=d3.zoom().scaleExtent([0.15,10]).on('zoom',e=>g.attr('transform',e.transform));
  svg.call(zoom); graphZoom=zoom; graphSvg=svg;

  // 클러스터 영역 원
  const areaCircles={};
  fileFolders.forEach(fol=>{
    const ci=g.append('circle').attr('r',60).attr('fill',folderColor(fol)).attr('fill-opacity',0.04).attr('stroke',folderColor(fol)).attr('stroke-width',1.5).attr('stroke-opacity',0.2).attr('stroke-dasharray','6,4').attr('filter','url(#ff-af)');
    areaCircles[fol]=ci;
    areaCircles[fol+'_lbl']=g.append('text').attr('text-anchor','middle').attr('font-size','11px').attr('font-weight','700').attr('fill',folderColor(fol)).attr('fill-opacity',0.55).attr('pointer-events','none').text(fol);
  });

  const nodeById={}; nodes.forEach(n=>{nodeById[n.id]=n;});
  const linkData=links.map(l=>({src:nodeById[typeof l.source==='object'?l.source.id:l.source],tgt:nodeById[typeof l.target==='object'?l.target.id:l.target],type:l.type})).filter(l=>l.src&&l.tgt);

  const linkLayer=g.append('g');
  const linkEls=linkData.map(l=>linkLayer.append('line').attr('stroke',l.type==='tag'?'rgba(74,222,128,0.4)':'rgba(160,195,255,0.14)').attr('stroke-width',l.type==='tag'?1:0.6).attr('stroke-dasharray',l.type==='tag'?'4,3':'none').attr('stroke-linecap','round'));

  const nodeLayer=g.append('g');
  nodes.forEach(n=>{
    const ng=nodeLayer.append('g').style('cursor',n.isTag?'default':'pointer')
      .call(d3.drag().on('start',(e,d)=>{if(!e.active)sim.alphaTarget(0.25).restart();d.fx=d.x;d.fy=d.y;}).on('drag',(e,d)=>{d.fx=e.x;d.fy=e.y;}).on('end',(e,d)=>{if(!e.active)sim.alphaTarget(0);d.fx=null;d.fy=null;}));
    ng.append('circle').attr('class','nhalo').attr('r',nodeR(n)+(n.isTag?7:5)).attr('fill','none').attr('stroke',nodeColor(n)).attr('stroke-width',n.isTag?1.5:0.9).attr('stroke-opacity',n.isTag?0.45:0.2);
    ng.append('circle').attr('class','nbody').datum(n).attr('r',nodeR(n)).attr('fill',nodeColor(n)).attr('fill-opacity',n.isTag?0.95:0.88).attr('filter',`url(#${n.isTag?'ff-nt':'ff-nf'})`);
    if(n.isTag){const r2=nodeR(n)*0.5;ng.append('polygon').attr('points',`0,${-r2} ${r2},0 0,${r2} ${-r2},0`).attr('fill','#56d364').attr('fill-opacity',0.65).attr('pointer-events','none');}
    ng.append('text').attr('x',nodeR(n)+5).attr('dy','0.35em').attr('font-size',n.isTag?'9.5px':'10px').attr('fill',n.isTag?'rgba(74,222,128,0.92)':'rgba(210,225,255,0.85)').attr('pointer-events','none').text(n.name.length>16?n.name.slice(0,16)+'…':n.name);
    _attachNodeEvents(ng,n,nodeR,nodeColor,lc,links,linkData,linkEls,nodeLayer,tooltip,nodeById);
  });

  sim.on('tick',()=>{
    linkEls.forEach((line,i)=>{const l=linkData[i];line.attr('x1',l.src.x).attr('y1',l.src.y).attr('x2',l.tgt.x).attr('y2',l.tgt.y);});
    let ni=0; nodeLayer.selectAll('g').each(function(){if(nodes[ni])d3.select(this).attr('transform',`translate(${nodes[ni].x||0},${nodes[ni].y||0})`);ni++;});
    fileFolders.forEach(fol=>{
      const fn=nodes.filter(n=>!n.isTag&&n.folder===fol&&n.x&&n.y);
      if(!fn.length)return;
      const mx=d3.mean(fn,d=>d.x),my=d3.mean(fn,d=>d.y);
      const r=Math.max(40,(d3.max(fn,d=>Math.hypot(d.x-mx,d.y-my))||0)+30);
      areaCircles[fol].attr('cx',mx).attr('cy',my).attr('r',r);
      areaCircles[fol+'_lbl']?.attr('x',mx).attr('y',my-r-8);
    });
  });
  svg.on('click',()=>{tooltip.style.display='none';});
}

/* ════════════════════════════════
   🔵 버블 차트
════════════════════════════════ */
function drawBubble(svgEl, nodes, links) {
  if(window._globeRAF){cancelAnimationFrame(window._globeRAF);window._globeRAF=null;}
  if(window._kaTimer){clearTimeout(window._kaTimer);window._kaTimer=null;}
  graphPaused=false;

  const wrap=svgEl.parentElement;
  const W=wrap.offsetWidth||900, H=wrap.offsetHeight||600;
  const tooltip=document.getElementById('graph-tooltip');

  const PALETTE=['#7eb8f7','#fbbf67','#f9a8d4','#a78bfa','#67e8f9','#86efac','#fca5a5','#6ee7b7','#fdba74','#c4b5fd'];
  const TAG_CLR='#4ade80';
  const fileFolders=[...new Set(nodes.filter(n=>!n.isTag).map(n=>n.folder))];
  const folderColor=d3.scaleOrdinal(PALETTE).domain(fileFolders);
  const nodeColor=d=>d.isTag?TAG_CLR:folderColor(d.folder);

  const svg=d3.select(svgEl).attr('width',W).attr('height',H);
  svg.selectAll('*').remove();
  const defs=svg.append('defs');
  const bgGr=defs.append('radialGradient').attr('id','bb-bg').attr('cx','50%').attr('cy','50%');
  bgGr.append('stop').attr('offset','0%').attr('stop-color','#0a1120');
  bgGr.append('stop').attr('offset','100%').attr('stop-color','#04080f');
  svg.append('rect').attr('width',W).attr('height',H).attr('fill','url(#bb-bg)');
  const mkGlow=(id,blur)=>{const f=defs.append('filter').attr('id',id).attr('x','-80%').attr('y','-80%').attr('width','260%').attr('height','260%');f.append('feGaussianBlur').attr('in','SourceGraphic').attr('stdDeviation',blur).attr('result','blur');const m=f.append('feMerge');m.append('feMergeNode').attr('in','blur');m.append('feMergeNode').attr('in','SourceGraphic');};
  mkGlow('bb-nf',2.5);mkGlow('bb-nt',5);mkGlow('bb-bf',22);

  const lc={}; nodes.forEach(n=>{lc[n.id]=0;});
  links.forEach(l=>{const s=typeof l.source==='object'?l.source.id:l.source,t=typeof l.target==='object'?l.target.id:l.target;if(lc[s]!=null)lc[s]++;if(lc[t]!=null)lc[t]++;});
  const nodeR=d=>d.isTag?Math.max(5,Math.min(5+(lc[d.id]||0)*2.5,20)):Math.max(5,Math.min(5+(lc[d.id]||0)*1.3,18));

  const folderNodeCnt={};
  fileFolders.forEach(f=>{folderNodeCnt[f]=nodes.filter(n=>!n.isTag&&n.folder===f).length;});

  // D3 pack
  const packRoot=d3.hierarchy({id:'root',children:fileFolders.map(fol=>({id:fol,value:folderNodeCnt[fol]||1}))}).sum(d=>d.value||0);
  d3.pack().size([W*0.9,H*0.88]).padding(18)(packRoot);
  const bubblePos={};
  (packRoot.children||[]).forEach(c=>{bubblePos[c.data.id]={x:c.x+W*0.05,y:c.y+H*0.06,r:c.r};});

  // 버블 그리기
  const bubbleG=svg.append('g');
  fileFolders.forEach(fol=>{
    const bp=bubblePos[fol]; if(!bp)return;
    const ci=folderColor(fol);
    const gid='bb-gr-'+fol.replace(/[^a-z0-9]/gi,'_');
    const gr=defs.append('radialGradient').attr('id',gid).attr('cx','38%').attr('cy','35%');
    gr.append('stop').attr('offset','0%').attr('stop-color',ci).attr('stop-opacity','0.16');
    gr.append('stop').attr('offset','100%').attr('stop-color',ci).attr('stop-opacity','0.04');
    bubbleG.append('circle').attr('cx',bp.x).attr('cy',bp.y).attr('r',bp.r+10).attr('fill','none').attr('stroke',ci).attr('stroke-width',1).attr('stroke-opacity',0.15).attr('filter','url(#bb-bf)');
    bubbleG.append('circle').attr('cx',bp.x).attr('cy',bp.y).attr('r',bp.r).attr('fill',`url(#${gid})`).attr('stroke',ci).attr('stroke-width',1.2).attr('stroke-opacity',0.35);
    bubbleG.append('text').attr('x',bp.x).attr('y',bp.y-bp.r+18).attr('text-anchor','middle').attr('font-size','12px').attr('font-weight','700').attr('fill',ci).attr('fill-opacity',0.75).attr('pointer-events','none').text(fol.length>16?fol.slice(0,16)+'…':fol);
    bubbleG.append('text').attr('x',bp.x).attr('y',bp.y+bp.r-10).attr('text-anchor','middle').attr('font-size','10px').attr('fill',ci).attr('fill-opacity',0.4).attr('pointer-events','none').text(folderNodeCnt[fol]+'개');
  });

  // 노드 배치
  const folderI2={};
  nodes.forEach(n=>{
    if(n.isTag){const ti=nodes.filter(x=>x.isTag).indexOf(n);const tagR=Math.min(50,nodes.filter(x=>x.isTag).length*8);const angle=(2*Math.PI*ti)/Math.max(nodes.filter(x=>x.isTag).length,1)-Math.PI/2;n._px=W/2+tagR*Math.cos(angle);n._py=H/2+tagR*Math.sin(angle);return;}
    const bp=bubblePos[n.folder]; if(!bp){n._px=W/2;n._py=H/2;return;}
    const total=folderNodeCnt[n.folder];
    folderI2[n.folder]=folderI2[n.folder]||0;
    const idx=folderI2[n.folder]++;
    if(total===1){n._px=bp.x;n._py=bp.y;return;}
    const rings=Math.ceil(Math.sqrt(total/Math.PI));
    let placed=0,found=false;
    for(let ring=1;ring<=rings+2&&!found;ring++){
      const perRing=Math.round(2*Math.PI*ring*2.2);
      for(let j=0;j<perRing&&placed<total&&!found;j++,placed++){
        if(placed===idx){const angle=(2*Math.PI*j)/perRing,rr=(ring/(rings+1))*(bp.r*0.78);n._px=bp.x+rr*Math.cos(angle);n._py=bp.y+rr*Math.sin(angle);found=true;}
      }
    }
    if(!found){n._px=bp.x;n._py=bp.y;}
  });

  const sim=d3.forceSimulation(nodes)
    .force('link',d3.forceLink(links).id(d=>d.id).distance(l=>l.type==='tag'?60:30).strength(l=>l.type==='tag'?0.2:0.5))
    .force('charge',d3.forceManyBody().strength(d=>d.isTag?-50:-90).distanceMax(200))
    .force('collision',d3.forceCollide(d=>nodeR(d)+8).strength(0.9))
    .force('bubble-x',d3.forceX(d=>d.isTag?W/2:(bubblePos[d.folder]?.x??W/2)).strength(d=>d.isTag?0.05:0.35))
    .force('bubble-y',d3.forceY(d=>d.isTag?H/2:(bubblePos[d.folder]?.y??H/2)).strength(d=>d.isTag?0.05:0.35))
    .alphaMin(0.002).alphaDecay(0.012).velocityDecay(0.45);
  graphSim=sim;

  const g=svg.append('g');
  const zoom=d3.zoom().scaleExtent([0.2,10]).on('zoom',e=>{bubbleG.attr('transform',e.transform);g.attr('transform',e.transform);});
  svg.call(zoom); graphZoom=zoom; graphSvg=svg;

  const nodeById={}; nodes.forEach(n=>{nodeById[n.id]=n;});
  const linkData=links.map(l=>({src:nodeById[typeof l.source==='object'?l.source.id:l.source],tgt:nodeById[typeof l.target==='object'?l.target.id:l.target],type:l.type})).filter(l=>l.src&&l.tgt);
  const linkLayer=g.append('g');
  const linkEls=linkData.map(l=>linkLayer.append('line').attr('stroke',l.type==='tag'?'rgba(74,222,128,0.45)':'rgba(160,195,255,0.15)').attr('stroke-width',l.type==='tag'?1:0.6).attr('stroke-dasharray',l.type==='tag'?'4,3':'none').attr('stroke-linecap','round'));

  const nodeLayer=g.append('g');
  nodes.forEach(n=>{
    const ng=nodeLayer.append('g').style('cursor',n.isTag?'default':'pointer')
      .call(d3.drag().on('start',(e,d)=>{if(!e.active)sim.alphaTarget(0.2).restart();d.fx=d.x;d.fy=d.y;}).on('drag',(e,d)=>{d.fx=e.x;d.fy=e.y;}).on('end',(e,d)=>{if(!e.active)sim.alphaTarget(0);d.fx=null;d.fy=null;}));
    ng.append('circle').attr('class','nhalo').attr('r',nodeR(n)+(n.isTag?7:4)).attr('fill','none').attr('stroke',nodeColor(n)).attr('stroke-width',n.isTag?1.5:0.8).attr('stroke-opacity',n.isTag?0.5:0.2);
    ng.append('circle').attr('class','nbody').datum(n).attr('r',nodeR(n)).attr('fill',nodeColor(n)).attr('fill-opacity',n.isTag?0.95:0.88).attr('filter',`url(#${n.isTag?'bb-nt':'bb-nf'})`);
    if(n.isTag){const r2=nodeR(n)*0.5;ng.append('polygon').attr('points',`0,${-r2} ${r2},0 0,${r2} ${-r2},0`).attr('fill','#56d364').attr('fill-opacity',0.65).attr('pointer-events','none');}
    ng.append('text').attr('x',nodeR(n)+5).attr('dy','0.35em').attr('font-size',n.isTag?'9.5px':'10px').attr('fill',n.isTag?'rgba(74,222,128,0.92)':'rgba(210,225,255,0.88)').attr('pointer-events','none').text(n.name.length>16?n.name.slice(0,16)+'…':n.name);
    _attachNodeEvents(ng,n,nodeR,nodeColor,lc,links,linkData,linkEls,nodeLayer,tooltip,nodeById);
  });

  sim.on('tick',()=>{
    linkEls.forEach((line,i)=>{const l=linkData[i];line.attr('x1',l.src.x).attr('y1',l.src.y).attr('x2',l.tgt.x).attr('y2',l.tgt.y);});
    let ni=0;nodeLayer.selectAll('g').each(function(){if(nodes[ni])d3.select(this).attr('transform',`translate(${nodes[ni].x||0},${nodes[ni].y||0})`);ni++;});
  });
  svg.on('click',()=>{tooltip.style.display='none';});
}

/* ════════════════════════════════
   🌍 3D 지구본
════════════════════════════════ */
function drawGlobe(svgEl, nodes, links) {
  if(window._globeRAF){cancelAnimationFrame(window._globeRAF);window._globeRAF=null;}
  if(window._kaTimer){clearTimeout(window._kaTimer);window._kaTimer=null;}
  graphPaused=false; graphSim=null;
  const pauseBtn=document.getElementById('pause-btn');
  if(pauseBtn){pauseBtn.textContent='⏸ 멈춤';pauseBtn.classList.remove('paused');}

  const wrap=svgEl.parentElement;
  const W=wrap.offsetWidth||900, H=wrap.offsetHeight||600;
  const CX=W/2, CY=H/2, R=Math.min(W,H)*0.38;
  const tooltip=document.getElementById('graph-tooltip');

  const PALETTE=['#7eb8f7','#fbbf67','#f9a8d4','#a78bfa','#67e8f9','#86efac','#fca5a5','#6ee7b7','#fdba74','#c4b5fd'];
  const TAG_CLR='#4ade80';
  const fileFolders=[...new Set(nodes.filter(n=>!n.isTag).map(n=>n.folder))];
  const folderColor=d3.scaleOrdinal(PALETTE).domain(fileFolders);
  const nodeColor=d=>d.isTag?TAG_CLR:folderColor(d.folder);

  const svg=d3.select(svgEl).attr('width',W).attr('height',H);
  svg.selectAll('*').remove();
  const defs=svg.append('defs');

  const bgGr=defs.append('radialGradient').attr('id','gb-bg').attr('cx','42%').attr('cy','38%');
  bgGr.append('stop').attr('offset','0%').attr('stop-color','#090f22');
  bgGr.append('stop').attr('offset','100%').attr('stop-color','#020408');
  svg.append('rect').attr('width',W).attr('height',H).attr('fill','url(#gb-bg)');

  for(let i=0;i<250;i++){svg.append('circle').attr('cx',(Math.sin(i*127.1)*0.5+0.5)*W).attr('cy',(Math.sin(i*311.7)*0.5+0.5)*H).attr('r',(Math.sin(i*57.3)*0.5+0.5)*1.3+0.15).attr('fill','white').attr('opacity',(Math.sin(i*93.1)*0.5+0.5)*0.55+0.07);}

  const globeGr=defs.append('radialGradient').attr('id','gb-globe').attr('cx','35%').attr('cy','32%');
  globeGr.append('stop').attr('offset','0%').attr('stop-color','#12305a');
  globeGr.append('stop').attr('offset','60%').attr('stop-color','#0a1e3d');
  globeGr.append('stop').attr('offset','100%').attr('stop-color','#04101f');
  const hlGr=defs.append('radialGradient').attr('id','gb-hl').attr('cx','32%').attr('cy','28%');
  hlGr.append('stop').attr('offset','0%').attr('stop-color','rgba(150,200,255,0.22)');
  hlGr.append('stop').attr('offset','100%').attr('stop-color','rgba(0,0,0,0)');

  const mkGlow=(id,blur)=>{const f=defs.append('filter').attr('id',id).attr('x','-80%').attr('y','-80%').attr('width','260%').attr('height','260%');f.append('feGaussianBlur').attr('in','SourceGraphic').attr('stdDeviation',blur).attr('result','blur');const m=f.append('feMerge');m.append('feMergeNode').attr('in','blur');m.append('feMergeNode').attr('in','SourceGraphic');};
  mkGlow('gb-nf',2.5);mkGlow('gb-nt',5);mkGlow('gb-halo',12);

  svg.append('circle').attr('cx',CX).attr('cy',CY).attr('r',R+22).attr('fill','none').attr('stroke','rgba(80,140,255,0.06)').attr('stroke-width',28).attr('filter','url(#gb-halo)');
  svg.append('circle').attr('cx',CX).attr('cy',CY).attr('r',R+6).attr('fill','none').attr('stroke','rgba(100,170,255,0.12)').attr('stroke-width',7);
  svg.append('circle').attr('cx',CX).attr('cy',CY).attr('r',R).attr('fill','url(#gb-globe)').attr('stroke','rgba(80,150,255,0.3)').attr('stroke-width',1.5);
  svg.append('circle').attr('cx',CX).attr('cy',CY).attr('r',R).attr('fill','url(#gb-hl)').attr('pointer-events','none');
  defs.append('clipPath').attr('id','gb-clip').append('circle').attr('cx',CX).attr('cy',CY).attr('r',R-1);

  const bandStep=Math.PI/(fileFolders.length+1);
  const folderBand={};
  fileFolders.forEach((fol,i)=>{folderBand[fol]=-Math.PI/2+bandStep*(i+1);});
  const folderCnt={},folderIdx={};
  nodes.filter(n=>!n.isTag).forEach(n=>{folderCnt[n.folder]=(folderCnt[n.folder]||0)+1;});
  nodes.forEach(n=>{
    if(n.isTag)return;
    folderIdx[n.folder]=folderIdx[n.folder]||0;
    const total=folderCnt[n.folder],idx=folderIdx[n.folder]++;
    n._lat=folderBand[n.folder]; n._lng=(2*Math.PI*idx)/total-Math.PI+0.05;
  });
  const tagNodes=nodes.filter(n=>n.isTag);
  tagNodes.forEach((n,i)=>{n._lat=Math.PI/2-0.28;n._lng=(2*Math.PI*i)/Math.max(tagNodes.length,1)-Math.PI;});

  const lc={}; nodes.forEach(n=>{lc[n.id]=0;});
  links.forEach(l=>{const s=typeof l.source==='object'?l.source.id:l.source,t=typeof l.target==='object'?l.target.id:l.target;if(lc[s]!=null)lc[s]++;if(lc[t]!=null)lc[t]++;});
  const nodeR=d=>d.isTag?Math.max(6,Math.min(6+(lc[d.id]||0)*2.8,22)):Math.max(4,Math.min(4+(lc[d.id]||0)*1.3,16));

  let rotY=0,rotX=0.28;

  function project(lat,lng){
    const cosLat=Math.cos(lat),sinLat=Math.sin(lat);
    const cosLng=Math.cos(lng+rotY),sinLng=Math.sin(lng+rotY);
    const cosRX=Math.cos(rotX),sinRX=Math.sin(rotX);
    const x3=cosLat*sinLng,y3=sinLat*cosRX-cosLat*cosLng*sinRX,z3=sinLat*sinRX+cosLat*cosLng*cosRX;
    return{x:CX+R*x3,y:CY-R*y3,z:z3};
  }

  const gridG=svg.append('g').attr('clip-path','url(#gb-clip)');
  const contentG=svg.append('g').attr('clip-path','url(#gb-clip)');
  const linkLayer=contentG.append('g');
  const nodeLayer=contentG.append('g');

  const nodeById={}; nodes.forEach(n=>{nodeById[n.id]=n;});
  const linkData=links.map(l=>({src:nodeById[typeof l.source==='object'?l.source.id:l.source],tgt:nodeById[typeof l.target==='object'?l.target.id:l.target],type:l.type})).filter(l=>l.src&&l.tgt);
  const linkEls=linkData.map(l=>linkLayer.append('line').attr('stroke',l.type==='tag'?'rgba(74,222,128,0.55)':'rgba(160,200,255,0.2)').attr('stroke-width',l.type==='tag'?1.2:0.7).attr('stroke-dasharray',l.type==='tag'?'4,3':'none').attr('stroke-linecap','round'));

  const nodeGroups=[];
  nodes.forEach(n=>{
    const ng=nodeLayer.append('g').style('cursor',n.isTag?'default':'pointer');
    ng.append('circle').attr('class','nhalo').attr('r',nodeR(n)+(n.isTag?7:5)).attr('fill','none').attr('stroke',nodeColor(n)).attr('stroke-width',n.isTag?1.5:0.9).attr('stroke-opacity',n.isTag?0.5:0.22);
    ng.append('circle').attr('class','nbody').datum(n).attr('r',nodeR(n)).attr('fill',nodeColor(n)).attr('fill-opacity',n.isTag?0.95:0.88).attr('filter',`url(#${n.isTag?'gb-nt':'gb-nf'})`);
    if(n.isTag){const r2=nodeR(n)*0.5;ng.append('polygon').attr('points',`0,${-r2} ${r2},0 0,${r2} ${-r2},0`).attr('fill','#56d364').attr('fill-opacity',0.65).attr('pointer-events','none');}
    ng.append('text').attr('x',nodeR(n)+5).attr('dy','0.35em').attr('font-size',n.isTag?'9.5px':'10px').attr('fill',n.isTag?'rgba(74,222,128,0.92)':'rgba(210,225,255,0.88)').attr('pointer-events','none').text(n.name.length>16?n.name.slice(0,16)+'…':n.name);
    _attachNodeEvents(ng,n,nodeR,nodeColor,lc,links,linkData,linkEls,nodeLayer,tooltip,nodeById);
    nodeGroups.push({n,ng});
  });

  function render(){
    gridG.selectAll('*').remove();
    for(let lat=-60;lat<=60;lat+=30){
      const latR=lat*Math.PI/180,pts=[];
      for(let lng=-180;lng<=180;lng+=5){const p=project(latR,lng*Math.PI/180);if(p.z>-0.1)pts.push([p.x,p.y]);else if(pts.length>1){gridG.append('polyline').attr('points',pts.map(p=>p.join(',')).join(' ')).attr('fill','none').attr('stroke','rgba(100,170,255,0.12)').attr('stroke-width',0.5);pts.length=0;}}
      if(pts.length>1)gridG.append('polyline').attr('points',pts.map(p=>p.join(',')).join(' ')).attr('fill','none').attr('stroke','rgba(100,170,255,0.12)').attr('stroke-width',0.5);
    }
    for(let lng=-180;lng<180;lng+=30){
      const lngR=lng*Math.PI/180,pts=[];
      for(let lat=-85;lat<=85;lat+=4){const p=project(lat*Math.PI/180,lngR);if(p.z>-0.1)pts.push([p.x,p.y]);else if(pts.length>1){gridG.append('polyline').attr('points',pts.map(p=>p.join(',')).join(' ')).attr('fill','none').attr('stroke','rgba(100,170,255,0.10)').attr('stroke-width',0.5);pts.length=0;}}
      if(pts.length>1)gridG.append('polyline').attr('points',pts.map(p=>p.join(',')).join(' ')).attr('fill','none').attr('stroke','rgba(100,170,255,0.10)').attr('stroke-width',0.5);
    }
    const eqPts=[];for(let lng=-180;lng<=180;lng+=3){const p=project(0,lng*Math.PI/180);if(p.z>-0.05)eqPts.push([p.x,p.y]);}
    if(eqPts.length>1)gridG.append('polyline').attr('points',eqPts.map(p=>p.join(',')).join(' ')).attr('fill','none').attr('stroke','rgba(100,200,255,0.22)').attr('stroke-width',1);

    nodeGroups.forEach(({n,ng})=>{
      const p=project(n._lat,n._lng);
      const vis=p.z>-0.05,op=vis?Math.max(0,Math.min(1,(p.z+0.1)*1.8)):0,sc=vis?0.55+p.z*0.5:0;
      ng.attr('transform',`translate(${p.x},${p.y}) scale(${Math.max(0,sc)})`).attr('opacity',op).style('display',op<0.02?'none':null);
      n._px=p.x;n._py=p.y;n._pz=p.z;n._vis=vis;
    });
    linkEls.forEach((line,i)=>{
      const l=linkData[i];
      if(!l.src._vis&&!l.tgt._vis){line.style('display','none');return;}
      line.style('display',null).attr('x1',l.src._px).attr('y1',l.src._py).attr('x2',l.tgt._px).attr('y2',l.tgt._py).attr('opacity',Math.max(0,(Math.min(l.src._pz||0,l.tgt._pz||0)+0.1)*0.9));
    });
  }

  function animate(){if(!graphPaused)rotY+=0.004;render();window._globeRAF=requestAnimationFrame(animate);}
  animate();

  // 드래그 + 클릭 토글
  let isDragging=false,dragMoved=false,dragX0=0,dragY0=0,rotY0=0,rotX0=0;
  svg.on('mousedown',(e)=>{
    if(e.target.closest&&e.target.closest('g[style*="cursor"]'))return;
    isDragging=true;dragMoved=false;dragX0=e.clientX;dragY0=e.clientY;rotY0=rotY;rotX0=rotX;
  });
  svg.on('mousemove',(e)=>{
    if(!isDragging)return;
    const dx=e.clientX-dragX0,dy=e.clientY-dragY0;
    if(Math.abs(dx)>3||Math.abs(dy)>3)dragMoved=true;
    rotY=rotY0+dx*0.007;
    rotX=Math.max(-Math.PI/2.5,Math.min(Math.PI/2.5,rotX0-dy*0.007));
  });
  svg.on('mouseup',(e)=>{
    if(isDragging&&!dragMoved)toggleSimulation();
    isDragging=false;
  });
  svg.on('mouseleave',()=>{isDragging=false;});

  graphSvg=svg; graphZoom=null;
  svg.on('click',()=>{tooltip.style.display='none';});
}

/* ── 공통 노드 이벤트 ── */
function _attachNodeEvents(ng, n, nodeR, nodeColor, lc, links, linkData, linkEls, nodeLayer, tooltip, nodeById) {
  ng.on('mouseover',(e)=>{
      tooltip.style.display='block';
      if(n.isTag){
        tooltip.innerHTML=`<span style="color:#4ade80;font-weight:700">#${n.name}</span>&nbsp;<span style="opacity:.7">${lc[n.id]||0}개 노트</span>`;
      } else {
        const tagHtml=n.tags&&n.tags.length?n.tags.map(t=>`<span style="display:inline-block;padding:1px 6px;margin:1px 2px;background:rgba(74,222,128,0.18);border:1px solid rgba(74,222,128,0.45);border-radius:10px;color:#4ade80;font-size:10px">#${t}</span>`).join(''):'<span style="opacity:.45;font-size:10px">태그 없음</span>';
        tooltip.innerHTML=`<div style="font-weight:600;margin-bottom:4px;color:rgba(220,235,255,0.95)">${n.name}</div><div>${tagHtml}</div>`;
      }
      const conn=new Set([n.id]);
      links.forEach(l=>{const s=l.source?.id||l.source,t2=l.target?.id||l.target;if(s===n.id)conn.add(t2);if(t2===n.id)conn.add(s);});
      linkEls.forEach((line,i)=>{const l=linkData[i],hit=l.src.id===n.id||l.tgt.id===n.id;line.attr('stroke',hit?(l.type==='tag'?'rgba(74,222,128,0.95)':'rgba(200,225,255,0.9)'):(l.type==='tag'?'rgba(74,222,128,0.05)':'rgba(160,200,255,0.03)')).attr('stroke-width',hit?2.5:0.25);});
      nodeLayer.selectAll('circle.nbody').attr('fill-opacity',0.07);
      conn.forEach(id=>{nodeLayer.selectAll('circle.nbody').filter(function(d2){return d2&&d2.id===id;}).attr('fill-opacity',0.95);});
      ng.select('circle.nbody').attr('fill-opacity',1);
      ng.select('circle.nhalo').attr('stroke-opacity',0.9).attr('r',nodeR(n)+11);
    })
    .on('mousemove',e=>{tooltip.style.left=(e.clientX+16)+'px';tooltip.style.top=(e.clientY-38)+'px';})
    .on('mouseout',()=>{
      tooltip.style.display='none';
      linkEls.forEach((line,i)=>{const l=linkData[i];line.attr('stroke',l.type==='tag'?'rgba(74,222,128,0.55)':'rgba(160,200,255,0.2)').attr('stroke-width',l.type==='tag'?1.2:0.7);});
      nodeLayer.selectAll('circle.nbody').attr('fill-opacity',function(d2){return d2?.isTag?0.95:0.88;});
      ng.select('circle.nhalo').attr('stroke-opacity',n.isTag?0.5:0.22).attr('r',nodeR(n)+(n.isTag?7:5));
    })
    .on('click',(e)=>{
      e.stopPropagation();
      if(!n.isTag){loadObsidianFileByPath(n.path,n.name,n.folder);}
      else{
        const wrap=document.getElementById('graph-wrap');
        if(wrap)showTagPopup(n,e,nodeById,links,wrap);
      }
    });
}



/* ── 옵시디안 에디터 상태 ── */
let _editorMode = 'preview'; // 'preview' | 'edit' | 'split'
let _currentFilePath = null;
let _currentFileSha  = null;
let _currentRawContent = '';
let _currentFileName = '';
let _currentFileFolder = '';

async function loadObsidianFileByPath(filePath, name, folder) {
  // 전역 상태 먼저 설정
  _currentFileName   = name;
  _currentFileFolder = folder;
  _currentFilePath   = filePath;
  _editorMode        = 'preview';

  // 로딩 표시
  contentEl.className = 'content markdown-body';
  contentEl.innerHTML = `<div class="file-inner"><div class="breadcrumb">옵시디안 > ${folder} > ${name}</div><div class="loading"><div class="loading-spinner"></div></div></div>`;

  try {
    const meta = await ghGetFileMeta(filePath);
    _currentFileSha    = meta.sha;
    _currentRawContent = atob(meta.content.replace(/\n/g,''));
    try { _currentRawContent = decodeURIComponent(escape(_currentRawContent)); } catch(e2){}
    renderEditor(name, folder);
  } catch(e) {
    contentEl.innerHTML = `<div class="file-inner"><div class="err">❌ ${e.message}</div></div>`;
  }
}

async function ghGetFileMeta(path) {
  const r = await fetch(
    `${GITHUB_API}/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${encodeURIComponent(path)}?ref=${GITHUB_BRANCH}&t=${Date.now()}`,
    { cache: 'no-store' }
  );
  if (!r.ok) throw new Error(`파일 메타 로드 실패: ${path}`);
  return await r.json();
}

function renderEditor(name, folder) {
  const isEdit    = _editorMode === 'edit';
  const isSplit   = _editorMode === 'split';
  const isPreview = _editorMode === 'preview';

  /* ── 헤더 1행 ── */
  const headerEl = document.createElement('div');
  headerEl.style.cssText = 'display:flex;align-items:center;gap:4px;padding:6px 0;border-bottom:1px solid #e8edf2;flex-shrink:0;';

  /* 제목 영역 */
  const titleWrap = document.createElement('div');
  titleWrap.style.cssText = 'display:flex;flex-direction:column;min-width:0;margin-right:auto;overflow:hidden;';
  const bc = document.createElement('div');
  bc.style.cssText = 'font-size:9.5px;color:#aab;line-height:1.2;';
  bc.textContent = '옵시디안' + (folder && folder!=='루트' ? ' › ' + folder : '');
  const titleDiv = document.createElement('div');
  titleDiv.style.cssText = 'font-size:13px;font-weight:700;color:#1e293b;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;';
  titleDiv.textContent = name.replace(/\.md$/i, '');
  titleDiv.title = name;
  titleWrap.appendChild(bc);
  titleWrap.appendChild(titleDiv);
  headerEl.appendChild(titleWrap);

  /* 버튼 헬퍼 */
  function mkB(html, cls, handler, extra) {
    const b = document.createElement('button');
    b.className = cls; b.innerHTML = html;
    b.style.cssText = 'padding:3px 9px;font-size:11px;white-space:nowrap;flex-shrink:0;' + (extra||'');
    if (handler) b.addEventListener('click', handler);
    return b;
  }
  function mkSep() {
    const d = document.createElement('div');
    d.style.cssText = 'width:1px;height:16px;background:#e2e8f0;flex-shrink:0;';
    return d;
  }

  /* 모드 버튼 */
  headerEl.appendChild(mkB('미리보기', 'editor-mode-btn'+(isPreview?' active':''), ()=>setEditorMode('preview',name,folder)));
  headerEl.appendChild(mkB('편집',     'editor-mode-btn'+(isEdit   ?' active':''), ()=>setEditorMode('edit',   name,folder)));
  headerEl.appendChild(mkB('분할',     'editor-mode-btn'+(isSplit  ?' active':''), ()=>setEditorMode(isSplit?'preview':'split',name,folder)));
  headerEl.appendChild(mkSep());

  /* 저장/다운로드 */
  const saveBtn = mkB('저장', 'editor-save-btn', ()=>saveToGithub(_currentFileName, _currentFileFolder));
  saveBtn.id = 'save-btn';
  headerEl.appendChild(saveBtn);
  headerEl.appendChild(mkB('⬇', 'editor-toolbar-btn', ()=>downloadObsidianFile(_currentFilePath, name), 'padding:3px 8px;'));

  /* 서식 토글 버튼 */
  let fmtBarEl = null;
  if (!isPreview) {
    headerEl.appendChild(mkSep());
    const fmtBtn = mkB('✏ 서식', 'editor-toolbar-btn', null);
    headerEl.appendChild(fmtBtn);

    fmtBarEl = document.createElement('div');
    fmtBarEl.style.cssText = 'display:none;align-items:center;gap:2px;flex-wrap:wrap;padding:3px 0;border-bottom:1px solid #f0f4f8;flex-shrink:0;';

    function wrapSel(before, after, ph) {
      const ta = document.getElementById('editor-textarea'); if (!ta) return;
      const s = ta.selectionStart, e = ta.selectionEnd;
      const sel = ta.value.slice(s, e) || (ph||'텍스트');
      ta.setRangeText(before+sel+after, s, e, 'select');
      ta.selectionStart = s+before.length;
      ta.selectionEnd   = s+before.length+sel.length;
      ta.focus(); ta.dispatchEvent(new Event('input'));
    }
    function prependLine(prefix) {
      const ta = document.getElementById('editor-textarea'); if (!ta) return;
      const s = ta.selectionStart, val = ta.value;
      const ls = val.lastIndexOf('\n', s-1)+1;
      const le = val.indexOf('\n', s);
      const end = le===-1 ? val.length : le;
      const line = val.slice(ls, end);
      ta.setRangeText(line.startsWith(prefix)?line.slice(prefix.length):prefix+line, ls, end, 'end');
      ta.focus(); ta.dispatchEvent(new Event('input'));
    }
    function insertLine(text) {
      const ta = document.getElementById('editor-textarea'); if (!ta) return;
      const s = ta.selectionStart;
      ta.setRangeText('\n'+text+'\n', s, s, 'end');
      ta.focus(); ta.dispatchEvent(new Event('input'));
    }

    [['<b>B</b>','굵게',    ()=>wrapSel('**','**','굵은')],
     ['<i>I</i>','기울임',  ()=>wrapSel('*','*','기울임')],
     ['<s>S</s>','취소선',  ()=>wrapSel('~~','~~','취소선')],
     ['`',       '코드',    ()=>wrapSel('`','`','코드')],
     ['H1',      '제목1',   ()=>prependLine('# ')],
     ['H2',      '제목2',   ()=>prependLine('## ')],
     ['H3',      '제목3',   ()=>prependLine('### ')],
     ['❝',       '인용',    ()=>prependLine('> ')],
     ['—',       '구분선',  ()=>insertLine('---')],
     ['☑',       '체크박스',()=>prependLine('- [ ] ')],
     ['🔗',      '링크',    ()=>wrapSel('[','](https://)','링크')],
     ['⌥',       '코드블록',()=>wrapSel('\n```\n','\n```\n','코드')],
     ['▤',       '표',      ()=>insertLine('| 헤더1 | 헤더2 |\n| --- | --- |\n| 셀1 | 셀2 |')],
    ].forEach(([icon, title, fn]) => {
      const b = document.createElement('button');
      b.className = 'editor-toolbar-btn fmt-btn';
      b.title = title; b.innerHTML = icon;
      b.style.cssText = 'padding:2px 6px;font-size:11px;min-width:24px;';
      b.addEventListener('click', fn);
      fmtBarEl.appendChild(b);
    });

    let fmtOpen = false;
    fmtBtn.addEventListener('click', () => {
      fmtOpen = !fmtOpen;
      fmtBarEl.style.display = fmtOpen ? 'flex' : 'none';
      fmtBtn.style.background = fmtOpen ? '#e2e8f0' : '';
    });

    setTimeout(() => {
      const ta = document.getElementById('editor-textarea'); if (!ta) return;
      ta.addEventListener('keydown', e => {
        if ((e.ctrlKey||e.metaKey) && e.key==='b') { e.preventDefault(); wrapSel('**','**','굵은'); }
        if ((e.ctrlKey||e.metaKey) && e.key==='i') { e.preventDefault(); wrapSel('*','*','기울임'); }
        if ((e.ctrlKey||e.metaKey) && e.key==='k') { e.preventDefault(); wrapSel('[','](https://)','링크'); }
        if (e.key==='Tab') { e.preventDefault(); const s=ta.selectionStart; ta.setRangeText('  ',s,s,'end'); ta.dispatchEvent(new Event('input')); }
      });
    }, 50);
  }

  /* ── 본문 ── */
  const bodyH = 'calc(100vh - 92px)';
  let bodyEl;
  if (isPreview) {
    bodyEl = document.createElement('div');
    bodyEl.className = 'preview-pane markdown-body';
    bodyEl.style.cssText = 'height:'+bodyH+';overflow-y:auto;padding:10px 0;';
    bodyEl.innerHTML = mdToHtml(_currentRawContent);
  } else if (isEdit) {
    bodyEl = document.createElement('textarea');
    bodyEl.className = 'editor-pane';
    bodyEl.id = 'editor-textarea';
    bodyEl.style.cssText = 'height:'+bodyH+';width:100%;resize:none;';
    bodyEl.value = _currentRawContent;
  } else {
    bodyEl = document.createElement('div');
    bodyEl.className = 'split-wrap';
    bodyEl.style.cssText = 'height:'+bodyH+';';
    const ta = document.createElement('textarea');
    ta.className = 'editor-pane'; ta.id = 'editor-textarea';
    ta.style.cssText = 'height:100%;width:100%;resize:none;';
    ta.value = _currentRawContent;
    const prev = document.createElement('div');
    prev.className = 'preview-pane markdown-body'; prev.id = 'editor-preview';
    prev.style.cssText = 'height:100%;overflow-y:auto;padding:16px;border:1px solid #e2e8f0;border-radius:8px;';
    prev.innerHTML = mdToHtml(_currentRawContent);
    bodyEl.appendChild(ta);
    bodyEl.appendChild(prev);
  }

  /* ── 조립 ── */
  const inner = document.createElement('div');
  inner.style.cssText = 'padding:5px 40px 0;display:flex;flex-direction:column;height:100%;box-sizing:border-box;overflow:hidden;';
  inner.appendChild(headerEl);
  if (fmtBarEl) inner.appendChild(fmtBarEl);
  inner.appendChild(bodyEl);

  contentEl.className = 'content markdown-body';
  contentEl.innerHTML = '';
  contentEl.appendChild(inner);

  const ta = document.getElementById('editor-textarea');
  if (ta) { ta.addEventListener('input', onEditorInput); ta.focus(); }
}

function setEditorMode(mode, name, folder) {
  const ta = document.getElementById('editor-textarea');
  if (ta) _currentRawContent = ta.value;
  _editorMode = mode;
  renderEditor(name, folder);
}

function onEditorInput() {
  const ta = document.getElementById('editor-textarea');
  if (!ta) return;
  _currentRawContent = ta.value;
  const preview = document.getElementById('editor-preview');
  if (preview) preview.innerHTML = mdToHtml(_currentRawContent);
}

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── 저장 다이얼로그 ──
async function saveToGithub(name, folder) {
  // textarea 최신 내용 먼저 저장
  const ta = document.getElementById('editor-textarea');
  if (ta) _currentRawContent = ta.value;

  // 저장 다이얼로그 열기
  showSaveDialog(name, folder);
}

  // ── 다이얼로그 골격 ──

  htitle.innerHTML = '<span>🗑 파일 삭제</span>';

  closeBtn.style.cssText = 'background:none;border:none;font-size:18px;cursor:pointer;color:#94a3b8;padding:0 4px;';
  closeBtn.onclick = () => overlay.remove();
  htitle.appendChild(closeBtn);
  header.appendChild(htitle);

  // 탭
  const tabBar = document.createElement('div');
  tabBar.style.cssText = 'display:flex;border-bottom:2px solid #e2e8f0;';
  const mkTab = (label, key) => {
    const t = document.createElement('button');
    t.dataset.tabKey = key;
    t.textContent = label;
    t.style.cssText = 'padding:8px 18px;border:none;background:none;cursor:pointer;font-size:13px;font-weight:600;color:#94a3b8;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .15s;';

  tabBar.appendChild(tabDrive);
  header.appendChild(tabBar);
  box.appendChild(header);

  const treeWrap = document.createElement('div');
  treeWrap.style.cssText = 'flex:1;overflow-y:auto;padding:10px 12px;min-height:200px;';
  box.appendChild(treeWrap);

  // 선택된 항목 표시 바
  const selBar = document.createElement('div');
  selBar.style.cssText = 'padding:8px 20px;background:#fef2f2;font-size:12px;color:#dc2626;min-height:34px;flex-shrink:0;display:none;border-top:1px solid #fee2e2;';
  box.appendChild(selBar);

  // 푸터
  const footer = document.createElement('div');
  footer.style.cssText = 'padding:12px 20px;border-top:1px solid #e2e8f0;display:flex;gap:10px;justify-content:flex-end;flex-shrink:0;';
  const cancelBtn = document.createElement('button');
  cancelBtn.textContent = '취소';
  cancelBtn.style.cssText = 'padding:8px 18px;border:1px solid #e2e8f0;border-radius:7px;background:white;cursor:pointer;font-size:14px;';
  cancelBtn.onclick = () => overlay.remove();
  const delBtn = document.createElement('button');
  delBtn.textContent = '삭제';
  delBtn.disabled = true;
  delBtn.style.cssText = 'padding:8px 20px;border:1px solid #e2e8f0;border-radius:7px;background:#f1f5f9;color:#94a3b8;cursor:not-allowed;font-size:14px;font-weight:600;transition:all .15s;';
  footer.appendChild(cancelBtn);
  footer.appendChild(delBtn);
  box.appendChild(footer);

  overlay.appendChild(box);
  overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });
  document.body.appendChild(overlay);

  // ── 상태 ──
  let selectedFile = null; // { name, path, sha, source:'obs'|'drive', id? }

  function setSelected(f) {
    selectedFile = f;
    if (f) {
      selBar.style.display = 'block';
      selBar.textContent = `선택: ${f.path || f.name}`;
