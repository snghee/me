  svg.append('circle').attr('cx',CX).attr('cy',CY).attr('r',R).attr('fill','url(#gb-hl)').attr('pointer-events','none');
  defs.append('clipPath').attr('id','gb-clip').append('circle').attr('cx',CX).attr('cy',CY).attr('r',R-1);

  const bandStep=Math.PI/(fileFolders.length+1);
  const folderBand={};
  fileFolders.forEach((fol,i)=>{folderBand[fol]=-Math.PI/2+bandStep*(i+1);});
  const folderCnt={},folderIdx={};
  nodes.filter(n=>!n.isTag).forEach(n=>{folderCnt[n.folder]=(folderCnt[n.folder]||0)+1;});
  nodes.forEach(n=>{
    if(n.isTag)return;
    folderIdx[n.folder]=folderIdx[n.folder]||0;
    const total=folderCnt[n.folder],idx=folderIdx[n.folder]++;
    n._lat=folderBand[n.folder]; n._lng=(2*Math.PI*idx)/total-Math.PI+0.05;
  });
  const tagNodes=nodes.filter(n=>n.isTag);
  tagNodes.forEach((n,i)=>{n._lat=Math.PI/2-0.28;n._lng=(2*Math.PI*i)/Math.max(tagNodes.length,1)-Math.PI;});

  const lc={}; nodes.forEach(n=>{lc[n.id]=0;});
  links.forEach(l=>{const s=typeof l.source==='object'?l.source.id:l.source,t=typeof l.target==='object'?l.target.id:l.target;if(lc[s]!=null)lc[s]++;if(lc[t]!=null)lc[t]++;});
  const nodeR=d=>d.isTag?Math.max(6,Math.min(6+(lc[d.id]||0)*2.8,22)):Math.max(4,Math.min(4+(lc[d.id]||0)*1.3,16));

  let rotY=0,rotX=0.28;

  function project(lat,lng){
    const cosLat=Math.cos(lat),sinLat=Math.sin(lat);
    const cosLng=Math.cos(lng+rotY),sinLng=Math.sin(lng+rotY);
    const cosRX=Math.cos(rotX),sinRX=Math.sin(rotX);
    const x3=cosLat*sinLng,y3=sinLat*cosRX-cosLat*cosLng*sinRX,z3=sinLat*sinRX+cosLat*cosLng*cosRX;
    return{x:CX+R*x3,y:CY-R*y3,z:z3};
  }

  const gridG=svg.append('g').attr('clip-path','url(#gb-clip)');
  const contentG=svg.append('g').attr('clip-path','url(#gb-clip)');
  const linkLayer=contentG.append('g');
  const nodeLayer=contentG.append('g');

  const nodeById={}; nodes.forEach(n=>{nodeById[n.id]=n;});
  const linkData=links.map(l=>({src:nodeById[typeof l.source==='object'?l.source.id:l.source],tgt:nodeById[typeof l.target==='object'?l.target.id:l.target],type:l.type})).filter(l=>l.src&&l.tgt);
  const linkEls=linkData.map(l=>linkLayer.append('line').attr('stroke',l.type==='tag'?'rgba(74,222,128,0.55)':'rgba(160,200,255,0.2)').attr('stroke-width',l.type==='tag'?1.2:0.7).attr('stroke-dasharray',l.type==='tag'?'4,3':'none').attr('stroke-linecap','round'));

  const nodeGroups=[];
  nodes.forEach(n=>{
    const ng=nodeLayer.append('g').style('cursor',n.isTag?'default':'pointer');
    ng.append('circle').attr('class','nhalo').attr('r',nodeR(n)+(n.isTag?7:5)).attr('fill','none').attr('stroke',nodeColor(n)).attr('stroke-width',n.isTag?1.5:0.9).attr('stroke-opacity',n.isTag?0.5:0.22);
    ng.append('circle').attr('class','nbody').datum(n).attr('r',nodeR(n)).attr('fill',nodeColor(n)).attr('fill-opacity',n.isTag?0.95:0.88).attr('filter',`url(#${n.isTag?'gb-nt':'gb-nf'})`);
    if(n.isTag){const r2=nodeR(n)*0.5;ng.append('polygon').attr('points',`0,${-r2} ${r2},0 0,${r2} ${-r2},0`).attr('fill','#56d364').attr('fill-opacity',0.65).attr('pointer-events','none');}
    ng.append('text').attr('x',nodeR(n)+5).attr('dy','0.35em').attr('font-size',n.isTag?'9.5px':'10px').attr('fill',n.isTag?'rgba(74,222,128,0.92)':'rgba(210,225,255,0.88)').attr('pointer-events','none').text(n.name.length>16?n.name.slice(0,16)+'…':n.name);
    _attachNodeEvents(ng,n,nodeR,nodeColor,lc,links,linkData,linkEls,nodeLayer,tooltip,nodeById);
    nodeGroups.push({n,ng});
  });

  function render(){
    gridG.selectAll('*').remove();
    for(let lat=-60;lat<=60;lat+=30){
      const latR=lat*Math.PI/180,pts=[];
      for(let lng=-180;lng<=180;lng+=5){const p=project(latR,lng*Math.PI/180);if(p.z>-0.1)pts.push([p.x,p.y]);else if(pts.length>1){gridG.append('polyline').attr('points',pts.map(p=>p.join(',')).join(' ')).attr('fill','none').attr('stroke','rgba(100,170,255,0.12)').attr('stroke-width',0.5);pts.length=0;}}
      if(pts.length>1)gridG.append('polyline').attr('points',pts.map(p=>p.join(',')).join(' ')).attr('fill','none').attr('stroke','rgba(100,170,255,0.12)').attr('stroke-width',0.5);
    }
    for(let lng=-180;lng<180;lng+=30){
      const lngR=lng*Math.PI/180,pts=[];
      for(let lat=-85;lat<=85;lat+=4){const p=project(lat*Math.PI/180,lngR);if(p.z>-0.1)pts.push([p.x,p.y]);else if(pts.length>1){gridG.append('polyline').attr('points',pts.map(p=>p.join(',')).join(' ')).attr('fill','none').attr('stroke','rgba(100,170,255,0.10)').attr('stroke-width',0.5);pts.length=0;}}
      if(pts.length>1)gridG.append('polyline').attr('points',pts.map(p=>p.join(',')).join(' ')).attr('fill','none').attr('stroke','rgba(100,170,255,0.10)').attr('stroke-width',0.5);
    }
    const eqPts=[];for(let lng=-180;lng<=180;lng+=3){const p=project(0,lng*Math.PI/180);if(p.z>-0.05)eqPts.push([p.x,p.y]);}
    if(eqPts.length>1)gridG.append('polyline').attr('points',eqPts.map(p=>p.join(',')).join(' ')).attr('fill','none').attr('stroke','rgba(100,200,255,0.22)').attr('stroke-width',1);

    nodeGroups.forEach(({n,ng})=>{
      const p=project(n._lat,n._lng);
      const vis=p.z>-0.05,op=vis?Math.max(0,Math.min(1,(p.z+0.1)*1.8)):0,sc=vis?0.55+p.z*0.5:0;
      ng.attr('transform',`translate(${p.x},${p.y}) scale(${Math.max(0,sc)})`).attr('opacity',op).style('display',op<0.02?'none':null);
      n._px=p.x;n._py=p.y;n._pz=p.z;n._vis=vis;
    });
    linkEls.forEach((line,i)=>{
      const l=linkData[i];
      if(!l.src._vis&&!l.tgt._vis){line.style('display','none');return;}
      line.style('display',null).attr('x1',l.src._px).attr('y1',l.src._py).attr('x2',l.tgt._px).attr('y2',l.tgt._py).attr('opacity',Math.max(0,(Math.min(l.src._pz||0,l.tgt._pz||0)+0.1)*0.9));
    });
  }

  function animate(){if(!graphPaused)rotY+=0.004;render();window._globeRAF=requestAnimationFrame(animate);}
  animate();

  // 드래그 + 클릭 토글
  let isDragging=false,dragMoved=false,dragX0=0,dragY0=0,rotY0=0,rotX0=0;
  svg.on('mousedown',(e)=>{
    if(e.target.closest&&e.target.closest('g[style*="cursor"]'))return;
    isDragging=true;dragMoved=false;dragX0=e.clientX;dragY0=e.clientY;rotY0=rotY;rotX0=rotX;
  });
  svg.on('mousemove',(e)=>{
    if(!isDragging)return;
    const dx=e.clientX-dragX0,dy=e.clientY-dragY0;
    if(Math.abs(dx)>3||Math.abs(dy)>3)dragMoved=true;
    rotY=rotY0+dx*0.007;
    rotX=Math.max(-Math.PI/2.5,Math.min(Math.PI/2.5,rotX0-dy*0.007));
  });
  svg.on('mouseup',(e)=>{
    if(isDragging&&!dragMoved)toggleSimulation();
    isDragging=false;
  });
  svg.on('mouseleave',()=>{isDragging=false;});

  graphSvg=svg; graphZoom=null;
  svg.on('click',()=>{tooltip.style.display='none';});
}

/* ── 공통 노드 이벤트 ── */
function _attachNodeEvents(ng, n, nodeR, nodeColor, lc, links, linkData, linkEls, nodeLayer, tooltip, nodeById) {
  ng.on('mouseover',(e)=>{
      tooltip.style.display='block';
      if(n.isTag){
        tooltip.innerHTML=`<span style="color:#4ade80;font-weight:700">#${escHtml(n.name)}</span>&nbsp;<span style="opacity:.7">${lc[n.id]||0}개 노트</span>`;
      } else {
        const tagHtml=n.tags&&n.tags.length?n.tags.map(t=>`<span style="display:inline-block;padding:1px 6px;margin:1px 2px;background:rgba(74,222,128,0.18);border:1px solid rgba(74,222,128,0.45);border-radius:10px;color:#4ade80;font-size:10px">#${escHtml(t)}</span>`).join(''):'<span style="opacity:.45;font-size:10px">태그 없음</span>';
        tooltip.innerHTML=`<div style="font-weight:600;margin-bottom:4px;color:rgba(220,235,255,0.95)">${escHtml(n.name)}</div><div>${tagHtml}</div>`;
      }
      const conn=new Set([n.id]);
      links.forEach(l=>{const s=l.source?.id||l.source,t2=l.target?.id||l.target;if(s===n.id)conn.add(t2);if(t2===n.id)conn.add(s);});
      linkEls.forEach((line,i)=>{const l=linkData[i],hit=l.src.id===n.id||l.tgt.id===n.id;line.attr('stroke',hit?(l.type==='tag'?'rgba(74,222,128,0.95)':'rgba(200,225,255,0.9)'):(l.type==='tag'?'rgba(74,222,128,0.05)':'rgba(160,200,255,0.03)')).attr('stroke-width',hit?2.5:0.25);});
      nodeLayer.selectAll('circle.nbody').attr('fill-opacity',0.07);
      conn.forEach(id=>{nodeLayer.selectAll('circle.nbody').filter(function(d2){return d2&&d2.id===id;}).attr('fill-opacity',0.95);});
      ng.select('circle.nbody').attr('fill-opacity',1);
      ng.select('circle.nhalo').attr('stroke-opacity',0.9).attr('r',nodeR(n)+11);
    })
    .on('mousemove',e=>{tooltip.style.left=(e.clientX+16)+'px';tooltip.style.top=(e.clientY-38)+'px';})
    .on('mouseout',()=>{
      tooltip.style.display='none';
      linkEls.forEach((line,i)=>{const l=linkData[i];line.attr('stroke',l.type==='tag'?'rgba(74,222,128,0.55)':'rgba(160,200,255,0.2)').attr('stroke-width',l.type==='tag'?1.2:0.7);});
      nodeLayer.selectAll('circle.nbody').attr('fill-opacity',function(d2){return d2?.isTag?0.95:0.88;});
      ng.select('circle.nhalo').attr('stroke-opacity',n.isTag?0.5:0.22).attr('r',nodeR(n)+(n.isTag?7:5));
    })
    .on('click',(e)=>{
      e.stopPropagation();
      if(!n.isTag){loadObsidianFileByPath(n.path,n.name,n.folder);}
      else{
        const wrap=document.getElementById('graph-wrap');
        if(wrap)showTagPopup(n,e,nodeById,links,wrap);
      }
    });
}



/* ── 옵시디안 에디터 상태 ── */
let _editorMode = 'preview'; // 'preview' | 'edit' | 'split'
let _currentFilePath = null;
let _currentFileSha  = null;
let _currentRawContent = '';
let _currentFileName = '';
let _currentFileFolder = '';

async function loadObsidianFileByPath(filePath, name, folder) {
  // 전역 상태 먼저 설정
  _currentFileName   = name;
  _currentFileFolder = folder;
  _currentFilePath   = filePath;
  _editorMode        = 'preview';

  // 로딩 표시
  contentEl.className = 'content markdown-body';
  contentEl.innerHTML = `<div class="file-inner"><div class="breadcrumb">옵시디안 > ${escHtml(folder)} > ${escHtml(name)}</div><div class="loading"><div class="loading-spinner"></div></div></div>`;

  try {
    const meta = await ghGetFileMeta(filePath);
    _currentFileSha    = meta.sha;
    _currentRawContent = atob(meta.content.replace(/\n/g,''));
    try { _currentRawContent = decodeURIComponent(escape(_currentRawContent)); } catch(e2){}
    renderEditor(name, folder);
  } catch(e) {
    contentEl.innerHTML = `<div class="file-inner"><div class="err">❌ ${escHtml(e.message)}</div></div>`;
  }
}

async function ghGetFileMeta(path) {
  const r = await fetch(
    `${GITHUB_API}/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${encodeURIComponent(path)}?ref=${GITHUB_BRANCH}&t=${Date.now()}`,
    { cache: 'no-store' }
  );
  if (!r.ok) throw new Error(`파일 메타 로드 실패: ${path}`);
  return await r.json();
}

function renderEditor(name, folder) {
  document.querySelectorAll('.graph-controls').forEach(el=>el.classList.remove('visible'));
  const isEdit    = _editorMode === 'edit';
  const isSplit   = _editorMode === 'split';
  const isPreview = _editorMode === 'preview';

  /* ── 헤더 1행 ── */
  const headerEl = document.createElement('div');
  headerEl.style.cssText = 'display:flex;align-items:center;gap:4px;padding:6px 0;border-bottom:1px solid #e8edf2;flex-shrink:0;';

  /* 제목 영역 */
  const titleWrap = document.createElement('div');
  titleWrap.style.cssText = 'display:flex;flex-direction:column;min-width:0;margin-right:auto;overflow:hidden;';
  const bc = document.createElement('div');
  bc.style.cssText = 'font-size:9.5px;color:#aab;line-height:1.2;';
  bc.textContent = '옵시디안' + (folder && folder!=='루트' ? ' › ' + folder : '');
  const titleDiv = document.createElement('div');
  titleDiv.style.cssText = 'font-size:13px;font-weight:700;color:#1e293b;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;';
  titleDiv.textContent = name.replace(/\.md$/i, '');
  titleDiv.title = name;
  titleWrap.appendChild(bc);
  titleWrap.appendChild(titleDiv);
  headerEl.appendChild(titleWrap);

  /* 버튼 헬퍼 */
  function mkB(html, cls, handler, extra) {
    const b = document.createElement('button');
    b.className = cls; b.innerHTML = html;
    b.style.cssText = 'padding:3px 9px;font-size:11px;white-space:nowrap;flex-shrink:0;' + (extra||'');
    if (handler) b.addEventListener('click', handler);
    return b;
  }
  function mkSep() {
    const d = document.createElement('div');
    d.style.cssText = 'width:1px;height:16px;background:#e2e8f0;flex-shrink:0;';
    return d;
  }

  /* 모드 버튼 */
  headerEl.appendChild(mkB('미리보기', 'editor-mode-btn'+(isPreview?' active':''), ()=>setEditorMode('preview',name,folder)));
  headerEl.appendChild(mkB('편집',     'editor-mode-btn'+(isEdit   ?' active':''), ()=>setEditorMode('edit',   name,folder)));
  headerEl.appendChild(mkB('분할',     'editor-mode-btn'+(isSplit  ?' active':''), ()=>setEditorMode(isSplit?'preview':'split',name,folder)));
  headerEl.appendChild(mkSep());

  /* 저장/다운로드 */
  const saveBtn = mkB('저장', 'editor-save-btn', ()=>saveToGithub(_currentFileName, _currentFileFolder));
  saveBtn.id = 'save-btn';
  headerEl.appendChild(saveBtn);
  headerEl.appendChild(mkB('⬇', 'editor-toolbar-btn', ()=>downloadObsidianFile(_currentFilePath, name), 'padding:3px 8px;'));

  /* 서식 토글 버튼 */
  let fmtBarEl = null;
  if (!isPreview) {
    headerEl.appendChild(mkSep());
    const fmtBtn = mkB('✏ 서식', 'editor-toolbar-btn', null);
    headerEl.appendChild(fmtBtn);

    fmtBarEl = document.createElement('div');
    fmtBarEl.style.cssText = 'display:none;align-items:center;gap:2px;flex-wrap:wrap;padding:3px 0;border-bottom:1px solid #f0f4f8;flex-shrink:0;';

    function wrapSel(before, after, ph) {
      const ta = document.getElementById('editor-textarea'); if (!ta) return;
      const s = ta.selectionStart, e = ta.selectionEnd;
      const sel = ta.value.slice(s, e) || (ph||'텍스트');
      ta.setRangeText(before+sel+after, s, e, 'select');
      ta.selectionStart = s+before.length;
      ta.selectionEnd   = s+before.length+sel.length;
      ta.focus(); ta.dispatchEvent(new Event('input'));
    }
    function prependLine(prefix) {
      const ta = document.getElementById('editor-textarea'); if (!ta) return;
      const s = ta.selectionStart, val = ta.value;
      const ls = val.lastIndexOf('\n', s-1)+1;
      const le = val.indexOf('\n', s);
      const end = le===-1 ? val.length : le;
      const line = val.slice(ls, end);
      ta.setRangeText(line.startsWith(prefix)?line.slice(prefix.length):prefix+line, ls, end, 'end');
      ta.focus(); ta.dispatchEvent(new Event('input'));
    }
    function insertLine(text) {
      const ta = document.getElementById('editor-textarea'); if (!ta) return;
      const s = ta.selectionStart;
      ta.setRangeText('\n'+text+'\n', s, s, 'end');
      ta.focus(); ta.dispatchEvent(new Event('input'));
    }

    [['<b>B</b>','굵게',    ()=>wrapSel('**','**','굵은')],
     ['<i>I</i>','기울임',  ()=>wrapSel('*','*','기울임')],
     ['<s>S</s>','취소선',  ()=>wrapSel('~~','~~','취소선')],
     ['`',       '코드',    ()=>wrapSel('`','`','코드')],
     ['H1',      '제목1',   ()=>prependLine('# ')],
     ['H2',      '제목2',   ()=>prependLine('## ')],
     ['H3',      '제목3',   ()=>prependLine('### ')],
     ['❝',       '인용',    ()=>prependLine('> ')],
     ['—',       '구분선',  ()=>insertLine('---')],
     ['☑',       '체크박스',()=>prependLine('- [ ] ')],
     ['🔗',      '링크',    ()=>wrapSel('[','](https://)','링크')],
     ['⌥',       '코드블록',()=>wrapSel('\n```\n','\n```\n','코드')],
     ['▤',       '표',      ()=>insertLine('| 헤더1 | 헤더2 |\n| --- | --- |\n| 셀1 | 셀2 |')],
    ].forEach(([icon, title, fn]) => {
      const b = document.createElement('button');
      b.className = 'editor-toolbar-btn fmt-btn';
      b.title = title; b.innerHTML = icon;
      b.style.cssText = 'padding:2px 6px;font-size:11px;min-width:24px;';
      b.addEventListener('click', fn);
      fmtBarEl.appendChild(b);
    });

    let fmtOpen = false;
    fmtBtn.addEventListener('click', () => {
      fmtOpen = !fmtOpen;
      fmtBarEl.style.display = fmtOpen ? 'flex' : 'none';
      fmtBtn.style.background = fmtOpen ? '#e2e8f0' : '';
    });

    setTimeout(() => {
      const ta = document.getElementById('editor-textarea'); if (!ta) return;
      ta.addEventListener('keydown', e => {
        if ((e.ctrlKey||e.metaKey) && e.key==='b') { e.preventDefault(); wrapSel('**','**','굵은'); }
        if ((e.ctrlKey||e.metaKey) && e.key==='i') { e.preventDefault(); wrapSel('*','*','기울임'); }
        if ((e.ctrlKey||e.metaKey) && e.key==='k') { e.preventDefault(); wrapSel('[','](https://)','링크'); }
        if (e.key==='Tab') { e.preventDefault(); const s=ta.selectionStart; ta.setRangeText('  ',s,s,'end'); ta.dispatchEvent(new Event('input')); }
      });
    }, 50);
  }

  /* ── 본문 ── */
  const bodyH = 'calc(100vh - 92px)';
  let bodyEl;
  if (isPreview) {
    bodyEl = document.createElement('div');
    bodyEl.className = 'preview-pane markdown-body';
    bodyEl.style.cssText = 'height:'+bodyH+';overflow-y:auto;padding:10px 0;';
    bodyEl.innerHTML = mdToHtml(_currentRawContent);
  } else if (isEdit) {
    bodyEl = document.createElement('textarea');
    bodyEl.className = 'editor-pane';
    bodyEl.id = 'editor-textarea';
    bodyEl.style.cssText = 'height:'+bodyH+';width:100%;resize:none;';
    bodyEl.value = _currentRawContent;
  } else {
    bodyEl = document.createElement('div');
    bodyEl.className = 'split-wrap';
    bodyEl.style.cssText = 'height:'+bodyH+';';
    const ta = document.createElement('textarea');
    ta.className = 'editor-pane'; ta.id = 'editor-textarea';
    ta.style.cssText = 'height:100%;width:100%;resize:none;';
    ta.value = _currentRawContent;
    const prev = document.createElement('div');
    prev.className = 'preview-pane markdown-body'; prev.id = 'editor-preview';
    prev.style.cssText = 'height:100%;overflow-y:auto;padding:16px;border:1px solid #e2e8f0;border-radius:8px;';
    prev.innerHTML = mdToHtml(_currentRawContent);
    bodyEl.appendChild(ta);
    bodyEl.appendChild(prev);
  }

  /* ── 조립 ── */
  const inner = document.createElement('div');
  inner.style.cssText = 'padding:5px 40px 0;display:flex;flex-direction:column;height:100%;box-sizing:border-box;overflow:hidden;';
  inner.appendChild(headerEl);
  if (fmtBarEl) inner.appendChild(fmtBarEl);
  inner.appendChild(bodyEl);

  contentEl.className = 'content markdown-body';
  contentEl.innerHTML = '';
  contentEl.appendChild(inner);

  const ta = document.getElementById('editor-textarea');
  if (ta) { ta.addEventListener('input', onEditorInput); ta.focus(); }
}

function setEditorMode(mode, name, folder) {
  const ta = document.getElementById('editor-textarea');
  if (ta) _currentRawContent = ta.value;
  _editorMode = mode;
  renderEditor(name, folder);
}

function onEditorInput() {
  const ta = document.getElementById('editor-textarea');
  if (!ta) return;
  _currentRawContent = ta.value;
  const preview = document.getElementById('editor-preview');
  if (preview) preview.innerHTML = mdToHtml(_currentRawContent);
}


// ── 저장 다이얼로그 ──
async function saveToGithub(name, folder) {
  // textarea 최신 내용 먼저 저장
  const ta = document.getElementById('editor-textarea');
  if (ta) _currentRawContent = ta.value;

  // 저장 다이얼로그 열기
  showSaveDialog(name, folder);
}

async function showDeleteDialog() {
  document.getElementById('delete-dialog-overlay')?.remove();

  // ── GitHub 토큰 확인 (localStorage: 브라우저 종료 후에도 유지) ──
  let token = localStorage.getItem('gh_write_token');
  if (!token) {
    token = prompt('GitHub Personal Access Token을 입력하세요.\n(브라우저에 저장되어 다음 방문 시 재입력 불필요)');
    if (!token) return;
    localStorage.setItem('gh_write_token', token.trim());
  }

  // ── 다이얼로그 골격 ──
  const overlay = document.createElement('div');
  overlay.id = 'delete-dialog-overlay';
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.62);z-index:99999;display:flex;align-items:center;justify-content:center;';

  const box = document.createElement('div');
  box.style.cssText = 'background:white;border-radius:14px;width:480px;max-width:93vw;max-height:82vh;display:flex;flex-direction:column;box-shadow:0 24px 64px rgba(0,0,0,.45);overflow:hidden;';

  // 헤더
  const header = document.createElement('div');
  header.style.cssText = 'padding:16px 20px 0;flex-shrink:0;';
  const htitle = document.createElement('div');
  htitle.style.cssText = 'font-size:16px;font-weight:700;color:#1e293b;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;';
  htitle.innerHTML = '<span>🗑 파일 삭제</span>';
  const closeBtn = document.createElement('button');
  closeBtn.textContent = '✕';
  closeBtn.style.cssText = 'background:none;border:none;font-size:18px;cursor:pointer;color:#94a3b8;padding:0 4px;';
  closeBtn.onclick = () => overlay.remove();
  htitle.appendChild(closeBtn);
  header.appendChild(htitle);

  // 탭
  const tabBar = document.createElement('div');
  tabBar.style.cssText = 'display:flex;border-bottom:2px solid #e2e8f0;';
  const mkTab = (label, key) => {
    const t = document.createElement('button');
    t.dataset.tabKey = key;
    t.textContent = label;
    t.style.cssText = 'padding:8px 18px;border:none;background:none;cursor:pointer;font-size:13px;font-weight:600;color:#94a3b8;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .15s;';
    t.onclick = () => switchTab(key);
    return t;
  };
  const tabObs   = mkTab('📂 옵시디안 (GitHub)', 'obs');
  const tabDrive = mkTab('📁 구글드라이브', 'drive');
  tabBar.appendChild(tabObs);
  tabBar.appendChild(tabDrive);
  header.appendChild(tabBar);
  box.appendChild(header);

  // 트리 영역
  const treeWrap = document.createElement('div');
  treeWrap.style.cssText = 'flex:1;overflow-y:auto;padding:10px 12px;min-height:200px;';
  box.appendChild(treeWrap);

  // 선택된 항목 표시 바
  const selBar = document.createElement('div');
  selBar.style.cssText = 'padding:8px 20px;background:#fef2f2;font-size:12px;color:#dc2626;min-height:34px;flex-shrink:0;display:none;border-top:1px solid #fee2e2;';
  box.appendChild(selBar);

  // 푸터
  const footer = document.createElement('div');
  footer.style.cssText = 'padding:12px 20px;border-top:1px solid #e2e8f0;display:flex;gap:10px;justify-content:flex-end;flex-shrink:0;';
  const cancelBtn = document.createElement('button');
  cancelBtn.textContent = '취소';
  cancelBtn.style.cssText = 'padding:8px 18px;border:1px solid #e2e8f0;border-radius:7px;background:white;cursor:pointer;font-size:14px;';
  cancelBtn.onclick = () => overlay.remove();
  const delBtn = document.createElement('button');
  delBtn.textContent = '삭제';
  delBtn.disabled = true;
  delBtn.style.cssText = 'padding:8px 20px;border:1px solid #e2e8f0;border-radius:7px;background:#f1f5f9;color:#94a3b8;cursor:not-allowed;font-size:14px;font-weight:600;transition:all .15s;';
  footer.appendChild(cancelBtn);
  footer.appendChild(delBtn);
  box.appendChild(footer);

  overlay.appendChild(box);
  overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });
  document.body.appendChild(overlay);

  // ── 상태 ──
  let selectedFile = null; // { name, path, sha, source:'obs'|'drive', id? }

  function setSelected(f) {
    selectedFile = f;
    if (f) {
      selBar.style.display = 'block';
      selBar.textContent = `선택: ${f.path || f.name}`;
      delBtn.disabled = false;
      delBtn.style.cssText = 'padding:8px 20px;border:1px solid #dc2626;border-radius:7px;background:#dc2626;color:white;cursor:pointer;font-size:14px;font-weight:600;transition:all .15s;';
    } else {
      selBar.style.display = 'none';
      delBtn.disabled = true;
      delBtn.style.cssText = 'padding:8px 20px;border:1px solid #e2e8f0;border-radius:7px;background:#f1f5f9;color:#94a3b8;cursor:not-allowed;font-size:14px;font-weight:600;transition:all .15s;';
    }
  }

  function highlightRow(row) {
    treeWrap.querySelectorAll('[data-sel]').forEach(el => {
      el.removeAttribute('data-sel');
      el.style.background = '';
      el.style.color = '';
    });
    row.dataset.sel = '1';
    row.style.background = '#fee2e2';
    row.style.color = '#dc2626';
  }

  // ── 탭 전환 ──
  let currentTab = 'obs';
  async function switchTab(key) {
    currentTab = key;
    setSelected(null);
    treeWrap.innerHTML = '<div style="text-align:center;padding:30px;color:#94a3b8;font-size:13px;">⏳ 불러오는 중...</div>';

    // 탭 스타일
    [tabObs, tabDrive].forEach(t => {
      const active = t.dataset.tabKey === key;
      t.style.color = active ? '#2563eb' : '#94a3b8';
      t.style.borderBottomColor = active ? '#2563eb' : 'transparent';
    });

    if (key === 'obs') await renderObsTree();
    else await renderDriveTree();
  }

  // ── 옵시디안 (GitHub) 트리 ──
  async function renderObsTree() {
    let tree = [];
    try { tree = await ghGetTree(); }
    catch(e) { treeWrap.innerHTML = `<div style="color:#dc2626;padding:16px;font-size:13px;">❌ 목록 로드 실패: ${escHtml(e.message)}</div>`; return; }

    const files = tree.filter(f => !f.path.startsWith('.')).map(f => {
      const parts = f.path.split('/');
      return { name: parts[parts.length-1], path: f.path, folder: parts.length > 1 ? parts.slice(0,-1).join('/') : '루트', sha: f.sha, source: 'obs' };
    });
    const grouped = {};
    files.forEach(f => { (grouped[f.folder] = grouped[f.folder]||[]).push(f); });

    treeWrap.innerHTML = '';

    const mkFileRow = (f, indent=10) => {
      const row = document.createElement('div');
      row.style.cssText = `display:flex;align-items:center;padding:6px ${indent}px;border-radius:6px;cursor:pointer;font-size:13px;color:#334155;gap:7px;`;
      row.innerHTML = `<span style="opacity:.6;font-size:12px">📄</span><span>${escHtml(f.name)}</span>`;
      row.onclick = () => { highlightRow(row); setSelected(f); };
      return row;
    };

    if (grouped['루트']) grouped['루트'].forEach(f => treeWrap.appendChild(mkFileRow(f)));
    Object.keys(grouped).sort().filter(fol => fol !== '루트').forEach(fol => {
      const folRow = document.createElement('div');
      folRow.style.cssText = 'display:flex;align-items:center;gap:5px;padding:6px 10px;font-size:12px;color:#64748b;font-weight:700;cursor:pointer;user-select:none;border-radius:6px;';
      const arrow = document.createElement('span');
      arrow.textContent = '▾'; arrow.style.cssText = 'font-size:11px;transition:transform .15s;';
      folRow.appendChild(arrow);
      folRow.appendChild(document.createTextNode('📁 ' + fol));
      folRow.onmouseover = () => { folRow.style.background='#f8fafc'; };
      folRow.onmouseout  = () => { folRow.style.background=''; };
      const folFiles = document.createElement('div');
      folRow.onclick = () => {
        const open = folFiles.style.display !== 'none';
        folFiles.style.display = open ? 'none' : 'block';
        arrow.style.transform = open ? 'rotate(-90deg)' : '';
      };
      grouped[fol].forEach(f => folFiles.appendChild(mkFileRow(f, 28)));
      treeWrap.appendChild(folRow);
      treeWrap.appendChild(folFiles);
    });
  }

  // ── 구글드라이브 트리 ──
  async function renderDriveTree() {
    treeWrap.innerHTML = '<div style="text-align:center;padding:30px;color:#94a3b8;font-size:13px;">⏳ Drive 목록 불러오는 중...</div>';
    try {
      const tok = await getDriveToken();

      /* 한 폴더의 파일/폴더 목록 fetch */
      async function listFolder(pid, pathPrefix) {
        const url = `https://www.googleapis.com/drive/v3/files?` +
          `q=${encodeURIComponent("'" + pid + "' in parents and trashed=false")}` +
          `&pageSize=200&fields=files(id,name,mimeType)&orderBy=folder,name`;
        const r = await fetch(url, { headers: { Authorization: 'Bearer ' + tok } });
        if (!r.ok) throw new Error('Drive 목록 오류 ' + r.status);
        const data = await r.json();
        const items = data.files || [];
        const result = [];
        for (const f of items) {
          if (!f || !f.id || !f.name) continue;
          if (f.mimeType === 'application/vnd.google-apps.folder') {
            result.push({ ...f, isFolder: true, path: pathPrefix ? pathPrefix + '/' + f.name : f.name, source: 'drive' });
          } else {
            result.push({ ...f, isFolder: false, path: pathPrefix ? pathPrefix + '/' + f.name : f.name, source: 'drive' });
          }
        }
        return result;
      }

      const items = await listFolder('root', '');
      treeWrap.innerHTML = '';

      if (!items.length) {
        treeWrap.innerHTML = '<div style="text-align:center;padding:30px;color:#94a3b8;font-size:13px;">📂 파일이 없습니다.</div>';
        return;
      }

      /* 파일/폴더 행 생성 */
      const mkDriveRow = (f, indent=10) => {
        const row = document.createElement('div');
        row.style.cssText = `display:flex;align-items:center;padding:7px ${indent}px;border-radius:6px;cursor:pointer;font-size:13px;color:#334155;gap:7px;transition:background .1s;`;
        const icon = f.isFolder ? '📁' : '📄';
        row.innerHTML = `<span style="opacity:.7;font-size:12px">${icon}</span><span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${escHtml(f.name)}</span>`;
        row.onmouseover = () => { if (!row.dataset.sel) row.style.background = '#f8fafc'; };
        row.onmouseout  = () => { if (!row.dataset.sel) row.style.background = ''; };
        row.onclick = () => { highlightRow(row); setSelected(f); };
        return row;
      };

      /* 폴더는 클릭 시 하위 목록 lazy load */
      const mkFolderRow = (f, indent=10) => {
        const row = document.createElement('div');
        row.style.cssText = `display:flex;align-items:center;gap:5px;padding:7px ${indent}px;font-size:13px;color:#334155;cursor:pointer;border-radius:6px;transition:background .1s;`;
        const arrow = document.createElement('span');
        arrow.textContent = '▸'; arrow.style.cssText = 'font-size:10px;color:#94a3b8;flex-shrink:0;transition:transform .15s;';
        const label = document.createElement('span');
        label.style.cssText = 'flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;';
        label.textContent = '📁 ' + f.name;
        row.appendChild(arrow); row.appendChild(label);
        row.onmouseover = () => { if (!row.dataset.sel) row.style.background = '#f8fafc'; };
        row.onmouseout  = () => { if (!row.dataset.sel) row.style.background = ''; };

        const subList = document.createElement('div');
        subList.style.display = 'none';
        let loaded = false;

        row.onclick = async () => {
          /* 폴더 자체도 선택 가능 (폴더 삭제) */
          highlightRow(row); setSelected(f);
          const isOpen = subList.style.display !== 'none';
          subList.style.display = isOpen ? 'none' : 'block';
          arrow.textContent = isOpen ? '▸' : '▾';
          if (!loaded && !isOpen) {
            loaded = true;
            subList.innerHTML = `<div style="padding:6px ${indent+18}px;font-size:11px;color:#94a3b8;">⏳ 불러오는 중...</div>`;
            try {
              const sub = await listFolder(f.id, f.path);
              subList.innerHTML = '';
              sub.forEach(sf => {
                if (sf.isFolder) {
                  const { row: sr, subList: sl } = mkFolderRow(sf, indent + 18);
                  subList.appendChild(sr); subList.appendChild(sl);
                } else {
                  subList.appendChild(mkDriveRow(sf, indent + 18));
                }
              });
              if (!sub.length) subList.innerHTML = `<div style="padding:6px ${indent+18}px;font-size:11px;color:#94a3b8;">(비어 있음)</div>`;
            } catch(e) {
              subList.innerHTML = `<div style="padding:6px ${indent+18}px;font-size:11px;color:#dc2626;">❌ ${escHtml(e.message)}</div>`;
            }
          }
        };
        return { row, subList };
      };

      items.forEach(f => {
        if (f.isFolder) {
          const { row, subList } = mkFolderRow(f);
          treeWrap.appendChild(row);
          treeWrap.appendChild(subList);
        } else {
          treeWrap.appendChild(mkDriveRow(f));
        }
      });

    } catch(e) {
      treeWrap.innerHTML = `<div style="padding:16px;color:#dc2626;font-size:13px;">❌ ${escHtml(e.message)}</div>`;
    }
  }

  // ── 삭제 실행 ──
  delBtn.onclick = async () => {
    if (!selectedFile) return;
    const isFolder = selectedFile.isFolder;
    const typeStr  = isFolder ? '폴더(및 하위 파일 전체)' : '파일';
    if (!confirm(`"${selectedFile.name}" ${typeStr}을 삭제하시겠습니까?\n${selectedFile.source === 'drive' ? '구글드라이브 휴지통으로 이동됩니다.' : 'GitHub에서 영구 삭제됩니다.'}`)) return;
    delBtn.disabled = true;
    delBtn.textContent = '삭제 중...';

    try {
      if (selectedFile.source === 'obs') {
        // GitHub 삭제
        const encodedPath = selectedFile.path.split('/').map(encodeURIComponent).join('/');
        const metaR = await fetch(
          `${GITHUB_API}/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${encodedPath}?ref=${GITHUB_BRANCH}&t=${Date.now()}`,
          { cache:'no-store' }
        );
        if (!metaR.ok) throw new Error('파일 정보 조회 실패');
        const meta = await metaR.json();
        const r = await fetch(
          `${GITHUB_API}/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${encodedPath}`,
          { method:'DELETE', headers:{'Authorization':`token ${token}`,'Content-Type':'application/json'},
            body: JSON.stringify({ message:`Delete ${selectedFile.name}`, sha:meta.sha, branch:GITHUB_BRANCH }) }
        );
        if (!r.ok) { const e = await r.json(); throw new Error(e.message||'삭제 실패'); }
        const deletedName = selectedFile.name;
        /* 상단 드롭다운 메뉴 즉시 갱신 */
        const obsDD = document.getElementById('dd-2');
        if (obsDD) { obsDD.innerHTML = ''; await populateObsidianMenu(obsDD); }
        _currentFilePath = null; _currentFileSha = null; _currentRawContent = '';
        setSelected(null);
        overlay.remove();
        showToast(`🗑 "${deletedName}" 삭제 완료`);
        showDashboard();
        return;

      } else {
        // 구글드라이브 삭제 — 휴지통으로 이동 (Drive API PATCH trashed=true)
        const tok = await getDriveToken();
        const r = await fetch(
          `https://www.googleapis.com/drive/v3/files/${selectedFile.id}`,
          {
            method: 'PATCH',
            headers: { Authorization: 'Bearer ' + tok, 'Content-Type': 'application/json' },
            body: JSON.stringify({ trashed: true })
          }
        );
        if (!r.ok) {
          const err = await r.json().catch(() => ({}));
          throw new Error(err.error?.message || 'Drive 삭제 실패 ' + r.status);
        }
        const deletedName = selectedFile.name;
        /* Drive 메뉴 갱신 */
        const driveDD = document.getElementById('dd-1');
        if (driveDD) { driveDD.innerHTML = ''; await populateServiceMenu(driveDD); }
        setSelected(null);
        overlay.remove();
        showToast(`🗑 "${deletedName}" 휴지통으로 이동됨`);
        showDashboard();
        return;
      }

      overlay.remove();
    } catch(e) {
      showToast('❌ ' + e.message, true);
      delBtn.disabled = false;
      delBtn.textContent = '삭제';
      delBtn.style.background = '#dc2626';
    }
  };

  // 초기 탭 로드
  switchTab('obs');
}

async function showSaveDialog(name, folder) {
  document.getElementById('save-dialog-overlay')?.remove();

  // 토큰 확인 (localStorage: 브라우저 종료 후에도 유지)
  let token = localStorage.getItem('gh_write_token');
  if (!token) {
    token = prompt('GitHub Personal Access Token을 입력하세요.\n(브라우저에 저장되어 다음 방문 시 재입력 불필요)');
    if (!token) return;
    localStorage.setItem('gh_write_token', token.trim());
  }

  // 폴더 목록 로드
  let folders = [];
  try {
    const tree = await ghGetTree();
    const folderSet = new Set();
    tree.forEach(f => {
      if (f.path.includes('/')) folderSet.add(f.path.split('/')[0]);
    });
    folders = ['루트', ...Array.from(folderSet).sort()];
  } catch(e) {
    folders = ['루트'];
  }

  // 다이얼로그 생성
  const overlay = document.createElement('div');
  overlay.id = 'save-dialog-overlay';
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:99999;display:flex;align-items:center;justify-content:center;';

  const box = document.createElement('div');
  box.style.cssText = 'background:white;border-radius:12px;width:420px;max-width:90vw;padding:24px;box-shadow:0 20px 60px rgba(0,0,0,.4);';

  // 제목
  const title = document.createElement('h3');
  title.textContent = '저장 위치 선택';
  title.style.cssText = 'margin-bottom:20px;font-size:18px;color:#1e293b;';
  box.appendChild(title);

  // 폴더 선택
  const folLabel = document.createElement('div');
  folLabel.textContent = '📁 폴더';
  folLabel.style.cssText = 'font-size:13px;font-weight:600;color:#475569;margin-bottom:6px;';
  box.appendChild(folLabel);

  const folSelect = document.createElement('select');
  folSelect.style.cssText = 'width:100%;padding:10px;border:1px solid #e2e8f0;border-radius:8px;font-size:15px;margin-bottom:16px;outline:none;box-sizing:border-box;';
  folders.forEach(f => {
    const opt = document.createElement('option');
    opt.value = f;
    opt.textContent = f;
    if (f === folder || (f === '루트' && !folder)) opt.selected = true;
    folSelect.appendChild(opt);
  });
  box.appendChild(folSelect);

  // 파일명
  const fileLabel = document.createElement('div');
  fileLabel.textContent = '📄 파일명';
  fileLabel.style.cssText = 'font-size:13px;font-weight:600;color:#475569;margin-bottom:6px;';
  box.appendChild(fileLabel);

  const fileInput = document.createElement('input');
  fileInput.type = 'text';
  fileInput.value = name.endsWith('.md') ? name : name + '.md';
  fileInput.placeholder = '파일명.md';
  fileInput.style.cssText = 'width:100%;padding:10px;border:1px solid #e2e8f0;border-radius:8px;font-size:15px;margin-bottom:20px;outline:none;box-sizing:border-box;';
  box.appendChild(fileInput);

  // 버튼
  const footer = document.createElement('div');
  footer.style.cssText = 'display:flex;gap:10px;justify-content:flex-end;';

  const cancelBtn = document.createElement('button');
  cancelBtn.textContent = '취소';
  cancelBtn.style.cssText = 'padding:10px 20px;border:1px solid #e2e8f0;border-radius:8px;background:white;cursor:pointer;font-size:14px;';
  cancelBtn.onclick = () => overlay.remove();

  const confirmBtn = document.createElement('button');
  confirmBtn.textContent = '저장';
  confirmBtn.style.cssText = 'padding:10px 20px;border:none;border-radius:8px;background:#22c55e;color:white;cursor:pointer;font-size:14px;font-weight:600;';
  confirmBtn.onclick = async () => {
    const selFolder = folSelect.value;
    const filename  = fileInput.value.trim();
    if (!filename) { showToast('❌ 파일명을 입력해주세요.', true); return; }

    const isRoot    = selFolder === '루트' || !selFolder;
    const targetPath = isRoot ? filename : `${selFolder}/${filename}`;
    const encodedPath = isRoot
      ? encodeURIComponent(filename)
      : `${encodeURIComponent(selFolder)}/${encodeURIComponent(filename)}`;

    overlay.remove();
    const btn = document.getElementById('save-btn');
    if (btn) { btn.disabled = true; btn.textContent = '⏳ 저장 중...'; }

    try {
      const ta = document.getElementById('editor-textarea');
      if (ta) _currentRawContent = ta.value;
      const encoded = btoa(unescape(encodeURIComponent(_currentRawContent)));

      // SHA 조회
      let saveSha = (targetPath === _currentFilePath) ? _currentFileSha : undefined;
      if (!saveSha) {
        try {
          const chk = await fetch(`${GITHUB_API}/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${encodedPath}?ref=${GITHUB_BRANCH}`, {cache:'no-store'});
          if (chk.ok) { const j = await chk.json(); saveSha = j.sha; }
        } catch(e) {}
      }

      const bodyObj = { message: `Update ${targetPath}`, content: encoded, branch: GITHUB_BRANCH };
      if (saveSha) bodyObj.sha = saveSha;

      const r = await fetch(
        `${GITHUB_API}/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${encodedPath}`,
        { method:'PUT', headers:{'Authorization':`token ${token}`,'Content-Type':'application/json'}, body:JSON.stringify(bodyObj) }
      );
      if (!r.ok) { const err = await r.json(); throw new Error(err.message || '저장 실패'); }

      const result = await r.json();
      _currentFilePath   = targetPath;
      _currentFileSha    = result.content.sha;
      _currentFileName   = filename;
      _currentFileFolder = isRoot ? '루트' : selFolder;

      if (btn) { btn.disabled = false; btn.innerHTML = '저장'; }
      showToast('✅ 저장 완료!');
      /* 메뉴 즉시 갱신 */
      _obsNeedsReload = false;
      const obsDD2 = document.getElementById('dd-2');
      if (obsDD2) { obsDD2.innerHTML = ''; await populateObsidianMenu(obsDD2); }
      renderEditor(_currentFileName, _currentFileFolder);
    } catch(e) {
      showToast('❌ ' + e.message, true);
      if (btn) { btn.disabled = false; btn.innerHTML = '저장'; }
    }
  };

  footer.appendChild(cancelBtn);
  footer.appendChild(confirmBtn);
  box.appendChild(footer);
  overlay.appendChild(box);
  overlay.addEventListener('click', e => { if(e.target===overlay) overlay.remove(); });
  document.body.appendChild(overlay);
  fileInput.focus();
  fileInput.select();
}


/* ── Google 설정 다이얼로그 (전면 개편) ── */
function showGoogleSettingsDialog(ddToReload) {
  document.getElementById('google-settings-overlay')?.remove();

  const hasSaved = !!getClientId();

  const overlay = document.createElement('div');
  overlay.id = 'google-settings-overlay';
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:999999;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px);';

  const box = document.createElement('div');
  box.style.cssText = 'background:#0f172a;border:1px solid rgba(52,152,219,0.4);border-radius:16px;width:520px;max-width:94vw;overflow:hidden;box-shadow:0 24px 80px rgba(0,0,0,.7);';

  /* ── 헤더 ── */
  const header = document.createElement('div');
  header.style.cssText = 'background:linear-gradient(135deg,#1e3a5f,#16213e);padding:20px 24px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(52,152,219,0.2);';
  const headerLeft = document.createElement('div');
  headerLeft.innerHTML = '<div style="display:flex;align-items:center;gap:10px"><span style="font-size:22px">⚙️</span><div><div style="color:white;font-size:16px;font-weight:700">관리자 설정 (1회만 입력)</div><div style="color:#64b5f6;font-size:11px;margin-top:2px">저장 후 Google 로그인 버튼만 사용하면 됩니다</div></div></div>';
  const xBtn = document.createElement('button');
  xBtn.innerHTML = '✕';
  xBtn.style.cssText = 'background:rgba(255,255,255,0.1);border:none;color:rgba(255,255,255,0.7);font-size:16px;cursor:pointer;padding:6px 10px;border-radius:6px;line-height:1;';
  xBtn.onmouseover = () => xBtn.style.background = 'rgba(255,255,255,0.2)';
  xBtn.onmouseout  = () => xBtn.style.background = 'rgba(255,255,255,0.1)';
  xBtn.onclick = () => overlay.remove();
  header.appendChild(headerLeft); header.appendChild(xBtn);
  box.appendChild(header);

  /* ── 상태 배지 ── */
  if (hasSaved) {
    const badge = document.createElement('div');
    badge.style.cssText = 'background:rgba(34,197,94,0.1);border-bottom:1px solid rgba(34,197,94,0.2);padding:10px 24px;display:flex;align-items:center;gap:8px;';
    badge.innerHTML = '<span style="color:#4ade80;font-size:13px">✅ 연동 설정이 저장되어 있습니다. 변경하려면 아래에서 수정하세요.</span>';
    box.appendChild(badge);
  }

  /* ── 바디 ── */
  const body = document.createElement('div');
  body.style.cssText = 'padding:24px;';

  const mkField = (label, key, placeholder, hint) => {
    const wrap = document.createElement('div');
    wrap.style.marginBottom = '18px';
    const topRow = document.createElement('div');
    topRow.style.cssText = 'display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;';
    const lbl = document.createElement('label');
    lbl.textContent = label;
    lbl.style.cssText = 'font-size:12px;font-weight:700;color:#94a3b8;letter-spacing:.5px;text-transform:uppercase;';
    topRow.appendChild(lbl);
    if (hint) {
      const hintEl = document.createElement('span');
      hintEl.textContent = hint;
      hintEl.style.cssText = 'font-size:10px;color:#475569;';
      topRow.appendChild(hintEl);
    }
    const inpWrap = document.createElement('div');
    inpWrap.style.cssText = 'position:relative;';
    const inp = document.createElement('input');
    inp.type = 'text';
    inp.placeholder = placeholder;
    inp.value = localStorage.getItem(key) || '';
    inp.dataset.key = key;
    inp.autocomplete = 'off';
    inp.style.cssText = 'width:100%;padding:11px 40px 11px 14px;border:1px solid rgba(255,255,255,0.1);border-radius:10px;font-size:13px;outline:none;box-sizing:border-box;font-family:monospace;background:#1e293b;color:#e2e8f0;transition:border-color .2s;';
    inp.onfocus = () => inp.style.borderColor = '#3498db';
    inp.onblur  = () => inp.style.borderColor = inp.value ? 'rgba(52,152,219,0.4)' : 'rgba(255,255,255,0.1)';
    if (inp.value) inp.style.borderColor = 'rgba(52,152,219,0.4)';
    /* 복사 버튼 */
    const copyBtn = document.createElement('button');
    copyBtn.innerHTML = '📋';
    copyBtn.title = '복사';
    copyBtn.style.cssText = 'position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:14px;opacity:0.5;';
    copyBtn.onmouseover = () => copyBtn.style.opacity = '1';
    copyBtn.onmouseout  = () => copyBtn.style.opacity = '0.5';
    copyBtn.onclick = (e) => { e.preventDefault(); navigator.clipboard?.writeText(inp.value); showToast('📋 복사됨'); };
    inpWrap.appendChild(inp); inpWrap.appendChild(copyBtn);
    wrap.appendChild(topRow); wrap.appendChild(inpWrap);
    body.appendChild(wrap);
    return inp;
  };

  const inpClientId = mkField('OAuth 2.0 Client ID',   'g_client_id', '000000000000-xxxx.apps.googleusercontent.com', 'Google Cloud Console');

  /* ── 도움말 박스 ── */
  const helpBox = document.createElement('div');
  helpBox.style.cssText = 'background:#1e293b;border:1px solid rgba(255,255,255,0.06);border-radius:10px;padding:12px 14px;margin-bottom:20px;';
  helpBox.innerHTML = '<div style="font-size:11px;color:#64748b;line-height:1.9;">' +
    '<b style="color:#94a3b8">📌 설정 방법 (최초 1회):</b><br>' +
    '① <a href="https://console.cloud.google.com/" target="_blank" style="color:#60a5fa">Google Cloud Console</a> → OAuth 2.0 클라이언트 ID 생성<br>' +
    '② Client ID 붙여넣기 후 저장<br>' +
    '③ 네브바의 <b style="color:#4ade80">🔑 Google 로그인</b> 클릭 → 본인 Drive 자동 표시' +
    '</div>';
  body.appendChild(helpBox);

  box.appendChild(body);

  /* ── 푸터 ── */
  const footer = document.createElement('div');
  footer.style.cssText = 'display:flex;gap:10px;justify-content:space-between;align-items:center;padding:16px 24px;border-top:1px solid rgba(255,255,255,0.06);background:#0a1120;';

  /* 초기화 버튼 */
  const clearBtn = document.createElement('button');
  clearBtn.textContent = '🗑 설정 초기화';
  clearBtn.style.cssText = 'padding:9px 16px;border:1px solid rgba(239,68,68,0.3);border-radius:8px;background:transparent;color:#f87171;cursor:pointer;font-size:13px;';
  clearBtn.onmouseover = () => clearBtn.style.background = 'rgba(239,68,68,0.1)';
  clearBtn.onmouseout  = () => clearBtn.style.background = 'transparent';
  clearBtn.onclick = () => {
    if (confirm('Google 연동 설정을 모두 초기화하시겠습니까?')) {
      clearGoogleSettings();
      overlay.remove();
      showToast('🗑 설정이 초기화되었습니다.');
    }
  };

  const rightBtns = document.createElement('div');
  rightBtns.style.cssText = 'display:flex;gap:10px;';

  const cancelBtn = document.createElement('button');
  cancelBtn.textContent = '취소';
  cancelBtn.style.cssText = 'padding:10px 20px;border:1px solid rgba(255,255,255,0.1);border-radius:8px;background:transparent;color:#94a3b8;cursor:pointer;font-size:14px;';
  cancelBtn.onclick = () => overlay.remove();

  const saveBtn = document.createElement('button');
  saveBtn.innerHTML = '💾 저장 후 연결';
  saveBtn.style.cssText = 'padding:10px 22px;border:none;border-radius:8px;background:linear-gradient(135deg,#3498db,#2980b9);color:white;cursor:pointer;font-size:14px;font-weight:700;box-shadow:0 4px 14px rgba(52,152,219,0.4);';
  saveBtn.onmouseover = () => saveBtn.style.opacity = '0.9';
  saveBtn.onmouseout  = () => saveBtn.style.opacity = '1';
  saveBtn.onclick = async () => {
    const clientId = inpClientId.value.trim();
    if (!clientId) {
      showToast('❌ Client ID를 입력해주세요.', true); return;
    }
    saveGoogleSettings(null, clientId, null);
    overlay.remove();
    showToast('✅ Google Drive 연동 설정이 저장되었습니다.');
    if (ddToReload) {
      ddToReload.innerHTML = '';
      await populateServiceMenu(ddToReload);
    }
  };

  rightBtns.appendChild(cancelBtn); rightBtns.appendChild(saveBtn);
  footer.appendChild(clearBtn); footer.appendChild(rightBtns);
  box.appendChild(footer);
  overlay.appendChild(box);
  overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });
  document.body.appendChild(overlay);
  inpClientId.focus();
}

function showToast(msg, isError=false) {
  document.querySelectorAll('.save-toast').forEach(t => t.remove());
  const el = document.createElement('div');
  el.className = 'save-toast';
  el.style.background = isError ? '#dc2626' : '#1e293b';
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

/* ── 태그 클릭 팝업 ── */
function showTagPopup(tagNode, event, nodeById, links, container) {
  document.getElementById('tag-popup')?.remove();

  /* 연결된 파일 수집 */
  const files = [];
  links.forEach(l => {
    const sid = l.source?.id||l.source, tid = l.target?.id||l.target;
    const oid = sid===tagNode.id ? tid : (tid===tagNode.id ? sid : null);
    if (oid) {
      const nd = nodeById[oid];
      if (nd && !nd.isTag) files.push(nd);
    }
  });

  const popup = document.createElement('div');
  popup.id = 'tag-popup';
  popup.style.cssText = `
    position:fixed; z-index:99998;
    background:rgba(8,14,28,0.97);
    border:1px solid rgba(74,222,128,0.4);
    border-radius:12px; padding:14px 16px;
    min-width:210px; max-width:280px;
    box-shadow:0 8px 32px rgba(0,0,0,0.6);
    animation:fadeUp .18s ease;
    left:${Math.min(event.clientX+12, window.innerWidth-295)}px;
    top:${Math.min(event.clientY+12, window.innerHeight-320)}px;
  `;
  /* 헤더 */
  const header = document.createElement('div');
  header.style.cssText = 'display:flex;align-items:center;justify-content:space-between;margin-bottom:10px';
  const tagLabel = document.createElement('div');
  tagLabel.style.cssText = 'color:#4ade80;font-weight:700;font-size:13px';
  tagLabel.textContent = '🏷 #' + tagNode.name;
  const closeBtn = document.createElement('button');
  closeBtn.textContent = '✕';
  closeBtn.style.cssText = 'background:none;border:none;color:#64748b;cursor:pointer;font-size:16px;line-height:1;padding:0 2px';
  closeBtn.addEventListener('click', () => popup.remove());
  header.appendChild(tagLabel);
  header.appendChild(closeBtn);
  popup.appendChild(header);

  /* 사용 수 */
  const countEl = document.createElement('div');
  countEl.style.cssText = 'font-size:11px;color:#64748b;margin-bottom:8px';
  countEl.textContent = files.length + '개 노트에서 사용';
  popup.appendChild(countEl);

  /* 파일 목록 — DOM으로 구성해 XSS 방지 */
  const listEl = document.createElement('div');
  listEl.style.cssText = 'display:flex;flex-direction:column;gap:3px;max-height:200px;overflow-y:auto';
  files.forEach(f => {
    const row = document.createElement('div');
    row.style.cssText = 'padding:6px 10px;background:rgba(255,255,255,0.04);border-radius:6px;cursor:pointer;font-size:12px;color:#c8d8f0;display:flex;align-items:center;gap:7px;border:1px solid transparent;transition:all .12s';
    row.addEventListener('mouseover', () => { row.style.background='rgba(74,222,128,0.1)'; row.style.borderColor='rgba(74,222,128,0.25)'; });
    row.addEventListener('mouseout',  () => { row.style.background='rgba(255,255,255,0.04)'; row.style.borderColor='transparent'; });
    row.addEventListener('click', () => { popup.remove(); loadObsidianFileByPath(f.path, f.name, f.folder); });
    const icon = document.createElement('span');
    icon.style.cssText = 'opacity:.55;font-size:11px';
    icon.textContent = '📄';
    const nameSpan = document.createElement('span');
    nameSpan.style.cssText = 'overflow:hidden;text-overflow:ellipsis;white-space:nowrap';
    nameSpan.textContent = f.name.replace(/\.md$/i, '');
    const folderSpan = document.createElement('span');
    folderSpan.style.cssText = 'margin-left:auto;font-size:10px;color:#475569;white-space:nowrap';
    folderSpan.textContent = f.folder !== '루트' ? f.folder : '';
    row.appendChild(icon); row.appendChild(nameSpan); row.appendChild(folderSpan);
    listEl.appendChild(row);
  });
  popup.appendChild(listEl);

  document.body.appendChild(popup);

  /* 바깥 클릭 시 닫기 */
  setTimeout(() => {
    const close = (e) => {
      if (!popup.contains(e.target)) { popup.remove(); document.removeEventListener('click', close); }
    };
    document.addEventListener('click', close);
  }, 50);
}

function toggleSimulation() {
  const btn = document.getElementById('pause-btn');
  graphPaused = !graphPaused;
  if (graphPaused) {
    if (btn) { btn.textContent = '▶ 재생'; btn.classList.add('paused'); }
  } else {
    if (btn) { btn.textContent = '⏸ 멈춤'; btn.classList.remove('paused'); }
  }
}

function zoomIn()    { if(graphZoom&&graphSvg) graphSvg.transition().duration(300).call(graphZoom.scaleBy, 1.4); }
function zoomOut()   { if(graphZoom&&graphSvg) graphSvg.transition().duration(300).call(graphZoom.scaleBy, 0.7); }
function resetZoom() { if(graphZoom&&graphSvg) graphSvg.transition().duration(500).call(graphZoom.transform, d3.zoomIdentity); }

} // initObsidianGraph 닫힘

</script>
