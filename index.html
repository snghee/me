<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SBJ DNX 내부 자료 포털</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.2.0/github-markdown.min.css">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { height:100%; overflow:hidden; }
body { font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif; display:flex; flex-direction:column; height:100vh; }

/* ── 메인 레이아웃 (콘텐츠 + 사이드바) ── */
.main-layout { display:flex; flex:1; overflow:hidden; }
.content-area { flex:1; overflow-y:hidden; min-width:0; display:flex; flex-direction:column; }
.sidebar {
  width:320px; flex-shrink:0;
  background:#1a1a2e; border-left:1px solid #2a2a4a;
  display:flex; flex-direction:column;
  overflow:hidden;
}
.sidebar-header {
  padding:12px 16px; background:#16213e;
  border-bottom:1px solid #2a2a4a;
  display:flex; align-items:center; justify-content:space-between;
}
.sidebar-header-title { color:#64b5f6; font-size:12px; font-weight:700; letter-spacing:1px; text-transform:uppercase; }
.sidebar-graph { flex:1; position:relative; overflow:hidden; }
.sidebar-graph svg { width:100%; height:100%; display:block; }
.graph-wrap { height:100%; }
@media (max-width:1024px) { .sidebar { width:260px; } }
@media (max-width:768px)  { .sidebar { display:none; } }

/* ── 네비게이션 ── */
.navbar {
  background:#2c3e50; color:white;
  display:flex; align-items:center;
  padding:0 28px; height:60px;
  position:sticky; top:0; z-index:100;
  box-shadow:0 2px 8px rgba(0,0,0,.3);
}
.navbar-brand { font-size:22px; font-weight:bold; margin-right:40px; white-space:nowrap; }
.navbar-menu  { display:flex; align-items:center; gap:6px; flex:1; overflow-x:auto; }
.navbar-menu::-webkit-scrollbar { display:none; }

/* ── 메뉴 버튼 ── */
.nav-item { position:relative; }
.nav-btn {
  display:flex; align-items:center; gap:8px;
  padding:12px 22px; cursor:pointer;
  border-radius:6px; font-size:15px; color:white;
  white-space:nowrap; user-select:none;
  background:none; border:none;
}
.nav-btn:hover { background:#3d5166; }
.nav-btn.open  { background:#3d5166; }
.nav-btn .arrow { font-size:10px; transition:transform .2s; display:inline-block; }
.nav-btn.open .arrow { transform:rotate(180deg); }

/* ── 드롭다운 ── */
.dropdown {
  display:none;
  position:fixed;
  background:#2c3e50; min-width:200px;
  border-radius:8px; box-shadow:0 8px 24px rgba(0,0,0,.3);
  z-index:99999; max-height:70vh; overflow-y:auto;
  scrollbar-width:thin; scrollbar-color:#4a6280 #2c3e50;
}
.dropdown.open { display:block !important; }
.dropdown::-webkit-scrollbar { width:4px; }
.dropdown::-webkit-scrollbar-thumb { background:#4a6280; border-radius:2px; }
.dd-item {
  padding:10px 18px; cursor:pointer; font-size:15px;
  color:rgba(255,255,255,.85);
  border-bottom:1px solid rgba(255,255,255,.05);
}
.dd-item:last-child { border-bottom:none; }
.dd-item:hover  { background:#3498db; color:white; }
.dd-item.active { color:#f39c12; font-weight:bold; }
.dd-folder {
  padding:8px 18px 6px; font-size:13px;
  color:rgba(255,255,255,.4); text-transform:uppercase;
  letter-spacing:.5px; background:rgba(0,0,0,.15);
  border-bottom:1px solid rgba(255,255,255,.05); cursor:pointer;
}

/* ── 콘텐츠 ── */
.content { overflow-y:hidden; background:white; flex:1; display:flex; flex-direction:column; }
.content.markdown-body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif; font-size:16px; line-height:1.6; color:#24292e; }
.content-area { background:white; }
.file-inner { padding:40px 60px; font-size:17px; overflow-y:auto; height:100%; box-sizing:border-box; }
.breadcrumb { font-size:15px; color:#999; margin-bottom:15px; padding-bottom:10px; border-bottom:1px solid #eee; }

/* ── 에디터 ── */
.editor-toolbar {
  display:flex; align-items:center; gap:8px;
  padding:10px 0 14px; border-bottom:1px solid #e8edf2; margin-bottom:16px; flex-wrap:wrap;
}
.editor-toolbar-btn {
  background:#f1f5f9; border:1px solid #e2e8f0; border-radius:5px;
  padding:5px 10px; font-size:12px; cursor:pointer; color:#475569;
  display:flex; align-items:center; gap:4px; white-space:nowrap;
}
.editor-toolbar-btn:hover { background:#e2e8f0; }
.editor-toolbar-sep { width:1px; height:20px; background:#e2e8f0; margin:0 2px; }
.editor-mode-btn {
  padding:5px 14px; border-radius:5px; font-size:12px; cursor:pointer;
  border:1px solid #e2e8f0;
}
.editor-mode-btn.active { background:#3498db; color:white; border-color:#3498db; }
.editor-mode-btn:not(.active) { background:#f1f5f9; color:#475569; }
.editor-save-btn {
  padding:6px 18px; background:#22c55e; color:white;
  border:none; border-radius:5px; font-size:13px; font-weight:600;
  cursor:pointer; display:flex; align-items:center; gap:6px;
}
.editor-save-btn:hover { background:#16a34a; }
.editor-save-btn:disabled { background:#94a3b8; cursor:not-allowed; }
.editor-pane {
  width:100%; padding:16px; font-size:14px; line-height:1.8;
  border:1px solid #e2e8f0; border-radius:8px; resize:none;
  font-family:'D2Coding','Fira Code',monospace; color:#1e293b;
  background:#fafafa; outline:none; box-sizing:border-box;
}
.editor-pane:focus { border-color:#3498db; background:white; }
.split-wrap { display:grid; grid-template-columns:1fr 1fr; gap:16px; height:calc(100vh - 240px); }
.split-wrap .editor-pane { height:100% !important; }
.split-wrap .preview-pane { height:100%; overflow-y:auto; padding:16px; border:1px solid #e2e8f0; border-radius:8px; }
.preview-pane { min-height:500px; }
.split-wrap { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
.split-wrap .editor-pane { box-sizing:border-box; }
.split-wrap .preview-pane { min-height:600px; padding:16px; border:1px solid #e2e8f0; border-radius:8px; overflow-y:auto; }
.save-toast {
  position:fixed; bottom:24px; right:24px; z-index:99999;
  background:#1e293b; color:white; padding:12px 20px; border-radius:8px;
  font-size:13px; display:flex; align-items:center; gap:8px;
  animation:slideUp .3s ease; box-shadow:0 4px 20px rgba(0,0,0,0.3);
}
@keyframes slideUp { from{transform:translateY(20px);opacity:0} to{transform:translateY(0);opacity:1} }

/* ── 저장 다이얼로그 ── */
.save-dialog-overlay {
  position:fixed; inset:0; background:rgba(0,0,0,.55); z-index:99998;
  display:flex; align-items:center; justify-content:center;
}
.save-dialog {
  background:white; border-radius:12px; width:480px; max-width:90vw;
  box-shadow:0 20px 60px rgba(0,0,0,.3); overflow:hidden;
}
.save-dialog-header {
  background:#2c3e50; color:white; padding:16px 20px;
  font-size:16px; font-weight:700; display:flex; justify-content:space-between; align-items:center;
}
.save-dialog-header button { background:none; border:none; color:white; font-size:20px; cursor:pointer; padding:0 4px; }
.save-dialog-body { padding:20px; }
.save-dialog-label { font-size:13px; font-weight:600; color:#475569; margin-bottom:6px; }
.save-dialog-tree {
  border:1px solid #e2e8f0; border-radius:8px; max-height:260px;
  overflow-y:auto; margin-bottom:16px; background:#f8fafc;
}
.save-tree-folder {
  padding:8px 14px; cursor:pointer; font-size:14px; font-weight:600;
  color:#1e293b; display:flex; align-items:center; gap:8px;
  border-bottom:1px solid #e8edf2; user-select:none;
}
.save-tree-folder:hover { background:#e8edf2; }
.save-tree-folder.selected { background:#dbeafe; color:#1d4ed8; }
.save-tree-file {
  padding:7px 14px 7px 34px; cursor:pointer; font-size:13px;
  color:#475569; border-bottom:1px solid #f1f5f9;
  display:flex; align-items:center; gap:6px;
}
.save-tree-file:hover { background:#f1f5f9; }
.save-tree-file.selected { background:#dbeafe; color:#1d4ed8; font-weight:600; }
.save-dialog-filename {
  width:100%; padding:10px 14px; border:1px solid #e2e8f0; border-radius:8px;
  font-size:14px; outline:none; box-sizing:border-box; margin-bottom:16px;
}
.save-dialog-filename:focus { border-color:#3498db; }
.save-dialog-footer { display:flex; gap:10px; justify-content:flex-end; }
.save-dialog-cancel { padding:9px 20px; border:1px solid #e2e8f0; border-radius:8px; background:white; cursor:pointer; font-size:14px; }
.save-dialog-confirm { padding:9px 20px; border:none; border-radius:8px; background:#22c55e; color:white; cursor:pointer; font-size:14px; font-weight:600; }
.save-dialog-confirm:hover { background:#16a34a; }
.loading { text-align:center; padding:40px; color:#999; }
.loading-spinner { border:4px solid #f3f3f3; border-top:4px solid #3498db; border-radius:50%; width:40px; height:40px; animation:spin 1s linear infinite; margin:20px auto; }
@keyframes spin { to { transform:rotate(360deg); } }
.err { background:#fee; border:1px solid #fcc; color:#c33; padding:15px; border-radius:5px; margin:20px 0; }

/* ── 햄버거 ── */
.hamburger { display:none; background:none; border:none; color:white; font-size:22px; cursor:pointer; margin-left:auto; padding:4px 8px; }
.mobile-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:1500; }
.mobile-overlay.show { display:block; }
.mobile-drawer { position:fixed; top:0; right:-280px; width:260px; height:100vh; background:#2c3e50; color:white; z-index:1800; transition:right .3s; overflow-y:auto; padding:60px 0 20px; }
.mobile-drawer.open { right:0; }
.drawer-close { position:absolute; top:14px; right:14px; background:none; border:none; color:white; font-size:22px; cursor:pointer; }
.drawer-section { padding:10px 0; border-bottom:1px solid rgba(255,255,255,.08); }
.drawer-section-title { padding:10px 20px 6px; font-size:14px; color:rgba(255,255,255,.4); text-transform:uppercase; letter-spacing:.5px; }
.drawer-item { padding:14px 28px; cursor:pointer; font-size:14px; color:rgba(255,255,255,.85); }
.drawer-item:hover { background:#3498db; color:white; }
.drawer-folder { padding:13px 24px; cursor:pointer; font-size:15px; color:rgba(255,255,255,.85); display:flex; align-items:center; gap:8px; }
.drawer-folder:hover { background:rgba(255,255,255,.08); }
.drawer-folder-list { display:none; }
.drawer-folder-list .drawer-item { padding-left:40px; font-size:14px; }
.drawer-loading { padding:10px 24px; font-size:13px; color:rgba(255,255,255,.4); }

/* ── 히어로 ── */
.content-area > #dashboard, .content-area > .markdown-body > #dashboard { display:flex; flex-direction:column; height:100%; }
#dashboard { display:flex; flex-direction:column; height:100%; }
.hero-section {
  position:relative;
  background:linear-gradient(135deg,#0a2342 0%,#1a3a5c 50%,#0d3b6e 100%);
  color:white;
  padding:12px 60px 10px;
  display:flex; align-items:center;
  overflow:hidden;
  flex-shrink:0;
}
.hero-section::before {
  content:''; position:absolute; top:-60px; right:-60px;
  width:400px; height:400px;
  background:radial-gradient(circle,rgba(52,152,219,.15) 0%,transparent 70%);
  pointer-events:none;
}
.hero-inner {
  position:relative; z-index:2; max-width:480px;
  display:flex; flex-direction:column; gap:0;
}
.hero-graph {
  width:100%; flex:1;
  min-height:0;
  background:#1a1a2e;
  position:relative;
}
.hero-graph svg { width:100%; height:100%; display:block; }
@media (max-width:768px) {
  .hero-section { padding:40px 20px 36px; min-height:auto; }
  .hero-graph { height:320px; }
}
.hero-tag { display:inline-block; font-size:11px; font-weight:600; letter-spacing:2px; text-transform:uppercase; color:#64b5f6; border:1px solid rgba(100,181,246,.4); padding:4px 12px; border-radius:20px; margin-bottom:6px; }
.hero-title { font-size:22px; font-weight:700; line-height:1.25; margin-bottom:14px; }
.hero-title span { color:#64b5f6; }
.hero-subtitle { font-size:13px; color:rgba(255,255,255,.6); line-height:1.7; max-width:520px; }
.hero-deco { position:absolute; right:60px; top:50%; transform:translateY(-50%); display:flex; flex-direction:column; gap:10px; opacity:.12; }
.hero-deco-line { height:2px; background:white; border-radius:2px; }

/* ── 통계 바 ── */
.stats-bar { background:#f5f7fa; border-bottom:1px solid #e8edf2; padding:14px 60px; display:flex; align-items:center; gap:40px; }
.stats-bar-label { font-size:11px; color:#999; font-weight:600; letter-spacing:1px; text-transform:uppercase; white-space:nowrap; }
.stats-bar-items { display:flex; gap:32px; flex:1; }
.stats-bar-item { display:flex; align-items:center; gap:8px; font-size:12px; color:#666; }
.stats-bar-num { font-size:20px; font-weight:700; color:#1a3a5c; }
.stats-bar-reset { font-size:11px; color:#e74c3c; cursor:pointer; border:1px solid #fcc; background:#fff5f5; padding:4px 10px; border-radius:4px; white-space:nowrap; }
.stats-bar-reset:hover { background:#fee; }

/* ── 로그 ── */
.main-content { padding:40px 60px; }
.section-title { font-size:13px; font-weight:700; color:#1a3a5c; letter-spacing:1px; text-transform:uppercase; border-left:3px solid #3498db; padding-left:10px; margin-bottom:14px; }
.log-table-wrap { border:1px solid #e8edf2; border-radius:8px; overflow:hidden; margin-bottom:28px; }
.log-scroll { max-height:160px; overflow-y:auto; }
.log-table { width:100%; border-collapse:collapse; font-size:12px; }
.log-table th { background:#f5f7fa; color:#888; font-weight:600; padding:9px 14px; text-align:left; border-bottom:1px solid #e8edf2; }
.log-table td { padding:9px 14px; border-bottom:1px solid #f0f3f6; color:#444; }
.log-table tr:last-child td { border-bottom:none; }
.log-empty { padding:20px; text-align:center; color:#bbb; font-size:12px; }
.two-col { display:grid; grid-template-columns:1fr 1fr; gap:28px; }

/* ── 옵시디안 그래프 ── */
.graph-wrap { border:1px solid #e8edf2; border-radius:8px; overflow:hidden; margin-bottom:28px; background:#1a1a2e; position:relative; }
.graph-wrap svg { display:block; width:100%; height:340px; }
.graph-node { cursor:pointer; }
.graph-node circle { stroke-width:1.5; transition:r .2s; }
.graph-node:hover circle { r:7; }
.graph-node text { font-size:13px; fill:rgba(255,255,255,0.85); pointer-events:none; }
.graph-link { stroke:rgba(100,181,246,0.3); stroke-opacity:1; stroke-width:1; }
.graph-controls { position:absolute; bottom:8px; right:8px; display:flex; gap:4px; z-index:10; }
.graph-btn { background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.2); color:white; padding:4px 8px; border-radius:4px; cursor:pointer; font-size:11px; }
.graph-btn:hover { background:rgba(255,255,255,0.2); }
.graph-tooltip { position:fixed; background:rgba(0,0,0,0.8); color:white; padding:4px 8px; border-radius:4px; font-size:11px; pointer-events:none; display:none; z-index:99999; }

/* ── 히어로 풀스크린 그래프 ── */
.hero-graph { opacity:0; transition:opacity 1s ease; }
.hero-graph.loaded { opacity:1; }

/* ── 통계 패널 (소개 메뉴 하단) ── */
.stats-panel { background:#f8fafc; border:1px solid #e8edf2; border-radius:8px; padding:20px; margin-top:28px; }
.stats-panel-title { font-size:13px; font-weight:700; color:#64748b; letter-spacing:1px; text-transform:uppercase; margin-bottom:16px; }
.stats-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin-bottom:6px; }
.stats-card { background:white; border:1px solid #e8edf2; border-radius:8px; padding:14px; text-align:center; }
.stats-card-num { font-size:28px; font-weight:800; color:#3498db; }
.stats-card-label { font-size:11px; color:#94a3b8; margin-top:4px; }
.stats-log-wrap { background:white; border:1px solid #e8edf2; border-radius:8px; overflow:hidden; margin-top:12px; }
.stats-log-title { padding:10px 14px; font-size:12px; font-weight:700; color:#64748b; background:#f8fafc; border-bottom:1px solid #e8edf2; display:flex; justify-content:space-between; align-items:center; }
.stats-reset-btn { background:none; border:1px solid #e2e8f0; border-radius:4px; padding:3px 8px; font-size:11px; color:#94a3b8; cursor:pointer; }
.stats-reset-btn:hover { background:#fee2e2; color:#ef4444; border-color:#fca5a5; }

@media (max-width:768px) {
  .navbar-menu { display:none; }
  .hamburger { display:block; }
  .hero-section { padding:40px 20px 36px; min-height:60vh !important; }
  .hero-deco { display:none; }
  .hero-title { font-size:24px; }
  .main-content { padding:24px 20px; }
  .two-col { grid-template-columns:1fr; }
  .file-inner { padding:20px 16px; }
  .stats-grid { grid-template-columns:repeat(3,1fr); gap:8px; }
}
</style>

<nav class="navbar" id="navbar">
  <div class="navbar-brand" onclick="showDashboard()" style="cursor:pointer">🏦 SBJ DNX</div>
  <div class="navbar-menu" id="navbar-menu"></div>
  <button class="hamburger" onclick="toggleDrawer()">☰</button>
</nav>

<div class="mobile-overlay" id="mobileOverlay" onclick="closeDrawer()"></div>
<div class="mobile-drawer" id="mobileDrawer">
  <button class="drawer-close" onclick="closeDrawer()">✕</button>
  <div id="mobile-drawer-content"></div>
</div>

<div class="main-layout">
<div class="content-area">
<div class="content markdown-body" id="content">
  <div id="dashboard">
    <div class="hero-section">
      <div class="hero-inner">
        <div class="hero-tag">Internal Document Portal</div>
        <div class="hero-title">SBJ DNX<br><span>내부 자료 포털</span></div>
        <div class="hero-subtitle">디지털 변혁을 추구하는 SBJ DNX의 내부 문서 관리 시스템입니다.<br>상단 메뉴에서 자료를 검색하고 열람하세요.</div>
      </div>
    </div>
    <!-- 그래프: 히어로 아래 전체 너비 -->
    <div class="hero-graph" id="graph-wrap">
      <svg id="obs-graph"></svg>
      <div class="graph-tooltip" id="graph-tooltip"></div>
      <div class="graph-controls">
        <button class="graph-btn" onclick="zoomIn()" title="확대">＋</button>

        <button class="graph-btn" onclick="resetZoom()" title="초기화">⟳</button>

    </div>
    <!-- 통계/로그는 숨겨진 상태로 유지 (소개 메뉴에서 표시) -->
    <div id="stat-visits" style="display:none">0</div>
    <div id="stat-downloads" style="display:none">0</div>
    <div id="stat-files" style="display:none">0</div>
    <div id="visit-log" style="display:none"></div>
    <div id="download-log" style="display:none"></div>
  </div>
</div>
</div><!-- content-area -->
</div><!-- main-layout -->

<script>
/* gapi는 나중에 비동기 로드 - 없어도 메뉴는 동작 */
function loadGapi() {
  return new Promise((res) => {
    if (window.gapi) { res(); return; }
    const s = document.createElement('script');
    s.src = 'https://apis.google.com/js/api.js';
    s.onload = res;
    s.onerror = res; // 실패해도 계속 진행
    document.head.appendChild(s);
  });
}
</script>

    `${GITHUB_API}/repos/${GITHUB_OWNER}/${GITHUB_REPO}/git/trees/${GITHUB_BRANCH}?recursive=1`
  );
  if (!r.ok) throw new Error('GitHub 트리 로드 실패');
  const data = await r.json();
  return data.tree.filter(f => f.type === 'blob' && f.path.endsWith('.md'));
}

async function ghGetRawFile(path, bustCache=false) {
  const url = `https://raw.githubusercontent.com/${GITHUB_OWNER}/${GITHUB_REPO}/${GITHUB_BRANCH}/${path}`
    + (bustCache ? `?t=${Date.now()}` : '');
  const r = await fetch(url, bustCache ? {cache:'no-store'} : {});
  if (!r.ok) throw new Error(`파일 로드 실패: ${path}`);
  return await r.text();
}

/* ── Google Drive ── */
function initGapi() {
  return new Promise(async (res,rej) => {
    if (driveInit) { res(); return; }
    await loadGapi();
    if (!window.gapi) { rej(new Error('gapi 로드 실패')); return; }
    gapi.load('client', async () => {
      try { await gapi.client.init({ apiKey:GOOGLE_API_KEY, discoveryDocs:['https://www.googleapis.com/discovery/v1/apis/drive/v3/rest'] }); driveInit=true; res(); }
      catch(e) { rej(e); }
    });
  });
}
async function fetchDriveFiles(id) {
  await initGapi();
  const r = await gapi.client.drive.files.list({ q:`'${id}' in parents and trashed=false`, pageSize:100, fields:'files(id,name,mimeType)' });
  return r.result.files||[];
}

async function downloadObsidianFile(filePath, name) {
  try {
    const r = await fetch(
      `https://raw.githubusercontent.com/${GITHUB_OWNER}/${GITHUB_REPO}/${GITHUB_BRANCH}/${filePath}`
    );
    if (!r.ok) throw new Error('다운로드 실패');
    const blob = await r.blob();
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href=url; a.download=name+'.md';
    document.body.appendChild(a); a.click(); URL.revokeObjectURL(url); a.remove();
    recordDownload(name, filePath);
  } catch(e) { alert(e.message); }
}

/* ── 파일 로드 ── */
async function loadFile(filePath, itemName, folder) {
  // 대시보드 숨기고 파일 모드로 전환
  const dash = document.getElementById('dashboard');
  if (dash) dash.style.display = 'none';
  contentEl.innerHTML=`<div class="file-inner"><div class="breadcrumb">${folder} > ${itemName}</div><div class="loading"><div class="loading-spinner"></div></div></div>`;
  if (filePath==='STATS')       { renderStats(folder,itemName); return; }
  if (filePath==='INTRO_STATS') { renderIntroStats(); return; }
  if (filePath==='NEW_DOC')     { renderNewDoc(); return; }
  try {
    const r = await fetch(filePath);
    if (!r.ok) throw new Error(`파일 없음: ${filePath}`);
    const md = await r.text();
    contentEl.className='content markdown-body';
    contentEl.innerHTML=`<div class="file-inner"><div class="breadcrumb">${folder} > ${itemName}</div>${mdToHtml(md)}</div>`;
  } catch(e) {
    contentEl.innerHTML=`<div class="file-inner"><div class="breadcrumb">${folder} > ${itemName}</div><div class="err">❌ ${e.message}</div></div>`;
  }
}

function renderNewDoc() {
  // 새 문서 상태

  function renderNdocBody() {
    const body = document.getElementById('ndoc-body');

    const ta = document.getElementById('ndoc-textarea');
    if (ta) _newDocContent = ta.value;

    } else if (_ndocMode === 'edit') {

let _ndMode = 'edit';

function ndSetMode(mode) {
  _ndMode = mode;
  // 버튼 active
  ['edit','split','preview'].forEach(m => {
    const b = document.getElementById('nd-btn-'+m);
    if (b) b.classList.toggle('active', m === mode);
  });
  const single   = document.getElementById('nd-textarea-single');
  const splitW   = document.getElementById('nd-split-wrap');
  const taSplit  = document.getElementById('nd-textarea');
  const prevS    = document.getElementById('nd-preview-single');

  // 현재 내용 동기화
  const curVal = (single && single.style.display !== 'none') ? single.value
               : (taSplit ? taSplit.value : '');

  if (mode === 'edit') {
    if (single)  { single.style.display='block'; single.value=curVal; }
    if (splitW)  splitW.style.display='none';
    if (prevS)   prevS.style.display='none';
  } else if (mode === 'split') {
    if (single)  single.style.display='none';
    if (splitW)  { splitW.style.display='grid'; if(taSplit) taSplit.value=curVal; }
    if (prevS)   prevS.style.display='none';
    ndSyncPreview();
  } else { // preview
    if (single)  single.style.display='none';
    if (splitW)  splitW.style.display='none';
    if (prevS)   { prevS.style.display='block'; prevS.innerHTML=mdToHtml(curVal); }
  }
}

function ndSyncPreview() {
  const taSplit  = document.getElementById('nd-textarea');
  const taSingle = document.getElementById('nd-textarea-single');
  const val = (taSplit && taSplit.style.display !== 'none') ? taSplit.value : (taSingle ? taSingle.value : '');
  const p1 = document.getElementById('nd-preview');
  const p2 = document.getElementById('nd-preview-single');
  if (p1) p1.innerHTML = mdToHtml(val);
  if (p2) p2.innerHTML = mdToHtml(val);
}

async function saveNewDoc() {
  const folder = (document.getElementById('nd-folder')?.value || '').trim();
  const title  = (document.getElementById('nd-title')?.value  || '').trim();
  const taSplit  = document.getElementById('nd-textarea');
  const taSingle = document.getElementById('nd-textarea-single');
  const body = (taSplit && taSplit.style.display !== 'none') ? taSplit.value : (taSingle ? taSingle.value : '');

  if (!title) { showToast('❌ 파일명을 입력하세요', true); return; }

  const filePath = folder ? `${folder}/${title}.md` : `${title}.md`;

  let token = localStorage.getItem('gh_write_token');
  if (!token) {
    token = prompt('GitHub Token 입력 (최초 1회):');
    if (!token) return;
    localStorage.setItem('gh_write_token', token);
  }

  const encoded = btoa(unescape(encodeURIComponent(body)));

  // 파일 존재 여부 확인 (SHA 필요)
  let sha = undefined;
  try {
    const check = await fetch(
      `${GITHUB_API}/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${encodeURIComponent(filePath)}?ref=${GITHUB_BRANCH}&t=${Date.now()}`,
      { headers: { 'Authorization': `token ${token}` } }
    );
    if (check.ok) { const j = await check.json(); sha = j.sha; }
  } catch(e) {}

  const payload = { message: `Create ${title}.md`, content: encoded, branch: GITHUB_BRANCH };
  if (sha) { payload.message = `Update ${title}.md`; payload.sha = sha; }

  const r = await fetch(
    `${GITHUB_API}/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${encodeURIComponent(filePath)}`,
    { method:'PUT', headers:{'Authorization':`token ${token}`,'Content-Type':'application/json'}, body:JSON.stringify(payload) }
  );

  if (r.ok) {
    showToast(`✅ 저장 완료: ${filePath}`);
  } else {
    const err = await r.json();
    showToast('❌ ' + (err.message || '저장 실패'), true);
  }
}

/* ── 마크다운 → HTML ── */
function mdToHtml(md) {
  if (!md) return '';
  if (typeof marked !== 'undefined') {
    // marked.js 설정
    marked.setOptions({
      breaks: true,       // 단일 줄바꿈 → <br>
      gfm: true,          // GitHub Flavored Markdown (표, 체크박스 등)
      highlight: function(code, lang) {
        if (typeof hljs !== 'undefined' && lang && hljs.getLanguage(lang)) {
          return hljs.highlight(code, { language: lang }).value;
        }
        return typeof hljs !== 'undefined' ? hljs.highlightAuto(code).value : code;
      }
    });
    return marked.parse(md);
  }
  // fallback: marked 로드 전
  if (!md) return '';
  return '<p>' + md
    .replace(/^### (.+)$/gm,'<h3>$1</h3>')
    .replace(/^## (.+)$/gm,'<h2>$1</h2>')
    .replace(/^# (.+)$/gm,'<h1>$1</h1>')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/\*(.+?)\*/g,'<em>$1</em>')
    .replace(/\[(.+?)\]\((.+?)\)/g,'<a href="$2" target="_blank">$1</a>')
    .replace(/`(.+?)`/g,'<code>$1</code>')
    .replace(/^- (.+)$/gm,'<li>$1</li>')
    .replace(/\n\n/g,'</p><p>')
    .replace(/\n/g,'<br>') + '</p>';
}

/* ── 통계 ── */
function recordDownload(name, id) {
  let s = JSON.parse(localStorage.getItem('downloadStats')||'[]');
  const now = new Date().toLocaleString('ko-KR');
  const ex = s.find(x=>x.fileId===id);
  if (ex) { ex.count++; ex.lastDownload=now; }
  else s.push({ fileId:id, fileName:name, count:1, firstDownload:now, lastDownload:now });
  localStorage.setItem('downloadStats', JSON.stringify(s));
  renderDashboard();
}

async function recordVisit() {
  let ip='알 수 없음';
  try { const r=await fetch('https://api.ipify.org?format=json'); ip=(await r.json()).ip; } catch(e){}
  let v = JSON.parse(localStorage.getItem('visitLog')||'[]');
  v.unshift({ time:new Date().toLocaleString('ko-KR'), ip });
  if (v.length>50) v=v.slice(0,50);
  localStorage.setItem('visitLog', JSON.stringify(v));
  renderDashboard();
}

let graphZoom = null, graphSvg = null;

async function initObsidianGraph() {
  const wrap = document.getElementById('graph-wrap');
  const svg  = document.getElementById('obs-graph');
  if (!svg || !wrap) return;

  // 로딩 표시
  svg.innerHTML = '<text x="50%" y="50%" text-anchor="middle" fill="#666" font-size="13" dy=".3em">⏳ 그래프 로딩 중...</text>';

  try {
    // GitHub 트리에서 노드 생성
    const tree = await ghGetTree();
    const nodes = tree
      .filter(f => !f.path.startsWith('.'))
      .map(f => {
        const parts = f.path.split('/');
        const name   = parts[parts.length-1].replace(/\.md$/, '');
        const folder = parts.length > 1 ? parts.slice(0,-1).join('/') : '루트';
        return { id: f.path.replace(/\.md$/, ''), name, path: f.path, folder };
      });

    if (!nodes.length) {
      svg.innerHTML = '<text x="50%" y="50%" text-anchor="middle" fill="#aaa" font-size="13" dy=".3em">노트가 없습니다</text>';
      return;
    }

    // 링크는 파일 내용 없이 폴더 기반으로 생성 (API 호출 최소화)
    const links = [];
    const folderMap = {};
    nodes.forEach(n => {
      if (!folderMap[n.folder]) folderMap[n.folder] = [];
      folderMap[n.folder].push(n.id);
    });
    // 같은 폴더 내 노드끼리 연결 (최대 3개)
    Object.values(folderMap).forEach(ids => {
      for (let i = 0; i < Math.min(ids.length-1, 3); i++) {
        links.push({ source: ids[i], target: ids[i+1] });
      }
    });

    drawGraph(svg, nodes, links);
    document.getElementById('graph-wrap').classList.add('loaded');
  } catch(e) {
    svg.innerHTML = `<text x="50%" y="50%" text-anchor="middle" fill="#e74c3c" font-size="12" dy=".3em">⚠️ GitHub 연결 실패: ${e.message}</text>`;
  }
}

function drawGraph(svgEl, nodes, links) {
  const rect = svgEl.getBoundingClientRect();
  const W = rect.width  || svgEl.parentElement.offsetWidth  || 800;
  const H = rect.height || svgEl.parentElement.offsetHeight || 320;
  const tooltip = document.getElementById('graph-tooltip');

  const folders = [...new Set(nodes.map(n => n.folder))];
  const palette = ['#64b5f6','#81c784','#ffb74d','#f06292','#ce93d8','#4dd0e1','#fff176','#a5d6a7'];
  const colors  = d3.scaleOrdinal(palette).domain(folders);

  const svg = d3.select(svgEl).attr('width', W).attr('height', H);
  svg.selectAll('*').remove();

  const R  = Math.min(W, H) * 0.38;
  const cx = W / 2, cy = H / 2;

  // 피보나치 구 배치 - 노드를 구면에 고르게 분포
  const phi = Math.PI * (3 - Math.sqrt(5));
  nodes.forEach((n, i) => {
    const y3d = 1 - (i / Math.max(nodes.length - 1, 1)) * 2;
    const r3d = Math.sqrt(Math.max(0, 1 - y3d * y3d));
    const theta = phi * i;
    n._sx = Math.cos(theta) * r3d;
    n._sy = y3d;
    n._sz = Math.sin(theta) * r3d;
  });

  const nodeById = {};
  nodes.forEach(n => nodeById[n.id] = n);

  let rotX = 0.3, rotY = 0;
  let animId = null;

  const linkLayer = svg.append('g');
  const nodeLayer = svg.append('g');

  function project(n) {
    const cosY = Math.cos(rotY), sinY = Math.sin(rotY);
    const x1 =  n._sx * cosY - n._sz * sinY;
    const z1 =  n._sx * sinY + n._sz * cosY;
    const cosX = Math.cos(rotX), sinX = Math.sin(rotX);
    const y1 =  n._sy * cosX - z1 * sinX;
    const z2 =  n._sy * sinX + z1 * cosX;
    return { px: cx + x1 * R, py: cy + y1 * R, pz: z2 };
  }

  function render() {
    const proj = nodes.map(n => ({ n, ...project(n) }));
    proj.sort((a, b) => a.pz - b.pz);

    // 링크
    const linkData = links.map(l => {
      const s = nodeById[l.source?.id || l.source];
      const t = nodeById[l.target?.id || l.target];
      if (!s || !t) return null;
      return { sp: project(s), tp: project(t) };
    }).filter(Boolean);

    linkLayer.selectAll('line').data(linkData).join('line')
      .attr('x1', d => d.sp.px).attr('y1', d => d.sp.py)
      .attr('x2', d => d.tp.px).attr('y2', d => d.tp.py)
      .attr('stroke', 'rgba(100,181,246,0.2)')
      .attr('stroke-width', 0.8);

    // 노드
    const gnodes = nodeLayer.selectAll('g.gn').data(proj, d => d.n.id)
      .join(enter => {
        const g = enter.append('g').attr('class','gn').style('cursor','pointer');
        g.append('circle');
        g.append('text').attr('pointer-events','none').attr('text-anchor','middle');
        g.on('mouseover', (e,d) => { tooltip.style.display='block'; tooltip.textContent=`${d.n.name} (${d.n.folder})`; })
         .on('mousemove', (e)   => { tooltip.style.left=(e.clientX+12)+'px'; tooltip.style.top=(e.clientY-28)+'px'; })
         .on('mouseout',  ()    => { tooltip.style.display='none'; })
         .on('click', (e,d)    => loadObsidianFileByPath(d.n.path, d.n.name, d.n.folder));
        return g;
      });

    gnodes.select('circle')
      .attr('cx', d => d.px).attr('cy', d => d.py)
      .attr('r',  d => 3 + ((d.pz + 1) / 2) * 7)
      .attr('fill',    d => colors(d.n.folder))
      .attr('opacity', d => 0.25 + ((d.pz + 1) / 2) * 0.75)
      .attr('stroke',  d => d3.color(colors(d.n.folder))?.darker(0.5) || '#fff')
      .attr('stroke-width', 0.8);

    gnodes.select('text')
      .attr('x', d => d.px)
      .attr('y', d => d.py + 3 + ((d.pz+1)/2)*7 + 10)
      .attr('font-size', d => 16 + ((d.pz+1)/2)*6)
      .attr('fill','rgba(255,255,255,0.75)')
      .attr('opacity', d => (d.pz > 0 ? 1 : 0))
      .text(d => d.n.name.length > 10 ? d.n.name.slice(0,10)+'…' : d.n.name);
  }

  function animate() { rotY += 0.004; render(); animId = requestAnimationFrame(animate); }
  animate();

  // 마우스 드래그 회전 / 클릭 시 멈춤 토글
  let drag=false, dx0, dy0, rx0, ry0, moved=false, paused=false;
  svgEl.addEventListener('mousedown', e => {
    drag=true; moved=false;
    dx0=e.clientX; dy0=e.clientY; rx0=rotX; ry0=rotY;
    cancelAnimationFrame(animId);
  });
  window.addEventListener('mousemove', e => {
    if (!drag) return;
    moved = true;
    rotY=ry0+(e.clientX-dx0)*0.005; rotX=rx0+(e.clientY-dy0)*0.005; render();
  });
  window.addEventListener('mouseup', () => {
    if (!drag) return;
    drag = false;
    if (!moved) {
      // 드래그 없이 클릭만 → 멈춤/재생 토글
      paused = !paused;
      if (!paused) animate();
    } else {
      // 드래그 후 손 뗌 → 멈춤 상태가 아니면 자동 회전 재개
      if (!paused) animate();
    }
  });

  // 터치 회전
  svgEl.addEventListener('touchstart', e => { drag=true; dx0=e.touches[0].clientX; dy0=e.touches[0].clientY; rx0=rotX; ry0=rotY; cancelAnimationFrame(animId); },{passive:true});
  svgEl.addEventListener('touchmove',  e => { if(!drag) return; rotY=ry0+(e.touches[0].clientX-dx0)*0.005; rotX=rx0+(e.touches[0].clientY-dy0)*0.005; render(); },{passive:true});
  svgEl.addEventListener('touchend',   () => { drag=false; animate(); });

  graphSvg = svg;
  graphZoom = null;
}

/* ── 옵시디안 에디터 상태 ── */
let _editorMode = 'preview'; // 'preview' | 'edit' | 'split'
let _currentFilePath = null;
let _currentFileSha  = null;
let _currentRawContent = '';
let _currentFileName = '';
let _currentFileFolder = '';

async function loadObsidianFileByPath(filePath, name, folder) {
  // 전역 상태 먼저 설정
  _currentFileName   = name;
  _currentFileFolder = folder;
  _currentFilePath   = filePath;
  _editorMode        = 'preview';

  // 로딩 표시
  contentEl.className = 'content markdown-body';
  contentEl.innerHTML = `<div class="file-inner"><div class="breadcrumb">자료실(옵시디안) > ${folder} > ${name}</div><div class="loading"><div class="loading-spinner"></div></div></div>`;

  try {
    const meta = await ghGetFileMeta(filePath);
    _currentFileSha    = meta.sha;
    _currentRawContent = atob(meta.content.replace(/\n/g,''));
    try { _currentRawContent = decodeURIComponent(escape(_currentRawContent)); } catch(e2){}
    renderEditor(name, folder);
  } catch(e) {
    contentEl.innerHTML = `<div class="file-inner"><div class="err">❌ ${e.message}</div></div>`;
  }
}

async function ghGetFileMeta(path) {
  const r = await fetch(
    `${GITHUB_API}/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${encodeURIComponent(path)}?ref=${GITHUB_BRANCH}&t=${Date.now()}`,
    { cache: 'no-store' }
  );
  if (!r.ok) throw new Error(`파일 메타 로드 실패: ${path}`);
  return await r.json();
}

function renderEditor(name, folder) {
  const isEdit    = _editorMode === 'edit';
  const isSplit   = _editorMode === 'split';
  const isPreview = _editorMode === 'preview';
  const editorH   = 'height:calc(100vh - 240px)';

  // ── 툴바 DOM 직접 생성 ──
  const toolbarEl = document.createElement('div');
  toolbarEl.className = 'editor-toolbar';

  const mkModeBtn = (label, mode) => {
    const b = document.createElement('button');
    b.className = 'editor-mode-btn' + (_editorMode === mode ? ' active' : '');
    b.textContent = label;
    b.onclick = () => setEditorMode(mode, name, folder);
    return b;
  };
  toolbarEl.appendChild(mkModeBtn('👁 미리보기', 'preview'));
  toolbarEl.appendChild(mkModeBtn('✏️ 편집', 'edit'));

  const splitBtn = document.createElement('button');
  splitBtn.className = 'editor-mode-btn' + (isSplit ? ' active' : '');
  splitBtn.textContent = '⬛ 분할';
  splitBtn.onclick = () => setEditorMode(isSplit ? 'preview' : 'split', name, folder);
  toolbarEl.appendChild(splitBtn);

  const saveBtn = document.createElement('button');
  saveBtn.className = 'editor-save-btn';
  saveBtn.id = 'save-btn';
  saveBtn.textContent = '💾 저장';
  saveBtn.onclick = () => saveToGithub(_currentFileName, _currentFileFolder);
  toolbarEl.appendChild(saveBtn);

  const sep = document.createElement('div');
  sep.className = 'editor-toolbar-sep';
  toolbarEl.appendChild(sep);

  const dlBtn = document.createElement('button');
  dlBtn.className = 'editor-toolbar-btn';
  dlBtn.textContent = '⬇️ 다운로드';
  dlBtn.onclick = () => downloadObsidianFile(_currentFilePath, name);
  toolbarEl.appendChild(dlBtn);

  // ── 본문 ──
  let bodyEl;
  if (isPreview) {
    bodyEl = document.createElement('div');
    bodyEl.className = 'preview-pane markdown-body';
    bodyEl.style.cssText = editorH + ';overflow-y:auto;padding:8px 0';
    bodyEl.innerHTML = mdToHtml(_currentRawContent);
  } else if (isEdit) {
    bodyEl = document.createElement('textarea');
    bodyEl.className = 'editor-pane';
    bodyEl.id = 'editor-textarea';
    bodyEl.style.cssText = editorH + ';width:100%;resize:none';
    bodyEl.value = _currentRawContent;
  } else {
    bodyEl = document.createElement('div');
    bodyEl.className = 'split-wrap';
    const ta = document.createElement('textarea');
    ta.className = 'editor-pane';
    ta.id = 'editor-textarea';
    ta.style.cssText = editorH + ';width:100%;resize:none';
    ta.value = _currentRawContent;
    const prev = document.createElement('div');
    prev.className = 'preview-pane markdown-body';
    prev.id = 'editor-preview';
    prev.style.cssText = editorH + ';overflow-y:auto;padding:16px;border:1px solid #e2e8f0;border-radius:8px';
    prev.innerHTML = mdToHtml(_currentRawContent);
    bodyEl.appendChild(ta);
    bodyEl.appendChild(prev);
  }

  // ── 컨테이너 조립 ──
  const inner = document.createElement('div');
  inner.className = 'file-inner';

  const bc = document.createElement('div');
  bc.className = 'breadcrumb';
  bc.textContent = '자료실(옵시디안) > ' + folder + ' > ' + name;

  const h2 = document.createElement('h2');
  h2.style.marginBottom = '12px';
  h2.textContent = name;

  inner.appendChild(bc);
  inner.appendChild(h2);
  inner.appendChild(toolbarEl);
  inner.appendChild(bodyEl);

  contentEl.className = 'content markdown-body';
  contentEl.innerHTML = '';
  contentEl.appendChild(inner);

  // ── 이벤트 ──
  const ta = document.getElementById('editor-textarea');
  if (ta) { ta.addEventListener('input', onEditorInput); ta.focus(); }
}

function setEditorMode(mode, name, folder) {
  const ta = document.getElementById('editor-textarea');
  if (ta) _currentRawContent = ta.value;
  _editorMode = mode;
  renderEditor(name, folder);
}

function onEditorInput() {
  const ta = document.getElementById('editor-textarea');
  if (!ta) return;
  _currentRawContent = ta.value;
  const preview = document.getElementById('editor-preview');
  if (preview) preview.innerHTML = mdToHtml(_currentRawContent);
}

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── 저장 다이얼로그 ──
async function saveToGithub(name, folder) {
  // textarea 최신 내용 먼저 저장
  const ta = document.getElementById('editor-textarea');
  if (ta) _currentRawContent = ta.value;

  // 저장 다이얼로그 열기
  showSaveDialog(name, folder);
}

async function showSaveDialog(name, folder) {
  document.getElementById('save-dialog-overlay')?.remove();

  // 토큰 확인
  let token = localStorage.getItem('gh_write_token');
  if (!token) {
    token = prompt('GitHub Token 입력 (최초 1회):');
    if (!token) return;
    localStorage.setItem('gh_write_token', token);
  }

  // 폴더 목록 로드
  let folders = [];
  try {
    const tree = await ghGetTree();
    const folderSet = new Set();
    tree.forEach(f => {
      if (f.path.includes('/')) folderSet.add(f.path.split('/')[0]);
    });
    folders = ['루트', ...Array.from(folderSet).sort()];
  } catch(e) {
    folders = ['루트'];
  }

  // 다이얼로그 생성
  const overlay = document.createElement('div');
  overlay.id = 'save-dialog-overlay';
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:99999;display:flex;align-items:center;justify-content:center;';

  const box = document.createElement('div');
  box.style.cssText = 'background:white;border-radius:12px;width:420px;max-width:90vw;padding:24px;box-shadow:0 20px 60px rgba(0,0,0,.4);';

  // 제목
  const title = document.createElement('h3');
  title.textContent = '💾 저장 위치 선택';
  title.style.cssText = 'margin-bottom:20px;font-size:18px;color:#1e293b;';
  box.appendChild(title);

  // 폴더 선택
  const folLabel = document.createElement('div');
  folLabel.textContent = '📁 폴더';
  folLabel.style.cssText = 'font-size:13px;font-weight:600;color:#475569;margin-bottom:6px;';
  box.appendChild(folLabel);

  const folSelect = document.createElement('select');
  folSelect.style.cssText = 'width:100%;padding:10px;border:1px solid #e2e8f0;border-radius:8px;font-size:15px;margin-bottom:16px;outline:none;box-sizing:border-box;';
  folders.forEach(f => {
    const opt = document.createElement('option');
    opt.value = f;
    opt.textContent = f;
    if (f === folder || (f === '루트' && !folder)) opt.selected = true;
    folSelect.appendChild(opt);
  });
  box.appendChild(folSelect);

  // 파일명
  const fileLabel = document.createElement('div');
  fileLabel.textContent = '📄 파일명';
  fileLabel.style.cssText = 'font-size:13px;font-weight:600;color:#475569;margin-bottom:6px;';
  box.appendChild(fileLabel);

  const fileInput = document.createElement('input');
  fileInput.type = 'text';
  fileInput.value = name.endsWith('.md') ? name : name + '.md';
  fileInput.placeholder = '파일명.md';
  fileInput.style.cssText = 'width:100%;padding:10px;border:1px solid #e2e8f0;border-radius:8px;font-size:15px;margin-bottom:20px;outline:none;box-sizing:border-box;';
  box.appendChild(fileInput);

  // 버튼
  const footer = document.createElement('div');
  footer.style.cssText = 'display:flex;gap:10px;justify-content:flex-end;';

  const cancelBtn = document.createElement('button');
  cancelBtn.textContent = '취소';
  cancelBtn.style.cssText = 'padding:10px 20px;border:1px solid #e2e8f0;border-radius:8px;background:white;cursor:pointer;font-size:14px;';
  cancelBtn.onclick = () => overlay.remove();

  const confirmBtn = document.createElement('button');
  confirmBtn.textContent = '💾 저장';
  confirmBtn.style.cssText = 'padding:10px 20px;border:none;border-radius:8px;background:#22c55e;color:white;cursor:pointer;font-size:14px;font-weight:600;';
  confirmBtn.onclick = async () => {
    const selFolder = folSelect.value;
    const filename  = fileInput.value.trim();
    if (!filename) { alert('파일명을 입력해주세요.'); return; }

    const isRoot    = selFolder === '루트' || !selFolder;
    const targetPath = isRoot ? filename : `${selFolder}/${filename}`;
    const encodedPath = isRoot
      ? encodeURIComponent(filename)
      : `${encodeURIComponent(selFolder)}/${encodeURIComponent(filename)}`;

    overlay.remove();
    const btn = document.getElementById('save-btn');
    if (btn) { btn.disabled = true; btn.textContent = '⏳ 저장 중...'; }

    try {
      const ta = document.getElementById('editor-textarea');
      if (ta) _currentRawContent = ta.value;
      const encoded = btoa(unescape(encodeURIComponent(_currentRawContent)));

      // SHA 조회
      let saveSha = (targetPath === _currentFilePath) ? _currentFileSha : undefined;
      if (!saveSha) {
        try {
          const chk = await fetch(`${GITHUB_API}/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${encodedPath}?ref=${GITHUB_BRANCH}`, {cache:'no-store'});
          if (chk.ok) { const j = await chk.json(); saveSha = j.sha; }
        } catch(e) {}
      }

      const bodyObj = { message: `Update ${targetPath}`, content: encoded, branch: GITHUB_BRANCH };
      if (saveSha) bodyObj.sha = saveSha;

      const r = await fetch(
        `${GITHUB_API}/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${encodedPath}`,
        { method:'PUT', headers:{'Authorization':`token ${token}`,'Content-Type':'application/json'}, body:JSON.stringify(bodyObj) }
      );
      if (!r.ok) { const err = await r.json(); throw new Error(err.message || '저장 실패'); }

      const result = await r.json();
      _currentFilePath   = targetPath;
      _currentFileSha    = result.content.sha;
      _currentFileName   = filename;
      _currentFileFolder = isRoot ? '루트' : selFolder;

      if (btn) { btn.disabled = false; btn.innerHTML = '💾 저장'; }
      showToast('✅ 저장 완료!');
      renderEditor(_currentFileName, _currentFileFolder);
    } catch(e) {
      showToast('❌ ' + e.message, true);
      if (btn) { btn.disabled = false; btn.innerHTML = '💾 저장'; }
    }
  };

  footer.appendChild(cancelBtn);
  footer.appendChild(confirmBtn);
  box.appendChild(footer);
  overlay.appendChild(box);
  overlay.addEventListener('click', e => { if(e.target===overlay) overlay.remove(); });
  document.body.appendChild(overlay);
  fileInput.focus();
  fileInput.select();
}


function showToast(msg, isError=false) {
  const el = document.createElement('div');
  el.className = 'save-toast';
  el.style.background = isError ? '#dc2626' : '#1e293b';
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

function zoomIn()    { if(graphZoom&&graphSvg) graphSvg.transition().call(graphZoom.scaleBy, 1.4); }
function zoomOut()   { if(graphZoom&&graphSvg) graphSvg.transition().call(graphZoom.scaleBy, 0.7); }
function resetZoom() { if(graphZoom&&graphSvg) graphSvg.transition().call(graphZoom.transform, d3.zoomIdentity); }

</script>
