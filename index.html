<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { height:100%; overflow:hidden; }
body { font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif; display:flex; flex-direction:column; height:100vh; }

/* ── 메인 레이아웃 (콘텐츠 + 사이드바) ── */
.main-layout { display:flex; flex:1; overflow:hidden; }
.content-area { flex:1; overflow-y:hidden; min-width:0; display:flex; flex-direction:column; }
.sidebar {
  width:320px; flex-shrink:0;
  background:#1a1a2e; border-left:1px solid #2a2a4a;
  display:flex; flex-direction:column;
  overflow:hidden;
}
.sidebar-header {
  padding:12px 16px; background:#16213e;
  border-bottom:1px solid #2a2a4a;
  display:flex; align-items:center; justify-content:space-between;
}
.sidebar-header-title { color:#64b5f6; font-size:12px; font-weight:700; letter-spacing:1px; text-transform:uppercase; }
.sidebar-graph { flex:1; position:relative; overflow:hidden; }
.sidebar-graph svg { width:100%; height:100%; display:block; }
.graph-wrap { height:100%; }
@media (max-width:1024px) { .sidebar { width:260px; } }
@media (max-width:768px)  { .sidebar { display:none; } }

/* ── 네비게이션 ── */
.navbar {
  background:#2c3e50; color:white;
  display:flex; align-items:center;
  padding:0 28px; height:60px;
  position:sticky; top:0; z-index:100;
  box-shadow:0 2px 8px rgba(0,0,0,.3);
}
.navbar-brand { font-size:22px; font-weight:bold; margin-right:40px; white-space:nowrap; }
.navbar-menu  { display:flex; align-items:center; gap:6px; flex:1; overflow-x:auto; }
.navbar-menu::-webkit-scrollbar { display:none; }

/* ── 메뉴 버튼 ── */
.nav-item { position:relative; }
.nav-btn {
  display:flex; align-items:center; gap:8px;
  padding:12px 22px; cursor:pointer;
  border-radius:6px; font-size:15px; color:white;
  white-space:nowrap; user-select:none;
  background:none; border:none;
}
.nav-btn:hover { background:#3d5166; }
.nav-btn.open  { background:#3d5166; }
.nav-btn .arrow { font-size:10px; transition:transform .2s; display:inline-block; }
.nav-btn.open .arrow { transform:rotate(180deg); }

/* ── 드롭다운 ── */
.dropdown {
  display:none;
  position:fixed;
  background:#2c3e50; min-width:200px;
  border-radius:8px; box-shadow:0 8px 24px rgba(0,0,0,.3);
  z-index:99999; max-height:70vh; overflow-y:auto;
  scrollbar-width:thin; scrollbar-color:#4a6280 #2c3e50;
}
.dropdown.open { display:block !important; }
.dropdown::-webkit-scrollbar { width:4px; }
.dropdown::-webkit-scrollbar-thumb { background:#4a6280; border-radius:2px; }
.dd-item {
  padding:10px 18px; cursor:pointer; font-size:15px;
  color:rgba(255,255,255,.85);
  border-bottom:1px solid rgba(255,255,255,.05);
}
.dd-item:last-child { border-bottom:none; }
.dd-item:hover  { background:#3498db; color:white; }
.dd-item.active { color:#f39c12; font-weight:bold; }
.dd-folder {
  padding:8px 18px 6px; font-size:13px;
  color:rgba(255,255,255,.4); text-transform:uppercase;
  letter-spacing:.5px; background:rgba(0,0,0,.15);
  border-bottom:1px solid rgba(255,255,255,.05); cursor:pointer;
}

/* ── 콘텐츠 ── */
.content { overflow-y:hidden; background:white; flex:1; display:flex; flex-direction:column; }
.content.markdown-body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif; font-size:16px; line-height:1.6; color:#24292e; }
.content-area { background:white; }
.file-inner { padding:40px 60px; font-size:17px; overflow-y:auto; height:100%; box-sizing:border-box; }
.breadcrumb { font-size:15px; color:#999; margin-bottom:15px; padding-bottom:10px; border-bottom:1px solid #eee; }

/* ── 에디터 ── */
.editor-toolbar {
  display:flex; align-items:center; gap:8px;
  padding:10px 0 14px; border-bottom:1px solid #e8edf2; margin-bottom:16px; flex-wrap:wrap;
}
.editor-toolbar-sep { width:1px; height:20px; background:#e2e8f0; margin:0 2px; }
.editor-toolbar-btn,
.editor-mode-btn,
.editor-save-btn {
  padding:5px 14px; border-radius:5px; font-size:12px; cursor:pointer;
  border:1px solid #e2e8f0; background:#f1f5f9; color:#475569;
  white-space:nowrap; font-weight:500;
}
.editor-toolbar-btn:hover,
.editor-mode-btn:not(.active):hover { background:#e2e8f0; }
.editor-mode-btn.active { background:#3498db; color:white; border-color:#3498db; }
.editor-save-btn { background:#3498db; color:white; border-color:#3498db; font-weight:600; }
.editor-save-btn:hover { background:#2980b9; border-color:#2980b9; }
.editor-save-btn:disabled { background:#94a3b8; border-color:#94a3b8; cursor:not-allowed; }
.editor-pane {
  width:100%; padding:16px; font-size:14px; line-height:1.8;
  background:white;
  border:1px solid #e2e8f0; border-radius:8px; resize:none;
  font-family:'D2Coding','Fira Code',monospace; color:#1e293b;
  background:#fafafa; outline:none; box-sizing:border-box;
}
.editor-pane:focus { border-color:#3498db; background:white; }
.split-wrap { display:grid; grid-template-columns:1fr 1fr; gap:16px; height:calc(100vh - 240px); }
.split-wrap .editor-pane { height:100% !important; }
.split-wrap .preview-pane { height:100%; overflow-y:auto; padding:16px; border:1px solid #e2e8f0; border-radius:8px; }
.preview-pane { min-height:500px; }
.split-wrap { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
.split-wrap .editor-pane { box-sizing:border-box; }
.split-wrap .preview-pane { min-height:600px; padding:16px; border:1px solid #e2e8f0; border-radius:8px; overflow-y:auto; }
.save-toast {
  position:fixed; bottom:24px; right:24px; z-index:99999;
  background:#1e293b; color:white; padding:12px 20px; border-radius:8px;
  font-size:13px; display:flex; align-items:center; gap:8px;

@keyframes slideUp { from{transform:translateY(20px);opacity:0} to{transform:translateY(0);opacity:1} }

/* ── 저장 다이얼로그 ── */

.save-dialog {

<script>
/* gapi는 나중에 비동기 로드 - 없어도 메뉴는 동작 */
function loadGapi() {
  return new Promise((res) => {
    if (window.gapi) { res(); return; }
    const s = document.createElement('script');
    s.src = 'https://apis.google.com/js/api.js';
    s.onload = res; s.onerror = res;
    document.head.appendChild(s);
  });
}

/* Google Identity Services (GIS) 로드 */
function loadGIS() {
  return new Promise((res) => {
    if (window.google?.accounts?.oauth2) { res(); return; }
    const s = document.createElement('script');
    s.src = 'https://accounts.google.com/gsi/client';
    s.onload = res; s.onerror = res;
    document.head.appendChild(s);
  });
}

/* Drive access_token 확보 (GIS tokenClient 방식) */
let _driveToken = null;
let _driveTokenExp = 0;
function getDriveToken() {
  return new Promise(async (res, rej) => {
    // 유효한 토큰이 있으면 재사용
    if (_driveToken && Date.now() < _driveTokenExp) { res(_driveToken); return; }
    await loadGIS();
    if (!window.google?.accounts?.oauth2) { rej(new Error('Google GIS 로드 실패')); return; }
    const client = google.accounts.oauth2.initTokenClient({
      client_id: CLIENT_ID,
      scope: 'https://www.googleapis.com/auth/drive',
      callback: (resp) => {
        if (resp.error) { rej(new Error('Google 인증 실패: ' + resp.error)); return; }
        _driveToken    = resp.access_token;
        _driveTokenExp = Date.now() + (resp.expires_in - 60) * 1000;
        res(_driveToken);
      },
    });
    client.requestAccessToken({ prompt: _driveToken ? '' : 'consent' });
  });
}
</script>

// GitHub API 헬퍼
async function ghGetTree() {
  const r = await fetch(
    `${GITHUB_API}/repos/${GITHUB_OWNER}/${GITHUB_REPO}/git/trees/${GITHUB_BRANCH}?recursive=1`
  );
  if (!r.ok) throw new Error('GitHub 트리 로드 실패');
  const data = await r.json();
  return data.tree.filter(f => f.type === 'blob' && f.path.endsWith('.md'));
}

async function ghGetRawFile(path, bustCache=false) {
  const url = `https://raw.githubusercontent.com/${GITHUB_OWNER}/${GITHUB_REPO}/${GITHUB_BRANCH}/${path}`
    + (bustCache ? `?t=${Date.now()}` : '');
  const r = await fetch(url, bustCache ? {cache:'no-store'} : {});
  if (!r.ok) throw new Error(`파일 로드 실패: ${path}`);
  return await r.text();
}

/* ── Google Drive ── */
function initGapi() {
  return new Promise(async (res,rej) => {
    if (driveInit) { res(); return; }
    await loadGapi();
    if (!window.gapi) { rej(new Error('gapi 로드 실패')); return; }
    gapi.load('client', async () => {
      try { await gapi.client.init({ apiKey:GOOGLE_API_KEY, discoveryDocs:['https://www.googleapis.com/discovery/v1/apis/drive/v3/rest'] }); driveInit=true; res(); }
      catch(e) { rej(e); }
    });
  });
}
async function fetchDriveFiles(id) {
  await initGapi();
  const r = await gapi.client.drive.files.list({ q:`'${id}' in parents and trashed=false`, pageSize:100, fields:'files(id,name,mimeType)' });
  return r.result.files||[];
}

async function downloadObsidianFile(filePath, name) {
  try {
    const r = await fetch(
      `https://raw.githubusercontent.com/${GITHUB_OWNER}/${GITHUB_REPO}/${GITHUB_BRANCH}/${filePath}`
    );
    if (!r.ok) throw new Error('다운로드 실패');
    const blob = await r.blob();
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href=url; a.download=name+'.md';
    document.body.appendChild(a); a.click(); URL.revokeObjectURL(url); a.remove();
    recordDownload(name, filePath);
  } catch(e) { alert(e.message); }
}

/* ── 파일 로드 ── */
async function loadFile(filePath, itemName, folder) {
  // 대시보드 숨기고 파일 모드로 전환
  const dash = document.getElementById('dashboard');
  if (dash) dash.style.display = 'none';
  contentEl.innerHTML=`<div class="file-inner"><div class="breadcrumb">${folder} > ${itemName}</div><div class="loading"><div class="loading-spinner"></div></div></div>`;
  if (filePath==='STATS')       { renderStats(folder,itemName); return; }
  if (filePath==='INTRO_STATS') { renderIntroStats(); return; }
  if (filePath==='NEW_DOC')     { renderNewDoc(); return; }
  if (filePath==='DELETE_FILE') { showDeleteDialog(); return; }
  try {
    const r = await fetch(filePath);
    if (!r.ok) throw new Error(`파일 없음: ${filePath}`);
    const md = await r.text();
    contentEl.className='content markdown-body';
    contentEl.innerHTML=`<div class="file-inner"><div class="breadcrumb">${folder} > ${itemName}</div>${mdToHtml(md)}</div>`;
  } catch(e) {
    contentEl.innerHTML=`<div class="file-inner"><div class="breadcrumb">${folder} > ${itemName}</div><div class="err">❌ ${e.message}</div></div>`;
  }
}

  (async () => {

      const folders = [...new Set(
        tree.filter(f => f.path.includes('/'))
            .map(f => f.path.split('/')[0])
            .filter(f => !f.startsWith('.') && !f.startsWith('_') && f !== '.trash')
      )];

  function renderNdocBody() {
    const body = document.getElementById('ndoc-body');
    if (!body) return;
    // 현재 textarea 내용 유지
    const ta = document.getElementById('ndoc-textarea');
    if (ta) _newDocContent = ta.value;

    ['edit','split','preview'].forEach(m => {
      const b = document.getElementById('ndoc-btn-'+m);
      if (b) b.classList.toggle('active', m === _ndocMode);
    });

    if (_ndocMode === 'preview') {
      body.innerHTML = `<div class="preview-pane markdown-body"
        style="height:${editorH};overflow-y:auto;padding:8px 0">
        ${mdToHtml(_newDocContent || '<p style="color:#aaa">내용을 입력하세요...</p>')}
      </div>`;
    } else if (_ndocMode === 'edit') {
      body.innerHTML = `<textarea id="ndoc-textarea" class="editor-pane"
        style="height:${editorH};width:100%;resize:none"
        placeholder="마크다운으로 내용을 입력하세요..."
        oninput="_newDocContent=this.value">${escHtml(_newDocContent)}</textarea>`;
      document.getElementById('ndoc-textarea')?.focus();
    } else { // split
      body.innerHTML = `
        <div class="split-wrap" style="height:${editorH}">
          <textarea id="ndoc-textarea" class="editor-pane"
            style="height:100%;width:100%;resize:none"

    }

  window.setNewDocMode = function(mode) {
    _ndocMode = mode;
    renderNdocBody();

  window.saveNewDoc = async function() {
    const titleEl = document.getElementById('new-doc-title');
    const folderEl = document.getElementById('ndoc-folder-select');
    const ta = document.getElementById('ndoc-textarea');
    if (ta) _newDocContent = ta.value;

    const title = titleEl?.value.trim();
    const folder = folderEl?.value.trim();

    if (!title) { showToast('❌ 제목을 입력하세요', true); titleEl?.focus(); return; }
    if (!_newDocContent.trim()) { showToast('❌ 내용을 입력하세요', true); return; }

    const fileName = title.endsWith('.md') ? title : title + '.md';
    const filePath = folder ? `${folder}/${fileName}` : fileName;

    let token = localStorage.getItem('gh_write_token');
    if (!token) {
      token = prompt('GitHub Token 입력 (최초 1회):');
      if (!token) return;
      localStorage.setItem('gh_write_token', token);
    }

    const btn = document.getElementById('ndoc-save-btn');
    if (btn) { btn.disabled=true; btn.textContent='⏳ 저장 중...'; }

    try {
      const encoded = btoa(unescape(encodeURIComponent(_newDocContent)));
      const r = await fetch(
        `${GITHUB_API}/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${encodeURIComponent(filePath)}`,
        {
          method: 'PUT',
          headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
          body: JSON.stringify({
            message: `Add ${fileName}`,
            content: encoded,
            branch: GITHUB_BRANCH
          })
        }
      );
      if (!r.ok) {
        const err = await r.json();
        throw new Error(err.message || '저장 실패');
      }
      showToast(`✅ "${filePath}" 저장 완료!`);
      if (btn) { btn.disabled=false; btn.innerHTML='저장'; }
    } catch(e) {
      showToast('❌ ' + e.message, true);

let _ndMode = 'edit';

function ndSetMode(mode) {
  _ndMode = mode;
  // 버튼 active
  ['edit','split','preview'].forEach(m => {
    const b = document.getElementById('nd-btn-'+m);
    if (b) b.classList.toggle('active', m === mode);
  });
  const single   = document.getElementById('nd-textarea-single');
  const splitW   = document.getElementById('nd-split-wrap');
  const taSplit  = document.getElementById('nd-textarea');
  const prevS    = document.getElementById('nd-preview-single');

  // 현재 내용 동기화
  const curVal = (single && single.style.display !== 'none') ? single.value
               : (taSplit ? taSplit.value : '');

  if (mode === 'edit') {
    if (single)  { single.style.display='block'; single.value=curVal; }
    if (splitW)  splitW.style.display='none';
    if (prevS)   prevS.style.display='none';
  } else if (mode === 'split') {
    if (single)  single.style.display='none';
    if (splitW)  { splitW.style.display='grid'; if(taSplit) taSplit.value=curVal; }
    if (prevS)   prevS.style.display='none';
    ndSyncPreview();
  } else { // preview
    if (single)  single.style.display='none';
    if (splitW)  splitW.style.display='none';
    if (prevS)   { prevS.style.display='block'; prevS.innerHTML=mdToHtml(curVal); }
  }
}

function ndSyncPreview() {
  const taSplit  = document.getElementById('nd-textarea');
  const taSingle = document.getElementById('nd-textarea-single');
  const val = (taSplit && taSplit.style.display !== 'none') ? taSplit.value : (taSingle ? taSingle.value : '');
  const p1 = document.getElementById('nd-preview');
  const p2 = document.getElementById('nd-preview-single');
  if (p1) p1.innerHTML = mdToHtml(val);
  if (p2) p2.innerHTML = mdToHtml(val);
}

async function _saveNewDoc_unused() {
  const folder = '';

  // 경로 세그먼트별 인코딩 (슬래시 보존)

    ? `${encodeURIComponent(folder)}/${encodeURIComponent(fileName)}`
    : encodeURIComponent(fileName);

  let token = localStorage.getItem('gh_write_token');
  if (!token) {
    token = prompt('GitHub Token 입력 (최초 1회):');
    if (!token) return;
    localStorage.setItem('gh_write_token', token);
  }

  const encoded = btoa(unescape(encodeURIComponent(body)));

  // 파일 존재 여부 확인 (SHA 필요)
  let sha = undefined;
  try {
    const check = await fetch(
      `${GITHUB_API}/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${encodedPath}?ref=${GITHUB_BRANCH}&t=${Date.now()}`,
      { headers: { 'Authorization': `token ${token}` } }
    );
    if (check.ok) { const j = await check.json(); sha = j.sha; }
  } catch(e) {}

  const payload = { message: sha ? `Update ${fileName}` : `Create ${fileName}`, content: encoded, branch: GITHUB_BRANCH };
  if (sha) payload.sha = sha;

  const btn = document.querySelector('#new-doc-wrap .editor-save-btn, .editor-save-btn');
  if (btn) { btn.disabled = true; btn.textContent = '⏳ 저장 중...'; }

  const r = await fetch(
    `${GITHUB_API}/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${encodedPath}`,
    { method:'PUT', headers:{'Authorization':`token ${token}`,'Content-Type':'application/json'}, body:JSON.stringify(payload) }
  );

  if (btn) { btn.disabled = false; btn.innerHTML = '저장'; }

  if (r.ok) {
    const result = await r.json();
    showToast(`✅ 저장 완료: ${filePath}`);
    // 저장 후 에디터로 전환
    _currentFilePath   = filePath;

    _currentFileName   = fileName;
    _currentFileFolder = folder || '루트';
    _currentRawContent = body;

    renderEditor(_currentFileName, _currentFileFolder);
  } else {
    const err = await r.json();
    showToast('❌ ' + (err.message || '저장 실패'), true);
  }
}

/* ── 마크다운 → HTML ── */
function mdToHtml(md) {
  if (!md) return '';
  if (typeof marked !== 'undefined') {
    // marked.js 설정
    marked.setOptions({
      breaks: true,       // 단일 줄바꿈 → <br>
      gfm: true,          // GitHub Flavored Markdown (표, 체크박스 등)
      highlight: function(code, lang) {
        if (typeof hljs !== 'undefined' && lang && hljs.getLanguage(lang)) {
          return hljs.highlight(code, { language: lang }).value;
        }
        return typeof hljs !== 'undefined' ? hljs.highlightAuto(code).value : code;
      }
    });
    return marked.parse(md);
  }
  // fallback: marked 로드 전
  if (!md) return '';
  return '<p>' + md
    .replace(/^### (.+)$/gm,'<h3>$1</h3>')
    .replace(/^## (.+)$/gm,'<h2>$1</h2>')
    .replace(/^# (.+)$/gm,'<h1>$1</h1>')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/\*(.+?)\*/g,'<em>$1</em>')
    .replace(/\[(.+?)\]\((.+?)\)/g,'<a href="$2" target="_blank">$1</a>')
    .replace(/`(.+?)`/g,'<code>$1</code>')
    .replace(/^- (.+)$/gm,'<li>$1</li>')
    .replace(/\n\n/g,'</p><p>')
    .replace(/\n/g,'<br>') + '</p>';
}

function recordDownload(name, id) {
  let s = JSON.parse(localStorage.getItem('downloadStats')||'[]');
  const now = new Date().toLocaleString('ko-KR');
  const ex = s.find(x=>x.fileId===id);
  if (ex) { ex.count++; ex.lastDownload=now; }
  else s.push({ fileId:id, fileName:name, count:1, firstDownload:now, lastDownload:now });
  localStorage.setItem('downloadStats', JSON.stringify(s));
  renderDashboard();
}

async function recordVisit() {
  let ip='알 수 없음';
  try { const r=await fetch('https://api.ipify.org?format=json'); ip=(await r.json()).ip; } catch(e){}
  let v = JSON.parse(localStorage.getItem('visitLog')||'[]');
  v.unshift({ time:new Date().toLocaleString('ko-KR'), ip });
  if (v.length>50) v=v.slice(0,50);
  localStorage.setItem('visitLog', JSON.stringify(v));
  renderDashboard();
}

            : '<div style="padding:20px;text-align:center;color:#94a3b8;font-size:13px">기록 없음</div>'}
        </div>
      </div>
    </div>
  </div>`;
}

let graphZoom = null, graphSvg = null;

async function initObsidianGraph() {
  const wrap = document.getElementById('graph-wrap');
  const svg  = document.getElementById('obs-graph');
  if (!svg || !wrap) return;

  // 로딩 표시
  svg.innerHTML = '<text x="50%" y="50%" text-anchor="middle" fill="#666" font-size="13" dy=".3em">⏳ 그래프 로딩 중...</text>';

  try {
    // GitHub 트리에서 노드 생성
    const tree = await ghGetTree();
    // 파일 목록 + frontmatter tags 추출 (병렬 로드, 최대 20개)
    const rawNodes = tree
      .filter(f => !f.path.startsWith('.'))
      .map(f => {
        const parts = f.path.split('/');
        const name   = parts[parts.length-1].replace(/\.md$/, '');
        const folder = parts.length > 1 ? parts.slice(0,-1).join('/') : '루트';
        return { id: f.path.replace(/\.md$/, ''), name, path: f.path, folder, tags: [] };
      });

    // 최대 30개 파일에서 frontmatter tags 병렬 로드
    const loadLimit = Math.min(rawNodes.length, 30);
    await Promise.allSettled(rawNodes.slice(0, loadLimit).map(async n => {
      try {
        const raw = await ghGetRawFile(n.path);
        const fm = raw.match(/^---[\s\S]*?---/);
        if (fm) {
          const fmText = fm[0];
          // [tag1, tag2] 인라인 배열 형식
          const inlineArr = fmText.match(/^tags:\s*\[([^\]]+)\]/im);
          if (inlineArr) {
            n.tags = inlineArr[1].split(',').map(t=>t.trim().replace(/^['"]|['"]$/g,'')).filter(Boolean);
          } else {
            // block 리스트 형식 (- tag)
            const blockM = fmText.match(/^tags:\s*\n((?:[ \t]*-[ \t]*[^\n]+\n?)+)/im);
            if (blockM) {
              n.tags = [...blockM[1].matchAll(/^[ \t]*-[ \t]*(.+)/gm)].map(m=>m[1].trim());
            } else {
              // 공백/쉼표 구분 인라인
              const plainM = fmText.match(/^tags:\s*([^\n\[{]+)/im);
              if (plainM) n.tags = plainM[1].split(/[,\s]+/).map(t=>t.trim()).filter(Boolean);
            }
          }
        }
      } catch(e) {}
    }));

    const nodes = rawNodes;

    if (!nodes.length) {
      svg.innerHTML = '<text x="50%" y="50%" text-anchor="middle" fill="#aaa" font-size="13" dy=".3em">노트가 없습니다</text>';
      return;
    }

    // 링크: 폴더 기반 + 태그 기반 (중복 방지)
    const links = [];
    const linkSet = new Set();
    const addLink = (a, b) => {
      const key = [a,b].sort().join('||');
      if (!linkSet.has(key)) { linkSet.add(key); links.push({ source: a, target: b }); }
    };
    // 같은 폴더끼리 연결
    const folderMap = {};
    nodes.forEach(n => { if(!folderMap[n.folder]) folderMap[n.folder]=[]; folderMap[n.folder].push(n.id); });
    Object.values(folderMap).forEach(ids => {
      for (let i = 0; i < ids.length-1; i++) addLink(ids[i], ids[i+1]);
    });
    // 같은 태그끼리 연결
    const tagMap = {};
    nodes.forEach(n => { (n.tags||[]).forEach(t=>{ if(!tagMap[t]) tagMap[t]=[]; tagMap[t].push(n.id); }); });
    Object.values(tagMap).forEach(ids => {
      for (let i = 0; i < ids.length-1; i++) addLink(ids[i], ids[i+1]);
    });

    drawGraph(svg, nodes, links);
    document.getElementById('graph-wrap').classList.add('loaded');
  } catch(e) {
    svg.innerHTML = `<text x="50%" y="50%" text-anchor="middle" fill="#e74c3c" font-size="12" dy=".3em">⚠️ GitHub 연결 실패: ${e.message}</text>`;
  }
}

function drawGraph(svgEl, nodes, links) {
  /* ── 초기화 ── */
  if (window._globeRAF) { cancelAnimationFrame(window._globeRAF); window._globeRAF = null; }
  if (window._kaTimer)  { clearTimeout(window._kaTimer); window._kaTimer = null; }
  graphPaused = false; graphSim = null;
  const pauseBtn = document.getElementById('pause-btn');
  if (pauseBtn) { pauseBtn.textContent = '⏸ 멈춤'; pauseBtn.classList.remove('paused'); }

  const wrap = svgEl.parentElement;
  const W = wrap.offsetWidth  || window.innerWidth  || 900;
  const H = wrap.offsetHeight || window.innerHeight || 600;
  const CX = W/2, CY = H/2;
  const R  = Math.min(W, H) * 0.38;
  const tooltip = document.getElementById('graph-tooltip');

  /* ── 색상 ── */
  const PALETTE = ['#7eb8f7','#fbbf67','#f9a8d4','#a78bfa','#67e8f9','#86efac','#fca5a5','#6ee7b7','#fdba74','#c4b5fd'];
  const TAG_CLR = '#4ade80';
  const fileFolders = [...new Set(nodes.filter(n=>!n.isTag).map(n=>n.folder))];
  const folderColor = d3.scaleOrdinal(PALETTE).domain(fileFolders);
  const nodeColor   = d => d.isTag ? TAG_CLR : folderColor(d.folder);

  /* ── SVG ── */
  const svg = d3.select(svgEl).attr('width',W).attr('height',H);
  svg.selectAll('*').remove();
  const defs = svg.append('defs');

  /* 배경 */
  const bgGr = defs.append('radialGradient').attr('id','gb-bg').attr('cx','42%').attr('cy','38%');
  bgGr.append('stop').attr('offset','0%').attr('stop-color','#090f22');
  bgGr.append('stop').attr('offset','100%').attr('stop-color','#020408');
  svg.append('rect').attr('width',W).attr('height',H).attr('fill','url(#gb-bg)');

  /* 별 */
  for (let i=0; i<250; i++) {
    const sx = (Math.sin(i*127.1)*0.5+0.5)*W;
    const sy = (Math.sin(i*311.7)*0.5+0.5)*H;
    const sr = (Math.sin(i*57.3)*0.5+0.5)*1.3+0.15;
    svg.append('circle').attr('cx',sx).attr('cy',sy).attr('r',sr)
      .attr('fill','white').attr('opacity',(Math.sin(i*93.1)*0.5+0.5)*0.55+0.07);
  }

  /* 지구 그라디언트 */
  const globeGr = defs.append('radialGradient').attr('id','gb-globe').attr('cx','35%').attr('cy','32%');
  globeGr.append('stop').attr('offset','0%').attr('stop-color','#12305a');
  globeGr.append('stop').attr('offset','60%').attr('stop-color','#0a1e3d');
  globeGr.append('stop').attr('offset','100%').attr('stop-color','#04101f');

  /* 지구 하이라이트 */
  const hlGr = defs.append('radialGradient').attr('id','gb-hl').attr('cx','32%').attr('cy','28%');
  hlGr.append('stop').attr('offset','0%').attr('stop-color','rgba(150,200,255,0.22)');
  hlGr.append('stop').attr('offset','100%').attr('stop-color','rgba(0,0,0,0)');

  /* 글로우 필터 */
  const mkGlow = (id, blur) => {
    const f = defs.append('filter').attr('id',id)
      .attr('x','-80%').attr('y','-80%').attr('width','260%').attr('height','260%');
    f.append('feGaussianBlur').attr('in','SourceGraphic').attr('stdDeviation',blur).attr('result','blur');
    const m = f.append('feMerge');
    m.append('feMergeNode').attr('in','blur');
    m.append('feMergeNode').attr('in','SourceGraphic');
  };
  mkGlow('nf',2.5); mkGlow('nt',5); mkGlow('halo',12);

  /* 지구 외부 글로우 */
  svg.append('circle').attr('cx',CX).attr('cy',CY).attr('r',R+22)
    .attr('fill','none').attr('stroke','rgba(80,140,255,0.06)').attr('stroke-width',28)
    .attr('filter','url(#halo)');
  svg.append('circle').attr('cx',CX).attr('cy',CY).attr('r',R+6)
    .attr('fill','none').attr('stroke','rgba(100,170,255,0.12)').attr('stroke-width',7);

  /* 지구 본체 */
  svg.append('circle').attr('cx',CX).attr('cy',CY).attr('r',R)
    .attr('fill','url(#gb-globe)').attr('stroke','rgba(80,150,255,0.3)').attr('stroke-width',1.5);

  /* 하이라이트 */
  svg.append('circle').attr('cx',CX).attr('cy',CY).attr('r',R)
    .attr('fill','url(#gb-hl)').attr('pointer-events','none');

  /* 클립 패스 */
  defs.append('clipPath').attr('id','globe-clip')
    .append('circle').attr('cx',CX).attr('cy',CY).attr('r',R-1);

  /* ── 구면 좌표 배정 ── */
  /* 폴더별로 위도 띠 할당, 각 띠 위에 노드를 경도 방향으로 균등 배치 */
  const bandStep = Math.PI / (fileFolders.length + 1);
  const folderBand = {};
  fileFolders.forEach((fol,i) => { folderBand[fol] = -Math.PI/2 + bandStep*(i+1); });

  const folderCnt = {}, folderIdx = {};
  nodes.filter(n=>!n.isTag).forEach(n => { folderCnt[n.folder]=(folderCnt[n.folder]||0)+1; });
  nodes.forEach(n => {
    if (n.isTag) return;
    folderIdx[n.folder] = folderIdx[n.folder]||0;
    const total = folderCnt[n.folder];
    const idx   = folderIdx[n.folder]++;
    n._lat = folderBand[n.folder];
    n._lng = (2*Math.PI*idx)/total - Math.PI + 0.05;
  });
  /* 태그: 북극 근처 */
  const tagNodes = nodes.filter(n=>n.isTag);
  tagNodes.forEach((n,i) => {
    n._lat = Math.PI/2 - 0.28;
    n._lng = (2*Math.PI*i)/Math.max(tagNodes.length,1) - Math.PI;
  });

  /* ── 링크 수 → 반지름 ── */
  const lc = {};
  nodes.forEach(n=>{lc[n.id]=0;});
  links.forEach(l=>{
    const s=typeof l.source==='object'?l.source.id:l.source;
    const t=typeof l.target==='object'?l.target.id:l.target;
    if(lc[s]!=null)lc[s]++; if(lc[t]!=null)lc[t]++;
  });
  const nodeR = d => d.isTag
    ? Math.max(6, Math.min(6+(lc[d.id]||0)*2.8, 22))   // 태그: 연결 수에 훨씬 비례
    : Math.max(4, Math.min(4+(lc[d.id]||0)*1.3, 16));

  /* ── 회전 상태 ── */
  let rotY = 0, rotX = 0.28;
  let isDragging = false, dragX0 = 0, dragY0 = 0, rotY0 = 0, rotX0 = 0;

  /* ── 3D → 2D 투영 ── */
  function project(lat, lng) {
    const cosLat = Math.cos(lat);
    const sinLat = Math.sin(lat);
    const cosLng = Math.cos(lng + rotY);
    const sinLng = Math.sin(lng + rotY);
    const cosRX  = Math.cos(rotX), sinRX = Math.sin(rotX);
    const x3 = cosLat * sinLng;
    const y3 = sinLat * cosRX - cosLat * cosLng * sinRX;
    const z3 = sinLat * sinRX + cosLat * cosLng * cosRX;
    return { x: CX + R*x3, y: CY - R*y3, z: z3 };
  }

  /* ── 격자선 레이어 (클립) ── */
  const gridG = svg.append('g').attr('clip-path','url(#globe-clip)');

  /* ── 링크/노드 레이어 (클립) ── */
  const contentG = svg.append('g').attr('clip-path','url(#globe-clip)');
  const linkLayer = contentG.append('g');
  const nodeLayer = contentG.append('g');

  /* ── 링크 데이터 ── */
  const nodeById = {};
  nodes.forEach(n=>{nodeById[n.id]=n;});
  const linkData = links.map(l=>({
    src: nodeById[typeof l.source==='object'?l.source.id:l.source],
    tgt: nodeById[typeof l.target==='object'?l.target.id:l.target],
    type: l.type
  })).filter(l=>l.src&&l.tgt);

  const linkEls = linkData.map(l=>
    linkLayer.append('line')
      .attr('stroke',l.type==='tag'?'rgba(74,222,128,0.55)':'rgba(160,200,255,0.2)')
      .attr('stroke-width',l.type==='tag'?1.2:0.7)
      .attr('stroke-dasharray',l.type==='tag'?'4,3':'none')
      .attr('stroke-linecap','round')
  );

  /* ── 노드 DOM ── */
  const nodeGroups = [];
  nodes.forEach(n => {
    const ng = nodeLayer.append('g').style('cursor',n.isTag?'default':'pointer');

    ng.append('circle').attr('class','nhalo')
      .attr('r',nodeR(n)+(n.isTag?7:5)).attr('fill','none')
      .attr('stroke',nodeColor(n)).attr('stroke-width',n.isTag?1.5:0.9)
      .attr('stroke-opacity',n.isTag?0.5:0.22);
    ng.append('circle').attr('class','nbody').datum(n)
      .attr('r',nodeR(n)).attr('fill',nodeColor(n))
      .attr('fill-opacity',n.isTag?0.95:0.88)
      .attr('filter',`url(#${n.isTag?'nt':'nf'})`);
    if(n.isTag){
      const r2=nodeR(n)*0.5;
      ng.append('polygon').attr('points',`0,${-r2} ${r2},0 0,${r2} ${-r2},0`)
        .attr('fill','#56d364').attr('fill-opacity',0.65).attr('pointer-events','none');
    }
    ng.append('text').attr('x',nodeR(n)+5).attr('dy','0.35em')
      .attr('font-size',n.isTag?'9.5px':'10px')
      .attr('fill',n.isTag?'rgba(74,222,128,0.92)':'rgba(210,225,255,0.88)')
      .attr('pointer-events','none')
      .text(n.name.length>16?n.name.slice(0,16)+'…':n.name);

    ng.on('mouseover',(e)=>{
        tooltip.style.display='block';
        if (n.isTag) {
          /* 태그 노드: 연결 파일 수 표시 */
          tooltip.innerHTML = `<span style="color:#4ade80;font-weight:700">#${n.name}</span>  <span style="opacity:.7">${lc[n.id]||0}개 노트 연결</span>`;
        } else {
          /* 파일 노드: 태그 뱃지 말풍선 */
          const tagHtml = n.tags && n.tags.length
            ? n.tags.map(t=>`<span style="display:inline-block;padding:1px 7px;margin:1px 2px;background:rgba(74,222,128,0.18);border:1px solid rgba(74,222,128,0.45);border-radius:10px;color:#4ade80;font-size:10px">#${t}</span>`).join('')
            : '<span style="opacity:.45;font-size:10px">태그 없음</span>';
          tooltip.innerHTML = `<div style="font-weight:600;margin-bottom:5px;color:rgba(220,235,255,0.95)">${n.name}</div><div>${tagHtml}</div>`;
        }
        const conn=new Set([n.id]);
        links.forEach(l=>{const s=l.source?.id||l.source,t2=l.target?.id||l.target;if(s===n.id)conn.add(t2);if(t2===n.id)conn.add(s);});
        linkEls.forEach((line,i)=>{
          const l=linkData[i],hit=l.src.id===n.id||l.tgt.id===n.id;
          line.attr('stroke',hit?(l.type==='tag'?'rgba(74,222,128,0.95)':'rgba(200,225,255,0.9)'):(l.type==='tag'?'rgba(74,222,128,0.05)':'rgba(160,200,255,0.03)'))
              .attr('stroke-width',hit?2.5:0.25);
        });
        nodeLayer.selectAll('circle.nbody').attr('fill-opacity',0.07);
        conn.forEach(id=>{nodeLayer.selectAll('circle.nbody').filter(function(d2){return d2&&d2.id===id;}).attr('fill-opacity',0.95);});
        ng.select('circle.nbody').attr('fill-opacity',1);
        ng.select('circle.nhalo').attr('stroke-opacity',0.9).attr('r',nodeR(n)+11);
      })
      .on('mousemove',e=>{
        tooltip.style.left=(e.clientX+16)+'px';
        tooltip.style.top=(e.clientY-38)+'px';
      })
      .on('mouseout',()=>{
        tooltip.style.display='none';
        linkEls.forEach((line,i)=>{const l=linkData[i];line.attr('stroke',l.type==='tag'?'rgba(74,222,128,0.55)':'rgba(160,200,255,0.2)').attr('stroke-width',l.type==='tag'?1.2:0.7);});
        nodeLayer.selectAll('circle.nbody').attr('fill-opacity',function(d2){return d2?.isTag?0.95:0.88;});
        ng.select('circle.nhalo').attr('stroke-opacity',n.isTag?0.5:0.22).attr('r',nodeR(n)+(n.isTag?7:5));
      })
      .on('click',(e)=>{
        e.stopPropagation();
        if (!n.isTag) {
          loadObsidianFileByPath(n.path,n.name,n.folder);
        } else {
          /* 태그 클릭 → 연결 파일 목록 팝업 */
          showTagPopup(n, e, nodeById, links, wrap);
        }
      });

    nodeGroups.push({ n, ng });
  });

  /* ── 렌더 함수 ── */
  function render() {
    /* 격자선 */
    gridG.selectAll('*').remove();
    /* 위도선 */
    for (let lat=-60; lat<=60; lat+=30) {
      const latR = lat*Math.PI/180;
      const pts = [];
      for (let lng=-180; lng<=180; lng+=5) {
        const p = project(latR, lng*Math.PI/180);
        if (p.z > -0.1) pts.push([p.x, p.y]);
        else if (pts.length) {
          if (pts.length > 1) {
            gridG.append('polyline').attr('points',pts.map(p=>p.join(',')).join(' '))
              .attr('fill','none').attr('stroke','rgba(100,170,255,0.12)').attr('stroke-width',0.5);
          }
          pts.length = 0;
        }
      }
      if (pts.length > 1) gridG.append('polyline').attr('points',pts.map(p=>p.join(',')).join(' '))
        .attr('fill','none').attr('stroke','rgba(100,170,255,0.12)').attr('stroke-width',0.5);
    }
    /* 경도선 */
    for (let lng=-180; lng<180; lng+=30) {
      const lngR = lng*Math.PI/180;
      const pts = [];
      for (let lat=-85; lat<=85; lat+=4) {
        const p = project(lat*Math.PI/180, lngR);
        if (p.z > -0.1) pts.push([p.x, p.y]);
        else if (pts.length) {
          if (pts.length > 1) gridG.append('polyline').attr('points',pts.map(p=>p.join(',')).join(' '))
            .attr('fill','none').attr('stroke','rgba(100,170,255,0.10)').attr('stroke-width',0.5);
          pts.length = 0;
        }
      }
      if (pts.length > 1) gridG.append('polyline').attr('points',pts.map(p=>p.join(',')).join(' '))
        .attr('fill','none').attr('stroke','rgba(100,170,255,0.10)').attr('stroke-width',0.5);
    }
    /* 적도 강조 */
    const eqPts = [];
    for (let lng=-180; lng<=180; lng+=3) {
      const p=project(0, lng*Math.PI/180);
      if(p.z>-0.05) eqPts.push([p.x,p.y]);
    }
    if(eqPts.length>1) gridG.append('polyline').attr('points',eqPts.map(p=>p.join(',')).join(' '))
      .attr('fill','none').attr('stroke','rgba(100,200,255,0.22)').attr('stroke-width',1);

    /* 노드 위치 업데이트 */
    nodeGroups.forEach(({n, ng}) => {
      const p = project(n._lat, n._lng);
      const visible = p.z > -0.05;
      const op  = visible ? Math.max(0, Math.min(1, (p.z+0.1)*1.8)) : 0;
      const sc  = visible ? 0.55 + p.z*0.5  : 0;
      ng.attr('transform',`translate(${p.x},${p.y}) scale(${Math.max(0,sc)})`)
        .attr('opacity', op)
        .style('display', op<0.02?'none':null);
      n._px=p.x; n._py=p.y; n._pz=p.z; n._vis=visible;
    });

    /* 링크 위치 업데이트 */
    linkEls.forEach((line,i)=>{
      const l=linkData[i];
      if(!l.src._vis&&!l.tgt._vis){line.style('display','none');return;}
      line.style('display',null)
        .attr('x1',l.src._px).attr('y1',l.src._py)
        .attr('x2',l.tgt._px).attr('y2',l.tgt._py)
        .attr('opacity',Math.max(0,(Math.min(l.src._pz||0,l.tgt._pz||0)+0.1)*0.9));
    });
  }

  /* ── 자동 회전 ── */
  function animate() {
    if (!graphPaused) rotY += 0.004;
    render();
    window._globeRAF = requestAnimationFrame(animate);
  }
  animate();

  /* ── 드래그 회전 + 클릭 토글 ── */
  let dragMoved = false;
  svg.on('mousedown',(e)=>{
    if(e.target.closest&&e.target.closest('g[style*="cursor"]')) return;
    isDragging=true; dragMoved=false;
    dragX0=e.clientX; dragY0=e.clientY; rotY0=rotY; rotX0=rotX;
  });
  svg.on('mousemove',(e)=>{
    if(!isDragging) return;
    const dx=e.clientX-dragX0, dy=e.clientY-dragY0;
    if(Math.abs(dx)>3||Math.abs(dy)>3) dragMoved=true;
    rotY = rotY0+dx*0.007;
    rotX = Math.max(-Math.PI/2.5, Math.min(Math.PI/2.5, rotX0-dy*0.007));
  });
  svg.on('mouseup',(e)=>{
    if(isDragging && !dragMoved) {
      /* 드래그 없이 클릭 → 회전 토글 */
      toggleSimulation();
    }
    isDragging=false;
  });
  svg.on('mouseleave',()=>{ isDragging=false; });

  /* 줌은 지구 크기 조절 (스크롤) */
  graphSvg = svg; graphZoom = null;
  svg.on('click',()=>{tooltip.style.display='none';});
}


/* ── 옵시디안 에디터 상태 ── */
let _editorMode = 'preview'; // 'preview' | 'edit' | 'split'
let _currentFilePath = null;
let _currentFileSha  = null;
let _currentRawContent = '';
let _currentFileName = '';
let _currentFileFolder = '';

async function loadObsidianFileByPath(filePath, name, folder) {
  // 전역 상태 먼저 설정
  _currentFileName   = name;
  _currentFileFolder = folder;
  _currentFilePath   = filePath;
  _editorMode        = 'preview';

  // 로딩 표시
  contentEl.className = 'content markdown-body';
  contentEl.innerHTML = `<div class="file-inner"><div class="breadcrumb">옵시디안 > ${folder} > ${name}</div><div class="loading"><div class="loading-spinner"></div></div></div>`;

  try {
    const meta = await ghGetFileMeta(filePath);
    _currentFileSha    = meta.sha;
    _currentRawContent = atob(meta.content.replace(/\n/g,''));
    try { _currentRawContent = decodeURIComponent(escape(_currentRawContent)); } catch(e2){}
    renderEditor(name, folder);
  } catch(e) {
    contentEl.innerHTML = `<div class="file-inner"><div class="err">❌ ${e.message}</div></div>`;
  }
}

async function ghGetFileMeta(path) {
  const r = await fetch(
    `${GITHUB_API}/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${encodeURIComponent(path)}?ref=${GITHUB_BRANCH}&t=${Date.now()}`,
    { cache: 'no-store' }
  );
  if (!r.ok) throw new Error(`파일 메타 로드 실패: ${path}`);
  return await r.json();
}

function renderEditor(name, folder) {
  const isEdit    = _editorMode === 'edit';
  const isSplit   = _editorMode === 'split';
  const isPreview = _editorMode === 'preview';
  const editorH   = 'height:calc(100vh - 240px)';

  // ── 툴바 DOM 직접 생성 ──
  const toolbarEl = document.createElement('div');
  toolbarEl.className = 'editor-toolbar';

  const mkModeBtn = (label, mode) => {
    const b = document.createElement('button');
    b.className = 'editor-mode-btn' + (_editorMode === mode ? ' active' : '');
    b.textContent = label;
    b.onclick = () => setEditorMode(mode, name, folder);
    return b;
  };
  toolbarEl.appendChild(mkModeBtn('미리보기', 'preview'));
  toolbarEl.appendChild(mkModeBtn('편집', 'edit'));

  const splitBtn = document.createElement('button');
  splitBtn.className = 'editor-mode-btn' + (isSplit ? ' active' : '');
  splitBtn.textContent = '분할';
  splitBtn.onclick = () => setEditorMode(isSplit ? 'preview' : 'split', name, folder);
  toolbarEl.appendChild(splitBtn);

  const saveBtn = document.createElement('button');
  saveBtn.className = 'editor-save-btn';
  saveBtn.id = 'save-btn';
  saveBtn.textContent = '저장';
  saveBtn.onclick = () => saveToGithub(_currentFileName, _currentFileFolder);
  toolbarEl.appendChild(saveBtn);

  const sep = document.createElement('div');
  sep.className = 'editor-toolbar-sep';
  toolbarEl.appendChild(sep);

  const dlBtn = document.createElement('button');
  dlBtn.className = 'editor-toolbar-btn';
  dlBtn.textContent = '다운로드';
  dlBtn.onclick = () => downloadObsidianFile(_currentFilePath, name);
  toolbarEl.appendChild(dlBtn);

  // ── 본문 ──
  let bodyEl;
  if (isPreview) {
    bodyEl = document.createElement('div');
    bodyEl.className = 'preview-pane markdown-body';
    bodyEl.style.cssText = editorH + ';overflow-y:auto;padding:8px 0';
    bodyEl.innerHTML = mdToHtml(_currentRawContent);
  } else if (isEdit) {
    bodyEl = document.createElement('textarea');
    bodyEl.className = 'editor-pane';
    bodyEl.id = 'editor-textarea';
    bodyEl.style.cssText = editorH + ';width:100%;resize:none';
    bodyEl.value = _currentRawContent;
  } else {
    bodyEl = document.createElement('div');
    bodyEl.className = 'split-wrap';
    const ta = document.createElement('textarea');
    ta.className = 'editor-pane';
    ta.id = 'editor-textarea';
    ta.style.cssText = editorH + ';width:100%;resize:none';
    ta.value = _currentRawContent;
    const prev = document.createElement('div');
    prev.className = 'preview-pane markdown-body';
    prev.id = 'editor-preview';
    prev.style.cssText = editorH + ';overflow-y:auto;padding:16px;border:1px solid #e2e8f0;border-radius:8px';
    prev.innerHTML = mdToHtml(_currentRawContent);
    bodyEl.appendChild(ta);
    bodyEl.appendChild(prev);
  }

  // ── 컨테이너 조립 ──
  const inner = document.createElement('div');
  inner.className = 'file-inner';

  const bc = document.createElement('div');
  bc.className = 'breadcrumb';
  bc.textContent = '옵시디안 > ' + folder + ' > ' + name;

  const h2 = document.createElement('h2');
  h2.style.marginBottom = '12px';
  h2.textContent = name;

  inner.appendChild(bc);
  inner.appendChild(h2);
  inner.appendChild(toolbarEl);
  inner.appendChild(bodyEl);

  contentEl.className = 'content markdown-body';
  contentEl.innerHTML = '';
  contentEl.appendChild(inner);

  // ── 이벤트 ──
  const ta = document.getElementById('editor-textarea');
  if (ta) { ta.addEventListener('input', onEditorInput); ta.focus(); }
}

function setEditorMode(mode, name, folder) {
  const ta = document.getElementById('editor-textarea');
  if (ta) _currentRawContent = ta.value;
  _editorMode = mode;
  renderEditor(name, folder);
}

function onEditorInput() {
  const ta = document.getElementById('editor-textarea');
  if (!ta) return;
  _currentRawContent = ta.value;
  const preview = document.getElementById('editor-preview');
  if (preview) preview.innerHTML = mdToHtml(_currentRawContent);
}

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── 저장 다이얼로그 ──
async function saveToGithub(name, folder) {
  // textarea 최신 내용 먼저 저장
  const ta = document.getElementById('editor-textarea');
  if (ta) _currentRawContent = ta.value;

  // 저장 다이얼로그 열기
  showSaveDialog(name, folder);
}

        if (!r.ok) { const e = await r.json(); throw new Error(e.message||'삭제 실패'); }

  const cancelBtn = document.createElement('button');
  cancelBtn.textContent = '취소';
  cancelBtn.style.cssText = 'padding:10px 20px;border:1px solid #e2e8f0;border-radius:8px;background:white;cursor:pointer;font-size:14px;';
  cancelBtn.onclick = () => overlay.remove();

  const confirmBtn = document.createElement('button');
  confirmBtn.textContent = '저장';
  confirmBtn.style.cssText = 'padding:10px 20px;border:none;border-radius:8px;background:#22c55e;color:white;cursor:pointer;font-size:14px;font-weight:600;';
  confirmBtn.onclick = async () => {
    const selFolder = folSelect.value;
    const filename  = fileInput.value.trim();
    if (!filename) { alert('파일명을 입력해주세요.'); return; }

    const isRoot    = selFolder === '루트' || !selFolder;
    const targetPath = isRoot ? filename : `${selFolder}/${filename}`;
    const encodedPath = isRoot
      ? encodeURIComponent(filename)
      : `${encodeURIComponent(selFolder)}/${encodeURIComponent(filename)}`;

    overlay.remove();
    const btn = document.getElementById('save-btn');
    if (btn) { btn.disabled = true; btn.textContent = '⏳ 저장 중...'; }

    try {
      const ta = document.getElementById('editor-textarea');
      if (ta) _currentRawContent = ta.value;
      const encoded = btoa(unescape(encodeURIComponent(_currentRawContent)));

      // SHA 조회
      let saveSha = (targetPath === _currentFilePath) ? _currentFileSha : undefined;
      if (!saveSha) {
        try {
          const chk = await fetch(`${GITHUB_API}/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${encodedPath}?ref=${GITHUB_BRANCH}`, {cache:'no-store'});
          if (chk.ok) { const j = await chk.json(); saveSha = j.sha; }
        } catch(e) {}
      }

      const bodyObj = { message: `Update ${targetPath}`, content: encoded, branch: GITHUB_BRANCH };
      if (saveSha) bodyObj.sha = saveSha;

      const r = await fetch(
        `${GITHUB_API}/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${encodedPath}`,
        { method:'PUT', headers:{'Authorization':`token ${token}`,'Content-Type':'application/json'}, body:JSON.stringify(bodyObj) }
      );
      if (!r.ok) { const err = await r.json(); throw new Error(err.message || '저장 실패'); }

      const result = await r.json();
      _currentFilePath   = targetPath;
      _currentFileSha    = result.content.sha;
      _currentFileName   = filename;
      _currentFileFolder = isRoot ? '루트' : selFolder;

      if (btn) { btn.disabled = false; btn.innerHTML = '저장'; }
      showToast('✅ 저장 완료!');
      renderEditor(_currentFileName, _currentFileFolder);
    } catch(e) {
      showToast('❌ ' + e.message, true);
      if (btn) { btn.disabled = false; btn.innerHTML = '저장'; }
    }
  };

  footer.appendChild(cancelBtn);
  footer.appendChild(confirmBtn);
  box.appendChild(footer);
  overlay.appendChild(box);
  overlay.addEventListener('click', e => { if(e.target===overlay) overlay.remove(); });
  document.body.appendChild(overlay);
  fileInput.focus();
  fileInput.select();
}


function showToast(msg, isError=false) {
  const el = document.createElement('div');
  el.className = 'save-toast';
  el.style.background = isError ? '#dc2626' : '#1e293b';
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

/* ── 태그 클릭 팝업 ── */
function showTagPopup(tagNode, event, nodeById, links, container) {
  document.getElementById('tag-popup')?.remove();

  /* 연결된 파일 수집 */
  const files = [];
  links.forEach(l => {
    const sid = l.source?.id||l.source, tid = l.target?.id||l.target;
    const oid = sid===tagNode.id ? tid : (tid===tagNode.id ? sid : null);
    if (oid) {
      const nd = nodeById[oid];
      if (nd && !nd.isTag) files.push(nd);
    }
  });

  const popup = document.createElement('div');
  popup.id = 'tag-popup';
  popup.style.cssText = `
    position:fixed; z-index:99998;
    background:rgba(8,14,28,0.97);
    border:1px solid rgba(74,222,128,0.4);
    border-radius:12px; padding:14px 16px;
    min-width:210px; max-width:280px;
    box-shadow:0 8px 32px rgba(0,0,0,0.6);
    animation:fadeUp .18s ease;
    left:${Math.min(event.clientX+12, window.innerWidth-295)}px;
    top:${Math.min(event.clientY+12, window.innerHeight-320)}px;
  `;
  popup.innerHTML = `
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
      <div style="color:#4ade80;font-weight:700;font-size:13px">
        <span style="margin-right:6px">🏷</span>#${tagNode.name}
      </div>
      <button onclick="document.getElementById('tag-popup')?.remove()"
        style="background:none;border:none;color:#64748b;cursor:pointer;font-size:16px;line-height:1;padding:0 2px">✕</button>
    </div>
    <div style="font-size:11px;color:#64748b;margin-bottom:8px">${files.length}개 노트에서 사용</div>
    <div style="display:flex;flex-direction:column;gap:3px;max-height:200px;overflow-y:auto">
      ${files.map(f => `
        <div onclick="document.getElementById('tag-popup')?.remove();loadObsidianFileByPath('${f.path}','${f.name}','${f.folder}')"
          style="padding:6px 10px;background:rgba(255,255,255,0.04);border-radius:6px;cursor:pointer;
                 font-size:12px;color:#c8d8f0;display:flex;align-items:center;gap:7px;
                 border:1px solid transparent;transition:all .12s"
          onmouseover="this.style.background='rgba(74,222,128,0.1)';this.style.borderColor='rgba(74,222,128,0.25)'"
          onmouseout="this.style.background='rgba(255,255,255,0.04)';this.style.borderColor='transparent'">
          <span style="opacity:.55;font-size:11px">📄</span>
          <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${f.name.replace(/\.md$/i,'')}</span>
          <span style="margin-left:auto;font-size:10px;color:#475569;white-space:nowrap">${f.folder!=='루트'?f.folder:''}</span>
        </div>
      `).join('')}
    </div>
  `;

  document.body.appendChild(popup);

  /* 바깥 클릭 시 닫기 */
  setTimeout(() => {
    const close = (e) => {
      if (!popup.contains(e.target)) { popup.remove(); document.removeEventListener('click', close); }
    };
    document.addEventListener('click', close);
  }, 50);
}

function toggleSimulation() {
  const btn = document.getElementById('pause-btn');
  graphPaused = !graphPaused;
  if (graphPaused) {
    if (btn) { btn.textContent = '▶ 재생'; btn.classList.add('paused'); }
  } else {
    if (btn) { btn.textContent = '⏸ 멈춤'; btn.classList.remove('paused'); }
  }
}

function zoomIn()    { if(graphZoom&&graphSvg) graphSvg.transition().duration(300).call(graphZoom.scaleBy, 1.4); }
function zoomOut()   { if(graphZoom&&graphSvg) graphSvg.transition().duration(300).call(graphZoom.scaleBy, 0.7); }
function resetZoom() { if(graphZoom&&graphSvg) graphSvg.transition().duration(500).call(graphZoom.transform, d3.zoomIdentity); }

</script>
