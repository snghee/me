<script>
/* ── escHtml: XSS 방지 (최상단 정의 필수) ── */
function escHtml(str) {
  if (!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}


/* ════════════════════════════════════════════════════════
   ★ Google OAuth 직접 로그인 방식
   - API Key / Client ID / Folder ID 를 HTML에 내장
   - 사용자는 "Google 로그인" 버튼만 클릭하면 됩니다
   - Client ID와 Folder ID는 아래 GOOGLE_CONFIG에서 관리자가 설정
   ════════════════════════════════════════════════════════ */

const GOOGLE_CONFIG = {
  /* ▼▼▼ 관리자 설정 영역 (1회만 수정) ▼▼▼ */
  CLIENT_ID: localStorage.getItem('g_client_id') || '',
  /* ▲▲▲ 관리자 설정 영역 끝 ▲▲▲ */
  SCOPE: 'https://www.googleapis.com/auth/drive',
};

/* 현재 로그인 상태 */
let _driveToken    = null;
let _driveTokenExp = 0;
let _driveUserInfo = null;  // { name, email, picture }

function getClientId()        { return GOOGLE_CONFIG.CLIENT_ID || localStorage.getItem('g_client_id') || null; }
/* 로그인한 계정의 My Drive root = 'root' (폴더 ID 불필요) */
function getServiceFolderId() { return 'root'; }
function getGoogleApiKey()    { return null; }

/** 설정 저장 — Client ID만 */
function saveGoogleSettings(apiKey, clientId, folderId) {
  if (clientId) { localStorage.setItem('g_client_id', clientId.trim()); GOOGLE_CONFIG.CLIENT_ID = clientId.trim(); }
  driveInit = false;
}

/** 설정 초기화 */
function clearGoogleSettings() {
  localStorage.removeItem('g_client_id');
  localStorage.removeItem('g_folder_id');
  GOOGLE_CONFIG.CLIENT_ID = '';
  _driveToken = null; _driveTokenExp = 0; _driveUserInfo = null;
  driveInit = false;
  updateNavbarLoginBtn();
}

/* ── GIS 로드 ── */
function loadGIS() {
  return new Promise((res) => {
    if (window.google?.accounts?.oauth2) { res(); return; }
    const s = document.createElement('script');
    s.src = 'https://accounts.google.com/gsi/client';
    s.onload = res; s.onerror = res;
    document.head.appendChild(s);
  });
}

/* ── gapi 로드 ── */
function loadGapi() {
  return new Promise((res) => {
    if (window.gapi) { res(); return; }
    const s = document.createElement('script');
    s.src = 'https://apis.google.com/js/api.js';
    s.onload = res; s.onerror = res;
    document.head.appendChild(s);
  });
}

/* ── Google 로그인 (팝업) → access_token 획득 ── */
function getDriveToken() {
  return new Promise(async (res, rej) => {
    if (_driveToken && Date.now() < _driveTokenExp) { res(_driveToken); return; }
    await loadGIS();
    if (!window.google?.accounts?.oauth2) { rej(new Error('Google GIS 로드 실패')); return; }
    const cid = getClientId();
    if (!cid) { showGoogleSettingsDialog(null); rej(new Error('Client ID 미설정')); return; }
    const client = google.accounts.oauth2.initTokenClient({
      client_id: cid,
      scope: GOOGLE_CONFIG.SCOPE,
      callback: async (resp) => {
        if (resp.error) { rej(new Error('Google 로그인 실패: ' + resp.error)); return; }
        _driveToken    = resp.access_token;
        _driveTokenExp = Date.now() + (resp.expires_in - 60) * 1000;
        /* 사용자 정보 가져오기 */
        try {
          const ui = await fetch('https://www.googleapis.com/oauth2/v3/userinfo', {
            headers: { Authorization: 'Bearer ' + _driveToken }
          });
          _driveUserInfo = await ui.json();
        } catch(_) {}
        updateNavbarLoginBtn();
        res(_driveToken);
      },
    });
    client.requestAccessToken({ prompt: '' });
  });
}

/* ── Google 로그아웃 ── */
function googleSignOut() {
  if (_driveToken && window.google?.accounts?.oauth2) {
    google.accounts.oauth2.revoke(_driveToken);
  }
  _driveToken = null; _driveTokenExp = 0; _driveUserInfo = null;
  driveInit = false;
  updateNavbarLoginBtn();
  showToast('👋 로그아웃되었습니다.');
}

/* ── 네브바 로그인 버튼 업데이트 ── */
function updateNavbarLoginBtn() {
  const btn = document.getElementById('google-login-btn');
  if (!btn) return;
  if (_driveUserInfo) {
    btn.innerHTML = `<img src="${_driveUserInfo.picture||''}" style="width:22px;height:22px;border-radius:50%;vertical-align:middle;margin-right:6px;" onerror="this.style.display='none'"><span style="font-size:13px;">${_driveUserInfo.name||_driveUserInfo.email||'로그인됨'}</span>`;
    btn.title = _driveUserInfo.email || '';
    btn.onclick = () => {
      if (confirm('Google 계정에서 로그아웃하시겠습니까?')) googleSignOut();
    };
  } else {
    btn.innerHTML = '<span style="font-size:13px;">🔑 Google 로그인</span>';
    btn.title = 'Google 계정으로 Drive에 접속';
    btn.onclick = async () => {
      try { await getDriveToken(); showToast('✅ Google Drive 연결됨'); }
      catch(e) { showToast('❌ ' + e.message, true); }
    };
  }
}

// GitHub 설정 (Public 저장소 - 토큰 불필요)
const GITHUB_OWNER  = 'snghee';
const GITHUB_REPO   = 'Obsidian';
const GITHUB_BRANCH = 'main';
const GITHUB_API    = 'https://api.github.com';

/* ── private_vault 설정 ── */
const PRIVATE_VAULT = {
  OWNER:  'snghee',
  REPO:   'private_vault',
  BRANCH: 'main',
  FOLDER: 'my_token',   // 접근 허용 폴더
};

/** private_vault의 my_token 폴더 파일 목록 (토큰 필요) */
async function pvGetTree() {
  const token = localStorage.getItem('gh_write_token');
  if (!token) throw new Error('GitHub 토큰이 없습니다. 파일 메뉴에서 먼저 토큰을 입력하세요.');
  const r = await fetch(
    `${GITHUB_API}/repos/${PRIVATE_VAULT.OWNER}/${PRIVATE_VAULT.REPO}/git/trees/${PRIVATE_VAULT.BRANCH}?recursive=1&t=${Date.now()}`,
    { headers: { Authorization: `token ${token}` }, cache: 'no-store' }
  );
  if (r.status === 401 || r.status === 403) throw new Error('토큰 권한 없음 — private_vault 접근이 허용된 토큰인지 확인하세요.');
  if (r.status === 404) throw new Error('저장소를 찾을 수 없습니다 (snghee/private_vault).');
  if (!r.ok) throw new Error('private_vault 로드 실패: ' + r.status);
  const data = await r.json();
  /* my_token 폴더 안의 파일만 반환 */
  return data.tree.filter(f =>
    f.type === 'blob' &&
    f.path.startsWith(PRIVATE_VAULT.FOLDER + '/')
  );
}

/** private_vault 파일 raw 내용 읽기 */
async function pvGetRawFile(path) {
  const token = localStorage.getItem('gh_write_token');
  if (!token) throw new Error('GitHub 토큰이 없습니다.');
  const r = await fetch(
    `${GITHUB_API}/repos/${PRIVATE_VAULT.OWNER}/${PRIVATE_VAULT.REPO}/contents/${path.split('/').map(encodeURIComponent).join('/')}?ref=${PRIVATE_VAULT.BRANCH}&t=${Date.now()}`,
    { headers: { Authorization: `token ${token}` }, cache: 'no-store' }
  );
  if (!r.ok) throw new Error('파일 읽기 실패: ' + r.status);
  const data = await r.json();
  /* Base64 디코딩 */
  return decodeURIComponent(escape(atob(data.content.replace(/\n/g, ''))));
}

// GitHub API 헬퍼
async function ghGetTree() {
  const r = await fetch(
    `${GITHUB_API}/repos/${GITHUB_OWNER}/${GITHUB_REPO}/git/trees/${GITHUB_BRANCH}?recursive=1&t=${Date.now()}`,
    { cache: 'no-store' }
  );
  if (!r.ok) throw new Error('GitHub 트리 로드 실패');
  const data = await r.json();
  return data.tree.filter(f => f.type === 'blob' && f.path.endsWith('.md'));
}

async function ghGetRawFile(path, bustCache=false) {
  const url = `https://raw.githubusercontent.com/${GITHUB_OWNER}/${GITHUB_REPO}/${GITHUB_BRANCH}/${path}`
    + (bustCache ? `?t=${Date.now()}` : '');
  const r = await fetch(url, bustCache ? {cache:'no-store'} : {});
  if (!r.ok) throw new Error(`파일 로드 실패: ${path}`);
  return await r.text();
}

/* ── Google Drive - gapi 불필요, fetch + OAuth 토큰 방식 ── */
async function initGapi() {
  /* fetch 방식으로 전환되어 gapi 초기화 불필요 */
  driveInit = true;
}
async function fetchDriveFiles(folderId) {
  /* OAuth 토큰으로 직접 fetch (gapi 불필요) */
  const token = await getDriveToken();

  async function listFolder(pid, pathPrefix) {
    const url = `https://www.googleapis.com/drive/v3/files?` +
      `q=${encodeURIComponent("'" + pid + "' in parents and trashed=false")}` +
      `&pageSize=200&fields=files(id,name,mimeType)&orderBy=folder,name`;
    const r = await fetch(url, { headers: { Authorization: 'Bearer ' + token } });
    if (!r.ok) {
      const err = await r.json().catch(() => ({}));
      throw new Error(err.error?.message || 'Drive API 오류 ' + r.status);
    }
    const data = await r.json();
    const items = data.files || [];
    const result = [];
    for (const f of items) {
      if (!f || !f.id || !f.name) continue; // null 방어
      if (f.mimeType === 'application/vnd.google-apps.folder') {
        try {
          const sub = await listFolder(f.id, pathPrefix ? pathPrefix + '/' + f.name : f.name);
          result.push(...sub);
        } catch(_) {} // 하위 폴더 실패해도 계속
      } else {
        result.push({ ...f, name: pathPrefix ? pathPrefix + '/' + f.name : f.name });
      }
    }
    return result;
  }
  return listFolder(folderId, '');
}

function renderMenu() {
  const nav    = document.getElementById('navbar-menu');
  const drawer = document.getElementById('mobile-drawer-content');
  let idx = 0;

  for (const [folder, items] of Object.entries(menuData)) {
    const id = idx++;

    const btn = document.createElement('button');
    btn.id = 'btn-' + id;
    btn.className = 'nav-btn';
    btn.innerHTML = `${escHtml(folder)} <span class="arrow">▾</span>`;

    const dd = document.createElement('div');
    dd.id = 'dd-' + id;
    dd.className = 'dropdown';

    btn.addEventListener('click', (function(capturedId, capturedFolder, capturedDd) {
      return async function(e) {
        e.stopPropagation();
        const isOpen = capturedDd.classList.contains('open');
        document.querySelectorAll('.dropdown').forEach(d => d.classList.remove('open'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('open'));
        openId = null;
        if (!isOpen) {
          // position:fixed 이므로 버튼 위치 계산
          const btnRect = document.getElementById('btn-' + capturedId).getBoundingClientRect();
          capturedDd.style.top  = btnRect.bottom + 4 + 'px';
          capturedDd.style.left = btnRect.left + 'px';
          capturedDd.classList.add('open');
          document.getElementById('btn-' + capturedId).classList.add('open');
          openId = capturedId;
          if (capturedFolder === '구글드라이브') {
            /* 토큰 만료/미로그인 이거나 아직 비어있으면 항상 재로드 */
            const needReload = capturedDd.childElementCount === 0
              || !_driveToken || Date.now() >= _driveTokenExp;
            if (needReload) { capturedDd.innerHTML = ''; await populateServiceMenu(capturedDd); }
          }
          if (capturedFolder === '옵시디안'     && (capturedDd.childElementCount === 0 || _obsNeedsReload)) { _obsNeedsReload = false; await populateObsidianMenu(capturedDd); }
          if (capturedFolder === '실행'         && capturedDd.childElementCount === 0) await populateExecMenu(capturedDd);
        }
      };
    })(id, folder, dd));

    /* 정적 아이템 */
    if (items) {
      for (const [name, path] of Object.entries(items)) {
        const item = makeDdItem(name, () => {
          closeAll();
          document.querySelectorAll('.dd-item').forEach(i=>i.classList.remove('active'));
          item.classList.add('active');
          loadFile(path, name, folder);
        });
        dd.appendChild(item);
      }
    }

    const ni = document.createElement('div');
    ni.className = 'nav-item';
    ni.appendChild(btn);
    ni.appendChild(dd);
    nav.appendChild(ni);

    /* 모바일 드로어 */
    const sec = document.createElement('div');
    sec.className = 'drawer-section';
    const t = document.createElement('div');
    t.className = 'drawer-section-title';
    t.textContent = folder;
    sec.appendChild(t);
    if (items) {
      for (const [name, path] of Object.entries(items)) {
        const di = document.createElement('div');
        di.className = 'drawer-item';
        di.textContent = name;
        di.addEventListener('click', () => { closeDrawer(); loadFile(path, name, folder); });
        sec.appendChild(di);
      }
    } else {
      // 동적 메뉴 (구글드라이브 / 옵시디안) - 드로어 안에서 직접 로드
      const loadBtn = document.createElement('div');
      loadBtn.className = 'drawer-folder';
      loadBtn.innerHTML = '<span>📂</span><span>탭하여 펼치기</span><span style="margin-left:auto">▸</span>';
      const subList = document.createElement('div');
      subList.className = 'drawer-folder-list';
      let loaded = false;
      loadBtn.addEventListener('click', async () => {
        const isOpen = subList.style.display === 'block';
        if (isOpen) {
          subList.style.display = 'none';
          loadBtn.querySelector('span:last-child').textContent = '▸';
          return;
        }
        subList.style.display = 'block';
        loadBtn.querySelector('span:last-child').textContent = '▾';
        if (!loaded) {
          loaded = true;
          subList.innerHTML = '<div class="drawer-loading">⏳ 불러오는 중...</div>';
          try {
            if (folder === '구글드라이브') {
              await populateServiceMenu(dd);
              subList.innerHTML = '';
              dd.querySelectorAll('.dd-item, .dd-folder').forEach(el => {
                const item = document.createElement('div');
                item.className = 'drawer-item';
                item.textContent = el.textContent;
                item.addEventListener('click', () => { closeDrawer(); el.click(); });
                subList.appendChild(item);
              });
            } else if (folder === '옵시디안') {
              const tree = await ghGetTree();
              const files = tree.filter(f => !f.path.startsWith('.')).map(f => {
                const parts = f.path.split('/');
                return { name: parts[parts.length-1].replace(/\.md$/, ''), path: f.path, folder: parts.length>1?parts.slice(0,-1).join('/'):'루트' };
              });
              subList.innerHTML = '';
              // 폴더별 그룹핑
              const grouped = {};
              files.forEach(f => { if(!grouped[f.folder]) grouped[f.folder]=[]; grouped[f.folder].push(f); });
              Object.keys(grouped).sort().forEach(fol => {
                const folBtn = document.createElement('div');
                folBtn.className = 'drawer-folder';
                folBtn.style.paddingLeft = '32px';
                const folList = document.createElement('div');
                folList.className = 'drawer-folder-list';
                folBtn.innerHTML = `<span>📁</span><span>${escHtml(fol)}</span><span style="margin-left:auto">▸</span>`;
                folBtn.addEventListener('click', () => {
                  const open = folList.style.display === 'block';
                  folList.style.display = open ? 'none' : 'block';
                  folBtn.querySelector('span:last-child').textContent = open ? '▸' : '▾';
                });
                grouped[fol].forEach(f => {
                  const fi = document.createElement('div');
                  fi.className = 'drawer-item';
                  fi.style.paddingLeft = '52px';
                  fi.textContent = '📄 ' + f.name;
                  fi.addEventListener('click', (e) => {
                    e.stopPropagation();
                    closeDrawer();
                    loadObsidianFileByPath(f.path, f.name, fol);
                  });
                  folList.appendChild(fi);
                });
                subList.appendChild(folBtn);
                subList.appendChild(folList);
              });
            }
          } catch(e) {
            subList.innerHTML = `<div class="drawer-loading">❌ ${escHtml(e.message)}</div>`;
          }
        }
      });
      sec.appendChild(loadBtn);
      sec.appendChild(subList);
    }
    drawer.appendChild(sec);
  }
}

      empty.style.cssText = 'padding:24px;text-align:center;color:rgba(255,255,255,0.3);font-size:13px;';
      empty.innerHTML = '<div style="font-size:28px;margin-bottom:8px;">📂</div>폴더가 비어 있습니다.';
      dd.appendChild(empty);
    } else {
      /* ── 검색창 ── */
      const searchWrap = document.createElement('div');
      searchWrap.style.cssText = 'padding:8px 10px;border-bottom:1px solid rgba(255,255,255,0.06);position:sticky;top:0;background:#2c3e50;z-index:10;';
      const searchInp = document.createElement('input');
      searchInp.type = 'text';
      searchInp.placeholder = '🔍 파일 검색...';
      searchInp.style.cssText = 'width:100%;padding:7px 12px;border:1px solid rgba(255,255,255,0.12);border-radius:8px;background:rgba(0,0,0,0.3);color:white;font-size:12px;outline:none;box-sizing:border-box;';
      searchInp.onfocus = () => searchInp.style.borderColor = '#3498db';
      searchInp.onblur  = () => searchInp.style.borderColor = 'rgba(255,255,255,0.12)';
      searchWrap.appendChild(searchInp);
      dd.appendChild(searchWrap);

      /* ── 전체 확장/축소 컨트롤바 ── */
      const ctrlBar = document.createElement('div');
      ctrlBar.style.cssText = 'display:flex;align-items:center;gap:6px;padding:6px 10px;background:rgba(0,0,0,0.2);border-bottom:1px solid rgba(255,255,255,0.06);';

      const mkCtrlBtn = (icon, title, onClick) => {
        const btn = document.createElement('button');
        btn.innerHTML = icon; btn.title = title;
        btn.style.cssText = 'display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);color:rgba(255,255,255,0.7);padding:4px 10px;border-radius:5px;cursor:pointer;font-size:11px;gap:4px;';
        btn.onmouseover = () => btn.style.background = 'rgba(255,255,255,0.15)';
        btn.onmouseout  = () => btn.style.background = 'rgba(255,255,255,0.08)';
        btn.addEventListener('click', (e) => { e.stopPropagation(); onClick(); });
        return btn;
      };

      const btnExpand   = mkCtrlBtn(
        '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></svg>',
        '모두 펼치기', () => {
          dd.querySelectorAll('.folder-list').forEach(l => l.style.display = 'block');
          dd.querySelectorAll('.folder-arrow').forEach(a => a.textContent = '▾');
        });
      const btnCollapse = mkCtrlBtn(
        '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 14 10 14 10 20"/><polyline points="20 10 14 10 14 4"/><line x1="10" y1="14" x2="3" y2="21"/><line x1="21" y1="3" x2="14" y2="10"/></svg>',
        '모두 접기', () => {
          dd.querySelectorAll('.folder-list').forEach(l => l.style.display = 'none');
          dd.querySelectorAll('.folder-arrow').forEach(a => a.textContent = '▸');
        });

      ctrlBar.appendChild(btnExpand);
      ctrlBar.appendChild(btnCollapse);
      dd.appendChild(ctrlBar);

      /* ── 파일 아이콘 결정 ── */
      const getFileIcon = (name, mime) => {
        if (mime === 'application/vnd.google-apps.folder') return '📁';
        if (name.endsWith('.md'))   return '📝';
        if (name.endsWith('.pdf'))  return '📕';
        if (name.endsWith('.xlsx') || name.endsWith('.csv')) return '📊';
        if (name.endsWith('.docx') || name.endsWith('.doc')) return '📄';
        if (name.endsWith('.pptx')) return '📊';
        if (name.endsWith('.jpg') || name.endsWith('.png') || name.endsWith('.gif')) return '🖼️';
        if (name.endsWith('.js') || name.endsWith('.py') || name.endsWith('.html')) return '💻';
        if (name.endsWith('.zip') || name.endsWith('.tar')) return '🗜️';
        return '📄';
      };

      /* ── 파일 목록 컨테이너 ── */
      const listContainer = document.createElement('div');
      listContainer.id = 'drive-list-container';

      /* ── 파일 항목 생성 함수 ── */
      const makeFileItem = (f) => {
        const item = document.createElement('div');
        item.className = 'dd-item drive-file-item';
        item.dataset.name = f.displayName || f.name;
        item.style.cssText = 'display:flex;align-items:center;gap:8px;padding:9px 14px 9px 28px;';
        item.innerHTML = `
          <span style="flex-shrink:0;font-size:14px;">${getFileIcon(f.displayName||f.name, f.mimeType)}</span>
          <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:13px;">${escHtml(f.displayName||f.name)}</span>
          <span style="flex-shrink:0;font-size:10px;opacity:0.35;" title="다운로드">⬇</span>`;
        item.addEventListener('click', async (e) => {
          e.stopPropagation();
          closeAll();
          const displayPath = f.name || '파일';
          contentEl.innerHTML = `<div class="file-inner"><div class="breadcrumb">구글드라이브 > ${escHtml(displayPath)}</div><div class="loading"><div class="loading-spinner"></div></div></div>`;
          try {
            const tok = await getDriveToken();
            const fname = (f.displayName || f.name || '').toLowerCase();
            const mime  = f.mimeType || '';

            /* ── 파일 형식별 뷰어 ── */

            /* Google Docs/Sheets/Slides/Forms → embed iframe */
            const googleEmbedMap = {
              'application/vnd.google-apps.document':     'https://docs.google.com/document/d/{id}/preview',
              'application/vnd.google-apps.spreadsheet':  'https://docs.google.com/spreadsheets/d/{id}/preview',
              'application/vnd.google-apps.presentation': 'https://docs.google.com/presentation/d/{id}/preview',
              'application/vnd.google-apps.form':         'https://docs.google.com/forms/d/{id}/viewform?embedded=true',
            };

            if (googleEmbedMap[mime]) {
              const embedUrl = googleEmbedMap[mime].replace('{id}', f.id);
              const openUrl  = `https://drive.google.com/file/d/${f.id}/view`;
              recordDownload(f.name, f.id);
              const typeLabel = {
                'application/vnd.google-apps.document':     '📝 Google 문서',
                'application/vnd.google-apps.spreadsheet':  '📊 Google 스프레드시트',
                'application/vnd.google-apps.presentation': '📊 Google 슬라이드',
                'application/vnd.google-apps.form':         '📋 Google 설문',
              }[mime] || '📄 Google 파일';
              contentEl.className = 'content markdown-body';
              contentEl.innerHTML = `<div style="display:flex;flex-direction:column;height:100%;min-height:0;">
                <div style="padding:12px 24px;background:#f8fafc;border-bottom:1px solid #e8edf2;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;">
                  <div>
                    <div style="font-size:11px;color:#999;margin-bottom:2px;">구글드라이브 > ${escHtml(displayPath)}</div>
                    <div style="font-size:15px;font-weight:600;color:#1e293b;">${typeLabel} · ${escHtml(f.displayName||f.name)}</div>
                  </div>
                  <a href="${openUrl}" target="_blank"
                    style="display:inline-flex;align-items:center;gap:6px;padding:7px 14px;background:#4285f4;color:white;border-radius:6px;text-decoration:none;font-size:13px;font-weight:600;flex-shrink:0;">
                    ↗ Drive에서 열기
                  </a>
                </div>
                <iframe src="${embedUrl}"
                  style="flex:1;width:100%;border:none;min-height:0;"
                  allow="autoplay"
                  sandbox="allow-scripts allow-same-origin allow-forms allow-popups">
                </iframe>
              </div>`;
              return;
            }

            /* PDF → iframe 뷰어 */
            if (fname.endsWith('.pdf')) {
              const pdfUrl = `https://drive.google.com/file/d/${f.id}/preview`;
              recordDownload(f.name, f.id);
              contentEl.className = 'content markdown-body';
              contentEl.innerHTML = `<div style="display:flex;flex-direction:column;height:100%;min-height:0;">
                <div style="padding:12px 24px;background:#f8fafc;border-bottom:1px solid #e8edf2;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;">
                  <div>
                    <div style="font-size:11px;color:#999;margin-bottom:2px;">구글드라이브 > ${escHtml(displayPath)}</div>
                    <div style="font-size:15px;font-weight:600;color:#1e293b;">📕 ${escHtml(f.displayName||f.name)}</div>
                  </div>
                  <a href="https://drive.google.com/uc?export=download&id=${encodeURIComponent(f.id)}" target="_blank"
                    style="display:inline-flex;align-items:center;gap:6px;padding:7px 14px;background:#e74c3c;color:white;border-radius:6px;text-decoration:none;font-size:13px;font-weight:600;flex-shrink:0;">
                    ⬇ 다운로드
                  </a>
                </div>
                <iframe src="${pdfUrl}"
                  style="flex:1;width:100%;border:none;min-height:0;"
                  allow="autoplay">
                </iframe>
              </div>`;
              return;
            }

            /* 이미지 → img 태그 */
            if (fname.match(/\.(jpg|jpeg|png|gif|webp|svg)$/)) {
              const imgUrl = `https://drive.google.com/thumbnail?id=${f.id}&sz=w1200`;
              recordDownload(f.name, f.id);
              contentEl.className = 'content markdown-body';
              contentEl.innerHTML = `<div class="file-inner">
                <div class="breadcrumb">구글드라이브 > ${escHtml(displayPath)}</div>
                <h2 style="margin-bottom:16px">🖼️ ${escHtml(f.displayName||f.name)}</h2>
                <img src="${imgUrl}" style="max-width:100%;border-radius:8px;box-shadow:0 4px 20px rgba(0,0,0,0.1);">
              </div>`;
              return;
            }

            /* 그 외 텍스트 파일 → fetch로 읽기 */
            const r = await fetch(
              `https://www.googleapis.com/drive/v3/files/${f.id}?alt=media`,
              { headers: { Authorization: 'Bearer ' + tok } }
            );
            if (!r.ok) throw new Error('파일 읽기 실패: ' + r.status);
            const text = await r.text();
            const html = fname.endsWith('.md') ? mdToHtml(text) : `<pre style="white-space:pre-wrap;font-size:13px;">${escHtml(text)}</pre>`;
            recordDownload(f.name, f.id);
            contentEl.className = 'content markdown-body';
            contentEl.innerHTML = `<div class="file-inner">
              <div class="breadcrumb">구글드라이브 > ${escHtml(displayPath)}</div>
              <h2 style="margin-bottom:16px">${escHtml(f.displayName||f.name)}</h2>
              <a href="https://drive.google.com/uc?export=download&id=${encodeURIComponent(f.id)}" target="_blank"
                style="display:inline-block;padding:8px 16px;background:#3498db;color:white;border-radius:4px;text-decoration:none;margin-bottom:20px">
                ⬇ 다운로드
              </a>
              ${html}
            </div>`;
          } catch(err) {
            contentEl.innerHTML = `<div class="file-inner"><div class="err">❌ ${escHtml(err.message)}</div></div>`;
          }
        });
        return item;
      };

      /* ── 폴더별 그룹핑 ── */
      const grouped = {};
      files.forEach(f => {
        const parts = f.name.split('/');
        const fol = parts.length > 1 ? parts[0] : '📄 루트 파일';
        const displayName = parts[parts.length - 1];
        if (!grouped[fol]) grouped[fol] = [];
        grouped[fol].push({ ...f, displayName });
      });

      /* ── 루트 파일 먼저 (폴더 없이) ── */
      const rootFiles = grouped['📄 루트 파일'] || [];
      rootFiles.forEach(f => {
        const item = makeFileItem(f);
        item.style.paddingLeft = '14px';
        listContainer.appendChild(item);
      });

      /* ── 폴더 그룹 ── */
      Object.keys(grouped).sort().filter(fol => fol !== '📄 루트 파일').forEach(fol => {
        const folDiv = document.createElement('div');
        folDiv.className = 'dd-folder drive-folder-row';
        folDiv.style.cssText = 'display:flex;align-items:center;gap:8px;padding:9px 14px;cursor:pointer;user-select:none;';
        const arrow = document.createElement('span');
        arrow.className = 'folder-arrow';
        arrow.textContent = '▸';
        arrow.style.cssText = 'font-size:10px;color:rgba(255,255,255,0.4);flex-shrink:0;';
        const folIcon = document.createElement('span');
        folIcon.textContent = '📁';
        folIcon.style.flexShrink = '0';
        const folLabel = document.createElement('span');
        folLabel.style.cssText = 'flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:13px;';
        folLabel.textContent = fol;
        const folCount = document.createElement('span');
        folCount.textContent = grouped[fol].length;
        folCount.style.cssText = 'font-size:10px;background:rgba(255,255,255,0.1);padding:1px 6px;border-radius:8px;color:rgba(255,255,255,0.45);flex-shrink:0;';
        folDiv.appendChild(arrow); folDiv.appendChild(folIcon); folDiv.appendChild(folLabel); folDiv.appendChild(folCount);

        const list = document.createElement('div');
        list.className = 'folder-list';
        list.style.display = 'none';

        folDiv.addEventListener('click', (e) => {
          e.stopPropagation();
          const isOpen = list.style.display !== 'none';
          list.style.display = isOpen ? 'none' : 'block';
          arrow.textContent = isOpen ? '▸' : '▾';
          folDiv.style.background = isOpen ? '' : 'rgba(52,152,219,0.08)';
        });

        grouped[fol].forEach(f => list.appendChild(makeFileItem(f)));
        listContainer.appendChild(folDiv);
        listContainer.appendChild(list);
      });

      dd.appendChild(listContainer);

      /* ── 검색 기능 연결 ── */
      searchInp.addEventListener('input', (e) => {
        e.stopPropagation();
        const q = searchInp.value.trim().toLowerCase();
        if (!q) {
          dd.querySelectorAll('.drive-file-item, .drive-folder-row, .folder-list').forEach(el => el.style.display = '');
          dd.querySelectorAll('.folder-list').forEach(l => l.style.display = 'none');
          return;
        }
        dd.querySelectorAll('.drive-folder-row').forEach(row => row.style.display = 'none');
        dd.querySelectorAll('.folder-list').forEach(l => l.style.display = 'block');
        dd.querySelectorAll('.drive-file-item').forEach(item => {
          const match = item.dataset.name?.toLowerCase().includes(q);
          item.style.display = match ? '' : 'none';
        });
      });
      searchInp.addEventListener('click', e => e.stopPropagation());
      searchInp.addEventListener('keydown', e => e.stopPropagation());
    }

    /* ── 하단 설정 변경 ── */
    const settingsItem = document.createElement('div');
    settingsItem.className = 'dd-item';
    settingsItem.style.cssText = 'color:rgba(255,255,255,0.35);font-size:11px;border-top:1px solid rgba(255,255,255,0.06);padding:10px 14px;display:flex;align-items:center;gap:6px;';
    settingsItem.innerHTML = '⚙️ Google 연동 설정 변경';
    settingsItem.addEventListener('click', () => { closeAll(); showGoogleSettingsDialog(null); });
    dd.appendChild(settingsItem);

  } catch(e) {
    dd.innerHTML = '';
    const errEl = document.createElement('div');
    errEl.style.cssText = 'padding:16px 14px;';

    /* 에러 원인별 안내 메시지 */
    let hint = '';
    const msg = (e.message || '').toLowerCase();
    if (msg.includes('not found') || msg.includes('404')) {
      hint = '⚠️ <b>Folder ID를 확인하세요.</b><br>Drive 폴더 URL의 <code>folders/</code> 뒷부분을 정확히 복사했는지 확인하세요.';
    } else if (msg.includes('403') || msg.includes('forbidden') || msg.includes('permission')) {
      hint = '⚠️ <b>접근 권한이 없습니다.</b><br>로그인한 Google 계정이 해당 폴더에 접근 권한이 있는지 확인하세요.';
    } else if (msg.includes('401') || msg.includes('unauthorized') || msg.includes('invalid')) {
      hint = '⚠️ <b>인증이 만료되었습니다.</b><br>Google 로그아웃 후 다시 로그인하세요.';
    } else if (msg.includes('client id') || msg.includes('client_id')) {
      hint = '⚠️ <b>OAuth Client ID가 올바르지 않습니다.</b><br>Google Cloud Console에서 Client ID를 다시 확인하세요.';
    }

    errEl.innerHTML = `
      <div style="color:#f87171;font-size:13px;font-weight:600;margin-bottom:8px;">❌ Drive 연결 오류</div>
      <div style="color:rgba(255,255,255,0.5);font-size:11px;background:rgba(0,0,0,0.25);padding:8px 10px;border-radius:6px;word-break:break-all;margin-bottom:${hint?'10px':'0'}">${escHtml(e.message)}</div>
      ${hint ? `<div style="color:#fbbf24;font-size:11px;line-height:1.7;background:rgba(251,191,36,0.08);border:1px solid rgba(251,191,36,0.2);padding:8px 10px;border-radius:6px;">${hint}</div>` : ''}
    `;
    dd.appendChild(errEl);
    const btnWrap = document.createElement('div');
    btnWrap.style.cssText = 'display:flex;gap:8px;padding:8px 14px 14px;';

    const retryBtn = document.createElement('button');
    retryBtn.textContent = '🔄 다시 시도';
    retryBtn.style.cssText = 'flex:1;padding:8px;border:1px solid rgba(52,152,219,0.4);border-radius:6px;background:rgba(52,152,219,0.1);color:#64b5f6;font-size:12px;cursor:pointer;';
    retryBtn.onclick = async (ev) => { ev.stopPropagation(); dd.innerHTML=''; await populateServiceMenu(dd); };

    const settingBtn = document.createElement('button');
    settingBtn.textContent = '⚙️ 설정 변경';
    settingBtn.style.cssText = 'flex:1;padding:8px;border:1px solid rgba(255,255,255,0.15);border-radius:6px;background:rgba(255,255,255,0.05);color:rgba(255,255,255,0.6);font-size:12px;cursor:pointer;';
    settingBtn.onclick = (ev) => { ev.stopPropagation(); showGoogleSettingsDialog(dd); };

    btnWrap.appendChild(retryBtn);
    btnWrap.appendChild(settingBtn);
    dd.appendChild(btnWrap);
  }
}

/* ── 옵시디안 메뉴 ── */
async function populateObsidianMenu(dd) {
  dd.innerHTML = '<div class="dd-item">⏳ GitHub에서 불러오는 중...</div>';
  try {
    const tree = await ghGetTree();
    const files = tree
      .filter(f => !f.path.startsWith('.'))
      .map(f => {
        const parts = f.path.split('/');
        const name = parts[parts.length-1].replace(/\.md$/, '');
        const folder = parts.length > 1 ? parts.slice(0,-1).join('/') : '루트';
        return { name, path: f.path, folder };
      });
    dd.innerHTML = '';
    if (!files.length) { dd.innerHTML='<div class="dd-item">(파일 없음)</div>'; return; }
    const grouped = {};
    files.forEach(f => { const fol=f.folder||'루트'; if(!grouped[fol]) grouped[fol]=[]; grouped[fol].push(f); });

    // 전체 확장/축소 버튼
    const ctrlBar = document.createElement('div');
    ctrlBar.style.cssText = 'display:flex;gap:6px;padding:6px 12px;background:rgba(0,0,0,0.2);border-bottom:1px solid rgba(255,255,255,0.08);';
    const btnExpand = document.createElement('button');
    btnExpand.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></svg>';
    btnExpand.title = '전체 펼치기';
    btnExpand.style.cssText = 'display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);color:white;padding:4px 8px;border-radius:4px;cursor:pointer;';
    btnExpand.addEventListener('click', (e) => { e.stopPropagation(); dd.querySelectorAll('.folder-list').forEach(l=>l.style.display='block'); dd.querySelectorAll('.folder-arrow').forEach(a=>a.innerHTML='<svg width="10" height="10" viewBox="0 0 16 16" fill="currentColor"><path d="M4 6l4 5 4-5H4z"/></svg>'); });
    const btnCollapse = document.createElement('button');
    btnCollapse.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 14 10 14 10 20"/><polyline points="20 10 14 10 14 4"/><line x1="10" y1="14" x2="3" y2="21"/><line x1="21" y1="3" x2="14" y2="10"/></svg>';
    btnCollapse.title = '전체 접기';
    btnCollapse.style.cssText = 'display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);color:white;padding:4px 8px;border-radius:4px;cursor:pointer;';
    btnCollapse.addEventListener('click', (e) => { e.stopPropagation(); dd.querySelectorAll('.folder-list').forEach(l=>l.style.display='none'); dd.querySelectorAll('.folder-arrow').forEach(a=>a.innerHTML='<svg width="10" height="10" viewBox="0 0 16 16" fill="currentColor"><path d="M6 4l5 4-5 4V4z"/></svg>'); });
    ctrlBar.appendChild(btnExpand);
    ctrlBar.appendChild(btnCollapse);
    dd.appendChild(ctrlBar);

    // 루트 파일 먼저 표시 (폴더 없이)
    if (grouped['루트']) {
      grouped['루트'].forEach(f => {
        const item = makeDdItem('📄 '+f.name, () => {
          closeAll();
          loadObsidianFileByPath(f.path, f.name, '루트');
        });
        dd.appendChild(item);
      });
    }

    // 하위 폴더 표시
    Object.keys(grouped).sort().filter(fol => fol !== '루트').forEach(fol => {
      const folDiv = makeFolderRow(fol);
      const list = document.createElement('div');
      list.className = 'folder-list';
      list.style.display = 'none';
      folDiv.addEventListener('click', (e) => {
        e.stopPropagation();
        const open = list.style.display !== 'none';
        list.style.display = open ? 'none' : 'block';
        const arrow = folDiv.querySelector('.folder-arrow');

async function populateExecMenu(dd) {

    const jsFiles = data.tree.filter(f => f.type === 'blob' && f.path.endsWith('.js') && !f.path.startsWith('.'));

      dd.innerHTML = '<div class="dd-item" style="color:#94a3b8">(JS 파일 없음)</div>';

    hdr.textContent = '⚡ JS 스크립트 실행';
    dd.appendChild(hdr);

    /* 폴더별 그룹 */
    const grouped = {};
    jsFiles.forEach(f => {

          <div style="background:#0f172a;border:1px solid rgba(239,68,68,0.5);border-radius:14px;padding:24px 28px;max-width:420px;width:90vw;box-shadow:0 20px 60px rgba(0,0,0,.7);">
            <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px;">
              <span style="font-size:22px">⚠️</span>
              <span style="color:#f87171;font-weight:700;font-size:15px">스크립트 실행 확인</span>
            </div>
            <div style="color:#94a3b8;font-size:13px;line-height:1.7;margin-bottom:8px;">
              GitHub 저장소에서 다음 파일을 내려받아 <b style="color:#fbbf24">브라우저에서 직접 실행</b>합니다.
            </div>
            <div style="background:#1e293b;border-radius:8px;padding:10px 14px;margin-bottom:16px;font-size:13px;color:#e2e8f0;word-break:break-all;">
              ⚡ ${escHtml(fileName)}
            </div>
            <div style="color:#64748b;font-size:11px;margin-bottom:20px;line-height:1.6;">
              저장소가 신뢰할 수 있는 경우에만 실행하세요.<br>
              악성 코드가 포함된 경우 브라우저 세션이 손상될 수 있습니다.
            </div>
            <div style="display:flex;gap:10px;justify-content:flex-end;">
              <button id="exec-cancel-btn" style="padding:8px 20px;border:1px solid #334155;border-radius:8px;background:transparent;color:#94a3b8;cursor:pointer;font-size:13px;">취소</button>
              <button id="exec-confirm-btn" style="padding:8px 20px;border:none;border-radius:8px;background:#dc2626;color:white;cursor:pointer;font-size:13px;font-weight:600;">실행</button>
            </div>
          </div>`;
        document.body.appendChild(popup);
        popup.querySelector('#exec-cancel-btn').onclick  = () => { popup.remove(); resolve(false); };
        popup.querySelector('#exec-confirm-btn').onclick = () => { popup.remove(); resolve(true); };
        popup.addEventListener('click', e => { if (e.target === popup) { popup.remove(); resolve(false); } });
      });
      if (!confirmed) return;

      try {
        showToast(`⚡ ${escHtml(fileName)} 실행 중...`);
        const raw = await ghGetRawFile(filePath, true);
        /* console 출력 캡처 */
        const logs = [];

        console.warn = (...a) => { logs.push('⚠️ '+a.join(' ')); origWarn(...a); };

        item.style.paddingLeft = '28px'; item.title = f.path;
        list.appendChild(item);
      });
      dd.appendChild(folDiv); dd.appendChild(list);
    });
  } catch(e) {
    dd.innerHTML = `<div class="dd-item" style="color:#e74c3c">⚠️ ${escHtml(e.message)}</div>`;
  }
}

function showExecResult(fileName, logs, result) {
  document.getElementById('exec-result-popup')?.remove();
  const popup = document.createElement('div');
  popup.id = 'exec-result-popup';
  popup.style.cssText = 'position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#0f172a;border:1px solid rgba(99,102,241,0.45);border-radius:12px;padding:18px 20px;min-width:320px;max-width:520px;max-height:70vh;overflow-y:auto;z-index:99999;box-shadow:0 16px 48px rgba(0,0,0,0.7);animation:fadeUp .18s ease;';
  const resultStr = result !== undefined ? String(result) : '';
  const logsHtml = logs.length
    ? '<div style="font-size:11px;color:#64748b;margin-bottom:6px">콘솔 출력</div>' +
      '<pre style="background:#1e293b;border-radius:7px;padding:10px 12px;font-size:12px;color:#94a3b8;overflow-x:auto;margin-bottom:10px;white-space:pre-wrap">' +
      logs.map(l=>l.replace(/</g,'&lt;')).join('\n') + '</pre>'
    : '';
  const resultHtml = resultStr
    ? '<div style="font-size:11px;color:#64748b;margin-bottom:6px">반환값</div>' +
      '<pre style="background:#1e293b;border-radius:7px;padding:10px 12px;font-size:12px;color:#6ee7b7;overflow-x:auto;white-space:pre-wrap">' +
      resultStr.replace(/</g,'&lt;') + '</pre>'
    : (!logs.length ? '<div style="color:#4ade80;font-size:13px">✅ 실행 완료</div>' : '');
  popup.innerHTML =
    '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">' +
    '<div style="color:#818cf8;font-weight:700;font-size:13px">⚡ ' + fileName + '</div>' +
    '<button onclick="document.getElementById(\'exec-result-popup\')?.remove()" style="background:none;border:none;color:#64748b;cursor:pointer;font-size:17px">✕</button>' +
    '</div>' + logsHtml + resultHtml;
  document.body.appendChild(popup);
  setTimeout(()=>{
    const close=(e)=>{if(!popup.contains(e.target)){popup.remove();document.removeEventListener('click',close);}};
    document.addEventListener('click',close);
  },50);
}

async function downloadObsidianFile(filePath, name) {
  try {
    const r = await fetch(
      `https://raw.githubusercontent.com/${GITHUB_OWNER}/${GITHUB_REPO}/${GITHUB_BRANCH}/${filePath}`
    );
    if (!r.ok) throw new Error('다운로드 실패');
    const blob = await r.blob();
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href=url; a.download=name+'.md';
    document.body.appendChild(a); a.click(); URL.revokeObjectURL(url); a.remove();
    recordDownload(name, filePath);
  } catch(e) { showToast('❌ ' + escHtml(e.message), true); }
}

async function loadFile(filePath, itemName, folder) {
  document.querySelectorAll('.graph-controls').forEach(el=>el.classList.remove('visible'));
  // 대시보드 숨기고 파일 모드로 전환
  const dash = document.getElementById('dashboard');
  if (dash) dash.style.display = 'none';
  contentEl.innerHTML=`<div class="file-inner"><div class="breadcrumb">${escHtml(folder)} > ${escHtml(itemName)}</div><div class="loading"><div class="loading-spinner"></div></div></div>`;
  if (filePath==='STATS')       { renderStats(folder,itemName); return; }
  if (filePath==='INTRO_STATS') { renderIntroStats(); return; }
  if (filePath==='NEW_DOC')     { renderNewDoc(); return; }
  if (filePath==='DELETE_FILE') { showDeleteDialog(); return; }
  try {
    const r = await fetch(filePath);
    if (!r.ok) throw new Error(`파일 없음: ${escHtml(filePath)}`);
    const md = await r.text();
    contentEl.className='content markdown-body';
    contentEl.innerHTML=`<div class="file-inner"><div class="breadcrumb">${escHtml(folder)} > ${escHtml(itemName)}</div>${mdToHtml(md)}</div>`;
  } catch(e) {
    contentEl.innerHTML=`<div class="file-inner"><div class="breadcrumb">${escHtml(folder)} > ${escHtml(itemName)}</div><div class="err">❌ ${escHtml(e.message)}</div></div>`;
  }
}

let _ndMode = 'edit';

function ndSetMode(mode) {
  _ndMode = mode;
  // 버튼 active
  ['edit','split','preview'].forEach(m => {
    const b = document.getElementById('nd-btn-'+m);
    if (b) b.classList.toggle('active', m === mode);
  });
  const single   = document.getElementById('nd-textarea-single');
  const splitW   = document.getElementById('nd-split-wrap');
  const taSplit  = document.getElementById('nd-textarea');
  const prevS    = document.getElementById('nd-preview-single');

  // 현재 내용 동기화
  const curVal = (single && single.style.display !== 'none') ? single.value
               : (taSplit ? taSplit.value : '');

  if (mode === 'edit') {
    if (single)  { single.style.display='block'; single.value=curVal; }
    if (splitW)  splitW.style.display='none';
    if (prevS)   prevS.style.display='none';
  } else if (mode === 'split') {
    if (single)  single.style.display='none';
    if (splitW)  { splitW.style.display='grid'; if(taSplit) taSplit.value=curVal; }
    if (prevS)   prevS.style.display='none';
    ndSyncPreview();
  } else { // preview
    if (single)  single.style.display='none';
    if (splitW)  splitW.style.display='none';
    if (prevS)   { prevS.style.display='block'; prevS.innerHTML=mdToHtml(curVal); }
  }
}

function ndSyncPreview() {
  const taSplit  = document.getElementById('nd-textarea');
  const taSingle = document.getElementById('nd-textarea-single');
  const val = (taSplit && taSplit.style.display !== 'none') ? taSplit.value : (taSingle ? taSingle.value : '');
  const p1 = document.getElementById('nd-preview');
  const p2 = document.getElementById('nd-preview-single');
  if (p1) p1.innerHTML = mdToHtml(val);
  if (p2) p2.innerHTML = mdToHtml(val);
}

async function saveNewDoc() {
  // _ndMode 기준으로 textarea 선택
  let body = '';
  if (_ndMode === 'split') {
    body = document.getElementById('nd-textarea')?.value || '';
  } else {
    body = document.getElementById('nd-textarea-single')?.value || '';
  }

  // 둘 다 비어있으면 fallback
  if (!body.trim()) {
    body = document.getElementById('nd-textarea-single')?.value
        || document.getElementById('nd-textarea')?.value
        || '';
  }

  if (!body.trim()) { showToast('❌ 내용을 입력하세요', true); return; }

  _currentRawContent = body;
  _currentFilePath = null;
  _currentFileSha  = null;
  showSaveDialog('새문서.md', '루트');
}

/* ── 마크다운 → HTML ── */
function mdToHtml(md) {
  if (!md) return '';
  if (typeof marked !== 'undefined') {
    // marked.js 설정
    marked.setOptions({
      breaks: true,       // 단일 줄바꿈 → <br>
      gfm: true,          // GitHub Flavored Markdown (표, 체크박스 등)
      highlight: function(code, lang) {
        if (typeof hljs !== 'undefined' && lang && hljs.getLanguage(lang)) {
          return hljs.highlight(code, { language: lang }).value;
        }
        return typeof hljs !== 'undefined' ? hljs.highlightAuto(code).value : code;
      }
    });
    return marked.parse(md);
  }
  // fallback: marked 로드 전
  if (!md) return '';
  return '<p>' + md
    .replace(/^### (.+)$/gm,'<h3>$1</h3>')
    .replace(/^## (.+)$/gm,'<h2>$1</h2>')
    .replace(/^# (.+)$/gm,'<h1>$1</h1>')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/\*(.+?)\*/g,'<em>$1</em>')
    .replace(/\[(.+?)\]\((.+?)\)/g,'<a href="$2" target="_blank">$1</a>')
    .replace(/`(.+?)`/g,'<code>$1</code>')
    .replace(/^- (.+)$/gm,'<li>$1</li>')
    .replace(/\n\n/g,'</p><p>')
    .replace(/\n/g,'<br>') + '</p>';
}

function recordDownload(name, id) {
  let s = JSON.parse(localStorage.getItem('downloadStats')||'[]');
  const now = new Date().toLocaleString('ko-KR');
  const ex = s.find(x=>x.fileId===id);
  if (ex) { ex.count++; ex.lastDownload=now; }
  else s.push({ fileId:id, fileName:name, count:1, firstDownload:now, lastDownload:now });
  localStorage.setItem('downloadStats', JSON.stringify(s));
  showDashboard();
}

/* ── 옵시디안 그래프 ── */
let graphZoom = null, graphSvg = null, graphSim = null, graphPaused = false;

async function initObsidianGraph() {
  // DOM 렌더링 완료 후 실행 (offsetWidth 보장)
  await new Promise(r => requestAnimationFrame(() => requestAnimationFrame(r)));

  const wrap = document.getElementById('graph-wrap');
  const svg  = document.getElementById('obs-graph');
  if (!svg || !wrap) return;

  // wrap 크기가 0이면 잠깐 기다리기
  if (wrap.offsetWidth === 0) {
    await new Promise(r => setTimeout(r, 100));
  }

  // 로딩 표시
  svg.innerHTML = '<text x="50%" y="50%" text-anchor="middle" fill="#666" font-size="13" dy=".3em">⏳ 그래프 로딩 중...</text>';

  try {
    // GitHub 트리에서 노드 생성
    const tree = await ghGetTree();
    // 파일 목록 + frontmatter tags 추출 (병렬 로드, 최대 20개)
    const rawNodes = tree
      .filter(f => !f.path.startsWith('.'))
      .map(f => {
        const parts = f.path.split('/');
        const name   = parts[parts.length-1].replace(/\.md$/, '');
        const folder = parts.length > 1 ? parts.slice(0,-1).join('/') : '루트';
        return { id: f.path.replace(/\.md$/, ''), name, path: f.path, folder, tags: [] };
      });

    // 최대 30개 파일에서 frontmatter tags 병렬 로드
    const loadLimit = Math.min(rawNodes.length, 30);
    await Promise.allSettled(rawNodes.slice(0, loadLimit).map(async n => {
      try {
        const raw = await ghGetRawFile(n.path);
        const fm = raw.match(/^---[\s\S]*?---/);
        if (fm) {
          const fmText = fm[0];
          // [tag1, tag2] 인라인 배열 형식
          const inlineArr = fmText.match(/^tags:\s*\[([^\]]+)\]/im);
          if (inlineArr) {
            n.tags = inlineArr[1].split(',').map(t=>t.trim().replace(/^['"]|['"]$/g,'')).filter(Boolean);
          } else {
            // block 리스트 형식 (- tag)
            const blockM = fmText.match(/^tags:\s*\n((?:[ \t]*-[ \t]*[^\n]+\n?)+)/im);
            if (blockM) {
              n.tags = [...blockM[1].matchAll(/^[ \t]*-[ \t]*(.+)/gm)].map(m=>m[1].trim());
            } else {
              // 공백/쉼표 구분 인라인
              const plainM = fmText.match(/^tags:\s*([^\n\[{]+)/im);
              if (plainM) n.tags = plainM[1].split(/[,\s]+/).map(t=>t.trim()).filter(Boolean);
            }
          }
        }
      } catch(e) {}
    }));

    const nodes = rawNodes.map(n => ({ ...n, isTag: false }));

    if (!nodes.length) {
      svg.innerHTML = '<text x="50%" y="50%" text-anchor="middle" fill="#aaa" font-size="13" dy=".3em">노트가 없습니다</text>';
      return;
    }

    // ── 태그 독립 노드 생성 ──
    const allTags = new Set();
    nodes.forEach(n => (n.tags||[]).forEach(t => allTags.add(t)));
    const tagNodes = [...allTags].map(t => ({
      id: '__tag__' + t, name: t, path: null, folder: '__tag__', tags: [], isTag: true
    }));
    const allNodes = [...nodes, ...tagNodes];

    // ── 링크: 폴더 기반(folder) + 태그 기반(tag) ──
    const links = [];
    const linkSet = new Set();
    const addLink = (a, b, type) => {
      const key = [a,b].sort().join('||') + '|' + type;
      if (!linkSet.has(key)) { linkSet.add(key); links.push({ source: a, target: b, type }); }
    };
    // 같은 폴더끼리 연결
    const folderMap = {};
    nodes.forEach(n => { if(!folderMap[n.folder]) folderMap[n.folder]=[]; folderMap[n.folder].push(n.id); });
    Object.values(folderMap).forEach(ids => {
      for (let i = 0; i < ids.length-1; i++) addLink(ids[i], ids[i+1], 'folder');
    });
    // 파일 → 태그 노드 연결
    nodes.forEach(n => {
      (n.tags||[]).forEach(t => {
        addLink(n.id, '__tag__' + t, 'tag');
      });
    });

    drawGraph(svg, allNodes, links);
    document.getElementById('graph-wrap').classList.add('loaded');
    // 버튼 아이콘 현재 스타일로 동기화
    const sb = document.getElementById('graph-style-btn');
    if (sb) { sb.textContent = _graphStyles[_graphStyle]; sb.title = _graphLabels[_graphStyle]; }
  } catch(e) {
    svg.innerHTML = `<text x="50%" y="50%" text-anchor="middle" fill="#e74c3c" font-size="12" dy=".3em">⚠️ GitHub 연결 실패: ${escHtml(e.message)}</text>`;
  }
}

/* ── 그래프 스타일 관리 ── */
let _graphStyle = 3; // 0=은하수 1=포스 2=버블 3=지구본
const _graphStyles = ['🌌','🕸','🔵','🌍'];
const _graphLabels = ['은하수','포스그래프','버블차트','3D지구본'];
let _graphNodes = null, _graphLinks = null;

function cycleGraphStyle() {
  _graphStyle = (_graphStyle + 1) % 4;
  const btn = document.getElementById('graph-style-btn');
  if (btn) {
    btn.textContent = _graphStyles[_graphStyle];
    btn.title = _graphLabels[_graphStyle];
  }
  const svgEl = document.getElementById('obs-graph');
  if (svgEl && _graphNodes) drawGraph(svgEl, _graphNodes, _graphLinks);
}

function drawGraph(svgEl, nodes, links) {
  // 노드/링크 저장 (스타일 전환용)
  _graphNodes = nodes; _graphLinks = links;

  if (_graphStyle === 0) drawGalaxy(svgEl, nodes, links);
  else if (_graphStyle === 1) drawForce(svgEl, nodes, links);
  else if (_graphStyle === 2) drawBubble(svgEl, nodes, links);
  else drawGlobe(svgEl, nodes, links);
}

/* ════════════════════════════════
   🌌 은하수 스타일
════════════════════════════════ */
function drawGalaxy(svgEl, nodes, links) {
  if(window._globeRAF){cancelAnimationFrame(window._globeRAF);window._globeRAF=null;}
  if(window._kaTimer){clearTimeout(window._kaTimer);window._kaTimer=null;}
  graphPaused=false; graphSim=null;

  const wrap=svgEl.parentElement;
  const W=wrap.offsetWidth||900, H=wrap.offsetHeight||600;
  const tooltip=document.getElementById('graph-tooltip');

  const PALETTE=['#7eb8f7','#fbbf67','#f9a8d4','#a78bfa','#67e8f9','#86efac','#fca5a5','#6ee7b7','#fdba74','#c4b5fd'];
  const TAG_CLR='#4ade80';
  const fileFolders=[...new Set(nodes.filter(n=>!n.isTag).map(n=>n.folder))];
  const folderColor=d3.scaleOrdinal(PALETTE).domain(fileFolders);
  const nodeColor=d=>d.isTag?TAG_CLR:folderColor(d.folder);

  const svg=d3.select(svgEl).attr('width',W).attr('height',H);
  svg.selectAll('*').remove();
  const defs=svg.append('defs');

  // 고정 배경색
  const bgGr=defs.append('radialGradient').attr('id','gx-bg').attr('cx','50%').attr('cy','50%');
  bgGr.append('stop').attr('offset','0%').attr('stop-color','#0a0f2e');
  bgGr.append('stop').attr('offset','100%').attr('stop-color','#020408');
  svg.append('rect').attr('width',W).attr('height',H).attr('fill','url(#gx-bg)');

  // 은하 중심 글로우 그라디언트
  const cGr=defs.append('radialGradient').attr('id','gx-core').attr('cx','50%').attr('cy','50%');
  cGr.append('stop').attr('offset','0%').attr('stop-color','rgba(160,120,255,0.3)');
  cGr.append('stop').attr('offset','100%').attr('stop-color','rgba(0,0,0,0)');

  const mkGlow=(id,blur)=>{
    const f=defs.append('filter').attr('id',id).attr('x','-80%').attr('y','-80%').attr('width','260%').attr('height','260%');
    f.append('feGaussianBlur').attr('in','SourceGraphic').attr('stdDeviation',blur).attr('result','blur');
    const m=f.append('feMerge');m.append('feMergeNode').attr('in','blur');m.append('feMergeNode').attr('in','SourceGraphic');
  };
  mkGlow('gx-nf',2.5);mkGlow('gx-nt',4.5);mkGlow('gx-arm',8);

  // 줌 레이어 (배경+별+콘텐츠 전부 여기 안에)
  const g=svg.append('g');
  const zoom=d3.zoom().scaleExtent([0.2,8]).on('zoom',e=>g.attr('transform',e.transform));
  svg.call(zoom); graphZoom=zoom; graphSvg=svg;

  // 배경 별 (줌과 함께 움직임)
  g.append('rect').attr('x',-W).attr('y',-H).attr('width',W*3).attr('height',H*3).attr('fill','url(#gx-bg)').attr('pointer-events','none');
  for(let i=0;i<280;i++){
    g.append('circle')
      .attr('cx',(Math.sin(i*127.1)*0.5+0.5)*W*1.5-W*0.25)
      .attr('cy',(Math.sin(i*311.7)*0.5+0.5)*H*1.5-H*0.25)
      .attr('r',(Math.sin(i*57.3)*0.5+0.5)*1.3+0.15)
      .attr('fill','white').attr('opacity',(Math.sin(i*93.1)*0.5+0.5)*0.55+0.06)
      .attr('pointer-events','none');
  }
  // 은하 중심 글로우
  g.append('ellipse').attr('cx',W/2).attr('cy',H/2).attr('rx',W*0.35).attr('ry',H*0.22).attr('fill','url(#gx-core)').attr('pointer-events','none');

  const CX=W/2, CY=H/2, MAX_R=Math.min(W,H)*0.44;
  const numArms=Math.max(fileFolders.length,1);

  // 나선팔 노드 배치
  const folderCnt={},folderIdx2={};
  nodes.filter(n=>!n.isTag).forEach(n=>{folderCnt[n.folder]=(folderCnt[n.folder]||0)+1;});
  nodes.forEach(n=>{
    if(n.isTag)return;
    const ai=fileFolders.indexOf(n.folder);
    folderIdx2[n.folder]=folderIdx2[n.folder]||0;
    const idx=folderIdx2[n.folder]++,total=folderCnt[n.folder];
    const armOffset=(2*Math.PI*ai)/numArms;
    const t=0.35+(idx/Math.max(total-1,1))*0.6;
    const r=MAX_R*t,theta=armOffset+t*2.8+(idx%3-1)*0.18;
    const spread=MAX_R*0.045*(1+t),perpAngle=theta+Math.PI/2;
    const scatter=(((idx*7+ai*13)%17)/17-0.5)*spread;
    n._px=CX+r*Math.cos(theta)+scatter*Math.cos(perpAngle);
    n._py=CY+r*Math.sin(theta)*0.55+scatter*Math.sin(perpAngle)*0.55;
  });
  const tagNodes=nodes.filter(n=>n.isTag);
  tagNodes.forEach((n,i)=>{
    const angle=(2*Math.PI*i)/Math.max(tagNodes.length,1)-Math.PI/2;
    n._px=CX+MAX_R*0.18*Math.cos(angle);n._py=CY+MAX_R*0.18*Math.sin(angle)*0.55;
  });

  // 나선팔 배경선 (줌 레이어 안)
  fileFolders.forEach((fol,ai)=>{
    const pts=[];
    for(let t=0;t<=1;t+=0.02){
      const ao=(2*Math.PI*ai)/numArms,th=ao+(0.3+t*0.65)*2.8,r=MAX_R*(0.3+t*0.65);
      pts.push([CX+r*Math.cos(th),CY+r*Math.sin(th)*0.55]);
    }
    const lg=d3.line().x(d=>d[0]).y(d=>d[1]).curve(d3.curveCatmullRom);
    g.append('path').attr('d',lg(pts)).attr('fill','none').attr('stroke',folderColor(fol)).attr('stroke-width',18).attr('stroke-opacity',0.12).attr('filter','url(#gx-arm)').attr('pointer-events','none');
    g.append('path').attr('d',lg(pts)).attr('fill','none').attr('stroke',folderColor(fol)).attr('stroke-width',1.5).attr('stroke-opacity',0.35).attr('pointer-events','none');
  });

  const lc={}; nodes.forEach(n=>{lc[n.id]=0;});
  links.forEach(l=>{const s=typeof l.source==='object'?l.source.id:l.source,t=typeof l.target==='object'?l.target.id:l.target;if(lc[s]!=null)lc[s]++;if(lc[t]!=null)lc[t]++;});
  const nodeR=d=>d.isTag?Math.max(5,Math.min(5+(lc[d.id]||0)*2.5,20)):Math.max(4,Math.min(4+(lc[d.id]||0)*1.2,15));

  const nodeById={}; nodes.forEach(n=>{nodeById[n.id]=n;});
  const linkData=links.map(l=>({src:nodeById[typeof l.source==='object'?l.source.id:l.source],tgt:nodeById[typeof l.target==='object'?l.target.id:l.target],type:l.type})).filter(l=>l.src&&l.tgt);

  const linkLayer=g.append('g');
  const linkEls=linkData.map(l=>linkLayer.append('line').attr('stroke',l.type==='tag'?'rgba(74,222,128,0.4)':'rgba(160,190,255,0.12)').attr('stroke-width',l.type==='tag'?1:0.6).attr('stroke-dasharray',l.type==='tag'?'4,3':'none').attr('x1',l.src._px).attr('y1',l.src._py).attr('x2',l.tgt._px).attr('y2',l.tgt._py));

  const nodeLayer=g.append('g');
  nodes.forEach(n=>{

/* ════════════════════════════════
   🕸 포스 그래프
════════════════════════════════ */
function drawForce(svgEl, nodes, links) {
  if(window._globeRAF){cancelAnimationFrame(window._globeRAF);window._globeRAF=null;}
  if(window._kaTimer){clearTimeout(window._kaTimer);window._kaTimer=null;}
  graphPaused=false;

  const wrap=svgEl.parentElement;
  const W=wrap.offsetWidth||900, H=wrap.offsetHeight||600;
  const tooltip=document.getElementById('graph-tooltip');

  const PALETTE=['#7eb8f7','#fbbf67','#f9a8d4','#a78bfa','#67e8f9','#86efac','#fca5a5','#6ee7b7','#fdba74','#c4b5fd'];
  const TAG_CLR='#4ade80';
  const fileFolders=[...new Set(nodes.filter(n=>!n.isTag).map(n=>n.folder))];
  const folderColor=d3.scaleOrdinal(PALETTE).domain(fileFolders);
  const nodeColor=d=>d.isTag?TAG_CLR:folderColor(d.folder);

  const svg=d3.select(svgEl).attr('width',W).attr('height',H);
  svg.selectAll('*').remove();
  const defs=svg.append('defs');
  svg.append('rect').attr('width',W).attr('height',H).attr('fill','#07111f');
  const mkGlow=(id,blur)=>{const f=defs.append('filter').attr('id',id).attr('x','-80%').attr('y','-80%').attr('width','260%').attr('height','260%');f.append('feGaussianBlur').attr('in','SourceGraphic').attr('stdDeviation',blur).attr('result','blur');const m=f.append('feMerge');m.append('feMergeNode').attr('in','blur');m.append('feMergeNode').attr('in','SourceGraphic');};
  mkGlow('ff-nf',2.5);mkGlow('ff-nt',4.5);mkGlow('ff-af',18);

  const lc={}; nodes.forEach(n=>{lc[n.id]=0;});
  links.forEach(l=>{const s=typeof l.source==='object'?l.source.id:l.source,t=typeof l.target==='object'?l.target.id:l.target;if(lc[s]!=null)lc[s]++;if(lc[t]!=null)lc[t]++;});
  const nodeR=d=>d.isTag?Math.max(5,Math.min(5+(lc[d.id]||0)*2.5,20)):Math.max(5,Math.min(5+(lc[d.id]||0)*1.3,18));

  const clusterR=Math.min(W,H)*0.30;
  const clusterCenter={};
  fileFolders.forEach((fol,i)=>{
    const angle=(2*Math.PI*i)/fileFolders.length-Math.PI/2;
    clusterCenter[fol]={x:W/2+clusterR*Math.cos(angle),y:H/2+clusterR*Math.sin(angle)};
  });

  const sim=d3.forceSimulation(nodes)
    .force('link',d3.forceLink(links).id(d=>d.id).distance(l=>l.type==='tag'?55:45).strength(l=>l.type==='tag'?0.3:0.7))
    .force('charge',d3.forceManyBody().strength(d=>d.isTag?-80:-160).distanceMax(300))
    .force('center',d3.forceCenter(W/2,H/2).strength(0.015))
    .force('collision',d3.forceCollide(d=>nodeR(d)+12).strength(0.85))
    .force('cluster-x',d3.forceX(d=>d.isTag?W/2:(clusterCenter[d.folder]?.x??W/2)).strength(d=>d.isTag?0.03:0.22))
    .force('cluster-y',d3.forceY(d=>d.isTag?H/2:(clusterCenter[d.folder]?.y??H/2)).strength(d=>d.isTag?0.03:0.22))
    .alphaMin(0.002).alphaDecay(0.008).velocityDecay(0.38);
  graphSim=sim;

  function keepAlive(){if(graphPaused)return;if(sim.alpha()<0.012)sim.alpha(0.05).restart();window._kaTimer=setTimeout(keepAlive,2500);}
  keepAlive();

  const g=svg.append('g');
  const zoom=d3.zoom().scaleExtent([0.15,10]).on('zoom',e=>g.attr('transform',e.transform));
  svg.call(zoom); graphZoom=zoom; graphSvg=svg;

  // 클러스터 영역 원
  const areaCircles={};
  fileFolders.forEach(fol=>{
    const ci=g.append('circle').attr('r',60).attr('fill',folderColor(fol)).attr('fill-opacity',0.04).attr('stroke',folderColor(fol)).attr('stroke-width',1.5).attr('stroke-opacity',0.2).attr('stroke-dasharray','6,4').attr('filter','url(#ff-af)');
    areaCircles[fol]=ci;
    areaCircles[fol+'_lbl']=g.append('text').attr('text-anchor','middle').attr('font-size','11px').attr('font-weight','700').attr('fill',folderColor(fol)).attr('fill-opacity',0.55).attr('pointer-events','none').text(fol);
  });

  const nodeById={}; nodes.forEach(n=>{nodeById[n.id]=n;});
  const linkData=links.map(l=>({src:nodeById[typeof l.source==='object'?l.source.id:l.source],tgt:nodeById[typeof l.target==='object'?l.target.id:l.target],type:l.type})).filter(l=>l.src&&l.tgt);

  const linkLayer=g.append('g');
  const linkEls=linkData.map(l=>linkLayer.append('line').attr('stroke',l.type==='tag'?'rgba(74,222,128,0.4)':'rgba(160,195,255,0.14)').attr('stroke-width',l.type==='tag'?1:0.6).attr('stroke-dasharray',l.type==='tag'?'4,3':'none').attr('stroke-linecap','round'));

  const nodeLayer=g.append('g');
  nodes.forEach(n=>{
    const ng=nodeLayer.append('g').style('cursor',n.isTag?'default':'pointer')
      .call(d3.drag().on('start',(e,d)=>{if(!e.active)sim.alphaTarget(0.25).restart();d.fx=d.x;d.fy=d.y;}).on('drag',(e,d)=>{d.fx=e.x;d.fy=e.y;}).on('end',(e,d)=>{if(!e.active)sim.alphaTarget(0);d.fx=null;d.fy=null;}));
    ng.append('circle').attr('class','nhalo').attr('r',nodeR(n)+(n.isTag?7:5)).attr('fill','none').attr('stroke',nodeColor(n)).attr('stroke-width',n.isTag?1.5:0.9).attr('stroke-opacity',n.isTag?0.45:0.2);
    ng.append('circle').attr('class','nbody').datum(n).attr('r',nodeR(n)).attr('fill',nodeColor(n)).attr('fill-opacity',n.isTag?0.95:0.88).attr('filter',`url(#${n.isTag?'ff-nt':'ff-nf'})`);
    if(n.isTag){const r2=nodeR(n)*0.5;ng.append('polygon').attr('points',`0,${-r2} ${r2},0 0,${r2} ${-r2},0`).attr('fill','#56d364').attr('fill-opacity',0.65).attr('pointer-events','none');}
    ng.append('text').attr('x',nodeR(n)+5).attr('dy','0.35em').attr('font-size',n.isTag?'9.5px':'10px').attr('fill',n.isTag?'rgba(74,222,128,0.92)':'rgba(210,225,255,0.85)').attr('pointer-events','none').text(n.name.length>16?n.name.slice(0,16)+'…':n.name);
    _attachNodeEvents(ng,n,nodeR,nodeColor,lc,links,linkData,linkEls,nodeLayer,tooltip,nodeById);
  });

  sim.on('tick',()=>{
    linkEls.forEach((line,i)=>{const l=linkData[i];line.attr('x1',l.src.x).attr('y1',l.src.y).attr('x2',l.tgt.x).attr('y2',l.tgt.y);});
    let ni=0; nodeLayer.selectAll('g').each(function(){if(nodes[ni])d3.select(this).attr('transform',`translate(${nodes[ni].x||0},${nodes[ni].y||0})`);ni++;});
    fileFolders.forEach(fol=>{
      const fn=nodes.filter(n=>!n.isTag&&n.folder===fol&&n.x&&n.y);
      if(!fn.length)return;
      const mx=d3.mean(fn,d=>d.x),my=d3.mean(fn,d=>d.y);
      const r=Math.max(40,(d3.max(fn,d=>Math.hypot(d.x-mx,d.y-my))||0)+30);
      areaCircles[fol].attr('cx',mx).attr('cy',my).attr('r',r);
      areaCircles[fol+'_lbl']?.attr('x',mx).attr('y',my-r-8);
    });
  });
  svg.on('click',()=>{tooltip.style.display='none';});
}

/* ════════════════════════════════
   🔵 버블 차트
════════════════════════════════ */
function drawBubble(svgEl, nodes, links) {
  if(window._globeRAF){cancelAnimationFrame(window._globeRAF);window._globeRAF=null;}
  if(window._kaTimer){clearTimeout(window._kaTimer);window._kaTimer=null;}
  graphPaused=false;

  const wrap=svgEl.parentElement;
  const W=wrap.offsetWidth||900, H=wrap.offsetHeight||600;
  const tooltip=document.getElementById('graph-tooltip');

  const PALETTE=['#7eb8f7','#fbbf67','#f9a8d4','#a78bfa','#67e8f9','#86efac','#fca5a5','#6ee7b7','#fdba74','#c4b5fd'];

  const fileFolders=[...new Set(nodes.filter(n=>!n.isTag).map(n=>n.folder))];
  const folderColor=d3.scaleOrdinal(PALETTE).domain(fileFolders);
  const nodeColor=d=>d.isTag?TAG_CLR:folderColor(d.folder);

  const svg=d3.select(svgEl).attr('width',W).attr('height',H);
  svg.selectAll('*').remove();
  const defs=svg.append('defs');
  const bgGr=defs.append('radialGradient').attr('id','bb-bg').attr('cx','50%').attr('cy','50%');
  bgGr.append('stop').attr('offset','0%').attr('stop-color','#0a1120');
  bgGr.append('stop').attr('offset','100%').attr('stop-color','#04080f');
  svg.append('rect').attr('width',W).attr('height',H).attr('fill','url(#bb-bg)');
  const mkGlow=(id,blur)=>{const f=defs.append('filter').attr('id',id).attr('x','-80%').attr('y','-80%').attr('width','260%').attr('height','260%');f.append('feGaussianBlur').attr('in','SourceGraphic').attr('stdDeviation',blur).attr('result','blur');const m=f.append('feMerge');m.append('feMergeNode').attr('in','blur');m.append('feMergeNode').attr('in','SourceGraphic');};
  mkGlow('bb-nf',2.5);mkGlow('bb-nt',5);mkGlow('bb-bf',22);

  const lc={}; nodes.forEach(n=>{lc[n.id]=0;});
  links.forEach(l=>{const s=typeof l.source==='object'?l.source.id:l.source,t=typeof l.target==='object'?l.target.id:l.target;if(lc[s]!=null)lc[s]++;if(lc[t]!=null)lc[t]++;});
  const nodeR=d=>d.isTag?Math.max(5,Math.min(5+(lc[d.id]||0)*2.5,20)):Math.max(5,Math.min(5+(lc[d.id]||0)*1.3,18));

  const folderNodeCnt={};
  fileFolders.forEach(f=>{folderNodeCnt[f]=nodes.filter(n=>!n.isTag&&n.folder===f).length;});

  // D3 pack
  const packRoot=d3.hierarchy({id:'root',children:fileFolders.map(fol=>({id:fol,value:folderNodeCnt[fol]||1}))}).sum(d=>d.value||0);
  d3.pack().size([W*0.9,H*0.88]).padding(18)(packRoot);
  const bubblePos={};
  (packRoot.children||[]).forEach(c=>{bubblePos[c.data.id]={x:c.x+W*0.05,y:c.y+H*0.06,r:c.r};});

  // 버블 그리기
  const bubbleG=svg.append('g');
  fileFolders.forEach(fol=>{
    const bp=bubblePos[fol]; if(!bp)return;
    const ci=folderColor(fol);
    const gid='bb-gr-'+fol.replace(/[^a-z0-9]/gi,'_');
    const gr=defs.append('radialGradient').attr('id',gid).attr('cx','38%').attr('cy','35%');
    gr.append('stop').attr('offset','0%').attr('stop-color',ci).attr('stop-opacity','0.16');
    gr.append('stop').attr('offset','100%').attr('stop-color',ci).attr('stop-opacity','0.04');
    bubbleG.append('circle').attr('cx',bp.x).attr('cy',bp.y).attr('r',bp.r+10).attr('fill','none').attr('stroke',ci).attr('stroke-width',1).attr('stroke-opacity',0.15).attr('filter','url(#bb-bf)');
    bubbleG.append('circle').attr('cx',bp.x).attr('cy',bp.y).attr('r',bp.r).attr('fill',`url(#${gid})`).attr('stroke',ci).attr('stroke-width',1.2).attr('stroke-opacity',0.35);
    bubbleG.append('text').attr('x',bp.x).attr('y',bp.y-bp.r+18).attr('text-anchor','middle').attr('font-size','12px').attr('font-weight','700').attr('fill',ci).attr('fill-opacity',0.75).attr('pointer-events','none').text(fol.length>16?fol.slice(0,16)+'…':fol);
    bubbleG.append('text').attr('x',bp.x).attr('y',bp.y+bp.r-10).attr('text-anchor','middle').attr('font-size','10px').attr('fill',ci).attr('fill-opacity',0.4).attr('pointer-events','none').text(folderNodeCnt[fol]+'개');
  });

  // 노드 배치
  const folderI2={};
  nodes.forEach(n=>{
    if(n.isTag){const ti=nodes.filter(x=>x.isTag).indexOf(n);const tagR=Math.min(50,nodes.filter(x=>x.isTag).length*8);const angle=(2*Math.PI*ti)/Math.max(nodes.filter(x=>x.isTag).length,1)-Math.PI/2;n._px=W/2+tagR*Math.cos(angle);n._py=H/2+tagR*Math.sin(angle);return;}
    const bp=bubblePos[n.folder]; if(!bp){n._px=W/2;n._py=H/2;return;}
    const total=folderNodeCnt[n.folder];
    folderI2[n.folder]=folderI2[n.folder]||0;
    const idx=folderI2[n.folder]++;
    if(total===1){n._px=bp.x;n._py=bp.y;return;}
    const rings=Math.ceil(Math.sqrt(total/Math.PI));
    let placed=0,found=false;
    for(let ring=1;ring<=rings+2&&!found;ring++){
      const perRing=Math.round(2*Math.PI*ring*2.2);
      for(let j=0;j<perRing&&placed<total&&!found;j++,placed++){
        if(placed===idx){const angle=(2*Math.PI*j)/perRing,rr=(ring/(rings+1))*(bp.r*0.78);n._px=bp.x+rr*Math.cos(angle);n._py=bp.y+rr*Math.sin(angle);found=true;}
      }
    }
    if(!found){n._px=bp.x;n._py=bp.y;}
  });

  const sim=d3.forceSimulation(nodes)
    .force('link',d3.forceLink(links).id(d=>d.id).distance(l=>l.type==='tag'?60:30).strength(l=>l.type==='tag'?0.2:0.5))
    .force('charge',d3.forceManyBody().strength(d=>d.isTag?-50:-90).distanceMax(200))
    .force('collision',d3.forceCollide(d=>nodeR(d)+8).strength(0.9))
    .force('bubble-x',d3.forceX(d=>d.isTag?W/2:(bubblePos[d.folder]?.x??W/2)).strength(d=>d.isTag?0.05:0.35))
    .force('bubble-y',d3.forceY(d=>d.isTag?H/2:(bubblePos[d.folder]?.y??H/2)).strength(d=>d.isTag?0.05:0.35))
    .alphaMin(0.002).alphaDecay(0.012).velocityDecay(0.45);
  graphSim=sim;

  const g=svg.append('g');
  const zoom=d3.zoom().scaleExtent([0.2,10]).on('zoom',e=>{bubbleG.attr('transform',e.transform);g.attr('transform',e.transform);});
  svg.call(zoom); graphZoom=zoom; graphSvg=svg;

  const nodeById={}; nodes.forEach(n=>{nodeById[n.id]=n;});
  const linkData=links.map(l=>({src:nodeById[typeof l.source==='object'?l.source.id:l.source],tgt:nodeById[typeof l.target==='object'?l.target.id:l.target],type:l.type})).filter(l=>l.src&&l.tgt);
  const linkLayer=g.append('g');
  const linkEls=linkData.map(l=>linkLayer.append('line').attr('stroke',l.type==='tag'?'rgba(74,222,128,0.45)':'rgba(160,195,255,0.15)').attr('stroke-width',l.type==='tag'?1:0.6).attr('stroke-dasharray',l.type==='tag'?'4,3':'none').attr('stroke-linecap','round'));

  const nodeLayer=g.append('g');
  nodes.forEach(n=>{
    const ng=nodeLayer.append('g').style('cursor',n.isTag?'default':'pointer')
      .call(d3.drag().on('start',(e,d)=>{if(!e.active)sim.alphaTarget(0.2).restart();d.fx=d.x;d.fy=d.y;}).on('drag',(e,d)=>{d.fx=e.x;d.fy=e.y;}).on('end',(e,d)=>{if(!e.active)sim.alphaTarget(0);d.fx=null;d.fy=null;}));
    ng.append('circle').attr('class','nhalo').attr('r',nodeR(n)+(n.isTag?7:4)).attr('fill','none').attr('stroke',nodeColor(n)).attr('stroke-width',n.isTag?1.5:0.8).attr('stroke-opacity',n.isTag?0.5:0.2);
    ng.append('circle').attr('class','nbody').datum(n).attr('r',nodeR(n)).attr('fill',nodeColor(n)).attr('fill-opacity',n.isTag?0.95:0.88).attr('filter',`url(#${n.isTag?'bb-nt':'bb-nf'})`);
    if(n.isTag){const r2=nodeR(n)*0.5;ng.append('polygon').attr('points',`0,${-r2} ${r2},0 0,${r2} ${-r2},0`).attr('fill','#56d364').attr('fill-opacity',0.65).attr('pointer-events','none');}
    ng.append('text').attr('x',nodeR(n)+5).attr('dy','0.35em').attr('font-size',n.isTag?'9.5px':'10px').attr('fill',n.isTag?'rgba(74,222,128,0.92)':'rgba(210,225,255,0.88)').attr('pointer-events','none').text(n.name.length>16?n.name.slice(0,16)+'…':n.name);
    _attachNodeEvents(ng,n,nodeR,nodeColor,lc,links,linkData,linkEls,nodeLayer,tooltip,nodeById);
  });

  sim.on('tick',()=>{
    linkEls.forEach((line,i)=>{const l=linkData[i];line.attr('x1',l.src.x).attr('y1',l.src.y).attr('x2',l.tgt.x).attr('y2',l.tgt.y);});
    let ni=0;nodeLayer.selectAll('g').each(function(){if(nodes[ni])d3.select(this).attr('transform',`translate(${nodes[ni].x||0},${nodes[ni].y||0})`);ni++;});
  });
  svg.on('click',()=>{tooltip.style.display='none';});
