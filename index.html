<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SBJ DNX 내부 자료 포털</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.2.0/github-markdown.min.css">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif; display:flex; flex-direction:column; min-height:100vh; }

/* ── 네비게이션 ── */
.navbar {
  background:#2c3e50; color:white;
  display:flex; align-items:center;
  padding:0 20px; height:56px;
  position:sticky; top:0; z-index:100;
  box-shadow:0 2px 8px rgba(0,0,0,.3);
}
.navbar-brand { font-size:18px; font-weight:bold; margin-right:30px; white-space:nowrap; }
.navbar-menu  { display:flex; align-items:center; gap:4px; flex:1; overflow-x:auto; }
.navbar-menu::-webkit-scrollbar { display:none; }

/* ── 메뉴 버튼 ── */
.nav-item { position:relative; }
.nav-btn {
  display:flex; align-items:center; gap:6px;
  padding:8px 14px; cursor:pointer;
  border-radius:6px; font-size:14px; color:white;
  white-space:nowrap; user-select:none;
  background:none; border:none;
}
.nav-btn:hover { background:#3d5166; }
.nav-btn.open  { background:#3d5166; }
.nav-btn .arrow { font-size:10px; transition:transform .2s; display:inline-block; }
.nav-btn.open .arrow { transform:rotate(180deg); }

/* ── 드롭다운 ── */
.dropdown {
  display:none;
  position:fixed;
  background:#2c3e50; min-width:200px;
  border-radius:8px; box-shadow:0 8px 24px rgba(0,0,0,.3);
  z-index:99999; max-height:70vh; overflow-y:auto;
  scrollbar-width:thin; scrollbar-color:#4a6280 #2c3e50;
}
.dropdown.open { display:block !important; }
.dropdown::-webkit-scrollbar { width:4px; }
.dropdown::-webkit-scrollbar-thumb { background:#4a6280; border-radius:2px; }
.dd-item {
  padding:10px 16px; cursor:pointer; font-size:13px;
  color:rgba(255,255,255,.85);
  border-bottom:1px solid rgba(255,255,255,.05);
}
.dd-item:last-child { border-bottom:none; }
.dd-item:hover  { background:#3498db; color:white; }
.dd-item.active { color:#f39c12; font-weight:bold; }
.dd-folder {
  padding:6px 16px 4px; font-size:11px;
  color:rgba(255,255,255,.4); text-transform:uppercase;
  letter-spacing:.5px; background:rgba(0,0,0,.15);
  border-bottom:1px solid rgba(255,255,255,.05); cursor:pointer;
}

/* ── 콘텐츠 ── */
.content { flex:1; overflow-y:auto; background:white; }
.content.markdown-body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif; font-size:16px; line-height:1.6; color:#24292e; }
.file-inner { padding:32px 60px; }
.breadcrumb { font-size:12px; color:#999; margin-bottom:15px; padding-bottom:10px; border-bottom:1px solid #eee; }
.loading { text-align:center; padding:40px; color:#999; }
.loading-spinner { border:4px solid #f3f3f3; border-top:4px solid #3498db; border-radius:50%; width:40px; height:40px; animation:spin 1s linear infinite; margin:20px auto; }
@keyframes spin { to { transform:rotate(360deg); } }
.err { background:#fee; border:1px solid #fcc; color:#c33; padding:15px; border-radius:5px; margin:20px 0; }

/* ── 햄버거 ── */
.hamburger { display:none; background:none; border:none; color:white; font-size:22px; cursor:pointer; margin-left:auto; padding:4px 8px; }
.mobile-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:1500; }
.mobile-overlay.show { display:block; }
.mobile-drawer { position:fixed; top:0; right:-280px; width:260px; height:100vh; background:#2c3e50; color:white; z-index:1800; transition:right .3s; overflow-y:auto; padding:60px 0 20px; }
.mobile-drawer.open { right:0; }
.drawer-close { position:absolute; top:14px; right:14px; background:none; border:none; color:white; font-size:22px; cursor:pointer; }
.drawer-section { padding:10px 0; border-bottom:1px solid rgba(255,255,255,.08); }
.drawer-section-title { padding:8px 20px 4px; font-size:11px; color:rgba(255,255,255,.4); text-transform:uppercase; letter-spacing:.5px; }
.drawer-item { padding:11px 24px; cursor:pointer; font-size:14px; color:rgba(255,255,255,.85); }
.drawer-item:hover { background:#3498db; color:white; }

/* ── 히어로 ── */
.hero-section { position:relative; background:linear-gradient(135deg,#0a2342 0%,#1a3a5c 50%,#0d3b6e 100%); color:white; padding:64px 60px 48px; min-height:280px; display:flex; align-items:center; overflow:hidden; }
.hero-section::before { content:''; position:absolute; top:-60px; right:-60px; width:400px; height:400px; background:radial-gradient(circle,rgba(52,152,219,.15) 0%,transparent 70%); pointer-events:none; }
.hero-inner { position:relative; z-index:1; max-width:800px; }
.hero-tag { display:inline-block; font-size:11px; font-weight:600; letter-spacing:2px; text-transform:uppercase; color:#64b5f6; border:1px solid rgba(100,181,246,.4); padding:4px 12px; border-radius:20px; margin-bottom:20px; }
.hero-title { font-size:36px; font-weight:700; line-height:1.25; margin-bottom:14px; }
.hero-title span { color:#64b5f6; }
.hero-subtitle { font-size:14px; color:rgba(255,255,255,.6); line-height:1.7; max-width:520px; }
.hero-deco { position:absolute; right:60px; top:50%; transform:translateY(-50%); display:flex; flex-direction:column; gap:10px; opacity:.12; }
.hero-deco-line { height:2px; background:white; border-radius:2px; }

/* ── 통계 바 ── */
.stats-bar { background:#f5f7fa; border-bottom:1px solid #e8edf2; padding:14px 60px; display:flex; align-items:center; gap:40px; }
.stats-bar-label { font-size:11px; color:#999; font-weight:600; letter-spacing:1px; text-transform:uppercase; white-space:nowrap; }
.stats-bar-items { display:flex; gap:32px; flex:1; }
.stats-bar-item { display:flex; align-items:center; gap:8px; font-size:12px; color:#666; }
.stats-bar-num { font-size:16px; font-weight:700; color:#1a3a5c; }
.stats-bar-reset { font-size:11px; color:#e74c3c; cursor:pointer; border:1px solid #fcc; background:#fff5f5; padding:4px 10px; border-radius:4px; white-space:nowrap; }
.stats-bar-reset:hover { background:#fee; }

/* ── 로그 ── */
.main-content { padding:40px 60px; }
.section-title { font-size:13px; font-weight:700; color:#1a3a5c; letter-spacing:1px; text-transform:uppercase; border-left:3px solid #3498db; padding-left:10px; margin-bottom:14px; }
.log-table-wrap { border:1px solid #e8edf2; border-radius:8px; overflow:hidden; margin-bottom:28px; }
.log-scroll { max-height:160px; overflow-y:auto; }
.log-table { width:100%; border-collapse:collapse; font-size:12px; }
.log-table th { background:#f5f7fa; color:#888; font-weight:600; padding:9px 14px; text-align:left; border-bottom:1px solid #e8edf2; }
.log-table td { padding:9px 14px; border-bottom:1px solid #f0f3f6; color:#444; }
.log-table tr:last-child td { border-bottom:none; }
.log-empty { padding:20px; text-align:center; color:#bbb; font-size:12px; }
.two-col { display:grid; grid-template-columns:1fr 1fr; gap:28px; }

/* ── 옵시디안 그래프 ── */
.graph-wrap { border:1px solid #e8edf2; border-radius:8px; overflow:hidden; margin-bottom:28px; background:#1a1a2e; position:relative; }
.graph-wrap svg { display:block; width:100%; height:340px; }
.graph-node { cursor:pointer; }
.graph-node circle { stroke-width:1.5; transition:r .2s; }
.graph-node:hover circle { r:7; }
.graph-node text { font-size:10px; fill:#ccc; pointer-events:none; }
.graph-link { stroke:#3a4a6a; stroke-opacity:0.5; stroke-width:1; }
.graph-controls { position:absolute; top:8px; right:8px; display:flex; gap:4px; }
.graph-btn { background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.2); color:white; padding:4px 8px; border-radius:4px; cursor:pointer; font-size:11px; }
.graph-btn:hover { background:rgba(255,255,255,0.2); }
.graph-tooltip { position:fixed; background:rgba(0,0,0,0.8); color:white; padding:4px 8px; border-radius:4px; font-size:11px; pointer-events:none; display:none; z-index:99999; }

@media (max-width:768px) {
  .navbar-menu { display:none; }
  .hamburger { display:block; }
  .hero-section { padding:40px 20px 36px; min-height:auto; }
  .hero-deco { display:none; }
  .hero-title { font-size:24px; }
  .stats-bar { padding:12px 20px; gap:16px; flex-wrap:wrap; }
  .stats-bar-items { gap:16px; flex-wrap:wrap; }
  .main-content { padding:24px 20px; }
  .two-col { grid-template-columns:1fr; }
  .file-inner { padding:20px 16px; }
}
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
</head>
<body>

<nav class="navbar">
  <div class="navbar-brand">🏦 SBJ DNX</div>
  <div class="navbar-menu" id="navbar-menu"></div>
  <button class="hamburger" onclick="toggleDrawer()">☰</button>
</nav>

<div class="mobile-overlay" id="mobileOverlay" onclick="closeDrawer()"></div>

<div class="content markdown-body" id="content">

</div>

<script>
/* gapi는 나중에 비동기 로드 - 없어도 메뉴는 동작 */
function loadGapi() {
  return new Promise((res) => {
    if (window.gapi) { res(); return; }
    const s = document.createElement('script');
    s.src = 'https://apis.google.com/js/api.js';
    s.onload = res;
    s.onerror = res; // 실패해도 계속 진행
    document.head.appendChild(s);
  });
}
</script>
<script>
const GOOGLE_API_KEY    = 'AIzaSyDOIdawmHgkx2wV04ohDl8_jaDNhOjibdg';
const CLIENT_ID         = '906251648544-lv0g297k3e0ckde767lvritqkmv6eben.apps.googleusercontent.com';
const SERVICE_FOLDER_ID = '19VQbUHcEtMnTMR39ciOYMrS0RCGTAf7b';

// PC: localhost:3000 / 스마트폰: 192.168.50.49:3000 자동 감지
const SERVER_BASE = (location.hostname === 'localhost' || location.hostname === '127.0.0.1')
  ? 'http://localhost:3000'
  : 'http://192.168.50.49:3000';

const menuData = {
  "소개":              { "회사 개요":"company-overview.md", "미션 & 비전":"mission-vision.md", "팀 소개":"team-intro.md" },
  "자료실(구글드라이브)": null,
  "자료실(옵시디안)":    null,
  "문서":              { "사용 설명서":"user-manual.md", "FAQ":"faq.md", "기술 가이드":"tech-guide.md", "📊 다운로드 통계":"STATS" }
};

const contentEl = document.getElementById('content');
let driveInit=false, driveLoaded=false, obsLoaded=false;

/* ── Google Drive ── */
function initGapi() {
  return new Promise(async (res,rej) => {
    if (driveInit) { res(); return; }
    await loadGapi();
    if (!window.gapi) { rej(new Error('gapi 로드 실패')); return; }
    gapi.load('client', async () => {
      try { await gapi.client.init({ apiKey:GOOGLE_API_KEY, discoveryDocs:['https://www.googleapis.com/discovery/v1/apis/drive/v3/rest'] }); driveInit=true; res(); }
      catch(e) { rej(e); }
    });
  });
}
async function fetchDriveFiles(id) {
  await initGapi();
  const r = await gapi.client.drive.files.list({ q:`'${id}' in parents and trashed=false`, pageSize:100, fields:'files(id,name,mimeType)' });
  return r.result.files||[];
}

/* ── 드롭다운 관리 (테스트 파일과 동일한 패턴) ── */
let openId = null;

function closeAll() {
  if (openId === null) return;
  const dd  = document.getElementById('dd-'  + openId);
  const btn = document.getElementById('btn-' + openId);
  if (dd)  dd.classList.remove('open');
  if (btn) btn.classList.remove('open');
  openId = null;
}

document.addEventListener('click', function(e) {
  if (!e.target.closest('.nav-item')) closeAll();
});

/* ── 메뉴 생성 ── */
function renderMenu() {
  const nav    = document.getElementById('navbar-menu');
  const drawer = document.getElementById('mobile-drawer-content');
  let idx = 0;

  for (const [folder, items] of Object.entries(menuData)) {
    const id = idx++;

    const btn = document.createElement('button');
    btn.id = 'btn-' + id;
    btn.className = 'nav-btn';
    btn.innerHTML = `${folder} <span class="arrow">▾</span>`;

    const dd = document.createElement('div');
    dd.id = 'dd-' + id;
    dd.className = 'dropdown';

    btn.addEventListener('click', (function(capturedId, capturedFolder, capturedDd) {
      return async function(e) {
        e.stopPropagation();
        const isOpen = capturedDd.classList.contains('open');
        console.log('[MENU CLICK] folder='+capturedFolder+' isOpen='+isOpen+' ddId='+capturedDd.id);
        document.querySelectorAll('.dropdown').forEach(d => d.classList.remove('open'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('open'));
        openId = null;
        if (!isOpen) {
          // position:fixed 이므로 버튼 위치 계산
          const btnRect = document.getElementById('btn-' + capturedId).getBoundingClientRect();
          capturedDd.style.top  = btnRect.bottom + 4 + 'px';
          capturedDd.style.left = btnRect.left + 'px';
          capturedDd.classList.add('open');
          document.getElementById('btn-' + capturedId).classList.add('open');
          openId = capturedId;
          console.log('[MENU] opened dd classList:', capturedDd.classList.toString());
          if (capturedFolder === '자료실(구글드라이브)' && capturedDd.childElementCount === 0) await populateServiceMenu(capturedDd);
          if (capturedFolder === '자료실(옵시디안)'     && capturedDd.childElementCount === 0) await populateObsidianMenu(capturedDd);
        }
      };
    })(id, folder, dd));

    /* 정적 아이템 */
    if (items) {
      for (const [name, path] of Object.entries(items)) {
        const item = makeDdItem(name, () => {
          closeAll();
          document.querySelectorAll('.dd-item').forEach(i=>i.classList.remove('active'));
          item.classList.add('active');
          loadFile(path, name, folder);
        });
        dd.appendChild(item);
      }
    }

    const ni = document.createElement('div');
    ni.className = 'nav-item';
    ni.appendChild(btn);
    ni.appendChild(dd);
    nav.appendChild(ni);

    /* 모바일 드로어 */
    const sec = document.createElement('div');
    sec.className = 'drawer-section';
    const t = document.createElement('div');
    t.className = 'drawer-section-title';
    t.textContent = folder;
    sec.appendChild(t);
    if (items) {
      for (const [name, path] of Object.entries(items)) {
        const di = document.createElement('div');
        di.className = 'drawer-item';
        di.textContent = name;
        di.addEventListener('click', () => { closeDrawer(); loadFile(path, name, folder); });
        sec.appendChild(di);
      }
    } else {
      const di = document.createElement('div');
      di.className = 'drawer-item';
      di.textContent = '📂 열기...';
      di.addEventListener('click', () => { closeDrawer(); btn.click(); });
      sec.appendChild(di);
    }
    drawer.appendChild(sec);
  }
}

function makeDdItem(text, onClick) {
  const d = document.createElement('div');
  d.className = 'dd-item';
  d.textContent = text;
  d.addEventListener('click', onClick);
  return d;
}

/* ── 구글드라이브 메뉴 ── */
async function populateServiceMenu(dd) {
  dd.innerHTML = '<div class="dd-item">⏳ 불러오는 중...</div>';
  try {
    const files = await fetchDriveFiles(SERVICE_FOLDER_ID);
    dd.innerHTML = '';
    if (!files.length) { dd.innerHTML='<div class="dd-item">(파일 없음)</div>'; return; }

    // 전체 확장/축소 컨트롤바
    const ctrlBar = document.createElement('div');
    ctrlBar.style.cssText = 'display:flex;gap:6px;padding:6px 12px;background:rgba(0,0,0,0.2);border-bottom:1px solid rgba(255,255,255,0.08);';
    const btnExpandG = document.createElement('button');
    btnExpandG.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></svg>';
    btnExpandG.title = '전체 펼치기';
    btnExpandG.style.cssText = 'display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);color:white;padding:4px 8px;border-radius:4px;cursor:pointer;';
    const btnCollapseG = document.createElement('button');
    btnCollapseG.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 14 10 14 10 20"/><polyline points="20 10 14 10 14 4"/><line x1="10" y1="14" x2="3" y2="21"/><line x1="21" y1="3" x2="14" y2="10"/></svg>';
    btnCollapseG.title = '전체 접기';
    btnCollapseG.style.cssText = 'display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);color:white;padding:4px 8px;border-radius:4px;cursor:pointer;';
    btnExpandG.addEventListener('click', (e) => { e.stopPropagation(); dd.querySelectorAll('.folder-list').forEach(l=>l.style.display='block'); dd.querySelectorAll('.folder-arrow').forEach(a=>a.innerHTML='<svg width="10" height="10" viewBox="0 0 16 16" fill="currentColor"><path d="M4 6l4 5 4-5H4z"/></svg>'); });
    btnCollapseG.addEventListener('click', (e) => { e.stopPropagation(); dd.querySelectorAll('.folder-list').forEach(l=>l.style.display='none'); dd.querySelectorAll('.folder-arrow').forEach(a=>a.innerHTML='<svg width="10" height="10" viewBox="0 0 16 16" fill="currentColor"><path d="M6 4l5 4-5 4V4z"/></svg>'); });
    ctrlBar.appendChild(btnExpandG);
    ctrlBar.appendChild(btnCollapseG);
    dd.appendChild(ctrlBar);

    // 파일을 폴더별로 그룹핑
    const grouped = {};
    files.forEach(f => {
      const parts = f.name.split('/');
      const fol = parts.length > 1 ? parts[0] : '파일';
      const name = parts[parts.length - 1];
      if (!grouped[fol]) grouped[fol] = [];
      grouped[fol].push({...f, displayName: name});
    });
    Object.keys(grouped).sort().forEach(fol => {
      const folDiv = document.createElement('div');
      folDiv.className = 'dd-folder';

        if (arrow) arrow.innerHTML = isOpen ? '<svg width="10" height="10" viewBox="0 0 16 16" fill="currentColor"><path d="M6 4l5 4-5 4V4z"/></svg>' : '<svg width="10" height="10" viewBox="0 0 16 16" fill="currentColor"><path d="M4 6l4 5 4-5H4z"/></svg>';

      dd.appendChild(folDiv);
      dd.appendChild(list);

        try {
          await initGapi();

          recordDownload(f.name, f.id);

          contentEl.innerHTML=`<div class="file-inner"><div class="breadcrumb">자료실(구글드라이브) > ${f.name}</div><h2 style="margin-bottom:20px">${f.name}</h2><a href="https://drive.google.com/uc?export=download&id=${f.id}" target="_blank" style="display:inline-block;padding:8px 16px;background:#3498db;color:white;border-radius:4px;text-decoration:none;margin-bottom:20px">⬇️ 다운로드</a>${html}</div>`;
        } catch(e) { contentEl.innerHTML=`<div class="file-inner"><div class="err">❌ ${e.message}</div></div>`; }
      });
        item.style.paddingLeft='28px';
        list.appendChild(item);
      });
    });
  } catch(e) { dd.innerHTML=`<div class="dd-item" style="color:#e74c3c">❌ Drive 오류</div>`; }
}

async function downloadObsidianFile(path, name) {
  try {
    const r = await fetch(`${SERVER_BASE}/api/download/${encodeURIComponent(path)}`);
    if (!r.ok) throw new Error('다운로드 실패');
    const blob = await r.blob();
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href=url; a.download=name;
    document.body.appendChild(a); a.click(); URL.revokeObjectURL(url); a.remove();
    recordDownload(name, path);
  } catch(e) { alert(e.message); }
}

/* ── 파일 로드 ── */
async function loadFile(filePath, itemName, folder) {
  contentEl.innerHTML=`<div class="file-inner"><div class="breadcrumb">${folder} > ${itemName}</div><div class="loading"><div class="loading-spinner"></div></div></div>`;
  if (filePath==='STATS') { renderStats(folder,itemName); return; }
  try {
    const r = await fetch(filePath);
    if (!r.ok) throw new Error(`파일 없음: ${filePath}`);
    const md = await r.text();
    contentEl.className='content markdown-body';
    contentEl.innerHTML=`<div class="file-inner"><div class="breadcrumb">${folder} > ${itemName}</div>${mdToHtml(md)}</div>`;
  } catch(e) {
    contentEl.innerHTML=`<div class="file-inner"><div class="breadcrumb">${folder} > ${itemName}</div><div class="err">❌ ${e.message}</div></div>`;
  }
}

function renderStats(folder, itemName) {
  const stats = JSON.parse(localStorage.getItem('downloadStats')||'[]');
  stats.sort((a,b)=>new Date(b.lastDownload)-new Date(a.lastDownload));
  let html=`<div class="file-inner"><div class="breadcrumb">${folder} > ${itemName}</div><h2>📊 다운로드 통계</h2>`;
  if (!stats.length) { html+='<p style="margin-top:20px;opacity:.6">기록 없음</p>'; }
  else {
    html+='<table style="width:100%;border-collapse:collapse;margin-top:16px"><tr style="background:#f0f0f0"><th style="padding:10px;text-align:left">파일명</th><th style="padding:10px;text-align:center">횟수</th><th style="padding:10px;text-align:left">마지막</th></tr>';
    stats.forEach(s => { html+=`<tr style="border-bottom:1px solid #eee"><td style="padding:10px">${s.fileName}</td><td style="padding:10px;text-align:center;color:#3498db;font-weight:bold">${s.count}회</td><td style="padding:10px;font-size:12px">${s.lastDownload}</td></tr>`; });
    html+='</table>';
  }
  contentEl.innerHTML=html+'</div>';
}

/* ── 마크다운 → HTML ── */
function mdToHtml(md) {
  return '<p>'+md
    .replace(/^### (.+)$/gm,'<h3>$1</h3>')
    .replace(/^## (.+)$/gm,'<h2>$1</h2>')
    .replace(/^# (.+)$/gm,'<h1>$1</h1>')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/\*(.+?)\*/g,'<em>$1</em>')
    .replace(/\[(.+?)\]\((.+?)\)/g,'<a href="$2" target="_blank">$1</a>')
    .replace(/`(.+?)`/g,'<code>$1</code>')
    .replace(/^- (.+)$/gm,'<li>$1</li>')
    .replace(/\n\n/g,'</p><p>')+'</p>';
}

/* ── 통계 ── */
function recordDownload(name, id) {
  let s = JSON.parse(localStorage.getItem('downloadStats')||'[]');
  const now = new Date().toLocaleString('ko-KR');
  const ex = s.find(x=>x.fileId===id);
  if (ex) { ex.count++; ex.lastDownload=now; }
  else s.push({ fileId:id, fileName:name, count:1, firstDownload:now, lastDownload:now });
  localStorage.setItem('downloadStats', JSON.stringify(s));
  renderDashboard();
}

async function recordVisit() {
  let ip='알 수 없음';
  try { const r=await fetch('https://api.ipify.org?format=json'); ip=(await r.json()).ip; } catch(e){}
  let v = JSON.parse(localStorage.getItem('visitLog')||'[]');
  v.unshift({ time:new Date().toLocaleString('ko-KR'), ip });
  if (v.length>50) v=v.slice(0,50);
  localStorage.setItem('visitLog', JSON.stringify(v));
  renderDashboard();
}

function resetAllStats() {
  if (!confirm('통계를 초기화하시겠습니까?')) return;
  localStorage.removeItem('visitLog'); localStorage.removeItem('downloadStats');
  renderDashboard();
}

function renderDashboard() {
  const visits = JSON.parse(localStorage.getItem('visitLog')||'[]');
  const dl     = JSON.parse(localStorage.getItem('downloadStats')||'[]');
  const total  = dl.reduce((s,d)=>s+d.count,0);
  const sv = document.getElementById('stat-visits');
  const sd = document.getElementById('stat-downloads');
  const sf = document.getElementById('stat-files');
  if (sv) sv.textContent = visits.length;
  if (sd) sd.textContent = total;
  if (sf) sf.textContent = dl.length;

  const vl = document.getElementById('visit-log');
  if (vl) vl.innerHTML = visits.length ? `<table class="log-table"><thead><tr><th>#</th><th>IP</th><th style="text-align:right">시간</th></tr></thead><tbody>${visits.map((v,i)=>`<tr><td style="color:#bbb">${i+1}</td><td style="color:#1a3a5c;font-weight:600">${v.ip||'-'}</td><td style="text-align:right;color:#999">${v.time||'-'}</td></tr>`).join('')}</tbody></table>`
    : '<div class="log-empty">접속 기록이 없습니다.</div>';

  const dlog = document.getElementById('download-log');
  if (dlog) dlog.innerHTML = dl.length ? `<table class="log-table"><thead><tr><th>파일명</th><th style="text-align:center">횟수</th><th style="text-align:right">마지막</th></tr></thead><tbody>${[...dl].sort((a,b)=>b.count-a.count).map(s=>`<tr><td>${s.fileName}</td><td style="text-align:center;font-weight:700;color:#3498db">${s.count}회</td><td style="text-align:right;color:#999">${s.lastDownload}</td></tr>`).join('')}</tbody></table>`
    : '<div class="log-empty">다운로드 기록이 없습니다.</div>';
}

/* ── 모바일 ── */
function toggleDrawer() {
  document.getElementById('mobileDrawer').classList.toggle('open');
  document.getElementById('mobileOverlay').classList.toggle('show');
}
function closeDrawer() {
  document.getElementById('mobileDrawer').classList.remove('open');
  document.getElementById('mobileOverlay').classList.remove('show');
}

/* ── 초기화 ── */
renderMenu();
renderDashboard();
recordVisit();
initObsidianGraph();

/* ── 옵시디안 그래프 ── */
let graphZoom = null, graphSvg = null;

async function initObsidianGraph() {
  const wrap = document.getElementById('graph-wrap');
  const svg  = document.getElementById('obs-graph');
  if (!svg || !wrap) return;

  // 로딩 표시
  svg.innerHTML = '<text x="50%" y="50%" text-anchor="middle" fill="#666" font-size="13" dy=".3em">⏳ 그래프 로딩 중...</text>';

  try {
    const r = await fetch(`${SERVER_BASE}/api/obsidian-graph`);
    if (!r.ok) throw new Error('서버 연결 실패');
    const data = await r.json();

    if (!data.nodes || data.nodes.length === 0) {
      svg.innerHTML = '<text x="50%" y="50%" text-anchor="middle" fill="#666" font-size="13" dy=".3em">노트가 없습니다</text>';
      return;
    }

    drawGraph(svg, data.nodes, data.links);
  } catch(e) {
    svg.innerHTML = `<text x="50%" y="50%" text-anchor="middle" fill="#e74c3c" font-size="12" dy=".3em">⚠️ 로컬 서버 연결 필요 (server.js 실행)</text>`;
  }
}

function drawGraph(svgEl, nodes, links) {
  const W = svgEl.getBoundingClientRect().width || 600;
  const H = 340;
  const tooltip = document.getElementById('graph-tooltip');

  // 폴더별 색상
  const folders = [...new Set(nodes.map(n => n.folder))];
  const colors  = d3.scaleOrdinal(d3.schemeTableau10).domain(folders);

  const svg = d3.select(svgEl)
    .attr('width', W).attr('height', H);
  svg.selectAll('*').remove();

  // zoom
  graphZoom = d3.zoom().scaleExtent([0.2, 4])
    .on('zoom', (e) => g.attr('transform', e.transform));
  svg.call(graphZoom);

  const g = svg.append('g');

  // 시뮬레이션
  const sim = d3.forceSimulation(nodes)
    .force('link',   d3.forceLink(links).id(d => d.id).distance(60))
    .force('charge', d3.forceManyBody().strength(-120))
    .force('center', d3.forceCenter(W/2, H/2))
    .force('collide', d3.forceCollide(14));

  // 링크
  const link = g.append('g').selectAll('line')
    .data(links).join('line').attr('class', 'graph-link');

  // 노드
  const node = g.append('g').selectAll('g')
    .data(nodes).join('g')
    .attr('class', 'graph-node')
    .call(d3.drag()
      .on('start', (e,d) => { if(!e.active) sim.alphaTarget(0.3).restart(); d.fx=d.x; d.fy=d.y; })
      .on('drag',  (e,d) => { d.fx=e.x; d.fy=e.y; })
      .on('end',   (e,d) => { if(!e.active) sim.alphaTarget(0); d.fx=null; d.fy=null; })
    )
    .on('mouseover', (e,d) => {
      tooltip.style.display='block';
      tooltip.textContent = `${d.name} (${d.folder})`;
    })
    .on('mousemove', (e) => {
      tooltip.style.left = (e.clientX+12)+'px';
      tooltip.style.top  = (e.clientY-28)+'px';
    })
    .on('mouseout', () => { tooltip.style.display='none'; })
    .on('click', (e,d) => {
      // 클릭 시 파일 열기
      loadObsidianFileByPath(d.path, d.name, d.folder);
    });

  // 연결 수에 따라 반지름 조절
  const linkCount = {};
  links.forEach(l => {
    linkCount[l.source.id||l.source] = (linkCount[l.source.id||l.source]||0)+1;
    linkCount[l.target.id||l.target] = (linkCount[l.target.id||l.target]||0)+1;
  });

  node.append('circle')
    .attr('r',    d => Math.min(5 + (linkCount[d.id]||0) * 1.5, 14))
    .attr('fill', d => colors(d.folder))
    .attr('stroke', d => d3.color(colors(d.folder)).darker(0.5));

  node.append('text')
    .attr('x', 0).attr('y', d => Math.min(5 + (linkCount[d.id]||0)*1.5, 14) + 10)
    .attr('text-anchor', 'middle')
    .text(d => d.name.length > 12 ? d.name.slice(0,12)+'…' : d.name);

  sim.on('tick', () => {
    link.attr('x1', d=>d.source.x).attr('y1', d=>d.source.y)
        .attr('x2', d=>d.target.x).attr('y2', d=>d.target.y);
    node.attr('transform', d=>`translate(${d.x},${d.y})`);
  });

  graphSvg = svg;
}

async function loadObsidianFileByPath(filePath, name, folder) {
  contentEl.className='content markdown-body';
  contentEl.innerHTML=`<div class="file-inner"><div class="breadcrumb">자료실(옵시디안) > ${folder} > ${name}</div><div class="loading"><div class="loading-spinner"></div></div></div>`;
  try {
    const r = await fetch(`${SERVER_BASE}/api/obsidian-file?path=${encodeURIComponent(filePath)}`);
    if (!r.ok) throw new Error('파일 로드 실패');
    const data = await r.json();
    contentEl.innerHTML=`<div class="file-inner"><div class="breadcrumb">자료실(옵시디안) > ${folder} > ${name}</div><h2 style="margin-bottom:20px">${name}</h2><button onclick="downloadObsidianFile('${filePath}','${name}')" style="padding:8px 16px;background:#3498db;color:white;border:none;border-radius:4px;cursor:pointer;margin-bottom:20px">⬇️ 다운로드</button>${mdToHtml(data.content)}</div>`;
  } catch(e) {
    contentEl.innerHTML=`<div class="file-inner"><div class="err">❌ ${e.message}</div></div>`;
  }
}

function zoomIn()    { if(graphZoom&&graphSvg) graphSvg.transition().call(graphZoom.scaleBy, 1.4); }
function zoomOut()   { if(graphZoom&&graphSvg) graphSvg.transition().call(graphZoom.scaleBy, 0.7); }
function resetZoom() { if(graphZoom&&graphSvg) graphSvg.transition().call(graphZoom.transform, d3.zoomIdentity); }

</script>
