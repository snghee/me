<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SBJ DNX 내부 자료 포털</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.2.0/github-markdown.min.css">
<style>
/* 기존 스타일 유지 */
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif; display:flex; flex-direction:column; min-height:100vh; }
.navbar { background:#2c3e50; color:white; display:flex; align-items:center; padding:0 20px; height:56px; position:sticky; top:0; z-index:1000; box-shadow:0 2px 8px rgba(0,0,0,.3); }
.navbar-brand { font-size:18px; font-weight:bold; margin-right:30px; white-space:nowrap; }
.navbar-menu { display:flex; align-items:center; gap:4px; flex:1; overflow-x:auto; }
.nav-item { position:relative; }
.nav-btn { display:flex; align-items:center; gap:6px; padding:8px 14px; cursor:pointer; border-radius:6px; font-size:14px; color:white; white-space:nowrap; user-select:none; background:none; border:none; }
.nav-btn:hover, .nav-btn.open { background:#3d5166; }
.nav-btn .arrow { font-size:10px; transition:transform .2s; display:inline-block; }
.nav-btn.open .arrow { transform:rotate(180deg); }
.dropdown { display:none; position:absolute; top:calc(100% + 4px); left:0; background:#2c3e50; min-width:200px; border-radius:8px; box-shadow:0 8px 24px rgba(0,0,0,.3); z-index:9999; max-height:70vh; overflow-y:auto; }
.dropdown.open { display:block; }
.dd-item { padding:10px 16px; cursor:pointer; font-size:13px; color:rgba(255,255,255,.85); border-bottom:1px solid rgba(255,255,255,.05); }
.dd-item:hover { background:#3498db; color:white; }
.content { flex:1; overflow-y:auto; background:white; }
.markdown-body { padding:32px 60px; }
.hero-section { background:linear-gradient(135deg,#0a2342 0%,#1a3a5c 50%,#0d3b6e 100%); color:white; padding:64px 60px; }
.stats-bar { background:#f5f7fa; border-bottom:1px solid #e8edf2; padding:14px 60px; display:flex; gap:40px; align-items:center; }
.stats-bar-num { font-weight:700; color:#1a3a5c; }
.main-content { padding:40px 60px; }
.two-col { display:grid; grid-template-columns:1fr 1fr; gap:28px; }
.log-table-wrap { border:1px solid #e8edf2; border-radius:8px; overflow:hidden; margin-top:10px; }
.log-table { width:100%; border-collapse:collapse; font-size:12px; }
.log-table th { background:#f5f7fa; padding:10px; text-align:left; }
.log-table td { padding:10px; border-top:1px solid #eee; }
.hamburger { display:none; background:none; border:none; color:white; font-size:22px; cursor:pointer; margin-left:auto; }
.mobile-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:1500; }
.mobile-drawer { position:fixed; top:0; right:-280px; width:260px; height:100vh; background:#2c3e50; z-index:1800; transition:0.3s; padding:60px 20px; color:white; }
.mobile-drawer.open { right:0; }
@media (max-width:768px) { .navbar-menu { display:none; } .hamburger { display:block; } .markdown-body, .hero-section, .stats-bar, .main-content { padding:20px; } .two-col { grid-template-columns:1fr; } }
</style>
</head>
<body>

<nav class="navbar">
  <div class="navbar-brand">🏦 SBJ DNX</div>
  <div class="navbar-menu" id="navbar-menu"></div>
  <button class="hamburger" id="hamburger-btn">☰</button>
</nav>

<div class="mobile-overlay" id="mobileOverlay"></div>
<div class="mobile-drawer" id="mobileDrawer">
  <button id="drawer-close-btn" style="position:absolute; top:20px; right:20px; background:none; border:none; color:white; font-size:24px; cursor:pointer;">✕</button>
  <div id="mobile-drawer-content"></div>
</div>

<div class="content markdown-body" id="content">
  <div id="dashboard">
    <div class="hero-section">
      <div class="hero-tag">Internal Document Portal</div>
      <h1 class="hero-title">SBJ DNX<br><span style="color:#64b5f6">내부 자료 포털</span></h1>
      <p style="opacity:0.7; margin-top:10px;">상단 메뉴에서 자료를 검색하고 열람하세요.</p>
    </div>
    <div class="stats-bar">
      <span>👁️ 접속 <span class="stats-bar-num" id="stat-visits">0</span></span>
      <span>⬇️ 다운로드 <span class="stats-bar-num" id="stat-downloads">0</span></span>
      <button onclick="resetAllStats()" style="margin-left:auto; font-size:11px; cursor:pointer;">초기화</button>
    </div>
    <div class="main-content">
      <div class="two-col">
        <div><h3>최근 접속</h3><div class="log-table-wrap" id="visit-log"></div></div>
        <div><h3>다운로드 통계</h3><div class="log-table-wrap" id="download-log"></div></div>
      </div>
    </div>
  </div>
</div>

<script src="https://apis.google.com/js/api.js"></script>
<script>
/* 설정 데이터 */
const menuData = {
  "소개": { "회사 개요":"company-overview.md", "미션 & 비전":"mission-vision.md", "팀 소개":"team-intro.md" },
  "자료실(구글드라이브)": null,
  "자료실(옵시디안)": null,
  "문서": { "사용 설명서":"user-manual.md", "FAQ":"faq.md", "📊 다운로드 통계":"STATS" }
};

const GOOGLE_API_KEY = 'AIzaSyDOIdawmHgkx2wV04ohDl8_jaDNhOjibdg';
const SERVICE_FOLDER_ID = '19VQbUHcEtMnTMR39ciOYMrS0RCGTAf7b';

let openId = null;
let driveLoaded = false;
let obsLoaded = false;

/* 유틸리티: 모든 드롭다운 닫기 */
function closeAllMenus() {
  document.querySelectorAll('.dropdown, .nav-btn').forEach(el => el.classList.remove('open'));
  openId = null;
}

/* 메뉴 렌더링 */
function initMenu() {
  const nav = document.getElementById('navbar-menu');
  const drawer = document.getElementById('mobile-drawer-content');
  
  Object.keys(menuData).forEach((folder, idx) => {
    // 데스크탑 메뉴
    const itemContainer = document.createElement('div');
    itemContainer.className = 'nav-item';
    
    const btn = document.createElement('button');
    btn.className = 'nav-btn';
    btn.innerHTML = `${folder} <span class="arrow">▾</span>`;
    btn.dataset.id = idx;
    
    const dd = document.createElement('div');
    dd.className = 'dropdown';
    dd.id = `dd-${idx}`;
    
    // 정적 아이템 추가
    if (menuData[folder]) {
      Object.entries(menuData[folder]).forEach(([name, path]) => {
        const di = document.createElement('div');
        di.className = 'dd-item';
        di.textContent = name;
        di.onclick = (e) => { e.stopPropagation(); closeAllMenus(); loadFile(path, name, folder); };
        dd.appendChild(di);
      });
    }

    // 메뉴 버튼 클릭 이벤트
    btn.addEventListener('click', async (e) => {
      e.stopPropagation();
      const isOpen = btn.classList.contains('open');
      closeAllMenus();
      
      if (!isOpen) {
        btn.classList.add('open');
        dd.classList.add('open');
        openId = idx;
        
        // 동적 데이터 로딩
        if (folder === "자료실(구글드라이브)" && !driveLoaded) await loadDriveList(dd);
        if (folder === "자료실(옵시디안)" && !obsLoaded) await loadObsidianList(dd);
      }
    });

    itemContainer.appendChild(btn);
    itemContainer.appendChild(dd);
    nav.appendChild(itemContainer);

    // 모바일 드로어 메뉴
    const mobileSec = document.createElement('div');
    mobileSec.innerHTML = `<p style="font-size:11px; color:rgba(255,255,255,0.4); margin-bottom:10px;">${folder}</p>`;
    if (menuData[folder]) {
        Object.entries(menuData[folder]).forEach(([name, path]) => {
            const mi = document.createElement('div');
            mi.className = 'dd-item';
            mi.textContent = name;
            mi.onclick = () => { closeDrawer(); loadFile(path, name, folder); };
            mobileSec.appendChild(mi);
        });
    } else {
        const mi = document.createElement('div');
        mi.className = 'dd-item';
        mi.textContent = "📂 목록 열기";
        mi.onclick = () => { closeDrawer(); btn.click(); };
        mobileSec.appendChild(mi);
    }
    drawer.appendChild(mobileSec);
  });
}

/* 외부 클릭 시 닫기 */
document.addEventListener('click', closeAllMenus);

/* 구글 드라이브 리스트 로딩 */
async function loadDriveList(container) {
  container.innerHTML = '<div class="dd-item">⏳ 로딩 중...</div>';
  try {
    // gapi 로드 체크
    if (typeof gapi === 'undefined') throw new Error("GAPI 로드 실패");
    await new Promise(res => gapi.load('client', res));
    await gapi.client.init({ apiKey: GOOGLE_API_KEY, discoveryDocs: ["https://www.googleapis.com/discovery/v1/apis/drive/v3/rest"] });
    
    const resp = await gapi.client.drive.files.list({ q: `'${SERVICE_FOLDER_ID}' in parents and trashed=false`, fields: 'files(id, name)' });
    const files = resp.result.files;
    container.innerHTML = '';
    
    if (files.length === 0) container.innerHTML = '<div class="dd-item">파일 없음</div>';
    files.forEach(f => {
      const item = document.createElement('div');
      item.className = 'dd-item';
      item.textContent = `📄 ${f.name}`;
      item.onclick = (e) => { e.stopPropagation(); closeAllMenus(); alert(f.name + " 준비 중"); };
      container.appendChild(item);
    });
    driveLoaded = true;
  } catch (e) {
    container.innerHTML = `<div class="dd-item" style="color:#ff6b6b">⚠️ 오류: ${e.message}</div>`;
  }
}

/* 옵시디안 리스트 로딩 (로컬 서버 연동) */
async function loadObsidianList(container) {
  container.innerHTML = '<div class="dd-item">⏳ 로딩 중...</div>';
  try {
    const r = await fetch('http://localhost:3000/api/obsidian-files');
    const files = await r.json();
    container.innerHTML = '';
    files.forEach(f => {
      const item = document.createElement('div');
      item.className = 'dd-item';
      item.textContent = `📝 ${f.name}`;
      item.onclick = (e) => { e.stopPropagation(); closeAllMenus(); };
      container.appendChild(item);
    });
    obsLoaded = true;
  } catch (e) {
    container.innerHTML = '<div class="dd-item" style="color:#999">⚠️ 로컬 서버 오프라인</div>';
  }
}

/* 파일 로드 함수 */
function loadFile(path, name, folder) {
    const content = document.getElementById('content');
    if(path === 'STATS') { renderStatsPage(); return; }
    content.innerHTML = `<div class="markdown-body"><h2>${name}</h2><p>${folder}의 콘텐츠를 불러오는 중...</p></div>`;
}

/* 모바일 제어 */
const drawer = document.getElementById('mobileDrawer');
const overlay = document.getElementById('mobileOverlay');
function openDrawer() { drawer.classList.add('open'); overlay.style.display = 'block'; }
function closeDrawer() { drawer.classList.remove('open'); overlay.style.display = 'none'; }

document.getElementById('hamburger-btn').onclick = (e) => { e.stopPropagation(); openDrawer(); };
document.getElementById('drawer-close-btn').onclick = closeDrawer;
overlay.onclick = closeDrawer;

/* 대시보드 통계 */
function renderDashboard() {
  const visits = JSON.parse(localStorage.getItem('visitLog') || '[]');
  document.getElementById('stat-visits').textContent = visits.length;
  const logWrap = document.getElementById('visit-log');
  logWrap.innerHTML = visits.length ? `<table class="log-table"><tr><th>시간</th><th>IP</th></tr>${visits.slice(0,5).map(v=>`<tr><td>${v.time}</td><td>${v.ip}</td></tr>`).join('')}</table>` : '<p style="padding:10px; color:#999;">기록 없음</p>';
}

function resetAllStats() { if(confirm("초기화할까요?")) { localStorage.clear(); location.reload(); } }

/* 초기화 */
window.onload = () => {
  initMenu();
  renderDashboard();
  // 방문 기록
  const log = JSON.parse(localStorage.getItem('visitLog') || '[]');
  log.unshift({ time: new Date().toLocaleTimeString(), ip: 'Local' });
  localStorage.setItem('visitLog', JSON.stringify(log.slice(0, 50)));
};
</script>
</body>
</html>
