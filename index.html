      delBtn.disabled = true;
      delBtn.style.cssText = 'padding:8px 20px;border:1px solid #e2e8f0;border-radius:7px;background:#f1f5f9;color:#94a3b8;cursor:not-allowed;font-size:14px;font-weight:600;transition:all .15s;';
    }
  }

  function highlightRow(row) {
    treeWrap.querySelectorAll('[data-sel]').forEach(el => {
      el.removeAttribute('data-sel');
      el.style.background = '';
      el.style.color = '';
    });
    row.dataset.sel = '1';
    row.style.background = '#fee2e2';
    row.style.color = '#dc2626';
  }

  // ── 탭 전환 ──
  let currentTab = 'obs';
  async function switchTab(key) {
    currentTab = key;
    setSelected(null);
    treeWrap.innerHTML = '<div style="text-align:center;padding:30px;color:#94a3b8;font-size:13px;">⏳ 불러오는 중...</div>';

    // 탭 스타일
    [tabObs, tabDrive].forEach(t => {
      const active = t.dataset.tabKey === key;
      t.style.color = active ? '#2563eb' : '#94a3b8';
      t.style.borderBottomColor = active ? '#2563eb' : 'transparent';
    });

    if (key === 'obs') await renderObsTree();
    else await renderDriveTree();
  }

  // ── 옵시디안 (GitHub) 트리 ──
  async function renderObsTree() {
    let tree = [];
    try { tree = await ghGetTree(); }
    catch(e) { treeWrap.innerHTML = `<div style="color:#dc2626;padding:16px;font-size:13px;">❌ 목록 로드 실패: ${e.message}</div>`; return; }

    const files = tree.filter(f => !f.path.startsWith('.')).map(f => {
      const parts = f.path.split('/');
      return { name: parts[parts.length-1], path: f.path, folder: parts.length > 1 ? parts.slice(0,-1).join('/') : '루트', sha: f.sha, source: 'obs' };
    });
    const grouped = {};
    files.forEach(f => { (grouped[f.folder] = grouped[f.folder]||[]).push(f); });

    treeWrap.innerHTML = '';

    const mkFileRow = (f, indent=10) => {
      const row = document.createElement('div');
      row.style.cssText = `display:flex;align-items:center;padding:6px ${indent}px;border-radius:6px;cursor:pointer;font-size:13px;color:#334155;gap:7px;`;
      row.innerHTML = `<span style="opacity:.6;font-size:12px">📄</span><span>${f.name}</span>`;
      row.onclick = () => { highlightRow(row); setSelected(f); };
      return row;
    };

    if (grouped['루트']) grouped['루트'].forEach(f => treeWrap.appendChild(mkFileRow(f)));
    Object.keys(grouped).sort().filter(fol => fol !== '루트').forEach(fol => {
      const folRow = document.createElement('div');
      folRow.style.cssText = 'display:flex;align-items:center;gap:5px;padding:6px 10px;font-size:12px;color:#64748b;font-weight:700;cursor:pointer;user-select:none;border-radius:6px;';
      const arrow = document.createElement('span');
      arrow.textContent = '▾'; arrow.style.cssText = 'font-size:11px;transition:transform .15s;';
      folRow.appendChild(arrow);
      folRow.appendChild(document.createTextNode('📁 ' + fol));
      folRow.onmouseover = () => { folRow.style.background='#f8fafc'; };
      folRow.onmouseout  = () => { folRow.style.background=''; };
      const folFiles = document.createElement('div');
      folRow.onclick = () => {
        const open = folFiles.style.display !== 'none';
        folFiles.style.display = open ? 'none' : 'block';
        arrow.style.transform = open ? 'rotate(-90deg)' : '';
      };
      grouped[fol].forEach(f => folFiles.appendChild(mkFileRow(f, 28)));
      treeWrap.appendChild(folRow);
      treeWrap.appendChild(folFiles);
    });
  }

  // ── 구글드라이브 트리 (OAuth 2SV 설정 후 활성화 예정) ──
  async function renderDriveTree() {
    treeWrap.innerHTML = '';
    const wrap = document.createElement('div');
    wrap.style.cssText = 'padding:32px 20px;text-align:center;';

    const icon = document.createElement('div');
    icon.style.cssText = 'font-size:36px;margin-bottom:14px;';
    icon.textContent = '🔐';

    const title = document.createElement('div');
    title.style.cssText = 'font-size:14px;font-weight:700;color:#1e293b;margin-bottom:8px;';
    title.textContent = 'Google 인증 설정 필요';

    const desc = document.createElement('div');
    desc.style.cssText = 'font-size:12px;color:#64748b;line-height:1.7;margin-bottom:20px;';
    desc.innerHTML = 'Google Cloud Console에서 2단계 인증(2SV) 설정 후<br>'
      + 'OAuth 클라이언트에 <code style="background:#f1f5f9;padding:1px 5px;border-radius:3px;color:#e11d48;">https://snghee.github.io</code> 를<br>'
      + '<b>승인된 JavaScript 원본</b>으로 추가하면 활성화됩니다.';

    const btn = document.createElement('a');
    btn.href = 'https://myaccount.google.com/security';
    btn.target = '_blank';
    btn.style.cssText = 'display:inline-block;padding:8px 18px;background:#4285f4;color:white;border-radius:7px;font-size:13px;font-weight:600;text-decoration:none;';
    btn.textContent = '🔑 Google 보안 설정 열기';

    const link = document.createElement('div');
    link.style.cssText = 'margin-top:10px;';
    const a2 = document.createElement('a');
    a2.href = 'https://console.cloud.google.com/apis/credentials';
    a2.target = '_blank';
    a2.style.cssText = 'font-size:11px;color:#94a3b8;text-decoration:underline;';
    a2.textContent = 'Cloud Console 인증 설정';
    link.appendChild(a2);

    wrap.appendChild(icon);
    wrap.appendChild(title);
    wrap.appendChild(desc);
    wrap.appendChild(btn);
    wrap.appendChild(link);
    treeWrap.appendChild(wrap);
  }

  // ── 삭제 실행 ──
  delBtn.onclick = async () => {
    if (!selectedFile) return;
    const isFolder = selectedFile.isFolder;
    const typeStr  = isFolder ? '폴더(및 하위 파일 전체)' : '파일';
    if (!confirm(`"${selectedFile.name}" ${typeStr}을 삭제하시겠습니까?\n${selectedFile.source === 'drive' ? '구글드라이브 휴지통으로 이동됩니다.' : 'GitHub에서 영구 삭제됩니다.'}`)) return;
    delBtn.disabled = true;
    delBtn.textContent = '삭제 중...';

    try {
      if (selectedFile.source === 'obs') {
        // GitHub 삭제
        const encodedPath = selectedFile.path.split('/').map(encodeURIComponent).join('/');
        const metaR = await fetch(
          `${GITHUB_API}/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${encodedPath}?ref=${GITHUB_BRANCH}&t=${Date.now()}`,
          { cache:'no-store' }
        );
        if (!metaR.ok) throw new Error('파일 정보 조회 실패');
        const meta = await metaR.json();
        const r = await fetch(
          `${GITHUB_API}/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${encodedPath}`,
          { method:'DELETE', headers:{'Authorization':`token ${token}`,'Content-Type':'application/json'},
            body: JSON.stringify({ message:`Delete ${selectedFile.name}`, sha:meta.sha, branch:GITHUB_BRANCH }) }
        );
        if (!r.ok) { const e = await r.json(); throw new Error(e.message||'삭제 실패'); }
        const obsDD = document.getElementById('dd-2');
        if (obsDD) obsDD.innerHTML = '';
        _currentFilePath = null; _currentFileSha = null; _currentRawContent = '';

      } else {
        // 구글드라이브 삭제 - OAuth 2SV 설정 후 활성화 예정
        throw new Error('구글드라이브 삭제는 OAuth 설정 완료 후 사용 가능합니다.');
      }

      overlay.remove();
      showToast(`🗑 "${selectedFile.name}" 삭제 완료`);
      showDashboard();
    } catch(e) {
      showToast('❌ ' + e.message, true);
      delBtn.disabled = false;
      delBtn.textContent = '삭제';
      delBtn.style.background = '#dc2626';
    }
  };

  // 초기 탭 로드
  switchTab('obs');
}

async function showSaveDialog(name, folder) {
  document.getElementById('save-dialog-overlay')?.remove();

  // 토큰 확인
  let token = localStorage.getItem('gh_write_token');
  if (!token) {
    token = prompt('GitHub Token 입력 (최초 1회):');
    if (!token) return;
    localStorage.setItem('gh_write_token', token);
  }

  // 폴더 목록 로드
  let folders = [];
  try {
    const tree = await ghGetTree();
    const folderSet = new Set();
    tree.forEach(f => {
      if (f.path.includes('/')) folderSet.add(f.path.split('/')[0]);
    });
    folders = ['루트', ...Array.from(folderSet).sort()];
  } catch(e) {
    folders = ['루트'];
  }

  // 다이얼로그 생성
  const overlay = document.createElement('div');
  overlay.id = 'save-dialog-overlay';
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:99999;display:flex;align-items:center;justify-content:center;';

  const box = document.createElement('div');
  box.style.cssText = 'background:white;border-radius:12px;width:420px;max-width:90vw;padding:24px;box-shadow:0 20px 60px rgba(0,0,0,.4);';

  // 제목
  const title = document.createElement('h3');
  title.textContent = '저장 위치 선택';
  title.style.cssText = 'margin-bottom:20px;font-size:18px;color:#1e293b;';
  box.appendChild(title);

  // 폴더 선택
  const folLabel = document.createElement('div');
  folLabel.textContent = '📁 폴더';
  folLabel.style.cssText = 'font-size:13px;font-weight:600;color:#475569;margin-bottom:6px;';
  box.appendChild(folLabel);

  const folSelect = document.createElement('select');
  folSelect.style.cssText = 'width:100%;padding:10px;border:1px solid #e2e8f0;border-radius:8px;font-size:15px;margin-bottom:16px;outline:none;box-sizing:border-box;';
  folders.forEach(f => {
    const opt = document.createElement('option');
    opt.value = f;
    opt.textContent = f;
    if (f === folder || (f === '루트' && !folder)) opt.selected = true;
    folSelect.appendChild(opt);
  });
  box.appendChild(folSelect);

  // 파일명
  const fileLabel = document.createElement('div');
  fileLabel.textContent = '📄 파일명';
  fileLabel.style.cssText = 'font-size:13px;font-weight:600;color:#475569;margin-bottom:6px;';
  box.appendChild(fileLabel);

  const fileInput = document.createElement('input');
  fileInput.type = 'text';
  fileInput.value = name.endsWith('.md') ? name : name + '.md';
  fileInput.placeholder = '파일명.md';
  fileInput.style.cssText = 'width:100%;padding:10px;border:1px solid #e2e8f0;border-radius:8px;font-size:15px;margin-bottom:20px;outline:none;box-sizing:border-box;';
  box.appendChild(fileInput);

  // 버튼
  const footer = document.createElement('div');
  footer.style.cssText = 'display:flex;gap:10px;justify-content:flex-end;';

  const cancelBtn = document.createElement('button');
  cancelBtn.textContent = '취소';
  cancelBtn.style.cssText = 'padding:10px 20px;border:1px solid #e2e8f0;border-radius:8px;background:white;cursor:pointer;font-size:14px;';
  cancelBtn.onclick = () => overlay.remove();

  const confirmBtn = document.createElement('button');
  confirmBtn.textContent = '저장';
  confirmBtn.style.cssText = 'padding:10px 20px;border:none;border-radius:8px;background:#22c55e;color:white;cursor:pointer;font-size:14px;font-weight:600;';
  confirmBtn.onclick = async () => {
    const selFolder = folSelect.value;
    const filename  = fileInput.value.trim();
    if (!filename) { alert('파일명을 입력해주세요.'); return; }

    const isRoot    = selFolder === '루트' || !selFolder;
    const targetPath = isRoot ? filename : `${selFolder}/${filename}`;
    const encodedPath = isRoot
      ? encodeURIComponent(filename)
      : `${encodeURIComponent(selFolder)}/${encodeURIComponent(filename)}`;

    overlay.remove();
    const btn = document.getElementById('save-btn');
    if (btn) { btn.disabled = true; btn.textContent = '⏳ 저장 중...'; }

    try {
      const ta = document.getElementById('editor-textarea');
      if (ta) _currentRawContent = ta.value;
      const encoded = btoa(unescape(encodeURIComponent(_currentRawContent)));

      // SHA 조회
      let saveSha = (targetPath === _currentFilePath) ? _currentFileSha : undefined;
      if (!saveSha) {
        try {
          const chk = await fetch(`${GITHUB_API}/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${encodedPath}?ref=${GITHUB_BRANCH}`, {cache:'no-store'});
          if (chk.ok) { const j = await chk.json(); saveSha = j.sha; }
        } catch(e) {}
      }

      const bodyObj = { message: `Update ${targetPath}`, content: encoded, branch: GITHUB_BRANCH };
      if (saveSha) bodyObj.sha = saveSha;

      const r = await fetch(
        `${GITHUB_API}/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${encodedPath}`,
        { method:'PUT', headers:{'Authorization':`token ${token}`,'Content-Type':'application/json'}, body:JSON.stringify(bodyObj) }
      );
      if (!r.ok) { const err = await r.json(); throw new Error(err.message || '저장 실패'); }

      const result = await r.json();
      _currentFilePath   = targetPath;
      _currentFileSha    = result.content.sha;
      _currentFileName   = filename;
      _currentFileFolder = isRoot ? '루트' : selFolder;

      if (btn) { btn.disabled = false; btn.innerHTML = '저장'; }
      showToast('✅ 저장 완료!');
      renderEditor(_currentFileName, _currentFileFolder);
    } catch(e) {
      showToast('❌ ' + e.message, true);
      if (btn) { btn.disabled = false; btn.innerHTML = '저장'; }
    }
  };

  footer.appendChild(cancelBtn);
  footer.appendChild(confirmBtn);
  box.appendChild(footer);
  overlay.appendChild(box);
  overlay.addEventListener('click', e => { if(e.target===overlay) overlay.remove(); });
  document.body.appendChild(overlay);
  fileInput.focus();
  fileInput.select();
}


function showToast(msg, isError=false) {
  const el = document.createElement('div');
  el.className = 'save-toast';
  el.style.background = isError ? '#dc2626' : '#1e293b';
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

/* ── 태그 클릭 팝업 ── */
function showTagPopup(tagNode, event, nodeById, links, container) {
  document.getElementById('tag-popup')?.remove();

  /* 연결된 파일 수집 */
  const files = [];
  links.forEach(l => {
    const sid = l.source?.id||l.source, tid = l.target?.id||l.target;
    const oid = sid===tagNode.id ? tid : (tid===tagNode.id ? sid : null);
    if (oid) {
      const nd = nodeById[oid];
      if (nd && !nd.isTag) files.push(nd);
    }
  });

  const popup = document.createElement('div');
  popup.id = 'tag-popup';
  popup.style.cssText = `
    position:fixed; z-index:99998;
    background:rgba(8,14,28,0.97);
    border:1px solid rgba(74,222,128,0.4);
    border-radius:12px; padding:14px 16px;
    min-width:210px; max-width:280px;
    box-shadow:0 8px 32px rgba(0,0,0,0.6);
    animation:fadeUp .18s ease;
    left:${Math.min(event.clientX+12, window.innerWidth-295)}px;
    top:${Math.min(event.clientY+12, window.innerHeight-320)}px;
  `;
  popup.innerHTML = `
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
      <div style="color:#4ade80;font-weight:700;font-size:13px">
        <span style="margin-right:6px">🏷</span>#${tagNode.name}
      </div>
      <button onclick="document.getElementById('tag-popup')?.remove()"
        style="background:none;border:none;color:#64748b;cursor:pointer;font-size:16px;line-height:1;padding:0 2px">✕</button>
    </div>
    <div style="font-size:11px;color:#64748b;margin-bottom:8px">${files.length}개 노트에서 사용</div>
    <div style="display:flex;flex-direction:column;gap:3px;max-height:200px;overflow-y:auto">
      ${files.map(f =>
        '<div onclick="document.getElementById(\'tag-popup\')?.remove();loadObsidianFileByPath(\'' + f.path + '\',\'' + f.name + '\',\'' + f.folder + '\')"' +
        ' style="padding:6px 10px;background:rgba(255,255,255,0.04);border-radius:6px;cursor:pointer;' +
        'font-size:12px;color:#c8d8f0;display:flex;align-items:center;gap:7px;' +
        'border:1px solid transparent;transition:all .12s"' +
        ' onmouseover="this.style.background=\'rgba(74,222,128,0.1)\';this.style.borderColor=\'rgba(74,222,128,0.25)\'"' +
        ' onmouseout="this.style.background=\'rgba(255,255,255,0.04)\';this.style.borderColor=\'transparent\'">' +
        '<span style="opacity:.55;font-size:11px">📄</span>' +
        '<span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">' + f.name.replace(/\.md$/i,'') + '</span>' +
        '<span style="margin-left:auto;font-size:10px;color:#475569;white-space:nowrap">' + (f.folder!=='루트'?f.folder:'') + '</span>' +
        '</div>'
      ).join('')}
    </div>
  `;

  document.body.appendChild(popup);

  /* 바깥 클릭 시 닫기 */
  setTimeout(() => {
    const close = (e) => {
      if (!popup.contains(e.target)) { popup.remove(); document.removeEventListener('click', close); }
    };
    document.addEventListener('click', close);
  }, 50);
}

function toggleSimulation() {
  const btn = document.getElementById('pause-btn');
  graphPaused = !graphPaused;
  if (graphPaused) {
    if (btn) { btn.textContent = '▶ 재생'; btn.classList.add('paused'); }
  } else {
    if (btn) { btn.textContent = '⏸ 멈춤'; btn.classList.remove('paused'); }
  }
}

function zoomIn()    { if(graphZoom&&graphSvg) graphSvg.transition().duration(300).call(graphZoom.scaleBy, 1.4); }
function zoomOut()   { if(graphZoom&&graphSvg) graphSvg.transition().duration(300).call(graphZoom.scaleBy, 0.7); }
function resetZoom() { if(graphZoom&&graphSvg) graphSvg.transition().duration(500).call(graphZoom.transform, d3.zoomIdentity); }
