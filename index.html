<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SBJ DNX 내부 자료 포털</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.2.0/github-markdown.min.css">
<style>
/* 기본 스타일 */
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif; display:flex; flex-direction:column; min-height:100vh; }

/* ── 네비게이션 (중요 수정 영역) ── */
.navbar {
  background:#2c3e50; color:white;
  display:flex; align-items:center;
  padding:0 20px; height:56px;
  position:sticky; top:0; z-index:2000; /* 네비게이션 레이어를 높게 설정 */
  box-shadow:0 2px 8px rgba(0,0,0,.3);
}
.navbar-brand { font-size:18px; font-weight:bold; margin-right:30px; white-space:nowrap; }

.navbar-menu { 
  display:flex; 
  align-items:center; 
  gap:4px; 
  flex:1; 
  /* overflow-x: auto; 를 삭제했습니다. 이게 있으면 메뉴가 안에서 갇힙니다. */
}

/* ── 메뉴 버튼 ── */
.nav-item { position:relative; height:100%; display:flex; align-items:center; }
.nav-btn {
  display:flex; align-items:center; gap:6px;
  padding:8px 14px; cursor:pointer;
  border-radius:6px; font-size:14px; color:white;
  white-space:nowrap; user-select:none;
  background:none; border:none;
}
.nav-btn:hover, .nav-btn.open { background:#3d5166; }
.nav-btn .arrow { font-size:10px; transition:transform .2s; display:inline-block; }
.nav-btn.open .arrow { transform:rotate(180deg); }

/* ── 드롭다운 (네비게이션 밖으로 튀어나오게 설정) ── */
.dropdown {
  display:none;
  position:absolute; 
  top:100%; /* 네비게이션 바 바로 아래 붙음 */
  left:0;
  background:#2c3e50; 
  min-width:220px;
  border-radius:0 0 8px 8px; 
  box-shadow:0 8px 24px rgba(0,0,0,.3);
  z-index:9999; /* 매우 높게 설정 */
  max-height:80vh; 
  overflow-y:auto;
}
.dropdown.open { display:block; }
.dd-item {
  padding:12px 16px; cursor:pointer; font-size:13px;
  color:rgba(255,255,255,.85);
  border-bottom:1px solid rgba(255,255,255,.1);
}
.dd-item:hover { background:#3498db; color:white; }
.dd-item:last-child { border-bottom:none; }

/* ── 나머지 스타일 (기존과 동일) ── */
.content { flex:1; background:white; }
.markdown-body { padding:40px 60px; max-width:1000px; margin:0 auto; }
.hero-section { background:linear-gradient(135deg,#0a2342 0%,#1a3a5c 100%); color:white; padding:60px; }
.stats-bar { background:#f5f7fa; border-bottom:1px solid #e8edf2; padding:15px 60px; display:flex; gap:30px; font-size:13px; }
.stats-bar-num { font-weight:bold; color:#1a3a5c; }
.main-content { padding:40px 60px; }
.two-col { display:grid; grid-template-columns:1fr 1fr; gap:30px; }
.log-table-wrap { border:1px solid #eee; border-radius:8px; margin-top:10px; overflow:hidden; }
.log-table { width:100%; border-collapse:collapse; font-size:12px; }
.log-table th, .log-table td { padding:10px; border-bottom:1px solid #eee; text-align:left; }
.hamburger { display:none; background:none; border:none; color:white; font-size:24px; cursor:pointer; margin-left:auto; }

@media (max-width:768px) {
  .navbar-menu { display:none; }
  .hamburger { display:block; }
  .markdown-body, .hero-section, .stats-bar, .main-content { padding:20px; }
  .two-col { grid-template-columns:1fr; }
}
</style>
</head>
<body>

<nav class="navbar">
  <div class="navbar-brand">🏦 SBJ DNX</div>
  <div class="navbar-menu" id="navbar-menu"></div>
  <button class="hamburger" id="hamburger-btn">☰</button>
</nav>

<div class="content" id="content">
  <div id="dashboard">
    <div class="hero-section">
