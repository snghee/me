<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif; display:flex; flex-direction:column; min-height:100vh; }

/* ── 메인 레이아웃 (콘텐츠 + 사이드바) ── */
.main-layout { display:flex; flex:1; overflow:hidden; }
.content-area { flex:1; overflow-y:auto; min-width:0; }
.sidebar {
  width:320px; flex-shrink:0;
  background:#1a1a2e; border-left:1px solid #2a2a4a;
  display:flex; flex-direction:column;
  overflow:hidden;
}
.sidebar-header {
  padding:12px 16px; background:#16213e;
  border-bottom:1px solid #2a2a4a;
  display:flex; align-items:center; justify-content:space-between;
}
.sidebar-header-title { color:#64b5f6; font-size:12px; font-weight:700; letter-spacing:1px; text-transform:uppercase; }
.sidebar-graph { flex:1; position:relative; overflow:hidden; }
.sidebar-graph svg { width:100%; height:100%; display:block; }
.graph-wrap { height:100%; }
@media (max-width:1024px) { .sidebar { width:260px; } }
@media (max-width:768px)  { .sidebar { display:none; } }

/* ── 네비게이션 ── */
.navbar {
  background:#2c3e50; color:white;
  display:flex; align-items:center;
  padding:0 20px; height:56px;
  position:sticky; top:0; z-index:100;
  box-shadow:0 2px 8px rgba(0,0,0,.3);
}
.navbar-brand { font-size:18px; font-weight:bold; margin-right:30px; white-space:nowrap; }
.navbar-menu  { display:flex; align-items:center; gap:4px; flex:1; overflow-x:auto; }
.navbar-menu::-webkit-scrollbar { display:none; }

/* ── 메뉴 버튼 ── */
.nav-item { position:relative; }
.nav-btn {
  display:flex; align-items:center; gap:6px;
  padding:8px 14px; cursor:pointer;
  border-radius:6px; font-size:14px; color:white;
  white-space:nowrap; user-select:none;
  background:none; border:none;
}
.nav-btn:hover { background:#3d5166; }
.nav-btn.open  { background:#3d5166; }
.nav-btn .arrow { font-size:10px; transition:transform .2s; display:inline-block; }
.nav-btn.open .arrow { transform:rotate(180deg); }

/* ── 드롭다운 ── */
.dropdown {
  display:none;
  position:fixed;
  background:#2c3e50; min-width:200px;
  border-radius:8px; box-shadow:0 8px 24px rgba(0,0,0,.3);
  z-index:99999; max-height:70vh; overflow-y:auto;
  scrollbar-width:thin; scrollbar-color:#4a6280 #2c3e50;
}
.dropdown.open { display:block !important; }
.dropdown::-webkit-scrollbar { width:4px; }
.dropdown::-webkit-scrollbar-thumb { background:#4a6280; border-radius:2px; }
.dd-item {
  padding:10px 16px; cursor:pointer; font-size:13px;
  color:rgba(255,255,255,.85);
  border-bottom:1px solid rgba(255,255,255,.05);
}
.dd-item:last-child { border-bottom:none; }
.dd-item:hover  { background:#3498db; color:white; }
.dd-item.active { color:#f39c12; font-weight:bold; }
.dd-folder {
  padding:6px 16px 4px; font-size:11px;
  color:rgba(255,255,255,.4); text-transform:uppercase;
  letter-spacing:.5px; background:rgba(0,0,0,.15);
  border-bottom:1px solid rgba(255,255,255,.05); cursor:pointer;
}

/* ── 콘텐츠 ── */
.content { overflow-y:auto; background:white; }
.content.markdown-body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif; font-size:16px; line-height:1.6; color:#24292e; }
.content-area { background:white; }
.file-inner { padding:32px 60px; }
.breadcrumb { font-size:12px; color:#999; margin-bottom:15px; padding-bottom:10px; border-bottom:1px solid #eee; }
.loading { text-align:center; padding:40px; color:#999; }
.loading-spinner { border:4px solid #f3f3f3; border-top:4px solid #3498db; border-radius:50%; width:40px; height:40px; animation:spin 1s linear infinite; margin:20px auto; }
@keyframes spin { to { transform:rotate(360deg); } }
.err { background:#fee; border:1px solid #fcc; color:#c33; padding:15px; border-radius:5px; margin:20px 0; }

/* ── 햄버거 ── */
.hamburger { display:none; background:none; border:none; color:white; font-size:22px; cursor:pointer; margin-left:auto; padding:4px 8px; }
.mobile-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:1500; }
.mobile-overlay.show { display:block; }
.mobile-drawer { position:fixed; top:0; right:-280px; width:260px; height:100vh; background:#2c3e50; color:white; z-index:1800; transition:right .3s; overflow-y:auto; padding:60px 0 20px; }
.mobile-drawer.open { right:0; }
.drawer-close { position:absolute; top:14px; right:14px; background:none; border:none; color:white; font-size:22px; cursor:pointer; }
.drawer-section { padding:10px 0; border-bottom:1px solid rgba(255,255,255,.08); }
.drawer-section-title { padding:8px 20px 4px; font-size:11px; color:rgba(255,255,255,.4); text-transform:uppercase; letter-spacing:.5px; }
.drawer-item { padding:11px 24px; cursor:pointer; font-size:14px; color:rgba(255,255,255,.85); }
.drawer-item:hover { background:#3498db; color:white; }
.drawer-folder { padding:11px 24px; cursor:pointer; font-size:14px; color:rgba(255,255,255,.85); display:flex; align-items:center; gap:8px; }
.drawer-folder:hover { background:rgba(255,255,255,.08); }
.drawer-folder-list { display:none; }
.drawer-folder-list .drawer-item { padding-left:40px; font-size:13px; }
.drawer-loading { padding:10px 24px; font-size:13px; color:rgba(255,255,255,.4); }

/* ── 히어로 ── */
.hero-section {
  position:relative;
  background:linear-gradient(135deg,#0a2342 0%,#1a3a5c 50%,#0d3b6e 100%);
  color:white;
  padding:64px 60px 48px;
  min-height:280px;
  display:flex; align-items:center;
  overflow:hidden;
}
.hero-section::before {
  content:''; position:absolute; top:-60px; right:-60px;
  width:400px; height:400px;
  background:radial-gradient(circle,rgba(52,152,219,.15) 0%,transparent 70%);
  pointer-events:none;
}
.hero-inner {
  position:relative; z-index:2; max-width:480px;
}
.hero-graph {
  width:100%; height:calc(100vh - 340px);
  min-height:320px;
  background:#1a1a2e;
  position:relative;
}
.hero-graph svg { width:100%; height:100%; display:block; }
@media (max-width:768px) {
  .hero-section { padding:40px 20px 36px; min-height:auto; }
  .hero-graph { height:320px; }
}
.hero-tag { display:inline-block; font-size:11px; font-weight:600; letter-spacing:2px; text-transform:uppercase; color:#64b5f6; border:1px solid rgba(100,181,246,.4); padding:4px 12px; border-radius:20px; margin-bottom:20px; }
.hero-title { font-size:36px; font-weight:700; line-height:1.25; margin-bottom:14px; }
.hero-title span { color:#64b5f6; }
.hero-subtitle { font-size:14px; color:rgba(255,255,255,.6); line-height:1.7; max-width:520px; }
.hero-deco { position:absolute; right:60px; top:50%; transform:translateY(-50%); display:flex; flex-direction:column; gap:10px; opacity:.12; }
.hero-deco-line { height:2px; background:white; border-radius:2px; }

/* ── 통계 바 ── */
.stats-bar { background:#f5f7fa; border-bottom:1px solid #e8edf2; padding:14px 60px; display:flex; align-items:center; gap:40px; }
.stats-bar-label { font-size:11px; color:#999; font-weight:600; letter-spacing:1px; text-transform:uppercase; white-space:nowrap; }
.stats-bar-items { display:flex; gap:32px; flex:1; }
.stats-bar-item { display:flex; align-items:center; gap:8px; font-size:12px; color:#666; }
.stats-bar-num { font-size:16px; font-weight:700; color:#1a3a5c; }
.stats-bar-reset { font-size:11px; color:#e74c3c; cursor:pointer; border:1px solid #fcc; background:#fff5f5; padding:4px 10px; border-radius:4px; white-space:nowrap; }
.stats-bar-reset:hover { background:#fee; }

/* ── 로그 ── */
.main-content { padding:40px 60px; }
.section-title { font-size:13px; font-weight:700; color:#1a3a5c; letter-spacing:1px; text-transform:uppercase; border-left:3px solid #3498db; padding-left:10px; margin-bottom:14px; }
.log-table-wrap { border:1px solid #e8edf2; border-radius:8px; overflow:hidden; margin-bottom:28px; }
.log-scroll { max-height:160px; overflow-y:auto; }
.log-table { width:100%; border-collapse:collapse; font-size:12px; }
.log-table th { background:#f5f7fa; color:#888; font-weight:600; padding:9px 14px; text-align:left; border-bottom:1px solid #e8edf2; }
.log-table td { padding:9px 14px; border-bottom:1px solid #f0f3f6; color:#444; }
.log-table tr:last-child td { border-bottom:none; }
.log-empty { padding:20px; text-align:center; color:#bbb; font-size:12px; }
.two-col { display:grid; grid-template-columns:1fr 1fr; gap:28px; }

/* ── 옵시디안 그래프 ── */
.graph-wrap { border:1px solid #e8edf2; border-radius:8px; overflow:hidden; margin-bottom:28px; background:#1a1a2e; position:relative; }
.graph-wrap svg { display:block; width:100%; height:340px; }
.graph-node { cursor:pointer; }
.graph-node circle { stroke-width:1.5; transition:r .2s; }
.graph-node:hover circle { r:7; }
.graph-node text { font-size:9px; fill:rgba(255,255,255,0.7); pointer-events:none; }
.graph-link { stroke:rgba(100,181,246,0.3); stroke-opacity:1; stroke-width:1; }
.graph-controls { position:absolute; bottom:8px; right:8px; display:flex; gap:4px; z-index:10; }
.graph-btn { background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.2); color:white; padding:4px 8px; border-radius:4px; cursor:pointer; font-size:11px; }
.graph-btn:hover { background:rgba(255,255,255,0.2); }
.graph-tooltip { position:fixed; background:rgba(0,0,0,0.8); color:white; padding:4px 8px; border-radius:4px; font-size:11px; pointer-events:none; display:none; z-index:99999; }

/* ── 히어로 풀스크린 그래프 ── */
.hero-graph { opacity:0; transition:opacity 1s ease; }
.hero-graph.loaded { opacity:1; }

/* ── 통계 패널 (소개 메뉴 하단) ── */
.stats-panel { background:#f8fafc; border:1px solid #e8edf2; border-radius:8px; padding:20px; margin-top:28px; }
.stats-panel-title { font-size:13px; font-weight:700; color:#64748b; letter-spacing:1px; text-transform:uppercase; margin-bottom:16px; }
.stats-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin-bottom:20px; }
.stats-card { background:white; border:1px solid #e8edf2; border-radius:8px; padding:14px; text-align:center; }
.stats-card-num { font-size:28px; font-weight:800; color:#3498db; }
.stats-card-label { font-size:11px; color:#94a3b8; margin-top:4px; }
.stats-log-wrap { background:white; border:1px solid #e8edf2; border-radius:8px; overflow:hidden; margin-top:12px; }
.stats-log-title { padding:10px 14px; font-size:12px; font-weight:700; color:#64748b; background:#f8fafc; border-bottom:1px solid #e8edf2; display:flex; justify-content:space-between; align-items:center; }
.stats-reset-btn { background:none; border:1px solid #e2e8f0; border-radius:4px; padding:3px 8px; font-size:11px; color:#94a3b8; cursor:pointer; }
.stats-reset-btn:hover { background:#fee2e2; color:#ef4444; border-color:#fca5a5; }

@media (max-width:768px) {
  .navbar-menu { display:none; }
  .hamburger { display:block; }
  .hero-section { padding:40px 20px 36px; min-height:60vh !important; }
  .hero-deco { display:none; }
  .hero-title { font-size:24px; }
  .main-content { padding:24px 20px; }
  .two-col { grid-template-columns:1fr; }
  .file-inner { padding:20px 16px; }
  .stats-grid { grid-template-columns:repeat(3,1fr); gap:8px; }
}
</style>

/* gapi는 나중에 비동기 로드 - 없어도 메뉴는 동작 */
function loadGapi() {
  return new Promise((res) => {
    if (window.gapi) { res(); return; }
    const s = document.createElement('script');
    s.src = 'https://apis.google.com/js/api.js';
    s.onload = res;
    s.onerror = res; // 실패해도 계속 진행
    document.head.appendChild(s);
  });
}
</script>

// GitHub API 헬퍼
async function ghGetTree() {
  const r = await fetch(
    `${GITHUB_API}/repos/${GITHUB_OWNER}/${GITHUB_REPO}/git/trees/${GITHUB_BRANCH}?recursive=1`
  );
  if (!r.ok) throw new Error('GitHub 트리 로드 실패');
  const data = await r.json();
  return data.tree.filter(f => f.type === 'blob' && f.path.endsWith('.md'));
}

async function ghGetRawFile(path) {
  const r = await fetch(
    `https://raw.githubusercontent.com/${GITHUB_OWNER}/${GITHUB_REPO}/${GITHUB_BRANCH}/${path}`
  );
  if (!r.ok) throw new Error(`파일 로드 실패: ${path}`);
  return await r.text();
}

/* ── Google Drive ── */
function initGapi() {
  return new Promise(async (res,rej) => {
    if (driveInit) { res(); return; }
    await loadGapi();
    if (!window.gapi) { rej(new Error('gapi 로드 실패')); return; }
    gapi.load('client', async () => {
      try { await gapi.client.init({ apiKey:GOOGLE_API_KEY, discoveryDocs:['https://www.googleapis.com/discovery/v1/apis/drive/v3/rest'] }); driveInit=true; res(); }
      catch(e) { rej(e); }
    });
  });
}
async function fetchDriveFiles(id) {
  await initGapi();
  const r = await gapi.client.drive.files.list({ q:`'${id}' in parents and trashed=false`, pageSize:100, fields:'files(id,name,mimeType)' });
  return r.result.files||[];
}

  const dd  = document.getElementById('dd-'  + openId);
  const btn = document.getElementById('btn-' + openId);

  if (btn) btn.classList.remove('open');
  openId = null;
}

document.addEventListener('click', function(e) {

});

          if (capturedFolder === '자료실(구글드라이브)' && capturedDd.childElementCount === 0) await populateServiceMenu(capturedDd);

async function downloadObsidianFile(filePath, name) {
  try {
    const r = await fetch(
      `https://raw.githubusercontent.com/${GITHUB_OWNER}/${GITHUB_REPO}/${GITHUB_BRANCH}/${filePath}`
    );
    if (!r.ok) throw new Error('다운로드 실패');
    const blob = await r.blob();
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href=url; a.download=name+'.md';
    document.body.appendChild(a); a.click(); URL.revokeObjectURL(url); a.remove();
    recordDownload(name, filePath);
  } catch(e) { alert(e.message); }
}

/* ── 파일 로드 ── */
async function loadFile(filePath, itemName, folder) {
  // 대시보드 숨기고 파일 모드로 전환
  const dash = document.getElementById('dashboard');
  if (dash) dash.style.display = 'none';
  contentEl.innerHTML=`<div class="file-inner"><div class="breadcrumb">${folder} > ${itemName}</div><div class="loading"><div class="loading-spinner"></div></div></div>`;
  if (filePath==='STATS')       { renderStats(folder,itemName); return; }
  if (filePath==='INTRO_STATS') { renderIntroStats(); return; }
  try {
    const r = await fetch(filePath);
    if (!r.ok) throw new Error(`파일 없음: ${filePath}`);
    const md = await r.text();
    contentEl.className='content markdown-body';
    contentEl.innerHTML=`<div class="file-inner"><div class="breadcrumb">${folder} > ${itemName}</div>${mdToHtml(md)}</div>`;
  } catch(e) {
    contentEl.innerHTML=`<div class="file-inner"><div class="breadcrumb">${folder} > ${itemName}</div><div class="err">❌ ${e.message}</div></div>`;
  }
}

function renderStats(folder, itemName) {

  dlStats.sort((a,b)=>new Date(b.lastDownload)-new Date(a.lastDownload));

  let dlRows = dlStats.length
    ? dlStats.map(s=>`<tr style="border-bottom:1px solid #f0f4f8"><td style="padding:10px 14px">${s.fileName}</td><td style="padding:10px 14px;text-align:center;color:#3498db;font-weight:700">${s.count}회</td><td style="padding:10px 14px;font-size:12px;color:#94a3b8">${s.lastDownload}</td></tr>`).join('')
    : '<tr><td colspan="3" style="padding:20px;text-align:center;color:#94a3b8">기록 없음</td></tr>';

  let visitRows = visits.slice(0,20).length

  contentEl.className='content markdown-body';

      <div class="stats-panel-title">📊 사용 통계</div>

        <div class="stats-card"><div class="stats-card-num">${dlStats.reduce((a,s)=>a+s.count,0)}</div><div class="stats-card-label">총 다운로드</div></div>
        <div class="stats-card"><div class="stats-card-num">${dlStats.length}</div><div class="stats-card-label">파일 종류</div></div>
      </div>
      <div class="stats-log-wrap">
        <div class="stats-log-title">⬇️ 다운로드 통계 <button class="stats-reset-btn" onclick="resetAllStats()">🗑️ 초기화</button></div>
        <table style="width:100%;border-collapse:collapse">
          <tr style="background:#f8fafc;font-size:12px;color:#64748b"><th style="padding:8px 14px;text-align:left">파일명</th><th style="padding:8px 14px;text-align:center">횟수</th><th style="padding:8px 14px;text-align:left">마지막</th></tr>

        <div class="stats-log-title">👁️ 최근 접속 기록</div>
        <table style="width:100%;border-collapse:collapse">
          <tr style="background:#f8fafc;font-size:12px;color:#64748b"><th style="padding:8px 14px;text-align:left">시간</th><th style="padding:8px 14px;text-align:left">IP</th></tr>

      </div>
    </div>
  </div>`;
}

/* ── 마크다운 → HTML ── */
function mdToHtml(md) {
  return '<p>'+md
    .replace(/^### (.+)$/gm,'<h3>$1</h3>')
    .replace(/^## (.+)$/gm,'<h2>$1</h2>')
    .replace(/^# (.+)$/gm,'<h1>$1</h1>')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/\*(.+?)\*/g,'<em>$1</em>')
    .replace(/\[(.+?)\]\((.+?)\)/g,'<a href="$2" target="_blank">$1</a>')
    .replace(/`(.+?)`/g,'<code>$1</code>')
    .replace(/^- (.+)$/gm,'<li>$1</li>')
    .replace(/\n\n/g,'</p><p>')+'</p>';
}

/* ── 통계 ── */
function recordDownload(name, id) {
  let s = JSON.parse(localStorage.getItem('downloadStats')||'[]');
  const now = new Date().toLocaleString('ko-KR');
  const ex = s.find(x=>x.fileId===id);
  if (ex) { ex.count++; ex.lastDownload=now; }
  else s.push({ fileId:id, fileName:name, count:1, firstDownload:now, lastDownload:now });
  localStorage.setItem('downloadStats', JSON.stringify(s));
  renderDashboard();
}

async function recordVisit() {
  let ip='알 수 없음';
  try { const r=await fetch('https://api.ipify.org?format=json'); ip=(await r.json()).ip; } catch(e){}
  let v = JSON.parse(localStorage.getItem('visitLog')||'[]');
  v.unshift({ time:new Date().toLocaleString('ko-KR'), ip });
  if (v.length>50) v=v.slice(0,50);
  localStorage.setItem('visitLog', JSON.stringify(v));
  renderDashboard();
}

/* ── 옵시디안 그래프 ── */
let graphZoom = null, graphSvg = null;

async function initObsidianGraph() {
  const wrap = document.getElementById('graph-wrap');
  const svg  = document.getElementById('obs-graph');
  if (!svg || !wrap) return;

  // 로딩 표시
  svg.innerHTML = '<text x="50%" y="50%" text-anchor="middle" fill="#666" font-size="13" dy=".3em">⏳ 그래프 로딩 중...</text>';

  try {
    // GitHub 트리에서 노드 생성
    const tree = await ghGetTree();
    const nodes = tree
      .filter(f => !f.path.startsWith('.'))
      .map(f => {
        const parts = f.path.split('/');
        const name   = parts[parts.length-1].replace(/\.md$/, '');
        const folder = parts.length > 1 ? parts.slice(0,-1).join('/') : '루트';
        return { id: f.path.replace(/\.md$/, ''), name, path: f.path, folder };
      });

    if (!nodes.length) {
      svg.innerHTML = '<text x="50%" y="50%" text-anchor="middle" fill="#aaa" font-size="13" dy=".3em">노트가 없습니다</text>';
      return;
    }

    // 링크는 파일 내용 없이 폴더 기반으로 생성 (API 호출 최소화)
    const links = [];
    const folderMap = {};
    nodes.forEach(n => {
      if (!folderMap[n.folder]) folderMap[n.folder] = [];
      folderMap[n.folder].push(n.id);
    });
    // 같은 폴더 내 노드끼리 연결 (최대 3개)
    Object.values(folderMap).forEach(ids => {
      for (let i = 0; i < Math.min(ids.length-1, 3); i++) {
        links.push({ source: ids[i], target: ids[i+1] });
      }
    });

    drawGraph(svg, nodes, links);
    document.getElementById('graph-wrap').classList.add('loaded');
  } catch(e) {
    svg.innerHTML = `<text x="50%" y="50%" text-anchor="middle" fill="#e74c3c" font-size="12" dy=".3em">⚠️ GitHub 연결 실패: ${e.message}</text>`;
  }
}

function drawGraph(svgEl, nodes, links) {
  const rect = svgEl.getBoundingClientRect();
  const W = rect.width  || svgEl.parentElement.offsetWidth  || 800;
  const H = rect.height || svgEl.parentElement.offsetHeight || 320;
  const tooltip = document.getElementById('graph-tooltip');

  // 폴더별 색상
  const folders = [...new Set(nodes.map(n => n.folder))];
  // 히어로 네이비 배경에 어울리는 밝은 색상 팔레트
  const palette = ['#64b5f6','#81c784','#ffb74d','#f06292','#ce93d8','#4dd0e1','#fff176','#a5d6a7'];
  const colors  = d3.scaleOrdinal(palette).domain(folders);

  const svg = d3.select(svgEl)
    .attr('width', W).attr('height', H);
  svg.selectAll('*').remove();

  // zoom
  graphZoom = d3.zoom().scaleExtent([0.2, 4])
    .on('zoom', (e) => g.attr('transform', e.transform));
  svg.call(graphZoom);

  const g = svg.append('g');

  // 시뮬레이션
  const sim = d3.forceSimulation(nodes)
    .force('link',    d3.forceLink(links).id(d => d.id).distance(80))
    .force('charge',  d3.forceManyBody().strength(-80))
    .force('center',  d3.forceCenter(W/2, H/2))
    .force('collide', d3.forceCollide(16))
    .alphaDecay(0)          // 시뮬레이션 멈추지 않음
    .alphaMin(0)            // 최소 에너지 0
    .velocityDecay(0.3);    // 속도 감쇠 (너무 빠르지 않게)

  // 노드에 초기 랜덤 속도 부여 (계속 흘러다니게)
  nodes.forEach(n => {
    n.vx = (Math.random() - 0.5) * 2;
    n.vy = (Math.random() - 0.5) * 2;
  });

  // 링크
  const link = g.append('g').selectAll('line')
    .data(links).join('line').attr('class', 'graph-link');

  // 노드
  const node = g.append('g').selectAll('g')
    .data(nodes).join('g')
    .attr('class', 'graph-node')
    .call(d3.drag()
      .on('start', (e,d) => { if(!e.active) sim.alphaTarget(0.3).restart(); d.fx=d.x; d.fy=d.y; })
      .on('drag',  (e,d) => { d.fx=e.x; d.fy=e.y; })
      .on('end',   (e,d) => { if(!e.active) sim.alphaTarget(0); d.fx=null; d.fy=null; })
    )
    .on('mouseover', (e,d) => {
      tooltip.style.display='block';
      tooltip.textContent = `${d.name} (${d.folder})`;
    })
    .on('mousemove', (e) => {
      tooltip.style.left = (e.clientX+12)+'px';
      tooltip.style.top  = (e.clientY-28)+'px';
    })
    .on('mouseout', () => { tooltip.style.display='none'; })
    .on('click', (e,d) => {
      // 클릭 시 파일 열기
      loadObsidianFileByPath(d.path, d.name, d.folder);
    });

  // 연결 수에 따라 반지름 조절
  const linkCount = {};
  links.forEach(l => {
    linkCount[l.source.id||l.source] = (linkCount[l.source.id||l.source]||0)+1;
    linkCount[l.target.id||l.target] = (linkCount[l.target.id||l.target]||0)+1;
  });

  node.append('circle')
    .attr('r',    d => Math.min(5 + (linkCount[d.id]||0) * 1.5, 14))
    .attr('fill', d => colors(d.folder))
    .attr('stroke', d => d3.color(colors(d.folder))?.darker(0.8) || '#fff');

  node.append('text')
    .attr('x', 0).attr('y', d => Math.min(5 + (linkCount[d.id]||0)*1.5, 14) + 10)
    .attr('text-anchor', 'middle')
    .text(d => d.name.length > 12 ? d.name.slice(0,12)+'…' : d.name);

  sim.on('tick', () => {
    link.attr('x1', d=>d.source.x).attr('y1', d=>d.source.y)
        .attr('x2', d=>d.target.x).attr('y2', d=>d.target.y);
    node.attr('transform', d=>`translate(${d.x},${d.y})`);
  });

  graphSvg = svg;
}

async function loadObsidianFileByPath(filePath, name, folder) {
  contentEl.className='content markdown-body';
  contentEl.innerHTML=`<div class="file-inner"><div class="breadcrumb">자료실(옵시디안) > ${folder} > ${name}</div><div class="loading"><div class="loading-spinner"></div></div></div>`;
  try {
    const data = await ghGetRawFile(filePath);
    contentEl.innerHTML=`<div class="file-inner"><div class="breadcrumb">자료실(옵시디안) > ${folder} > ${name}</div><h2 style="margin-bottom:20px">${name}</h2><button onclick="downloadObsidianFile('${filePath}','${name}')" style="padding:8px 16px;background:#3498db;color:white;border:none;border-radius:4px;cursor:pointer;margin-bottom:20px">⬇️ 다운로드</button>${mdToHtml(data)}</div>`;
  } catch(e) {
    contentEl.innerHTML=`<div class="file-inner"><div class="err">❌ ${e.message}</div></div>`;
  }
}

function zoomIn()    { if(graphZoom&&graphSvg) graphSvg.transition().call(graphZoom.scaleBy, 1.4); }
function zoomOut()   { if(graphZoom&&graphSvg) graphSvg.transition().call(graphZoom.scaleBy, 0.7); }
function resetZoom() { if(graphZoom&&graphSvg) graphSvg.transition().call(graphZoom.transform, d3.zoomIdentity); }

</script>
